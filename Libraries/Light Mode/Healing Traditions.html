</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{background:#FBFEF5;font-family:"Helvetica Neue",Helvetica,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::selection{background:#2D9AAD;color:#fff;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(133,212,224,0.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(133,212,224,0.32);}
input::placeholder{color:#5f7888;}
input:focus{outline:none;border-color:rgba(91,196,214,0.5)!important;box-shadow:0 0 0 2px rgba(45,154,173,0.12);}
button{font-family:inherit;}
#mainscroll{scroll-behavior:smooth;}
table{font-family:inherit;}

/* ── GLOBAL COSMIC STAGE (behind detail/category/search/compare) ── */
.cosmic-stage{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 44% at 50% 4%, rgba(212,160,23,0.10), transparent 58%),
    radial-gradient(ellipse 80% 50% at 50% 10%, rgba(45,154,173,0.12), transparent 60%),
    radial-gradient(ellipse 90% 55% at 50% 112%, rgba(45,154,173,0.10), transparent 62%),
    linear-gradient(180deg,#FFFBEB 0%,#FBFEF5 40%,#EAF7F0 100%);}
/* faint diagonal galaxy arc */
.mw-arc{position:absolute;inset:auto -16% 24% -16%;height:54%;
  background:
    radial-gradient(ellipse 60% 58% at 42% 60%, rgba(140,175,225,0.16) 0%, rgba(140,175,225,0.05) 40%, transparent 70%),
    radial-gradient(ellipse 44% 44% at 64% 52%, rgba(175,135,225,0.11) 0%, transparent 64%),
    radial-gradient(ellipse 40% 40% at 30% 66%, rgba(130,205,224,0.10) 0%, transparent 64%);
  transform:rotate(-13deg);filter:blur(6px);opacity:.85;}

/* ── REALISTIC STARFIELD ──
   Three coordinated layers: fine field, mid field, and bright glow-stars.
   Bright stars get a soft halo via a larger faint radial at the same point. */
.stars,.mw-stars{position:absolute;inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 7% 18%,#eaf3ff 99%,transparent),
    radial-gradient(1px 1px at 13% 41%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 19% 9%,#fff 99%,transparent),
    radial-gradient(1.4px 1.4px at 23% 63%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 29% 27%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 34% 78%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 39% 14%,#fff 99%,transparent),
    radial-gradient(1px 1px at 44% 49%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 48% 88%,#c4d8ff 99%,transparent),
    radial-gradient(1.4px 1.4px at 53% 33%,#fff 99%,transparent),
    radial-gradient(1px 1px at 58% 70%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 63% 11%,#bcd2ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 68% 54%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 73% 84%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 78% 23%,#fff 99%,transparent),
    radial-gradient(1.3px 1.3px at 83% 61%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 88% 38%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 93% 73%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 97% 16%,#fff 99%,transparent);
  background-repeat:no-repeat;animation:twinkle 7s ease-in-out infinite alternate;}
.stars.layer-2{
  background-image:
    radial-gradient(1px 1px at 5% 55%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 16% 84%,#fff 99%,transparent),
    radial-gradient(1px 1px at 27% 47%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 36% 92%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 49% 19%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 61% 87%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 71% 40%,#fff 99%,transparent),
    radial-gradient(1px 1px at 82% 92%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 91% 57%,#dce9ff 99%,transparent);
  animation-duration:10s;animation-direction:alternate-reverse;opacity:.7;}
/* bright glow-stars: a sharp core + a soft halo around a handful of points */
.stars-bright,.mw-stars-bright{position:absolute;inset:0;
  background-image:
    radial-gradient(2px 2px at 21% 30%,#fff 60%,rgba(255,255,255,0.0) 100%),
    radial-gradient(7px 7px at 21% 30%,rgba(207,224,255,0.5) 0%,transparent 70%),
    radial-gradient(2px 2px at 57% 22%,#fff 60%,transparent 100%),
    radial-gradient(8px 8px at 57% 22%,rgba(173,135,225,0.4) 0%,transparent 70%),
    radial-gradient(2.4px 2.4px at 79% 58%,#fff 60%,transparent 100%),
    radial-gradient(9px 9px at 79% 58%,rgba(130,205,224,0.45) 0%,transparent 70%),
    radial-gradient(2px 2px at 40% 70%,#fff 60%,transparent 100%),
    radial-gradient(7px 7px at 40% 70%,rgba(207,224,255,0.4) 0%,transparent 70%);
  background-repeat:no-repeat;animation:twinkle 5s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.5}50%{opacity:.95}100%{opacity:.6}}

/* gold celestial beam, V9 signature, behind dark views */
.beam-gold{position:absolute;left:50%;top:-20%;width:220px;height:92%;transform:translateX(-50%) rotate(8deg);

  evidence: 'This is the single clearest case of a traditional remedy validated by rigorous modern science. In a 1960s-70s Chinese program, the chemist Tu Youyou screened over 2,000 traditional recipes; the breakthrough came when an ancient instruction to steep the herb in cool water (rather than boil it) revealed that heat was destroying the active compound. Isolating pure artemisinin from sweet wormwood produced a malaria treatment that has saved millions of lives and became the global frontline therapy. Tu Youyou received the 2015 Nobel Prize in Physiology or Medicine, the first for a discovery drawn from traditional Chinese medicine. The validation is unambiguous: the tradition pointed to the plant; modern methods isolated, proved, and scaled the cure.',
  risk: 'Artemisinin-based therapy is highly effective and safe when used correctly as combination therapy (ACT) under medical guidance. The real risks are using the raw herb or artemisinin alone (which can foster drug resistance, a serious global concern), and substituting unproven herbal "antimalarials" for proper treatment of a deadly disease. Malaria is a medical emergency; this entry celebrates a validated derivative, not self-treatment with wormwood tea.',
  safetyFlag: 'caution',
  diffusion: 'A remedy native to Asia that, once isolated and proven, traveled everywhere malaria is endemic, South and Southeast Asia, sub-Saharan Africa, South America. Artemisia species themselves grow across temperate Asia, Europe, and North Africa, and wormwoods feature in several herbal traditions, but the validated antimalarial path runs specifically from Chinese classical texts to the global pharmacy.',
  tag: 'A 1,600-year-old Chinese fever remedy became the world\'s frontline malaria cure and won a Nobel Prize, the clearest proof that tradition can point science to something real.',
  facts: [['Plant', 'Artemisia annua (sweet wormwood / qinghao)'], ['First recorded', '~317-420 AD (Ge Hong)'], ['Isolated by', 'Tu Youyou (1970s)'], ['Nobel Prize', '2015 (Physiology or Medicine)']],
  brief: 'If you want one story that captures why traditional medicine deserves serious study rather than reflexive dismissal, it is this one. Sweet wormwood was used in China for "intermittent fevers", malaria, for at least sixteen centuries, recorded in a handbook from around 317-420 AD. In a Cold War-era research program, chemist Tu Youyou combed thousands of traditional recipes; the decisive clue was an ancient line instructing a cold-water preparation, which told her that boiling destroyed the active ingredient. Extracting pure artemisinin yielded a malaria drug that kills the parasite faster than anything before it and has since saved millions of lives, earning Tu the 2015 Nobel Prize. The lesson the library draws is precise: the tradition was not "validated into existence", it already worked. Science isolated the compound, proved the mechanism, and scaled it to the world.',
  mf: [['Traditional remedies never lead to real medicines.', 'Artemisinin is a direct refutation: a 1,600-year-old Chinese fever remedy became the global frontline malaria cure and earned a Nobel Prize. Tradition pointed to the plant; science isolated and proved the cure.'], ['Since wormwood cures malaria, wormwood tea is a safe self-treatment.', 'No. The validated medicine is purified artemisinin used in combination therapy under medical care. Using the raw herb or artemisinin alone risks treatment failure and drug resistance, and malaria is a medical emergency.']],

  rel: ['aristolochic-acid', 'willow-aspirin', 'meaning-response', 'ephedra'],
  enelNote: 'The flagship "validated by rigorous science" entry, and the cleanest possible illustration of Jeffrey\'s framing that validation is science catching up, not conferring reality. We tell the full past-to-present arc (ancient text -> cold-extraction insight -> isolated compound -> Nobel -> global cure), keep the safety note about monotherapy/resistance and self-treatment, and pair it deliberately with aristolochic acid, same tradition, opposite evidence verdict, to model honest two-layer assessment.',

  cats: ['herbal', 'safety', 'tradition', 'travel'],

  traditions: ['Traditional Chinese Medicine', 'Balkan folk exposure'],
  region: 'East Asia, Balkans; cases worldwide',
  geo: [['Belgian cohort developing kidney failure', 70], ['Urothelial cancer in exposed', 45]],
  cultural: 'Plants in the Aristolochia family (and related Asarum) have long appeared in Chinese and other herbal traditions, used for conditions from edema to arthritis. They carry classical names and a place in the materia medica, which is exactly why the harm went unrecognized for so long: cultural standing is not a safety guarantee, and a respected traditional plant can still be deadly.',
  mechanism: 'Aristolochic acid forms DNA adducts that cause a distinctive pattern of mutations (including in the TP53 tumor-suppressor gene), driving both progressive kidney scarring and urothelial (urinary-tract) cancers. The DNA-adduct fingerprint is what let researchers prove causation.',
  evTier: 'harmful',
  evidence: 'This is the flagship case of rigorous science documenting that a traditional remedy causes serious harm. In the early 1990s, doctors in Belgium noticed a cluster of young women on a slimming regimen developing rapidly progressive kidney failure; the cause was traced to a slimming-clinic herb mix in which one plant was substituted for an Aristolochia species (the two shared a Pin Yin name). More than 100 Belgian patients were affected, roughly 70% progressed to end-stage kidney disease, and 40-46% developed urinary-tract cancer. The same disease was then documented on a large scale in Taiwan, tied to widespread herbal use, and corroborated by the specific DNA-adduct signature in tumor tissue. Aristolochic acid is now classified as a potent human carcinogen and Aristolochia herbs are banned or restricted in many countries.',
  risk: 'This is a hard safety flag. Aristolochic acid is a definitive human carcinogen and kidney toxin: exposure can cause irreversible kidney failure and urinary-tract cancers, sometimes years after use stops. The danger is compounded by botanical substitution, herbs sharing common names can be swapped, so a product may contain Aristolochia without saying so. Anyone who has used Aristolochia-containing remedies (sometimes labeled with names like Mu Tong, Fang Ji, or Asarum-based preparations) should tell their doctor. No traditional standing or "natural" label offsets a proven carcinogen.',
  safetyFlag: 'dangerous',
  diffusion: 'A harm that surfaced first in Belgium (in patients taking an Asian herb), then was documented across Taiwan and East Asia, with cases reported worldwide, and a parallel environmental exposure in Balkan farming villages where Aristolochia grew among wheat (the long-mysterious "Balkan endemic nephropathy"). It is a striking case of the same toxin appearing through both deliberate herbal use and accidental food contamination across very different cultures.',
  tag: 'A respected herbal-medicine plant turned out to cause kidney failure and cancer, the clearest example of why cultural standing is not a safety guarantee.',
  facts: [['Toxin', 'Aristolochic acid (DNA-adduct carcinogen)'], ['First cluster', 'Belgian slimming clinic, early 1990s'], ['Progressed to kidney failure', '~70% of that cohort'], ['Developed urinary-tract cancer', '~40-46%']],
  brief: 'If artemisinin shows that tradition can point to a real cure, aristolochic acid shows the equally important opposite: a plant with long cultural standing can be proven, by rigorous science, to maim and kill. In the early 1990s, Belgian physicians traced a cluster of young women\'s sudden kidney failure to a slimming-clinic herbal mix containing an Aristolochia species (swapped in via a shared common name). More than 100 were affected; about 70% reached end-stage kidney disease and nearly half developed urinary-tract cancer. The same toxin was then tied to a large epidemic in Taiwan and confirmed by a unique DNA-mutation fingerprint in patients\' tumors, and even to a decades-old mystery illness in Balkan farming villages where the plant contaminated wheat. Aristolochic acid is now a recognized potent carcinogen, banned in many countries. The library states this plainly: respect for a tradition never overrides a proven, severe harm.',
  mf: [['Herbal and "natural" remedies are inherently safe.', 'Aristolochic acid herbs are a definitive counterexample: a traditional, natural plant proven to cause irreversible kidney failure and cancer. "Natural" and "traditional" are not safety claims.'], ['If a plant has been used for centuries, it must be harmless.', 'Aristolochia had long classical standing, yet rigorous epidemiology and DNA evidence showed it is a potent carcinogen. Long use can hide slow, serious harm; cultural age is not safety data.']],
  voices: [{
    n: 'Vanherweghem et al. (The Lancet, 1993)',
    r: 'Physicians who found the cluster',
    stance: 'opposes',
    paid: false,
    q: 'Identified rapidly progressive kidney fibrosis in young women on a slimming regimen containing Chinese herbs, the first link between Aristolochia and the disease.'

  history: 'Aristolochia plants held long-standing places in Chinese and other herbal traditions until a 1990s Belgian slimming-clinic cluster exposed their toxicity. Investigation spread to Taiwan, where widespread herbal use produced a large epidemic, and molecular work proved causation via a unique DNA-adduct signature, which also solved the decades-old Balkan endemic nephropathy. Many countries subsequently banned or restricted these herbs.',
  timeline: [['Centuries', 'Aristolochia species used in several herbal traditions'], ['1993', 'Belgian cluster links the herb to kidney failure (Lancet)'], ['2000s', 'Taiwan epidemic and DNA-adduct evidence confirm cancer causation'], ['2000s-2010s', 'Bans and restrictions enacted in many countries']],
  rel: ['artemisinin', 'heavy-metal-bhasma', 'meaning-response', 'ephedra'],
  enelNote: 'The flagship "harmful" entry and the deliberate counterweight to artemisinin: same broad tradition, opposite verdict, both reached through rigorous science. It carries the portal\'s hardest safety message, cultural standing is not a safety guarantee, with a hard danger flag, the substitution-by-shared-name hazard, and a clear "tell your doctor" line. This is exactly the two-layer honesty (respect the tradition AND never soft-pedal a proven harm) Jeffrey asked for.',

  i: 'acupuncture',
  n: 'Acupuncture',
  fn: 'Needles, Meridians, and What the Trials Actually Show',

  cats: ['bodywork', 'tradition', 'mixed', 'travel', 'region'],
  cls: 'Needle Therapy',
  tradition: 'Traditional Chinese Medicine',
  traditions: ['Traditional Chinese Medicine', 'East Asian medicine'],
  region: 'China (origin); now worldwide',
  geo: [['Practiced and studied worldwide', 100]],
  cultural: 'Acupuncture is a cornerstone of Chinese medicine with roughly two millennia of recorded use, based on the theory of qi (vital energy) flowing along meridians, with fine needles placed at specific points to restore balance. It carries deep cultural and philosophical meaning across East Asia and has become one of the most widely practiced traditional therapies in the world.',
  mechanism: 'The traditional meridian/qi model is not supported by anatomical evidence. Proposed biomedical mechanisms include local nerve stimulation, release of endogenous opioids and other neurotransmitters, changes in pain processing, and connective-tissue and autonomic effects, plus a substantial contribution from the ritual and therapeutic-encounter (meaning) response.',
  evTier: 'mixed',
  evidence: 'Acupuncture is the classic "mixed evidence" case. For several conditions, notably chronic pain (back, neck, knee osteoarthritis), tension and migraine headache, and chemotherapy-related nausea, reviews find modest benefit over usual care, and major guidelines list it as an option. The complication: in many high-quality trials, "real" acupuncture barely outperforms "sham" acupuncture (needling at wrong points or with non-penetrating needles), which suggests much of the effect comes from the powerful ritual, expectation, and attention of the encounter rather than the specific points. Whether that makes acupuncture "real" depends on the question: it can genuinely help people feel better, even if the meridian theory is wrong and the mechanism is largely the meaning response.',
  risk: 'Performed by a trained, licensed practitioner with single-use sterile needles, acupuncture is relatively low-risk. Reported harms include bruising, fainting, and, rarely, infection or (very rarely) punctured organs (e.g., pneumothorax) with improper deep needling. The larger risk is opportunity cost: choosing acupuncture instead of effective treatment for a serious or progressive condition. As an adjunct for pain or nausea it is generally safe; as a replacement for needed medical care it is not.',
  safetyFlag: 'caution',
  diffusion: 'From China, acupuncture spread across East Asia (Japan, Korea, Vietnam each developed distinct styles) and, especially after the 1970s, into Western medicine, where it is now offered in pain clinics and hospitals worldwide. It also seeded microsystem offshoots, auricular (ear) acupuncture and the broader reflexology family, that reinterpret the "map the body onto one part" idea.',
  tag: 'A two-thousand-year-old needle therapy that modestly helps with pain and nausea, though trials suggest much of the benefit is the ritual, not the meridians.',
  facts: [['Origin', 'Traditional Chinese Medicine, ~2,000+ years'], ['Best evidence', 'Chronic pain, headache, nausea'], ['The catch', 'Often barely beats sham needling'], ['Theory status', 'Meridian/qi model not anatomically supported']],
  brief: 'Acupuncture is the portal\'s model of honest "mixed" evidence. The traditional theory, qi flowing along meridians, has no anatomical basis, yet the practice is not nothing. For chronic pain, headaches, and chemotherapy nausea, reviews show modest real-world benefit, and many guidelines list it as a reasonable option. The fascinating wrinkle is that in rigorous trials, genuine acupuncture often barely beats sham acupuncture, needling the "wrong" spots or with retractable needles, which points to the ritual, expectation, and attentive care doing much of the work. This is precisely where the library\'s framing matters: acupuncture can genuinely help people feel better even if the meridian map is wrong, because the meaning response is real. We hold both truths, the theory is not supported, and the practice can still bring relief, without forcing a false choice between them.',
  mf: [['Acupuncture works because it unblocks qi along meridians.', 'There\'s no anatomical evidence for qi or meridians. Where acupuncture helps (some pain, headache, nausea), the likely mechanisms are nerve and neurotransmitter effects plus a large ritual/meaning response, not energy flow.'], ['Because the theory is wrong, acupuncture does nothing.', 'Also too simple. Trials show modest benefit for certain conditions, and even if much of it is the meaning response, real relief is real. The honest verdict is mixed: helpful for some symptoms, via mechanisms other than the traditional ones.']],
  voices: [{
    n: 'Clinical-guideline panels',
    r: 'Pain and headache guidelines',
    stance: 'caveats',
    paid: false,
    q: 'List acupuncture as a reasonable option for chronic low-back pain, knee osteoarthritis, and some headaches, while noting modest effect sizes and evidence limitations.'

    n: 'Sham-controlled trialists',
    r: 'Acupuncture researchers',

    stance: 'cautions',
    paid: false,
    q: 'Argue the specific effects are small and theory-free, and caution against using acupuncture in place of treatments with stronger evidence.'

  history: 'Documented in China for over two millennia and elaborated across East Asia, acupuncture entered Western awareness dramatically in the 1970s and was subsequently subjected to controlled trials. Those trials produced the now-characteristic pattern, modest benefit for select conditions, but little separation from sham, reframing the debate from "does it work?" to "how does it work, and how much is ritual?"',
  timeline: [['~200 BC-200 AD', 'Acupuncture systematized in classical Chinese texts'], ['1970s', 'Acupuncture gains Western attention; trials begin'], ['2000s-2010s', 'Sham-controlled trials reveal modest, ritual-heavy effects'], ['2010s-2020s', 'Guidelines list it as an option for certain pain and nausea']],
  rel: ['reflex-microsystems', 'meaning-response', 'cupping', 'artemisinin'],
  enelNote: 'Acupuncture is the model "mixed-evidence" entry and a perfect companion to the meaning-response flagship: the theory is unsupported, the practice helps modestly, and much of the effect is ritual, all true at once. We refuse the false binary (mystical cure vs. total sham), name the sham-trial finding honestly, keep the opportunity-cost and rare-harm cautions, and link to reflexology and ear-acupuncture as its microsystem offspring.',

  i: 'cupping',
  n: 'Cupping Therapy',
  fn: 'The Suction Cups That Crossed Every Ancient World',

  tradition: 'Multiple (Egyptian, Greek, Chinese, Middle Eastern)',
  traditions: ['Ancient Egyptian', 'Greek (Hippocratic)', 'Traditional Chinese Medicine', 'Unani / hijama'],
  region: 'Near East, Mediterranean, East Asia; now global',
  geo: [['Practiced across many cultures, ancient to modern', 100]],
  cultural: 'Cupping, placing heated or suction cups on the skin to draw blood to the surface (and sometimes, in "wet" cupping/hijama, to draw small amounts of blood), is one of humanity\'s most widely shared therapies. It is documented in ancient Egypt, in Greek Hippocratic medicine, across the Islamic world as hijama (where it carries religious as well as medical significance), in Chinese medicine, and in folk practice from Finland to Latin America. The round marks it leaves became globally familiar when modern athletes appeared covered in them.',
  mechanism: 'Proposed mechanisms include increased local blood flow, connective-tissue and fascial effects, mild counter-irritation and pain-gate modulation, and a substantial relaxation and ritual (meaning) component. The traditional rationale, drawing out "stagnation," "bad blood," or imbalanced humors, reflects each culture\'s theory rather than a demonstrated mechanism.',
  evTier: 'mixed',
  evidence: 'Evidence is limited and generally low-quality. Some small trials and reviews suggest cupping may offer short-term relief for certain musculoskeletal and neck/back pain, but studies are often poorly controlled and blinding is nearly impossible (the marks give it away), so a large ritual/expectation component is likely. There is no good evidence it "detoxifies" or treats internal disease. The honest verdict is "traditional-use with weak, mixed support for short-term pain", a practice that may help people feel better, with mechanisms that are mostly non-specific.',
  risk: 'Dry cupping is generally low-risk, leaving characteristic circular bruises (not injuries) that fade in days. Wet cupping (hijama), which involves skin incisions, carries infection and bleeding risk and must be done with strict hygiene; it is inadvisable for people on blood thinners or with bleeding or clotting disorders or diabetes. Burns can occur with fire-cupping. As with other traditional therapies, the main risk is using it in place of effective treatment for a serious condition.',
  safetyFlag: 'caution',
  diffusion: 'One of the great cross-cultural diffusion stories: cupping appears independently and through trade across ancient Egypt, Greece and Rome, the Islamic world, China, and European and Latin American folk medicine, an idea so intuitive (suction draws something out) that many cultures arrived at it. It is a prime candidate for the portal\'s "shared across cultures" map, where the question of independent invention versus spread along trade and conquest routes is genuinely interesting.',
  tag: 'Suction cups used for healing from ancient Egypt to Greek, Islamic, and Chinese medicine, weak modern evidence for short-term pain, but a remarkable story of a practice nearly every culture reached.',
  facts: [['Forms', 'Dry cupping; wet cupping (hijama)'], ['Found in', 'Egypt, Greece, China, Islamic world, folk Europe'], ['Best (weak) evidence', 'Short-term musculoskeletal pain'], ['The marks', 'Bruises, not injuries; fade in days']],
  brief: 'Cupping is the portal\'s great cross-cultural traveler. The same basic act, applying suction to the skin to "draw something out", appears in ancient Egyptian and Greek medicine, across the Islamic world as hijama (with religious significance), in Chinese medicine, and in folk traditions from Northern Europe to Latin America. That near-universality is itself fascinating: an idea intuitive enough that many cultures invented or adopted it. The modern evidence is thin: some weak, mixed support for short-term musculoskeletal pain, no good evidence for "detox" or internal disease, and a likely large ritual component (you can\'t blind a treatment that leaves round marks). Dry cupping is low-risk; wet cupping (with skin incisions) needs real hygiene and caution. The library frames cupping as a genuine shared human practice with modest, non-specific effects, neither mystical cure nor pure theater.',
  mf: [['The marks from cupping are "toxins" being pulled out.', 'The circular marks are bruising from suction, broken capillaries near the skin, not toxins. There\'s no evidence cupping removes toxins or treats internal disease.'], ['Cupping is a single tradition (just Chinese medicine).', 'Cupping is one of the most widely shared therapies in history, documented in Egyptian, Greek, Islamic (hijama), Chinese, and European folk medicine. It\'s a cross-cultural practice, not the property of one tradition.']],
  voices: [{
    n: 'Cupping-trial reviewers',
    r: 'Systematic reviewers',

    q: 'Find low-quality evidence of possible short-term relief for some musculoskeletal pain, limited by poor blinding and a likely large non-specific (ritual) effect.'

    stance: 'cautions',
    paid: false,
    q: 'Warn that wet cupping involves skin incisions with real infection and bleeding risks and is inadvisable for those on blood thinners or with clotting disorders.'
  }],
  history: 'Cupping appears in some of the oldest medical records, ancient Egypt and Greek Hippocratic texts, and spread through the Islamic world (as hijama) and Chinese medicine, persisting in European and Latin American folk practice. It receded in Western medicine with the rise of biomedicine, then re-entered popular awareness in the 2010s via athletes, prompting renewed (if inconclusive) study.',
  timeline: [['Ancient', 'Documented in Egyptian and Greek (Hippocratic) medicine'], ['Medieval', 'Spreads across the Islamic world as hijama; central in TCM'], ['20th c.', 'Recedes in Western biomedicine, persists in folk practice'], ['2010s', 'Returns to popular attention via athletes; renewed study']],
  rel: ['acupuncture', 'sweat-bath', 'meaning-response', 'hijama-bloodletting'],
  enelNote: 'Cupping is a flagship diffusion entry, an almost-universal practice ideal for the cross-cultural map, and a clean "mixed/weak evidence, real ritual" case. We honor its many traditions (naming Egyptian, Greek, Islamic/hijama, Chinese, folk) without flattening them, debunk the "toxins in the marks" myth plainly, and split dry vs wet cupping on safety. The independent-invention-vs-spread question is exactly the kind of thing the planned diffusion map should visualize.',

  n: 'Psilocybin Mushrooms',
  fn: 'From Mazatec Ceremony to the Clinical Frontier',

  hot: true,
  ev: 2,
  cats: ['ceremonial', 'validated', 'tradition', 'travel', 'region'],

  traditions: ['Mazatec', 'Nahuatl', 'Zapotec', 'Mixe', 'other Mesoamerican peoples'],
  region: 'Mexico & Mesoamerica (origin); research worldwide',
  geo: [['US states with legal/decriminalized access (growing)', 30]],
  cultural: 'Psilocybe mushrooms have been used ceremonially for healing and divination by Indigenous peoples of Mexico and Central America, the Mazatec, Nahuatl, Zapotec, Mixe, and others, for many centuries, possibly far longer. In Mazatec tradition the mushrooms (los niños santos, "the holy children") are taken in a nighttime healing vigil (velada) led by a curandero/a such as the famed Mazatec healer Maria Sabina, whose 1950s ceremonies, shared with an outside visitor, became the bridge that carried these mushrooms into Western awareness (with painful consequences for her community).',
  mechanism: 'Psilocybin is converted in the body to psilocin, which acts on serotonin (5-HT2A) receptors, transiently reorganizing brain network activity. In therapy this is thought to create a window of psychological flexibility, often accompanied by a profound subjective/mystical experience, that, paired with skilled support, can shift entrenched patterns in depression and addiction.',
  evTier: 'validated',
  evidence: 'After a roughly 50-year research freeze, psilocybin has become one of the most promising areas in psychiatry. The US FDA granted it Breakthrough Therapy designation for treatment-resistant and major depression (2018-2019), reflecting strong preliminary trial evidence, and 2025 trials reported benefit for PTSD. Research also suggests efficacy for alcohol and tobacco use disorders, and for end-of-life anxiety. Importantly, the benefit appears tied to the supported, ritualized experience itself, a striking modern echo of the ceremonial context Indigenous traditions always insisted on. It remains investigational, not FDA-approved as a general medicine, and effects depend heavily on dose, set, and setting.',
  risk: 'Psilocybin has low physiological toxicity and is not considered addictive, but it carries real psychological risks: frightening experiences, lasting distress, and the potential to trigger or worsen psychosis or mania, especially in people with (or at risk for) bipolar or psychotic disorders. It can cause dangerous behavior if taken unsupervised, and misidentified wild mushrooms can be poisonous or deadly. Clinical benefit is observed in carefully screened, supervised settings; this entry documents the tradition and research, not a how-to, and is not guidance to self-treat. Psilocybin remains federally illegal (Schedule I) in the US even where states have created exceptions.',
  safetyFlag: 'serious',
  diffusion: 'A practice rooted in Mesoamerica that traveled into the West via mid-20th-century accounts of Mazatec ceremonies, then into laboratories, and now into a patchwork of legal frameworks: Oregon (regulated psilocybin services, 2020), Colorado (Natural Medicine Health Act, 2022), New Mexico (medical program, 2025), with compassionate or clinical access in Canada, Australia, and long-standing limited use in Switzerland. Nearby context for many readers: access and clinics have also emerged in Mexico, including near the border. The fungi themselves grow on several continents, and psychoactive-mushroom use appears in other cultures too, but the documented healing lineage centers on Mesoamerica.',
  tag: 'Sacred healing mushrooms of Mesoamerican peoples, frozen out of science for 50 years, now an FDA "breakthrough" candidate for depression and addiction, with the ceremony itself proving central.',
  facts: [['Traditional use', 'Mazatec and other Mesoamerican healing ceremonies'], ['FDA status', 'Breakthrough Therapy (depression); still investigational'], ['Emerging uses', 'Depression, PTSD, alcohol/tobacco use disorder'], ['US legal status', 'Schedule I federally; some state exceptions']],
  brief: 'Psilocybin is the portal\'s richest past-to-present arc. For centuries, Indigenous peoples of Mexico, Mazatec, Nahuatl, Zapotec and others, have used Psilocybe mushrooms in supported healing ceremonies; the Mazatec called them "the holy children," taken in a night vigil led by a curandera such as Maria Sabina. Her 1950s ceremonies became the bridge to the West (and brought harm to her community). After mid-century enthusiasm, research was frozen for roughly 50 years. It has since returned with force: the FDA granted psilocybin Breakthrough Therapy designation for depression, and trials point to benefit for PTSD and for alcohol and tobacco addiction. The most striking finding is how much the supported, ritualized experience matters, exactly what the traditions insisted on all along. The library presents this as documented tradition and live science, with hard safety framing and no instructions: it remains federally illegal, carries real psychological risk, and shows benefit only in screened, supervised settings.',
  mf: [['Psychedelic mushrooms are a modern recreational invention.', 'They have been used ceremonially for healing and divination by Mesoamerican peoples for centuries. The modern clinical interest is a return to, and study of, a very old practice, not a new one.'], ['Psilocybin is a proven, approved medicine you can use to self-treat depression.', 'It is investigational, not FDA-approved as a general medicine, and federally illegal. Benefits appear only in screened, supervised settings; unsupervised use carries real psychological risk, and it can be dangerous for people prone to psychosis or mania.']],

  history: 'Used ceremonially across Mesoamerica for centuries, Psilocybe mushrooms entered Western awareness through 1950s accounts of Mazatec veladas, sparking a wave of mid-century research that was halted by drug prohibition for roughly 50 years. Beginning in the 2000s, a research renaissance produced FDA Breakthrough designations and a spreading patchwork of state and national access frameworks, returning scientific attention to a practice Indigenous traditions had long sustained.',
  timeline: [['Centuries', 'Ceremonial healing use by Mazatec and other Mesoamerican peoples'], ['1950s', 'Mazatec veladas publicized to the West; research begins'], ['~1970-2000', 'Prohibition freezes psychedelic research'], ['2018-2025', 'FDA Breakthrough status; PTSD/addiction trials; state legal frameworks']],
  rel: ['peyote', 'meaning-response', 'ayahuasca', 'sweat-bath'],
  enelNote: 'The flagship past-to-present + current-legal-status entry Jeffrey specifically wanted (mushrooms historic-to-current, addiction and mental-health uses, the legal map including near the border). We honor the Mesoamerican lineage by name, tell the Maria Sabina bridge honestly (including the harm of extraction), give the live research and the legal patchwork, and apply hard safety framing: documented, not how-to; investigational and federally illegal; serious psychological risk; benefit only in supervised settings. The "ceremony itself matters" finding ties straight back to the meaning-response flagship.',

}, {
  i: 'sweat-bath',
  n: 'Sweat Baths (Temazcal, Sauna, Banya & More)',
  fn: 'The Cleansing Heat Humanity Built Everywhere',
  tier: 1,
  ts: 90,
  sig: 'hot',
  hot: true,
  ev: 2,
  cats: ['cleanse', 'bodywork', 'travel', 'tradition'],
  cls: 'Heat / Sweat Therapy',
  tradition: 'Many, worldwide (independent traditions)',
  traditions: ['Mesoamerican (temazcal)', 'Indigenous North American (inipi)', 'Finnish (sauna)', 'Russian (banya)', 'Turkish/Roman (hammam)', 'Korean (jjimjilbang)', 'African steam traditions'],
  region: 'Worldwide',
  geo: [['Cultures with a deep sweat-bath tradition', 100]],
  cultural: 'The sweat bath is one of humanity\'s most universal healing institutions, and almost every version is both physical and ceremonial. In Mexico and Mesoamerica the temazcal, a domed adobe chamber, is used for purification, healing, and ritual, often with medicinal herbs and the guidance of a temazcalero. Indigenous North American peoples hold the sweat lodge (inipi) as sacred ceremony. The Finnish sauna, Russian banya, Turkish hammam (with Roman roots), Korean jjimjilbang, and African steam traditions each carry their own deep cultural meaning. The shared core, gather, heat, sweat, often pray or cleanse, recurs across continents that had no contact.',
  mechanism: 'Heat exposure raises heart rate and cardiac output (much like moderate exercise), dilates blood vessels, triggers sweating and heat-shock responses, shifts autonomic balance toward relaxation, and reduces some inflammatory markers, plausible pathways for cardiovascular and well-being benefits. The communal, ritual setting adds a meaning-response and social dimension.',
  evTier: 'validated',
  evidence: 'Among traditional heat practices, the Finnish sauna has the strongest modern evidence. A large long-running Finnish cohort (the Kuopio study, ~2,300 men followed ~20 years) found that frequent sauna use was associated, in a dose-dependent way, with markedly lower cardiovascular and all-cause mortality, those using a sauna 4-7 times weekly had roughly 50% lower fatal cardiovascular disease and about 40% lower all-cause mortality than once-weekly users, with associations also seen for stroke and dementia. These are observational findings (not proof of cause), but they are substantial and mechanistically plausible. Evidence for other sweat traditions is thinner but the shared physiology likely carries over. It is a beautiful case of an ancient, near-universal practice now partly validated by rigorous study.',
  risk: 'Sweat bathing is generally safe for healthy people but carries real cautions: dehydration, overheating, and fainting; risk in pregnancy; and danger for people with certain heart conditions or uncontrolled blood pressure (and combining intense heat with alcohol can be deadly). Children and older adults need extra care, and very hot or prolonged sessions raise risk. Ceremonial sweat lodges have, rarely, caused fatal heat injury when run improperly. The guidance is moderation, hydration, and medical advice for those with heart disease or pregnancy.',
  safetyFlag: 'caution',
  diffusion: 'A near-perfect natural experiment in cultural convergence: the temazcal, inipi, sauna, banya, hammam, jjimjilbang, and African steam houses arose largely independently across the globe, humans everywhere discovered that communal heat and sweat feel healing. Some spread by contact (the hammam from Roman bathing; sauna culture exported worldwide), but many are independent inventions, making this a centerpiece for the cross-cultural map and the "same intuition, many origins" theme.',
  tag: 'From the Mexican temazcal to the Finnish sauna, Indigenous sweat lodge, banya, and hammam, humanity built cleansing-heat rituals everywhere, and the sauna version now has real evidence for heart health.',
  facts: [['Found in', 'Mesoamerica, N. America, Finland, Russia, Turkey, Korea, Africa'], ['Sauna 4-7x/week (cohort)', '~50% lower fatal CVD vs 1x/week'], ['Shared core', 'Communal heat, sweat, often ceremony'], ['Mostly', 'Independent inventions across cultures']],
  brief: 'The sweat bath may be the single best illustration of the portal\'s themes at once: a near-universal human practice, deeply ceremonial, that modern science has begun to validate. The Mesoamerican temazcal (a domed adobe chamber used for healing and purification, familiar to families across Mexico), the Indigenous North American sweat lodge, the Finnish sauna, Russian banya, Turkish hammam, Korean jjimjilbang, and African steam traditions arose largely independently, humans everywhere found that communal heat and sweat feel cleansing and restorative. And the evidence is real: a large Finnish cohort followed for two decades found frequent sauna use associated with roughly half the rate of fatal cardiovascular disease and substantially lower all-cause mortality, with plausible mechanisms (heat acts somewhat like exercise on the heart). It\'s observational, not proof, and the cultural meaning was never in doubt to those who practiced it, but it\'s a striking case of ancient intuition meeting modern data.',
  mf: [['The sauna is a uniquely Finnish invention.', 'Sweat bathing is near-universal, the temazcal, sweat lodge, banya, hammam, jjimjilbang, and African steam traditions arose largely independently. Finland has the most famous (and best-studied) version, but the practice belongs to humanity broadly.'], ['Sweating "detoxifies" the body of poisons.', 'Sweat is mainly water and salts; detoxification is done by the liver and kidneys. The real benefits, cardiovascular conditioning, relaxation, and the communal ritual, are not about flushing toxins.']],
  voices: [{
    n: 'Laukkanen et al. (Kuopio cohort)',
    r: 'Cardiovascular epidemiologists',
    stance: 'champions',
    paid: false,
    q: 'Found frequent sauna use associated, dose-dependently, with substantially lower fatal cardiovascular and all-cause mortality over ~20 years of follow-up.'
  }, {
    n: 'Tradition-bearers (temazcal, inipi, others)',
    r: 'Ceremonial practitioners',
    stance: 'endorses',
    paid: false,
    q: 'Hold the sweat bath as healing and sacred, integrating heat with herbs, prayer, and community across many distinct cultures.'
  }, {
    n: 'Medical historians/anthropologists',
    r: 'Cross-cultural scholars',
    stance: 'endorses',
    paid: false,
    q: 'Document sweat bathing as one of the most widespread healing institutions in human history, largely independently invented across continents.'
  }, {
    n: 'Heat-safety clinicians',
    r: 'Cardiology/physiology view',
    stance: 'caveats',
    paid: false,
    q: 'Note real benefits but caution about dehydration, fainting, pregnancy, certain heart conditions, alcohol, and improperly run ceremonies.'
  }],
  history: 'Sweat baths appear across the ancient world, Mesoamerican temazcales, Indigenous North American lodges, Roman and later Turkish baths, Finnish saunas, Russian banyas, each embedded in its culture\'s healing and ceremonial life. Largely sidelined by Western biomedicine, the practice re-entered scientific attention in the 21st century, when long-term Finnish cohort studies revealed strong associations between regular sauna use and cardiovascular health, validating in part what many cultures had long held.',
  timeline: [['Ancient-precolonial', 'Temazcal, sweat lodge, sauna, banya, hammam develop across cultures'], ['20th c.', 'Sauna culture exported globally; ceremonial traditions persist'], ['2015', 'Finnish cohort links frequent sauna use to lower mortality'], ['2010s-2020s', 'Heat therapy studied for cardiovascular and longevity benefit']],
  rel: ['heliotherapy', 'grounding', 'cupping', 'meaning-response'],
  enelNote: 'A centerpiece diffusion + validated entry, and it carries Jeffrey\'s Michoacan temazcal touchstone alongside Finnish sauna, the exact "from one culture to another / same intuition everywhere" arc he asked for. We name each tradition specifically (no Finland-as-default), give the strong sauna cohort evidence while flagging it as observational, debunk the sweat-detox myth, and keep solid heat-safety cautions. Prime material for the cross-cultural map (independent invention vs spread).',
  enel: true
}, {
  i: 'peyote',
  n: 'Peyote & Mescaline',
  fn: 'A Sacred Cactus, a Protected Sacrament, a Studied Molecule',
  tier: 1,
  ts: 86,
  sig: 'rising',
  hot: false,
  ev: 1,
  cats: ['ceremonial', 'tradition', 'traditional', 'travel', 'region'],
  cls: 'Psychedelic / Ceremonial Cactus',
  tradition: 'Indigenous North American (and Mesoamerican)',
  traditions: ['Wixarika (Huichol)', 'Native American Church', 'other Indigenous peoples'],
  region: 'Northern Mexico & US Southwest',
  geo: [['Sacramental use protected for Native American Church members (US)', 100]],
  cultural: 'Peyote (Lophophora williamsii), a small spineless cactus of northern Mexico and the US Southwest, has been used ceremonially for millennia, archaeological specimens date back thousands of years. For the Wixarika (Huichol) people it is central to pilgrimage and cosmology; in the Native American Church it is a protected sacrament taken in all-night prayer ceremonies for healing, community, and spiritual connection. Its active compound, mescaline, is also found in some South American cacti (San Pedro/huachuma), used in Andean traditions. This is sacred medicine embedded in living religious practice, not a recreational drug to its tradition-bearers.',
  mechanism: 'Mescaline is a serotonergic psychedelic (acting at 5-HT2A receptors, like psilocybin and LSD), producing altered perception and a profound subjective experience. In ceremonial use the prolonged, supported, communal setting shapes the experience as much as the molecule.',
  evTier: 'traditional',
  evidence: 'Rigorous modern clinical research on peyote/mescaline is sparse compared with psilocybin, largely because of legal restriction and respect for its sacred, conservation-sensitive status. Observational and survey research within Native American Church communities has reported low rates of harm and possible benefits for alcohol-use disorder in that ceremonial context, consistent with the broader psychedelic-and-addiction signal, but this is not the same as controlled trials. The honest tier is "traditional/ceremonial use with limited formal study," a practice whose value is attested culturally and supported by suggestive but not definitive research.',
  risk: 'Mescaline has low physiological toxicity but the same serious psychological risks as other psychedelics: frightening experiences and the potential to precipitate psychosis or mania in vulnerable people. There are major non-medical dimensions too: peyote is slow-growing and threatened by overharvesting, and its conservation is a real concern for the tradition; and in the US, sacramental use is legally protected specifically for enrolled Native American Church members, while use outside that context is generally illegal. This entry documents a protected religious practice and a research-relevant molecule, not a how-to, and not an invitation to appropriate a sacred, ecologically fragile medicine.',
  safetyFlag: 'serious',
  diffusion: 'A medicine of the Chihuahuan Desert borderlands whose ceremonial use spread among many Indigenous nations and was formalized in the Native American Church across the US and Canada. Its active molecule, mescaline, links it to the San Pedro/huachuma cactus traditions of the Andes, an example of related psychoactive plants anchoring distinct ceremonial systems across the Americas. Mescaline also entered 20th-century Western thought (famously through written accounts) well before the modern psychedelic-research era.',
  tag: 'A sacred cactus used ceremonially for millennia and protected as a Native American Church sacrament, its molecule mescaline studied, its plant threatened, its use legally and culturally bounded.',
  facts: [['Plant', 'Peyote (Lophophora williamsii); mescaline is the active compound'], ['Traditional use', 'Millennia; Wixarika pilgrimage, Native American Church'], ['US legal status', 'Protected sacrament for NAC members; otherwise illegal'], ['Conservation', 'Slow-growing, threatened by overharvest']],
  brief: 'Peyote sits at the intersection of sacred tradition, law, ecology, and emerging science, which is exactly why it belongs here. The small desert cactus has been used ceremonially for thousands of years; it is central to Wixarika (Huichol) pilgrimage and is the protected sacrament of the Native American Church, taken in all-night prayer ceremonies for healing and connection. Its molecule, mescaline (also found in the Andean San Pedro cactus), is a serotonergic psychedelic in the same family as psilocybin. Formal clinical research is limited, partly by legal restriction and partly out of respect for its sacred, conservation-threatened status, but observations within ceremonial communities suggest low harm and possible help with alcohol-use disorder, echoing the broader psychedelic-and-addiction story. The library treats peyote with care: a living protected religious practice and a research-relevant compound, documented, never instructed, with its legal boundaries and the real threat of overharvesting made clear.',
  mf: [['Peyote is just a recreational drug.', 'To its tradition-bearers it is sacred medicine within ceremony, used for millennia and protected as a religious sacrament. Treating it as recreational both misreads the tradition and, outside protected use, is illegal.'], ['Anyone can legally use peyote because it\'s "natural" and ceremonial.', 'In the US, sacramental peyote use is legally protected specifically for Native American Church members; broader use is generally illegal. The plant is also ecologically threatened, making casual harvesting genuinely harmful.']],
  voices: [{
    n: 'Native American Church',
    r: 'Sacramental tradition',
    stance: 'endorses',
    paid: false,
    q: 'Holds peyote as a sacred sacrament for healing, prayer, and community, used in supported all-night ceremonies and protected as religious practice.'
  }, {
    n: 'Wixarika (Huichol) tradition-bearers',
    r: 'Indigenous cultural authority',
    stance: 'endorses',
    paid: false,
    q: 'Center peyote in pilgrimage and cosmology and raise alarm over overharvesting and appropriation threatening the plant and the practice.'
  }, {
    n: 'Psychedelic/addiction researchers',
    r: 'Survey and observational studies',
    stance: 'caveats',
    paid: false,
    q: 'Report low harm and possible benefit for alcohol-use disorder among ceremonial users, while noting formal controlled research on mescaline remains limited.'
  }, {

    r: 'Ecology and law',
    stance: 'cautions',
    paid: false,
    q: 'Warn that peyote is slow-growing and threatened, and that use outside protected sacramental contexts is illegal in much of the US.'
  }],
  history: 'Peyote use in the Chihuahuan Desert borderlands dates back thousands of years, central to Wixarika and other Indigenous traditions, and was organized in the modern Native American Church in the late 19th and 20th centuries, eventually winning specific US legal protection as a sacrament. Its molecule mescaline entered Western scientific and literary awareness in the 20th century, and the modern psychedelic-research era has renewed (carefully bounded) interest in its therapeutic potential.',
  timeline: [['Millennia ago', 'Ceremonial peyote use in the desert borderlands'], ['Late 19th-20th c.', 'Native American Church formalizes sacramental use'], ['20th c.', 'Mescaline isolated and enters Western awareness'], ['1990s-present', 'US legal protection for NAC use; conservation concern grows']],
  rel: ['psilocybin', 'ayahuasca', 'meaning-response', 'sweat-bath'],
  enelNote: 'Carries Jeffrey\'s Michoacan peyote touchstone and the psychedelics-for-addiction thread, handled with maximum care. We name the Wixarika and Native American Church traditions specifically, set the legal boundary clearly (protected sacrament for NAC members; otherwise illegal), foreground the conservation/overharvest threat, and apply the documented-not-how-to and serious-psychological-risk framing. Tier is "traditional" (limited formal study) honestly, not overclaimed.',

}, {
  i: 'heliotherapy',
  n: 'Heliotherapy (Sun & Light Therapy)',
  fn: 'From Ancient Sun-Worship to the Sanatorium to Vitamin D',
  tier: 1,
  ts: 82,
  sig: 'rising',
  hot: false,
  ev: 2,
  cats: ['bodywork', 'validated', 'travel', 'tradition'],
  cls: 'Light / Sun Therapy',
  tradition: 'Many (ancient Mediterranean, modern European)',
  traditions: ['Ancient Egyptian/Greek/Roman', 'Ayurvedic & Arabic medicine', 'early-20th-c. European sanatorium medicine'],
  region: 'Worldwide (formalized in Europe)',
  geo: [['Sunlight-and-health intuition is universal', 100]],
  cultural: 'Using the sun to heal is one of the oldest medical ideas. Ancient Egyptian, Greek, and Roman physicians prescribed sunbathing (heliosis); sun exposure features in Ayurvedic and Arabic medical traditions; and "taking the sun" was woven into folk health practice across cultures. In the late 19th and early 20th centuries this became formalized heliotherapy in European, especially Swiss Alpine, sanatoriums, where patients with tuberculosis and other diseases were treated with carefully dosed sunlight long before anyone understood why it helped.',
  mechanism: 'Two real mechanisms underlie the tradition. Sunlight (UVB) drives vitamin D synthesis in skin, important for bone and immune health; and sunlight has direct effects on certain skin conditions and, via the eyes, on circadian rhythm and mood (the basis of modern light therapy for seasonal depression). The antibacterial and immune effects exploited in sanatorium-era TB heliotherapy are partly explained by these pathways.',
  evTier: 'validated',
  evidence: 'The ancient intuition that sun is medicine turned out to be substantially correct, though in specific ways. Modern medicine validates several descendants of heliotherapy: vitamin D\'s role in bone and immune health; phototherapy (controlled UV) as a standard treatment for psoriasis and some other skin diseases; blue-light therapy for newborn jaundice; and bright-light therapy for seasonal affective disorder and circadian disorders. The historical TB sanatorium use was real but has been superseded by antibiotics. So heliotherapy is "validated, in translated form": the practice was right that light heals, and science identified the precise pathways and turned them into targeted therapies, while also clarifying sunlight\'s serious downside.',
  risk: 'The crucial modern caveat the ancients lacked: ultraviolet radiation causes skin cancer and photoaging, and there is no "safe tan." The validated benefits come from specific, dosed interventions (vitamin D via sensible exposure or supplements, medical phototherapy under supervision, light boxes for mood), not from deliberate heavy sun exposure. Sunburn and cumulative UV exposure raise melanoma and other skin-cancer risk. The honest framing: light genuinely heals through defined pathways, and uncontrolled sunbathing is a real hazard, two truths the tradition\'s modern form must hold together.',
  safetyFlag: 'caution',
  diffusion: 'A near-universal intuition (sun heals) that was formalized into clinical heliotherapy in modern Europe, especially the Swiss Alpine sanatoriums, and then dissolved into multiple precise modern therapies (vitamin D science, dermatologic phototherapy, circadian light therapy). It connects naturally to the sweat-bath and grounding entries as part of a family of "reconnect the body to nature\'s elements" practices spanning many cultures and eras.',
  tag: 'Healing with sunlight runs from ancient Mediterranean medicine through Alpine TB sanatoriums to modern vitamin D, phototherapy, and light therapy, the old intuition was right, with one big caveat science added.',
  facts: [['Ancient use', 'Egyptian, Greek, Roman, Ayurvedic, Arabic sun therapy'], ['Early modern', 'Swiss Alpine TB sanatorium heliotherapy'], ['Validated descendants', 'Vitamin D, phototherapy, light therapy'], ['The caveat science added', 'UV causes skin cancer; no safe tan']],
  brief: 'Heliotherapy is a clean example of an ancient practice being validated, then refined, by modern science, with an important correction attached. Sun-as-medicine is one of humanity\'s oldest health ideas, prescribed by Egyptian, Greek, and Roman physicians and present in Ayurvedic and Arabic traditions. It became formal clinical heliotherapy in the early-20th-century European, especially Swiss Alpine, sanatoriums, where dosed sunlight was used against tuberculosis and other diseases before its mechanisms were known. Science then unpacked the intuition into precise, validated therapies: vitamin D for bone and immune health, controlled UV phototherapy for psoriasis, blue light for newborn jaundice, and bright-light therapy for seasonal depression and circadian disorders. The ancients were right that light heals, and modern research both identified how and added the caveat they couldn\'t have known, ultraviolet radiation causes skin cancer, so the validated benefits come from specific dosed interventions, not deliberate sunbathing.',
  mf: [['The sanatorium-era sun cure was just superstition.', 'It was a real, partially effective practice later explained by vitamin D and UV biology, and superseded for TB by antibiotics. Its descendants, phototherapy and light therapy, are standard medicine today.'], ['If sunlight heals, more sun exposure is better.', 'No. UV radiation causes skin cancer and there\'s no safe tan. The validated benefits come from sensible vitamin D exposure or supplements and medically dosed phototherapy/light boxes, not heavy sunbathing.']],
  voices: [{
    n: 'Medical historians',
    r: 'History of heliotherapy',
    stance: 'endorses',
    paid: false,
    q: 'Document sun therapy from ancient Mediterranean medicine through the Alpine sanatorium era as a real, pre-antibiotic treatment for tuberculosis and skin disease.'
  }, {
    n: 'Dermatology & photomedicine',
    r: 'Modern clinical translation',
    stance: 'champions',
    paid: false,
    q: 'Use controlled UV phototherapy for psoriasis, blue light for neonatal jaundice, and bright-light therapy for seasonal and circadian disorders, validated descendants of heliotherapy.'
  }, {
    n: 'Vitamin D researchers',
    r: 'Bone/immune science',
    stance: 'endorses',
    paid: false,
    q: 'Confirm sunlight\'s role in vitamin D synthesis underlies part of the historical benefit, while favoring sensible exposure or supplementation over heavy sun.'
  }, {
    n: 'Skin-cancer prevention',
    r: 'Oncology/dermatology safety',
    stance: 'cautions',
    paid: false,
    q: 'Stress that UV radiation is a major skin-cancer cause and that deliberate sunbathing is not a safe way to pursue light\'s benefits.'
  }],
  history: 'Sun therapy spans ancient Egyptian, Greek, Roman, Ayurvedic, and Arabic medicine and was formalized as heliotherapy in early-20th-century European sanatoriums for tuberculosis. Antibiotics superseded its TB use, but 20th- and 21st-century science translated the underlying intuition into vitamin D research, dermatologic phototherapy, and circadian light therapy, while establishing UV\'s role in skin cancer.',
  timeline: [['Ancient', 'Sun therapy in Mediterranean, Ayurvedic, and Arabic medicine'], ['Early 20th c.', 'Alpine sanatorium heliotherapy for TB and skin disease'], ['Mid 20th c.', 'Antibiotics replace TB sun cure; vitamin D and UV science mature'], ['Late 20th-21st c.', 'Phototherapy and light therapy become standard; UV-cancer link established']],
  rel: ['sweat-bath', 'grounding', 'meaning-response', 'sunlight-circadian'],
  enelNote: 'Directly answers Jeffrey\'s ask to tie grounding-adjacent practices back to the Swiss sanatoriums and forward to validated health effects across Europe, the Middle East, and beyond. The arc is ancient sun-medicine -> Alpine sanatorium heliotherapy -> precise modern therapies (vitamin D, phototherapy, light therapy), with the UV-skin-cancer caveat science added. A strong "validated in translated form" case that pairs with sweat-bath and grounding as nature-element practices.',
  enel: true
}, {
  i: 'grounding',
  n: 'Grounding (Earthing)',
  fn: 'Bare Feet on the Earth, Old Instinct and Thin Evidence',
  tier: 2,
  ts: 80,
  sig: 'rising',
  hot: false,
  ev: 1,
  cats: ['bodywork', 'traditional', 'travel'],
  cls: 'Earth-Contact Practice',
  tradition: 'Modern (with older naturalist roots)',
  traditions: ['19th-c. European "back to nature"', 'folk barefoot/earth-contact practices'],
  region: 'Worldwide (modern wellness)',
  geo: [['Enthusiast-driven; small studies only', 100]],
  cultural: 'Grounding, or earthing, the practice of putting bare skin in contact with the earth (or conductive mats wired to ground), is a modern wellness movement with older echoes. Walking barefoot, sleeping on the ground, and "reconnecting with the earth" appear in many traditional and naturalist sensibilities, and a 19th-century European "back to nature" movement explicitly claimed health benefits from barefoot contact and sleeping grounded. The contemporary version frames it as restoring an electrical connection to the Earth that modern insulated life has severed.',
  mechanism: 'The proposed mechanism, that the Earth\'s surface electrons transfer into the body to neutralize free radicals and reduce inflammation, is speculative and not established by mainstream physiology. More mundane and plausible contributors include relaxation, time outdoors, mindful rest, and the meaning response.',
  evTier: 'traditional',
  evidence: 'Grounding has a real but weak and largely enthusiast-driven evidence base: numerous small studies (often from advocates or with methodological limits) report improvements in sleep, pain, mood, inflammation markers, and recovery. These are intriguing but preliminary, the trials are small, frequently unblinded, and not independently replicated at scale, so they fall short of establishing the specific "earth-electron" mechanism. It is honest to say grounding is mostly traditional/wellness practice with suggestive low-quality data: people often report feeling better, the simplest explanations (rest, nature, expectation) are not ruled out, and whether there is a specific physiological effect remains genuinely unproven.',
  risk: 'Grounding itself is low-risk, walking barefoot outdoors is generally safe (mind cuts, hazards, and infection risk for those with diabetes or neuropathy). The real risk is financial and opportunity-based: marketed grounding mats, sheets, and devices make strong health claims the evidence does not support, and relying on grounding in place of effective treatment for a real condition would be harmful. As a pleasant, free practice (barefoot time outdoors), it is benign; as a purchased cure for disease, it is unproven.',
  safetyFlag: '',
  diffusion: 'A practice with deep, diffuse roots, barefoot earth-contact and "return to nature" intuitions appear across many cultures and a 19th-century European naturist movement, reassembled into a branded modern wellness product. It belongs in the same nature-element family as sun therapy and sweat baths, and is a useful honest example for the library: real cross-cultural intuition, genuine subjective benefit for many, and a specific mechanistic claim that remains unproven.',
  tag: 'Bare skin on the earth as a health practice, an old naturalist instinct repackaged as modern wellness, with lots of small studies, plausible relaxation benefits, and an unproven "earth-electron" theory.',
  facts: [['Practice', 'Skin contact with earth or grounded mats'], ['Older roots', '19th-c. European "back to nature" movement'], ['Evidence', 'Small, mostly enthusiast-driven studies'], ['Mechanism claim', 'Earth electrons reduce inflammation, unproven']],
  brief: 'Grounding is a useful honesty test for the whole library: a practice with a genuine old intuition, real subjective benefit for many, and a specific scientific claim that remains unproven, all true at once. The idea, bare skin in contact with the earth restores health, echoes barefoot and "return to nature" sensibilities across cultures and an explicit 19th-century European naturist movement, now sold as grounding mats and sheets. Its proposed mechanism (the Earth\'s electrons entering the body to quench inflammation) is speculative and not accepted by mainstream physiology. The evidence is a pile of small, often advocate-run studies reporting better sleep, less pain, and improved mood, intriguing but preliminary and not robustly replicated. The most plausible read is that time outdoors, relaxation, and the meaning response do real work, while the specific "earthing" effect stays unestablished. It\'s benign and pleasant as free barefoot time; the concern is products making claims the data don\'t support.',
  mf: [['Grounding is proven to reduce inflammation by transferring Earth\'s electrons.', 'That mechanism is speculative and not established by mainstream physiology. The studies are small and mostly enthusiast-driven; simpler explanations (rest, nature, expectation) aren\'t ruled out.'], ['Grounding is worthless nonsense.', 'Also too strong. People often report real benefit, and time outdoors and relaxation plausibly help. The honest verdict is "unproven specific effect, possible non-specific benefit", neither validated cure nor pure nonsense.']],

  enelNote: 'Grounding is the honest "traditional-use, unproven-mechanism, possible-non-specific-benefit" entry Jeffrey named directly, tied into the nature-element family with sun therapy and sweat baths. We give the old naturalist roots, the enthusiast-driven small studies (with the paid/commercial stance flagged), and the speculative mechanism plainly, while refusing both overclaim and reflexive dismissal, and we point back to the meaning-response flagship for why people genuinely feel better.',

  traditions: ['Ayurveda', 'Siddha', 'Unani', 'Southeast Asian folk medicine'],
  region: 'South Asia (origin); global',
  geo: [['Used in cooking and medicine across South/SE Asia', 100]],
  cultural: 'Turmeric (Curcuma longa) has been a cornerstone of Ayurvedic and broader South Asian medicine for thousands of years, valued for wounds, digestion, skin, and inflammation, and woven into food, ritual, and daily life (it colors curries, marks weddings, and features in religious practice). Its place as both spice and medicine, the "food as medicine" ideal, is part of why it feels so trustworthy to so many.',
  mechanism: 'Curcumin, turmeric\'s main active compound (only about 3-5% of the rhizome), has anti-inflammatory and antioxidant activity in the lab, acting on multiple inflammatory signaling pathways. A central real-world limitation is bioavailability: curcumin is poorly absorbed and rapidly metabolized, which is why products add piperine (black pepper) or use special formulations to boost absorption, sometimes by thousands of percent.',
  evTier: 'mixed',
  evidence: 'Turmeric is a genuine "mixed evidence" case. The most promising human data are for osteoarthritis: several meta-analyses find oral turmeric/curcumin modestly relieves knee pain and stiffness, and the US NCCIH calls the initial evidence positive while stressing that higher-quality trials are needed. For most of the sweeping claims (cancer prevention, broad disease cure), human evidence is limited and far short of the lab hype, complicated by poor bioavailability and wide variation in product content. Honest summary: as a culinary spice it is safe and pleasant; as a supplement it shows real but modest promise for joint pain and remains unproven for most marketed uses.',
  risk: 'Turmeric in food is very safe. The surprising safety signal is with concentrated supplements: a growing number of cases of turmeric/curcumin-associated drug-induced liver injury have been reported internationally, and high-bioavailability formulations (and added piperine, which raises absorption sharply) appear to raise that risk. Turmeric can also affect blood clotting and interact with medications. The takeaway: the spice is benign, but high-dose, high-absorption supplements are not automatically safe, and anyone with liver concerns or on medications should be cautious and tell their clinician.',
  safetyFlag: 'caution',
  diffusion: 'Native to South Asia, turmeric spread along ancient trade routes throughout Southeast Asia, the Middle East, and Africa as both spice and medicine, and is now a global supplement. It exemplifies a "food as medicine" remedy that traveled by cuisine and commerce, and its modern journey, from kitchen staple to capsule, mirrors how traditional foods get reformulated (and sometimes made riskier) as concentrated products.',
  tag: 'An ancient Ayurvedic spice with real but modest evidence for joint pain, hampered by poor absorption, and a surprising liver-injury signal once it\'s concentrated into supplements.',
  facts: [['Active compound', 'Curcumin (~3-5% of the root)'], ['Best evidence', 'Osteoarthritis (knee) pain, modest'], ['Key limitation', 'Poor bioavailability (piperine added to boost it)'], ['Safety signal', 'Supplement-linked liver injury (rare)']],
  brief: 'Turmeric captures the gap between traditional reputation and clinical reality, in both directions. In Ayurveda and across South Asia it has been medicine and food for millennia, and that "golden spice" trust is enormous. Modern science finds something real but smaller than the hype: its compound curcumin is anti-inflammatory in the lab, and human trials show modest benefit for osteoarthritis knee pain, with most grander claims unproven and hampered by the fact that curcumin is barely absorbed (hence the piperine and special formulations products use). And there\'s a twist the tradition couldn\'t have anticipated: while turmeric in food is very safe, concentrated supplements, especially high-absorption ones, have been linked to a rising number of liver-injury cases. The library\'s read is balanced: a wonderful, safe spice with genuine modest promise for joint pain, oversold for most other uses, and a reminder that "concentrated and natural" is not automatically safe.',
  mf: [['Turmeric supplements are a proven cure for inflammation and many diseases.', 'Evidence is mixed: real but modest for osteoarthritis pain, and limited for most marketed claims. Poor absorption and inconsistent products complicate the picture; it\'s promising, not a proven cure-all.'], ['Because turmeric is a food, supplements are automatically safe at any dose.', 'Food turmeric is safe, but concentrated, high-absorption supplements have been linked to liver injury and can affect bleeding and interact with drugs. "Natural and concentrated" is not the same as safe.']],

  history: 'A staple of Ayurvedic and South Asian medicine for millennia, turmeric spread globally as spice and remedy and became a blockbuster modern supplement. Curcumin was identified as its key compound, and decades of research clarified both its lab activity and its poor bioavailability, while recent case reports surfaced an unexpected supplement-linked liver-injury risk, sharpening the contrast between culinary and concentrated use.',
  timeline: [['Antiquity', 'Turmeric central to Ayurvedic and South Asian medicine and cuisine'], ['20th c.', 'Curcumin identified; lab anti-inflammatory activity studied'], ['2000s-2010s', 'Osteoarthritis trials show modest benefit; supplement boom'], ['2020s', 'Rising reports of supplement-associated liver injury']],
  rel: ['ashwagandha', 'willow-aspirin', 'meaning-response', 'heavy-metal-bhasma'],
  enelNote: 'Turmeric is a balanced "mixed-evidence" flagship and a clean "food as medicine, then concentrated into risk" story. We credit the genuine osteoarthritis signal and the deep Ayurvedic lineage, name the bioavailability problem and the piperine trick, and give prominent space to the real supplement-linked liver-injury safety flag, while keeping food turmeric clearly safe. The marketing voice is flagged paid; the cure-all framing is named without dismissing the real modest benefit.',

  i: 'willow-aspirin',
  n: 'Willow Bark to Aspirin',
  fn: 'The Folk Remedy That Became the World\'s Drug, Mostly',

  traditions: ['European folk', 'Ancient Egyptian', 'Chinese folk', 'Assyrian'],
  region: 'Worldwide (willow is near-global)',
  geo: [['Aspirin, one of the most-used drugs on earth', 100]],
  cultural: 'Willow (Salix) bark and leaves have been chewed and brewed for pain and fever in many cultures, willow grows almost everywhere, and references appear across Egyptian, Assyrian, Chinese, and European folk medicine. It is the classic story told to give modern aspirin an ancient, trustworthy pedigree: "people knew willow eased pain for thousands of years." That story is mostly, but not entirely, true, and the honest version is more interesting.',
  mechanism: 'Willow bark contains salicin, which the body converts to salicylic acid, the compound that reduces pain, fever, and inflammation by inhibiting cyclooxygenase enzymes. Aspirin (acetylsalicylic acid), synthesized by modifying salicylic acid, works through the same final pathway, which is why the folk remedy and the drug are genuinely related.',
  evTier: 'validated',
  evidence: 'The validation is real and the chain is documented: Reverend Edward Stone reported willow bark\'s fever-reducing power to the Royal Society in 1763; chemists isolated salicin from willow in 1828; and in 1897 Bayer\'s chemists (Felix Hoffmann and colleagues) produced acetylsalicylic acid, aspirin, one of the most widely used medicines in history, later shown by John Vane to work by blocking prostaglandin production. But historians add an honest caveat: the romantic claim that Hippocrates and the ancients clearly used willow specifically as an aspirin-like painkiller is shakier than usually told, several classic sources don\'t actually describe it that way. So willow-to-aspirin is a validated plant-to-drug story, with a useful lesson about not over-romanticizing traditional pedigrees.',
  risk: 'Aspirin is effective but not harmless: it can cause stomach bleeding and ulcers, and is linked to Reye\'s syndrome in children with viral illness (so it is avoided in kids). Willow bark supplements contain variable, unstandardized salicin and carry similar risks (bleeding, allergy, drug interactions, the same pediatric Reye\'s concern), with far less dosing precision than the standardized drug. The validated, predictable product is aspirin; willow bark tea is the unstandardized ancestor, not a safer "natural aspirin."',
  safetyFlag: 'caution',
  diffusion: 'Because willow grows almost worldwide, and because salicin also occurs in meadowsweet, poplar, and myrtle, the "bark-and-leaf for fever" intuition arose in many places, a multi-origin folk practice rather than a single lineage. Its convergence into one global drug (and the partly mythologized "ancient pedigree") makes it a centerpiece for the cross-cultural map and for the meta-lesson about how we narrate tradition.',
  tag: 'Willow bark eased pain and fever in many cultures and led to aspirin, one of history\'s great drugs, though the "ancient Hippocratic willow painkiller" pedigree is more legend than the tidy story suggests.',
  facts: [['Active compound', 'Salicin, becomes salicylic acid'], ['Key documented step', 'Edward Stone\'s 1763 Royal Society report'], ['Aspirin synthesized', '1897 (Bayer / Hoffmann)'], ['Honest caveat', '"Ancient willow painkiller" partly mythologized']],
  brief: 'Willow-to-aspirin is the archetypal "folk remedy becomes the world\'s drug" story, and it\'s true, with an honest twist. Willow bark, which contains salicin (converted in the body to pain-and-fever-reducing salicylic acid), was used across many cultures, and the documented modern chain is clear: Reverend Edward Stone\'s 1763 report to the Royal Society on willow bark for fever, the isolation of salicin in 1828, and Bayer\'s synthesis of acetylsalicylic acid, aspirin, in 1897. Aspirin became one of the most-used medicines ever. The twist historians stress: the popular claim that Hippocrates and the ancients clearly used willow as an aspirin-like painkiller is shakier than usually told, a reminder that we love giving modern drugs a romantic ancient pedigree. The library tells both: a genuinely validated plant-to-pharmaceutical arc, and a caution about over-romanticizing tradition, plus the real point that the standardized drug, not willow tea, is the safe, precise descendant.',
  mf: [['Aspirin is just purified willow bark the ancients always used as a painkiller.', 'The salicin-to-salicylic-acid link is real, but the documented chain runs through Stone (1763), salicin isolation (1828), and Bayer (1897). The "ancient willow painkiller" pedigree is partly myth, the precise, validated product is the synthesized drug.'], ['Willow bark tea is a safer, natural aspirin.', 'Willow bark has variable, unstandardized salicin and the same risks as aspirin (bleeding, allergy, Reye\'s syndrome in children), with far less dosing control. The standardized drug is the predictable descendant, not a more dangerous tea.']],
  voices: [{
    n: 'Pharmacology historians',
    r: 'History of aspirin',
    stance: 'champions',
    paid: false,
    q: 'Trace a documented path from willow\'s salicin through Edward Stone\'s 1763 fever report and salicin\'s 1828 isolation to Bayer\'s 1897 aspirin, one of the most successful drugs ever.'

    paid: false,
    q: 'Warn that both aspirin and willow bark can cause bleeding and are linked to Reye\'s syndrome in children, and that willow\'s unstandardized dose adds uncertainty.'

  history: 'Willow and other salicin-bearing plants were used for pain and fever across many cultures, though the precise extent of ancient "painkiller" use is debated. The documented modern arc runs from Edward Stone\'s 1763 Royal Society report through salicin\'s isolation in 1828 to Bayer\'s 1897 synthesis of aspirin, with the mechanism later elucidated, making it a canonical validated plant-to-pharmaceutical story.',
  timeline: [['Antiquity', 'Willow used for pain/fever across cultures (extent debated)'], ['1763', 'Edward Stone reports willow bark for fever to the Royal Society'], ['1828', 'Salicin isolated from willow bark'], ['1897', 'Bayer synthesizes acetylsalicylic acid (aspirin)']],
  rel: ['artemisinin', 'turmeric', 'meaning-response', 'ephedra'],
  enelNote: 'A canonical "folk-to-pharmacy" diffusion + validated entry, and it does double duty by modeling intellectual honesty: it credits the real salicin-to-aspirin chain while debunking the over-romanticized "ancient Hippocratic willow painkiller" pedigree. That self-aware "don\'t over-romanticize tradition" note is exactly the disciplined framing Jeffrey wants, paired with the practical point that standardized aspirin, not willow tea, is the safe descendant.',
