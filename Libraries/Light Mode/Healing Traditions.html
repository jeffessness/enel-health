}, {
  i: 'fermented-foods',
  n: 'Fermented Foods',
  fn: 'The World\'s Oldest Way to Feed the Gut',
  tier: 1,
  ts: 86,
  sig: 'hot',
  hot: true,
  ev: 2,
  cats: ['food', 'tradition', 'travel', 'validated'],
  cls: 'Food as Medicine',
  tradition: 'Near-universal across cultures (Korea, Japan, Europe, Caucasus, and beyond)',
  traditions: ['Korean (kimchi)', 'Japanese (miso, natto)', 'European (sauerkraut, yogurt)', 'Caucasus/Central Asia (kefir)', 'Global dairy and vegetable fermentation'],
  region: 'Every inhabited region has fermentation traditions',
  geo: [['East Asia (kimchi, miso, natto)', 88], ['Europe & Caucasus (kraut, yogurt, kefir)', 85], ['South & Central Asia', 75], ['Global (modern revival)', 70]],
  cultural: 'Long before refrigeration, nearly every culture learned to ferment, a way to preserve food that also transformed flavor, texture, and nutrition. Korea has kimchi, Japan miso and natto, Eastern Europe sauerkraut and yogurt, the Caucasus kefir, and countless regions their own ferments. These foods sit at the intersection of cuisine and medicine: staples eaten daily, often credited in folk tradition with aiding digestion and vitality, and woven into cultural identity. The near-universal independent adoption of fermentation, many peoples discovering it separately, is itself a sign that it solved real problems of preservation and, we now understand, gut health.',
  mechanism: 'Fermentation uses microbes (bacteria, yeasts) to transform food, producing live cultures, enzymes, B vitamins and vitamin K, and bioactive metabolites. Eaten regularly, fermented foods can increase gut microbial diversity and deliver beneficial microbes and substrates; even non-living microbial components and metabolites appear to confer some benefit. Greater microbial diversity is associated with lower chronic inflammation.',
  evTier: 'validated',
  evidence: 'The core benefit is increasingly well supported. A notable Stanford clinical trial (36 adults, 10 weeks) found that a diet high in fermented foods (yogurt, kefir, kimchi, kombucha, fermented vegetables) increased gut microbial diversity and lowered 19 inflammatory proteins, while, strikingly, a high-fiber diet did not produce the same effects over that short window. Kefir has meta-analysis support for modest improvements in glycemic and metabolic markers, and sauerkraut has shown benefit for IBS symptoms. The validated message: regularly eating a variety of live-culture fermented foods supports gut diversity and lowers inflammatory markers. Caveats: individual responses vary, the clinical relevance of marker changes is still being mapped, and not every "fermented" product contains live cultures, heating, pasteurization, and alcohol kill microbes, so sourdough, wine, and shelf-stable jarred pickles often lack them.',
  risk: 'Fermented foods are safe and beneficial for most people, with sensible exceptions. They can be high in sodium (kimchi, sauerkraut, miso), relevant for blood pressure; histamine-sensitive individuals may react; and people who are immunocompromised, pregnant, or have certain conditions should be cautious with unpasteurized products and check with a clinician. Home fermentation must follow safe methods to avoid contamination. Kombucha should be consumed in moderation. These are foods, not a treatment for disease, and they complement rather than replace medical care.',
  diffusion: 'Fermentation is one of humanity\'s clearest cases of independent, near-universal invention, Korea, Japan, Europe, the Caucasus, Africa, and the Americas each developed their own ferments to preserve food, almost certainly because the technique worked everywhere edible plants and milk existed. Specific ferments later traveled (yogurt and kefir spread west; kimchi and kombucha went global in the modern wellness era), but the underlying practice arose again and again on its own.',
  ev: 2,
  tag: 'A near-universal way of eating that modern science now ties to gut diversity and lower inflammation, with the honest caveat that not every "fermented" food has live cultures.',
  facts: [['Examples', 'Kimchi, miso, kefir, sauerkraut, yogurt'], ['Stanford trial', '↑ microbiome diversity, ↓ 19 inflammatory proteins'], ['Kefir', 'Meta-analysis support for metabolic markers'], ['Caveat', 'Heat/alcohol kill the live cultures']],
  brief: 'Almost every culture independently learned to ferment, kimchi in Korea, miso and natto in Japan, sauerkraut and yogurt in Europe, kefir in the Caucasus, originally to preserve food, and these ferments became daily staples credited with aiding digestion. Modern science increasingly validates the gut connection: a Stanford trial (36 adults, 10 weeks) found a fermented-food diet raised microbial diversity and lowered 19 inflammatory proteins, where a high-fiber diet did not over the same window, and kefir has meta-analysis support for metabolic markers. The validated takeaway is that regularly eating varied live-culture ferments supports gut diversity and lowers inflammation, with honest caveats: responses vary, marker changes need clinical mapping, and not every "fermented" food (wine, sourdough, shelf-stable pickles) still contains live cultures. A near-universal tradition the evidence largely backs.',
  uses: ['Supporting gut microbial diversity', 'Lowering inflammatory markers (varied live-culture ferments)', 'Metabolic support (kefir; modest evidence)', 'A model of independent, near-universal food tradition'],
  mf: [['Any food labeled "fermented" delivers live probiotic cultures.', 'Heating, pasteurization, and alcohol kill microbes, so sourdough, wine, and many shelf-stable jarred pickles lack live cultures. Live-culture foods like fresh kimchi, kefir, and unpasteurized sauerkraut are what drive the microbiome effects.'], ['Fermented foods are just a trend with no real evidence.', 'A Stanford clinical trial found a fermented-food diet increased gut diversity and lowered inflammatory proteins, and kefir has metabolic-marker support. The benefit is increasingly validated, even as individual responses vary.']],
  voices: [{
    n: 'Stanford fermented-food trial',
    r: 'Clinical study (Cell, 2021)',
    stance: 'champions',
    paid: false,
    q: 'Found a 10-week fermented-food diet increased gut microbial diversity and lowered 19 inflammatory proteins, with stronger effects at higher servings, where high fiber did not over the same period.'
  }, {
    n: 'Microbiome researchers',
    r: 'Gut-health science',
    stance: 'endorses',
    paid: false,
    q: 'Support that regular, varied live-culture fermented foods raise microbial diversity and may lower inflammation, while noting individual variability and uncertain clinical relevance of some markers.'
  }, {
    n: 'Traditional food cultures',
    r: 'Korea, Japan, Europe, Caucasus and beyond',
    stance: 'champions',
    paid: false,
    q: 'Independently developed daily fermented staples for preservation and digestion, a near-universal practice now echoed by modern gut science.'
  }, {
    n: 'Clinical-nutrition caution',
    r: 'Dietitians',
    stance: 'caveats',
    paid: false,
    q: 'Flag high sodium in some ferments, histamine sensitivity, and care with unpasteurized products for immunocompromised or pregnant people, fermented foods complement, not replace, medical care.'
  }],
  history: 'Fermentation is among humanity\'s oldest food technologies, developed independently across the world for preservation and later valued for flavor and nutrition. Specific ferments spread through trade and migration, and in the late 20th and early 21st centuries a wellness-driven revival, propelled by microbiome science, brought kimchi, kombucha, and kefir to global prominence, with clinical trials beginning to substantiate long-held intuitions about gut health.',
  timeline: [['Ancient', 'Fermentation developed independently across cultures for preservation'], ['20th c.', 'Yogurt, kefir, and other ferments spread widely'], ['2021', 'Stanford trial links fermented-food diet to gut diversity and lower inflammation'], ['2020s', 'Microbiome science drives a global fermented-food revival']],
  rel: ['honey-wounds', 'chamomile', 'medicinal-mushrooms', 'turmeric'],
  enelNote: 'Fermented foods are a strong validated + near-universal-independent-discovery entry, parallel to honey. The Stanford trial gives a concrete, sourced anchor (gut diversity up, 19 inflammatory proteins down), and the honest caveats (live-culture vs not, sodium, variability) keep it from tipping into hype. It threads cuisine and medicine and pairs naturally with the fiber and probiotics material. On the map it shows as convergent, many cultures arriving at fermentation on their own.',

}, {
  i: 'sacred-tobacco',
  n: 'Sacred vs. Commercial Tobacco',
  fn: 'One Plant, Two Utterly Different Stories',
  tier: 1,
  ts: 83,
  sig: 'steady',
  hot: false,
  ev: 2,
  cats: ['ceremonial', 'tradition', 'region', 'travel', 'safety'],
  cls: 'Ceremonial Plant / Public-Health Cautionary Tale',
  tradition: 'Indigenous American ceremonial use vs. global commercial tobacco',
  traditions: ['Indigenous North American (pipe ceremony, four sacred medicines)', 'Andean & Amazonian ceremonial tobacco', 'Global commercial tobacco industry (the harm story)'],
  region: 'The Americas (sacred origin); commercial tobacco now worldwide',
  geo: [['Indigenous North America (ceremonial)', 85], ['Andes & Amazon (origin, ceremonial)', 82], ['Global (commercial tobacco harm)', 95]],
  cultural: 'Few plants hold two stories as opposite as tobacco\'s. For many Indigenous peoples of the Americas, traditional tobacco (often Nicotiana rustica) is sacred, one of the four sacred medicines alongside cedar, sage, and sweetgrass, offered in the pipe ceremony and in prayer as a way to connect with the Creator, the spirits, and one another. Archaeological evidence places ceremonial tobacco in the Andes at least ~5,500 years ago. This sacred tobacco is carefully hand-prepared, additive-free, used respectfully and sparingly in ritual, and is fundamentally not the same thing as the commercial cigarette. The "Keep Tobacco Sacred" movement exists precisely to defend that distinction, and public native ceremonies with tobacco were not even legally protected in the US until the American Indian Religious Freedom Act of 1978.',
  mechanism: 'Tobacco contains nicotine, which crosses the blood-brain barrier and is powerfully addictive; commercial cigarettes were engineered to deliver it efficiently. Ceremonial use, infrequent, often not deeply inhaled, additive-free, and embedded in ritual, has a very different exposure profile from daily cigarette smoking, though nicotine\'s pharmacology is the same molecule.',
  evTier: 'mixed',
  evidence: 'The evidence splits as sharply as the cultural story. Commercial tobacco is one of the most rigorously documented harms in all of medicine: cigarette smoking is a leading cause of preventable death worldwide, causing cancers, cardiovascular and lung disease, this is settled, overwhelming science. Sacred/ceremonial tobacco is a different question of exposure and meaning; it is used infrequently and ritually, and small ethnographic and pilot clinical studies (for example, of Amazonian healer-administered tobacco) have begun to document traditional therapeutic uses, but rigorous biomedical evidence for ceremonial tobacco\'s health effects is minimal. The honest framing: the cultural and spiritual value of sacred tobacco is real and respected; the catastrophic harm belongs overwhelmingly to commercial, habitual, industry-engineered tobacco.',
  risk: 'The hard safety line is unambiguous and must not be blurred: commercial tobacco, habitual cigarette use, is gravely dangerous and addictive, and nothing here softens that. Nicotine in any form is addictive and harmful in pregnancy. The cultural respect owed to ceremonial tobacco does not extend to commercial tobacco, and the sacred tradition itself draws that line, elders often regard commercial tobacco as a disrespectful corruption of the plant\'s sacred role. Anyone using commercial tobacco who wants to quit should seek evidence-based cessation support. Ceremonial use is a matter for the communities and traditions that hold it.',
  diffusion: 'Tobacco\'s diffusion is a cautionary epic. A sacred American plant, used ceremonially for thousands of years, was taken to Europe after 15th-century colonial contact, commodified, industrialized, and marketed globally, transforming into one of the world\'s largest public-health catastrophes. The same species that was offered in prayer became, in commercial form, a leading cause of preventable death, a stark example of how stripping a practice from its cultural container and scaling it for profit can invert its meaning and its harm.',
  ev: 2,
  tag: 'A sacred American plant used ceremonially for millennia, and, in its commercial form, a leading cause of preventable death. The distinction is the whole point.',
  facts: [['Sacred form', 'Often Nicotiana rustica; additive-free, ritual'], ['One of', 'Four sacred medicines (w/ cedar, sage, sweetgrass)'], ['Andean ceremonial use', '~5,500 years ago'], ['Commercial tobacco', 'Leading cause of preventable death']],
  brief: 'Tobacco holds two opposite stories. For many Indigenous peoples of the Americas, traditional tobacco is sacred, one of the four sacred medicines with cedar, sage, and sweetgrass, offered in the pipe ceremony and prayer, used respectfully and sparingly, and archaeologically documented in the Andes ~5,500 years ago. Commercial tobacco is something else entirely: an industry-engineered nicotine-delivery product and one of the most rigorously documented harms in medicine, a leading cause of preventable death worldwide. The "Keep Tobacco Sacred" movement, and the 1978 American Indian Religious Freedom Act, exist to defend that distinction. We honor the cultural and spiritual reality of sacred tobacco while stating, without softening, that commercial habitual tobacco is gravely dangerous, a line the sacred tradition itself draws.',
  uses: ['Understanding the sacred-vs-commercial distinction', 'Honoring ceremonial tobacco\'s cultural meaning', 'Clear-eyed view of commercial tobacco\'s documented harm', 'A case study in how commodification inverts a practice'],
  mf: [['Sacred tobacco and commercial cigarettes are basically the same thing.', 'They are profoundly different in plant, preparation, frequency, and meaning. Sacred tobacco is additive-free, ritual, and infrequent; commercial tobacco is industry-engineered for addiction and is a leading cause of preventable death. The tradition itself insists on the distinction.'], ['Respecting ceremonial tobacco means downplaying tobacco\'s harms.', 'No, the harm of commercial, habitual tobacco is overwhelming and settled, and the sacred tradition does not excuse it, many elders see commercial tobacco as a corruption of the plant\'s sacred role. Cultural respect and honest harm-reduction coexist.']],
  voices: [{
    n: 'Indigenous traditions & elders',
    r: 'Keepers of sacred tobacco',
    stance: 'champions',
    paid: false,
    q: 'Hold traditional tobacco as a sacred medicine for prayer and ceremony, and many explicitly reject commercial tobacco as a disrespectful corruption of its sacred role.'
  }, {
    n: 'Public-health & oncology science',
    r: 'Tobacco harm evidence',
    stance: 'opposes',
    paid: false,
    q: 'Document commercial cigarette smoking as a leading cause of preventable death worldwide, causing cancers and cardiovascular and lung disease, settled, overwhelming evidence.'
  }, {
    n: 'Ethnographic researchers',
    r: 'Traditional-use studies',
    stance: 'caveats',
    paid: false,
    q: 'Have begun documenting ceremonial and healer-administered tobacco uses in pilot studies, while noting rigorous biomedical evidence for ceremonial tobacco remains minimal.'
  }, {
    n: '"Keep Tobacco Sacred" movement',
    r: 'Cultural-public-health bridge',
    stance: 'endorses',
    paid: false,
    q: 'Works to distinguish sacred from commercial tobacco, defending Indigenous tradition while discouraging the addictive commercial product.'
  }],
  history: 'Tobacco was used ceremonially across the Americas for thousands of years, sacred to many peoples and central to ritual. After 15th-century colonial contact it was carried to Europe, commodified, and, with 20th-century industrial engineering and marketing, became a global public-health catastrophe. Indigenous communities have since led a movement to reclaim and protect sacred tobacco\'s meaning, distinct from the commercial product, supported by the 1978 American Indian Religious Freedom Act.',
  timeline: [['~5,500 yrs ago', 'Ceremonial tobacco documented in the Andes'], ['Pre-1492', 'Sacred and medicinal use across the Americas'], ['Post-1492', 'Commodified, taken to Europe, industrialized globally'], ['1978', 'American Indian Religious Freedom Act protects ceremonial use'], ['2000s-2020s', '"Keep Tobacco Sacred" movement defends the distinction']],
  rel: ['peyote', 'ayahuasca', 'meaning-response', 'ephedra'],
  enelNote: 'Sacred tobacco is the portal\'s sharpest two-layer case: profound cultural and spiritual reality on one side, one of the most settled harms in medicine on the other, and the same plant. We honor the sacred tradition (naming the four sacred medicines, the pipe ceremony, the 1978 Act) while stating commercial tobacco\'s harm without any softening, and we note that the tradition itself draws that line. It also models how commodification can invert a practice\'s meaning and danger, a theme that recurs across the library.',
  enel: true
}, {
  i: 'detox-cleanse',
  n: 'Cleanses & "Detox"',
  fn: 'An Ancient Instinct the Modern Version Oversells',
  tier: 1,
  ts: 85,
  sig: 'hot',
  hot: true,
  ev: 1,
  cats: ['cleanse', 'tradition', 'travel', 'traditional', 'safety'],
  cls: 'Purification / Detoxification',
  tradition: 'Ancient purification traditions vs. modern commercial "detox"',
  traditions: ['Ayurvedic panchakarma', 'Fasting and purification across faiths', 'Folk spring tonics & purges', 'Modern commercial detox/cleanse industry'],
  region: 'Purification rituals are near-universal; "detox" products are a global market',
  geo: [['South Asia (panchakarma)', 75], ['Global religious fasting/purification', 80], ['Folk European & other spring tonics', 60], ['Global commercial "detox" market', 85]],
  cultural: 'The urge to cleanse, to purify the body after excess, at the change of seasons, or as spiritual discipline, is ancient and near-universal. Ayurveda has panchakarma, a structured purification regimen; many faiths practice fasting and purification; folk traditions used "spring tonics" and bitter herbs to "clean the blood" after winter. These practices carry real cultural and spiritual meaning, and some, like fasting, have genuine physiological effects. The modern commercial "detox" industry borrows this ancient language, juice cleanses, "detox" teas, foot pads, colon cleanses, liver flushes, but reframes it around removing vaguely-defined "toxins," a claim that is mostly marketing.',
  mechanism: 'The body already has a sophisticated, continuous detoxification system: the liver, kidneys, lungs, gut, and skin neutralize and excrete waste and harmful compounds around the clock. No juice, tea, foot pad, or colon flush is needed to "activate" this, it is always running. Where cleanses produce real effects (e.g., from fasting or simply eating less processed food and more plants), the mechanism is those dietary changes and caloric shifts, not the removal of named "toxins."',
  evTier: 'mixed',
  evidence: 'The honest split: the ancient instinct contains real things (fasting has documented metabolic effects; eating more whole plants and less ultra-processed food genuinely helps), but the specific commercial "detox" claim, that cleanses remove toxins the body cannot handle itself, is not supported by good evidence. Reviews repeatedly find no rigorous evidence that commercial detox diets, teas, or colon cleanses eliminate toxins or deliver lasting health benefits; any short-term "feeling better" is generally explained by cutting alcohol, sugar, and processed food, plus placebo and expectation. Some "detox" teas work simply by acting as laxatives or diuretics, producing water-weight loss, not detoxification. So: purification traditions and fasting, real and sometimes beneficial; the toxin-removal marketing, largely unsupported.',
  risk: 'Some "detox" practices are genuinely harmful. "Detox" teas containing senna and other stimulant laxatives can cause dehydration, electrolyte imbalance, and dependence; colon cleansing/colonic irrigation can cause cramping, infection, perforation, and dangerous electrolyte shifts; prolonged juice-only or extreme cleanses can cause nutrient deficiency, blood-sugar problems, and muscle loss, and are dangerous for people with diabetes, kidney disease, eating-disorder history, or who are pregnant. "Liver flushes" and foot pads do nothing physiological. Anyone with a medical condition should avoid commercial cleanses and talk to a clinician; the safe core, eat more whole foods, less ultra-processed, carries no such risk.',
  diffusion: 'Purification is one of humanity\'s most universal health instincts, fasting, ritual cleansing, and seasonal tonics arose independently across faiths and cultures. The modern twist is commercial: the ancient language of purification spread into a global wellness market that repackaged it as "detox" products, a case where a real, near-universal instinct was commodified into claims the science does not support, and amplified by social media and influencer marketing.',
  ev: 1,
  tag: 'The urge to purify is ancient and near-universal, but the commercial "detox" claim, that cleanses remove toxins your liver and kidneys cannot, is mostly marketing.',
  facts: [['Ancient forms', 'Panchakarma, fasting, spring tonics'], ['Your real detox system', 'Liver, kidneys, gut, lungs, skin (always on)'], ['Commercial detox claim', 'Largely unsupported by evidence'], ['Some "detox" teas', 'Act as laxatives, water-weight only']],
  brief: 'The instinct to cleanse, after excess, at the seasons\' turn, as spiritual discipline, is ancient and near-universal: Ayurvedic panchakarma, religious fasting, folk spring tonics. Some of it contains real physiology (fasting has genuine effects; eating more whole plants and less processed food helps). But the modern commercial "detox" industry, juice cleanses, "detox" teas, colon flushes, foot pads, borrows that language to sell removal of vaguely-defined "toxins," a claim good evidence does not support, because the liver, kidneys, gut, lungs, and skin already detoxify continuously. Any short-term benefit usually comes from cutting alcohol, sugar, and processed food (plus placebo), and some "detox" teas merely act as laxatives. Several cleanse practices are genuinely risky. The ancient instinct is real; the toxin-removal marketing is mostly not.',
  uses: ['Understanding the body\'s real, continuous detox system', 'Distinguishing fasting/whole-food benefits from "toxin" claims', 'Recognizing risky cleanse practices', 'Seeing how an ancient instinct was commodified'],
  mf: [['Cleanses and detox products remove toxins your body cannot handle on its own.', 'The liver, kidneys, gut, lungs, and skin detoxify continuously; no juice, tea, or flush is needed to "activate" them. Reviews find no good evidence that commercial detoxes remove toxins, any benefit comes from dietary changes and placebo.'], ['Detox is just harmless wellness, even if it does nothing.', 'Some practices are genuinely harmful: stimulant-laxative "detox" teas cause dehydration and dependence, colon cleansing risks infection and perforation, and extreme juice cleanses cause nutrient and blood-sugar problems, dangerous for several groups.']],

  history: 'Purification practices, fasting, ritual cleansing, panchakarma, spring tonics, are ancient and cross-cultural, rooted in real instincts and sometimes real physiology. In the modern wellness era their language was adopted by a commercial "detox" market that reframed purification around removing "toxins," a claim that grew with social-media and influencer marketing even as scientific reviews repeatedly failed to support it.',
  timeline: [['Antiquity', 'Fasting, panchakarma, and purification rituals across cultures'], ['Pre-modern', 'Folk "spring tonics" and blood-cleansing herbs'], ['2000s-2010s', 'Commercial "detox" industry adopts purification language'], ['2010s-2020s', 'Reviews find no toxin-removal evidence; social media amplifies claims']],
  rel: ['heavy-metal-bhasma', 'turmeric', 'meaning-response', 'sweat-bath'],
  enelNote: 'Detox/cleanse is the dedicated entry the "Cleanses & Detox" category needed, and a clean two-layer case: a real, near-universal purification instinct (with genuine physiology in fasting and whole-food eating) versus a commercial "toxin-removal" claim that the evidence does not support and that sometimes causes real harm. We respect panchakarma and ritual fasting, debunk the toxin marketing plainly, flag the genuinely dangerous practices (stimulant-laxative teas, colonics), and locate the benefit where it actually is, diet change and placebo. Note: links to the existing fasting entry across portals if surfaced.',

  i: 'moxibustion',
  n: 'Moxibustion & Fire Therapies',
  fn: 'Healing With Heat at the Point',
  tier: 2,

  cats: ['bodywork', 'tradition', 'travel', 'traditional', 'region'],
  cls: 'Heat / Counter-Stimulation Therapy',
  tradition: 'Traditional Chinese Medicine and East Asian practice',
  traditions: ['Traditional Chinese Medicine', 'Japanese (kyu) and Korean practice', 'Tibetan & Mongolian moxa traditions'],
  region: 'China, Japan, Korea, and across East and Inner Asia; now global with acupuncture',
  geo: [['China (origin with acupuncture)', 88], ['Japan & Korea', 78], ['Tibet & Mongolia', 60], ['Global (with acupuncture practice)', 55]],
  cultural: 'Moxibustion is acupuncture\'s sibling, the two are paired in the very name of Chinese medicine (zhen jiu, "needle-moxa"). It involves burning moxa, dried mugwort (Artemisia), at or near acupuncture points to warm them, either on the skin, on a needle, or held above the point. In TCM theory it warms the meridians, moves qi and blood, and dispels "cold" and "dampness," and it is used for pain, digestive complaints, and, famously, to turn breech-position babies before birth. It belongs to a broader family of heat- and fire-based therapies (including cautery and warming techniques) found across cultures, all built on the intuition that applied heat can heal.',
  mechanism: 'Proposed mechanisms are partly understood and partly traditional. Local heat increases blood flow and can relax muscle and modulate pain (counter-irritation), plausible bases for symptomatic relief. For the breech-baby use, the leading hypothesis is that heat at the point (BL67, beside the little toe) increases fetal activity, possibly via maternal hormonal or autonomic responses, prompting the baby to turn. The meridian/qi framework is traditional and not a biomedical mechanism.',
  evTier: 'mixed',
  evidence: 'The evidence is mixed and mostly weak, with one intriguing exception. For pain and general complaints, trials are small, low-quality, and inconclusive, no firm conclusions are justified. The most-studied use is breech presentation: some randomized trials and reviews suggest moxibustion at BL67 (often combined with acupuncture) may modestly increase the chance a breech baby turns to head-down, though results are mixed and the evidence quality is limited, so it is considered promising-but-unproven and is sometimes offered as a low-risk adjunct under professional guidance. Overall: a long, coherent tradition with weak general evidence and one specific, better-studied (still uncertain) application.',
  risk: 'Moxibustion is generally low-risk when done by a trained practitioner, but it involves burning material near skin, so the real risks are burns, blisters, and scarring (especially with direct moxibustion), and smoke, which can irritate airways and is a concern for people with asthma or in poorly ventilated spaces. It should be avoided over certain areas and used cautiously in pregnancy except for the specific, professionally-guided breech application. As with acupuncture, the largest indirect risk is using it in place of needed medical care; a breech pregnancy in particular requires obstetric management regardless of any moxibustion attempt.',
  diffusion: 'Moxibustion spread together with acupuncture from China across East and Inner Asia, Japan (kyu), Korea, Tibet, and Mongolia, each developing variations, and then globally in the 20th century as part of the worldwide adoption of Chinese medicine. It sits within a wider, cross-cultural family of heat- and fire-based healing (cautery, warming therapies) that arose in many places, reflecting the universal observation that applied heat soothes and stimulates.',
  ev: 1,
  tag: 'Acupuncture\'s fire-based sibling, burning mugwort at the point, with weak general evidence and one better-studied use: nudging breech babies to turn.',
  facts: [['What it is', 'Burning moxa (mugwort) at acupoints'], ['Paired with', 'Acupuncture ("needle-moxa")'], ['Best-studied use', 'Turning breech babies (BL67)'], ['General evidence', 'Weak; small, low-quality trials']],
  brief: 'Moxibustion is acupuncture\'s fire-based sibling, the two are paired in the name of Chinese medicine itself, and involves burning moxa (dried mugwort) at or near acupuncture points to warm them. In TCM it warms the meridians and dispels "cold" and "dampness," used for pain, digestion, and, famously, to turn breech babies before birth. The evidence is mostly weak: trials for pain and general use are small and inconclusive. The exception is breech presentation, where some randomized trials and reviews suggest moxibustion at the BL67 point (often with acupuncture) may modestly increase the chance a breech baby turns head-down, promising but uncertain, and sometimes offered as a low-risk adjunct under professional guidance. The honest read: a coherent ancient tradition, weak general evidence, one specific better-studied application, with burns and smoke the real cautions.',
  uses: ['Warming and pain relief (weak evidence)', 'Adjunct for turning breech babies (BL67; promising, uncertain)', 'Part of traditional acupuncture practice', 'A window into cross-cultural heat therapies'],
  mf: [['Moxibustion has no evidence for anything.', 'Its strongest use, turning breech babies via BL67, has some randomized-trial and review support suggesting a modest effect, though uncertain. General-use evidence is weak, but the breech application is a real, better-studied exception.'], ['If moxibustion can turn a breech baby, it replaces obstetric care.', 'No, a breech pregnancy requires obstetric management regardless. Moxibustion is at most a low-risk adjunct attempted under professional guidance, not a substitute for the medical management of breech presentation.']],
  voices: [{
    n: 'Breech-presentation trials',
    r: 'Obstetric research',
    stance: 'caveats',
    paid: false,
    q: 'Suggest moxibustion at BL67 (often with acupuncture) may modestly increase the chance a breech baby turns head-down, with mixed results and limited evidence quality.'
  }, {
    n: 'TCM practitioners',
    r: 'Traditional theory',
    stance: 'champions',
    paid: false,
    q: 'Hold that moxibustion warms the meridians and moves qi and blood to dispel cold and dampness, paired with acupuncture as a core therapy.'
  }, {
    n: 'Evidence reviewers',
    r: 'General-use assessment',
    stance: 'mixed',
    paid: false,
    q: 'Find general-use trials small, low-quality, and inconclusive, so no firm conclusions are justified beyond the better-studied breech application.'
  }, {
    n: 'Safety-minded clinicians',
    r: 'On burns and pregnancy',
    stance: 'caveats',
    paid: false,
    q: 'Flag burn, blister, and smoke-irritation risks, and stress that breech pregnancy needs obstetric management regardless of any moxibustion attempt.'
  }],
  history: 'Moxibustion is as old as acupuncture in the Chinese tradition, the two named together as "needle-moxa," and spread with it across East and Inner Asia, developing regional forms in Japan, Korea, Tibet, and Mongolia. It entered global practice in the 20th century alongside acupuncture, and modern research has focused most on its breech-turning application, the one use with a meaningful (if uncertain) evidence base.',
  timeline: [['Antiquity', 'Moxibustion paired with acupuncture in Chinese medicine'], ['Pre-modern', 'Regional forms develop in Japan, Korea, Tibet, Mongolia'], ['20th c.', 'Spreads globally with acupuncture'], ['2000s-2020s', 'Research focuses on the breech-presentation application']],
  rel: ['acupuncture', 'sweat-bath', 'heliotherapy', 'reflex-microsystems'],
  enelNote: 'Moxibustion rounds out the bodywork cluster and the TCM family alongside acupuncture and cupping. It is a clean "weak general evidence, one better-studied use" entry: we give the breech-baby application its fair (uncertain) due, keep the general-use evidence honestly weak, carry the burn/smoke and obstetric-management cautions, and place it in the cross-cultural heat-therapy family that ties to the sweat bath and heliotherapy. The fire-and-heat thread connects the portal\'s warmth-based practices.',
  enel: true
}];

// ════════════════════════════════════════════════════════════
//  DiffusionMap — interactive cross-cultural travel map.
//  Equirectangular projection on canvas; React overlay for labels,
//  practice selector, and legend. Select a practice to see its
//  origin(s), how it spread (arcs), or where it arose independently.
// ════════════════════════════════════════════════════════════
function DiffusionMap({
  onSelect
}) {
  const cvRef = React.useRef(null);
  const [sel, setSel] = useState(null); // selected entry id or null (overview)
  const [hover, setHover] = useState(null);
  const W = 980,
    H = 520; // logical map size (equirectangular)
  // projection: lon -180..180 -> 0..W ; lat 84..-60 -> 0..H (crop antarctica)
  const LAT_TOP = 84,
    LAT_BOT = -60;
  const proj = (lon, lat) => [(lon + 180) / 360 * W, (LAT_TOP - lat) / (LAT_TOP - LAT_BOT) * H];
  const COLORS = {
    mint: C.mint,
    gold: C.gold,
    teal: C.tealL,
    red: C.red
  };
  useEffect(() => {
    const cv = cvRef.current;
    if (!cv) return;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = W * DPR;
    cv.height = H * DPR;
    cv.style.width = '100%';
    cv.style.height = 'auto';
    const ctx = cv.getContext('2d');
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    let raf,
      t0 = performance.now();
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    function arc(ctx, a, b, prog) {
      // great-ish arc: quadratic bezier bowed toward viewer (up)
      const [x1, y1] = proj(a[0], a[1]),
        [x2, y2] = proj(b[0], b[1]);
      const mx = (x1 + x2) / 2,
        my = (y1 + y2) / 2;
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const cx = mx,
        cy = my - Math.min(dist * 0.32, 120); // bow upward
      // sample
      ctx.beginPath();
      const N = 64,
        end = Math.floor(N * prog);
      for (let i = 0; i <= end; i++) {
        const u = i / N,
          iu = 1 - u;
        const x = iu * iu * x1 + 2 * iu * u * cx + u * u * x2,
          y = iu * iu * y1 + 2 * iu * u * cy + u * u * y2;
        if (i === 0) ctx.moveTo(x, y);else ctx.lineTo(x, y);
      }
      ctx.stroke();
      // moving head dot
      if (prog < 1) {
        const u = prog,
          iu = 1 - u;
        const x = iu * iu * x1 + 2 * iu * u * cx + u * u * x2,
          y = iu * iu * y1 + 2 * iu * u * cy + u * u * y2;
        return [x, y];
      }
      return null;
    }
    function draw(now) {
      const tt = (now - t0) / 1000;
      ctx.clearRect(0, 0, W, H);
      // ocean
      ctx.fillStyle = 'rgba(8,16,30,0.55)';
      ctx.fillRect(0, 0, W, H);
      // graticule
      ctx.strokeStyle = 'rgba(91,196,214,0.06)';
      ctx.lineWidth = 0.5;
      for (let lon = -150; lon <= 150; lon += 30) {
        const [x] = proj(lon, 0);
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let lat = 60; lat >= -40; lat -= 30) {
        const [, y] = proj(0, lat);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      // land
      for (const ring of MAP_LANDS) {
        ctx.beginPath();
        for (let i = 0; i < ring.length; i++) {
          const [x, y] = proj(ring[i][0], ring[i][1]);
          if (i === 0) ctx.moveTo(x, y);else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(34,72,92,0.42)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(127,216,230,0.30)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      // entries to draw: selected one, or all origins in overview
      const ids = sel ? [sel] : Object.keys(DIFFUSION);
      ids.forEach(id => {
        const d = DIFFUSION[id];
        if (!d) return;
        const col = COLORS[d.color] || C.tealL;
        if (sel) {
          // routes (animated)
          ctx.strokeStyle = col;
          ctx.lineWidth = 1.6;
          ctx.globalAlpha = 0.85;
          (d.routes || []).forEach((r, ri) => {
            const prog = reduce ? 1 : Math.min(1, Math.max(0, (tt - ri * 0.5) / 1.4));
            const head = arc(ctx, r.from, r.to, prog);
            if (head) {
              ctx.save();
              ctx.fillStyle = col;
              ctx.beginPath();
              ctx.arc(head[0], head[1], 3, 0, 7);
              ctx.fill();
              ctx.restore();
            }
          });
          ctx.globalAlpha = 1;
          // nodes
          (d.nodes || []).forEach(nd => {
            const [x, y] = proj(nd.lon, nd.lat);
            const isO = nd.kind === 'origin',
              isInd = nd.kind === 'independent';
            ctx.beginPath();
            ctx.arc(x, y, isO ? 6 : 4.5, 0, 7);
            ctx.fillStyle = isO ? col : isInd ? 'rgba(127,216,230,0.9)' : 'rgba(245,240,225,0.85)';
            ctx.fill();
