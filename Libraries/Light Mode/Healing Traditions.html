  geo: [['Banned as a weight-loss/energy supplement (US 2004)', 100]],
  cultural: 'Ma huang (Ephedra sinica) is a classical Chinese herb used for thousands of years, traditionally for respiratory conditions, asthma, congestion, and "wind-cold" patterns, in carefully formulated, time-limited combinations under a practitioner\'s guidance. In its traditional context it was a respected, potent remedy used with caution, not a daily stimulant.',
  mechanism: 'Ephedra contains ephedrine and pseudoephedrine, powerful sympathomimetic compounds that stimulate the cardiovascular and nervous systems (raising heart rate and blood pressure and opening airways). These are real, potent drug effects, which is exactly why the herb is both effective and dangerous.',
  evTier: 'mixed',
  evidence: 'Ephedra is a case where the traditional use had a real pharmacological basis and the modern misuse caused real harm. Ephedrine genuinely works as a bronchodilator and decongestant (and pseudoephedrine remains a common decongestant), validating part of the traditional respiratory use. But when ephedra was sold in the West as a concentrated weight-loss and energy/"fat-burner" supplement, often combined with caffeine and taken daily at high doses far from its traditional use, it was linked to heart attacks, strokes, seizures, and deaths. The US FDA banned ephedra-containing dietary supplements in 2004, its first such ban. So: validated active compounds, mixed-to-harmful as a misused supplement.',
  risk: 'This is a serious safety flag. Concentrated ephedra/ephedrine supplements, especially stacked with caffeine for weight loss or energy, have caused cardiovascular events (heart attack, stroke, dangerous blood-pressure spikes, arrhythmias), seizures, and deaths, leading to the 2004 US ban on ephedra dietary supplements. The danger rises sharply with dose, daily use, stimulant combinations, and pre-existing heart conditions, exactly the pattern of Western "fat-burner" use, and far removed from cautious, short-term traditional formulation. The lesson: a potent traditional herb taken out of its careful context and concentrated for a new purpose can be lethal.',
  safetyFlag: 'dangerous',
  diffusion: 'A Chinese respiratory herb whose isolated compound (ephedrine) entered global pharmacology as a legitimate drug, while the raw herb, repackaged in the West as a weight-loss stimulant, became a cautionary tale ending in a national ban. It pairs with aristolochic acid as a second "traditional herb proven dangerous in misuse," and with willow/artemisinin as another herb yielding a validated compound, the same plant landing in different evidence tiers depending on use.',
  tag: 'A classic Chinese respiratory herb whose real stimulant compounds made it effective, and, repackaged as a Western "fat-burner," caused heart attacks and deaths and a national ban.',
  facts: [['Herb', 'Ma huang (Ephedra sinica)'], ['Active compounds', 'Ephedrine, pseudoephedrine'], ['Traditional use', 'Respiratory/asthma, short-term, formulated'], ['US action', 'FDA banned ephedra supplements, 2004']],
  brief: 'Ephedra shows how context decides whether a potent herb heals or harms. Ma huang has been used in Chinese medicine for millennia, mainly for respiratory complaints, in cautious, short-term, formulated combinations. Its active compounds, ephedrine and pseudoephedrine, are genuinely powerful (ephedrine opens airways; pseudoephedrine is still a common decongestant), which validates part of the traditional use. The catastrophe came when ephedra was pulled out of that careful context and sold in the West as a concentrated daily weight-loss and energy supplement, often stacked with caffeine. In that form it was linked to heart attacks, strokes, seizures, and deaths, and in 2004 the US FDA banned ephedra-containing supplements, its first such action. The library holds both truths plainly: the traditional remedy had real pharmacology, and the modern misuse was genuinely dangerous, a potent plant is not safe just because it is old and natural.',
  mf: [['Ephedra is a gentle natural herb safe for daily weight loss and energy.', 'Ephedra contains powerful stimulants and, used as a concentrated daily "fat-burner" (often with caffeine), was linked to heart attacks, strokes, and deaths, prompting a 2004 US ban. It is potent and was dangerous in that use.'], ['Because ephedra was banned, its traditional use was worthless.', 'Not so. Its compounds (ephedrine, pseudoephedrine) are real, effective respiratory drugs, validating part of the traditional use. The harm came from concentrated misuse out of context, not from the herb having no basis.']],
  voices: [{

  history: 'Used in Chinese medicine for respiratory conditions for thousands of years, ephedra yielded ephedrine, isolated and adopted into global pharmacology. In the late 20th century the raw herb was marketed in the West as a weight-loss and energy supplement; mounting reports of serious cardiovascular harm and deaths led the US FDA to ban ephedra-containing supplements in 2004.',
  timeline: [['Antiquity', 'Ma huang used in Chinese medicine for respiratory conditions'], ['Early 20th c.', 'Ephedrine isolated and adopted as a pharmaceutical'], ['1990s', 'Ephedra marketed in the West as weight-loss/energy supplement'], ['2004', 'FDA bans ephedra-containing dietary supplements']],

  geo: [['Marketed worldwide as a stress/sleep supplement', 100]],
  cultural: 'Ashwagandha (Withania somnifera) is one of Ayurveda\'s most prized herbs, a "rasayana" (rejuvenative) used for vitality, strength, and calm for over two thousand years. Its Sanskrit name evokes the strength of a horse, and it was traditionally taken to restore energy, resilience, and sleep. Today it is one of the best-selling herbal supplements in the world, marketed as an "adaptogen" for stress.',
  mechanism: 'Proposed mechanisms include modulation of the stress response (lowering cortisol) and effects on GABA and serotonin signaling, consistent with calming and anti-anxiety effects. As with many botanicals, products vary widely in extract type and concentration, and the meaning/expectation response likely contributes.',
  evTier: 'mixed',
  evidence: 'Ashwagandha has better human evidence than many traditional herbs, though still limited. Multiple small-to-moderate randomized trials and reviews suggest it can modestly reduce stress and anxiety and lower cortisol, with some signals for improved sleep, and weaker evidence for athletic and other benefits. The trials are often small, short, industry-linked, and varied in formulation, so confidence is moderate, not high. The honest tier is "mixed/promising": a traditional herb with a plausibly real, modest anti-stress effect that is among the more studied botanicals, while still needing larger independent trials.',
  risk: 'Ashwagandha is generally well tolerated short-term, but real cautions exist. A growing number of liver-injury (hepatotoxicity) cases have been reported, enough that several regulators have flagged it; it may not be safe in pregnancy (traditionally considered an abortifacient risk), can affect thyroid hormone levels, may interact with sedatives, thyroid, and immunosuppressant medications, and is best avoided with autoimmune conditions without medical advice. As with all supplements, product quality and contamination vary. The takeaway: a promising calming herb with a genuine, if uncommon, liver-safety signal and several interaction concerns, worth discussing with a clinician.',
  safetyFlag: 'caution',
  diffusion: 'A South Asian Ayurvedic herb that became a global wellness staple, riding the modern "adaptogen" trend. Its journey, ancient rasayana to mass-market stress capsule, mirrors turmeric\'s, and like turmeric it shows how a traditional remedy can carry real (if modest) evidence and an under-appreciated safety signal once concentrated and sold worldwide.',
  tag: 'A 2,000-year-old Ayurvedic "rejuvenative" now a best-selling stress supplement, with genuinely promising (if modest) anxiety evidence and a real, if uncommon, liver-injury signal.',
  facts: [['Plant', 'Withania somnifera (ashwagandha)'], ['Tradition', 'Ayurvedic rasayana (rejuvenative)'], ['Best evidence', 'Modest stress/anxiety and cortisol reduction'], ['Safety signals', 'Liver-injury reports; avoid in pregnancy']],
  brief: 'Ashwagandha is one of the better cases for the "traditional herb with real modern support" story, held honestly. In Ayurveda it is a prized rasayana, a rejuvenative for strength, vitality, and calm, used for over two millennia, and today it is a top-selling "adaptogen" supplement. The evidence is, for a botanical, relatively encouraging: several randomized trials suggest a modest reduction in stress and anxiety and in cortisol, with some sleep benefit, though studies are mostly small, short, and industry-linked, so confidence is moderate. The library also surfaces a less-advertised reality: a growing number of liver-injury cases have prompted regulatory attention, and ashwagandha is best avoided in pregnancy and used cautiously with thyroid issues, sedatives, autoimmune conditions, and certain medications. The balanced read: a promising calming herb with genuine traditional roots and modest modern support, plus real safety considerations that deserve a conversation with a clinician.',
  mf: [['Ashwagandha is a proven, risk-free cure for stress and anxiety.', 'Evidence is promising but modest and mostly from small, short, industry-linked trials, and it carries real cautions, including liver-injury reports and pregnancy and medication concerns. It\'s a reasonable, studied option, not a risk-free cure.'], ['As an ancient natural herb, ashwagandha has no safety concerns.', 'It has a documented (if uncommon) liver-injury signal, may affect thyroid hormones, is best avoided in pregnancy, and interacts with several medications. Traditional and natural do not mean concern-free.']],

  timeline: [['Antiquity', 'Ashwagandha used as an Ayurvedic rasayana'], ['2000s-2010s', 'Adaptogen trend drives global supplement sales'], ['2010s-2020s', 'Randomized trials suggest modest anti-stress effects'], ['2020s', 'Regulators flag ashwagandha-associated liver-injury reports']],
  rel: ['turmeric', 'heavy-metal-bhasma', 'meaning-response', 'ephedra'],
  enelNote: 'Ashwagandha is a fair "mixed/promising" Ayurvedic entry that avoids both hype and dismissal: relatively good (if small/industry-linked) evidence for modest stress relief, paired prominently with the under-advertised liver-injury signal and pregnancy/thyroid/interaction cautions. It pairs with turmeric (another Ayurvedic herb between kitchen and clinic) and feeds the broader point that traditional botanicals deserve real study and real safety scrutiny at once.',

}, {
  i: 'heavy-metal-bhasma',
  n: 'Heavy Metals in Some Traditional Remedies',
  fn: 'When the Medicine Contains Lead, Mercury, or Arsenic',
  tier: 1,
  ts: 84,
  sig: 'hot',
  hot: true,
  ev: 3,
  cats: ['safety', 'tradition', 'travel', 'region'],
  cls: 'Contamination / Toxic Preparation',
  tradition: 'Some Ayurvedic (bhasma/rasa shastra) and other systems',
  traditions: ['Ayurveda (rasa shastra)', 'some folk and imported remedies'],
  region: 'South Asia; cases worldwide via imported products',
  geo: [['US-bought Ayurvedic products found with heavy metals (one study)', 20]],
  cultural: 'Within Ayurveda, a specialized branch (rasa shastra) deliberately incorporates processed metals and minerals, including mercury, lead, and arsenic, into preparations called bhasma, believing that elaborate purification (shodhana) renders them safe and therapeutic. Practitioners regard these as potent, refined medicines made by careful traditional processes. Separately, heavy metals also enter some traditional and folk remedies as unintended contamination. This entry documents both the deliberate and the accidental presence of toxic metals, with respect for the tradition\'s intent and zero compromise on the danger.',
  mechanism: 'Lead, mercury, and arsenic are cumulative toxins with no safe level for routine intake. They damage the nervous system, kidneys, blood, and (in children and pregnancy) development, regardless of the spiritual or processing rationale behind their inclusion. Traditional purification does not reliably remove their toxicity.',
  evTier: 'harmful',
  evidence: 'This is a documented, hard safety problem. Published testing has repeatedly found that a meaningful fraction of Ayurvedic herbal-mineral products, including ones bought in the US, contain detectable lead, mercury, or arsenic, sometimes at levels capable of causing toxicity; one widely cited analysis found roughly one in five tested products contained heavy metals. Real cases of lead and mercury poisoning, including in pregnant women and children, have been traced to such remedies, and to certain folk preparations and cosmetics (e.g., some traditional eye and "tonic" products). The evidence is clear and corroborated by case reports and product testing: some traditional remedies can poison people.',
  risk: 'A hard danger flag. Heavy-metal-containing remedies can cause serious, sometimes permanent harm, lead and mercury poisoning, kidney and nerve damage, anemia, and developmental harm to fetuses and children, even when used as directed, because the toxins accumulate. Risk is highest with deliberate metal-containing bhasma/rasa shastra products, certain imported folk remedies, and some traditional cosmetics (kohl/surma, some "health tonics"). No purification ritual or tradition makes lead, mercury, or arsenic safe to ingest. Anyone using such products, especially if pregnant, nursing, or giving them to a child, should stop and seek medical testing, and tell their clinician.',
  safetyFlag: 'dangerous',
  diffusion: 'A harm that originates in specific traditional practices but spreads globally through imported products and diaspora use, heavy-metal-containing remedies bought online or abroad have caused poisonings far from their origin. It mirrors the aristolochic-acid story (a traditional preparation causing measurable harm documented by rigorous testing) and underscores a cross-cultural safety theme: contamination and toxic ingredients travel with traded remedies.',
  tag: 'Some traditional remedies, by intention or contamination, contain lead, mercury, or arsenic and have poisoned people, no purification ritual makes a heavy metal safe to swallow.',
  facts: [['Metals involved', 'Lead, mercury, arsenic'], ['One US testing study', '~1 in 5 products had heavy metals'], ['Highest-risk products', 'Metal-based bhasma, some imported folk remedies'], ['Safe level', 'None for cumulative heavy-metal intake']],
  brief: 'This is one of the portal\'s most important safety entries, and it requires holding respect and bluntness together. Within Ayurveda, a specialized branch (rasa shastra) deliberately includes processed mercury, lead, and arsenic in mineral preparations (bhasma), trusting elaborate purification to make them safe and potent. Other traditional and folk remedies, and some traditional cosmetics, contain heavy metals as contamination. The evidence is unambiguous: product testing has repeatedly found lead, mercury, or arsenic in a meaningful share of Ayurvedic and imported remedies, including products sold in the US, and documented poisonings, in adults, pregnant women, and children, have been traced to them. The library states the cultural intent honestly and the danger without hedging: heavy metals are cumulative toxins with no safe intake level, and no traditional purification reliably removes their toxicity. If you use metal-containing or unverified imported remedies, especially around pregnancy or children, stop and get medical testing.',
  mf: [['Traditional purification makes the metals in these remedies safe.', 'It does not. Lead, mercury, and arsenic remain toxic and cumulative regardless of processing or spiritual rationale, and documented poisonings have resulted from such products. No ritual makes a heavy metal safe to ingest.'], ['Heavy-metal contamination is rare and not a real concern.', 'Testing has repeatedly found lead, mercury, or arsenic in a meaningful fraction of Ayurvedic and imported remedies, with real poisoning cases including in pregnancy and children. It is a documented, serious problem, not a hypothetical one.']],
  voices: [{
    n: 'Product-testing researchers',
    r: 'Heavy-metal analyses (e.g., JAMA-published)',
    stance: 'opposes',
    paid: false,
    q: 'Found that a meaningful fraction of tested Ayurvedic products, including US-purchased ones, contained lead, mercury, or arsenic, sometimes at toxic levels.'
  }, {
    n: 'Public-health/poison-control agencies',
    r: 'CDC and toxicology',
    stance: 'opposes',
    paid: false,
    q: 'Document lead and mercury poisoning cases, including in pregnant women and children, traced to traditional remedies and some traditional cosmetics.'
  }, {
    n: 'Reform-minded practitioners',
    r: 'Within Ayurveda',
    stance: 'cautions',
    paid: false,
    q: 'Advocate for heavy-metal testing, transparency, and avoiding metal-based preparations, distinguishing herbal Ayurveda from risky rasa shastra products.'
  }, {
    n: 'Rasa shastra traditionalists',
    r: 'Classical mineral-preparation view',
    stance: 'caveats',
    paid: false,
    q: 'Maintain that elaborate purification renders metal preparations therapeutic, a claim modern toxicology does not support given documented poisonings.'
  }],
  history: 'The deliberate use of processed metals in Ayurvedic rasa shastra is centuries old, framed by traditional purification doctrine. As these products globalized and modern testing developed, repeated analyses found dangerous heavy-metal levels, and documented poisonings prompted warnings from health agencies worldwide, establishing this as a clear, evidence-based safety concern rather than a cultural slight.',
  timeline: [['Centuries', 'Rasa shastra incorporates processed metals into bhasma'], ['2000s', 'US product testing finds heavy metals in many Ayurvedic remedies'], ['2000s-2010s', 'Documented lead/mercury poisonings traced to such products'], ['Ongoing', 'Health agencies issue warnings; testing and reform urged']],
  rel: ['aristolochic-acid', 'ephedra', 'turmeric', 'ashwagandha'],
  enelNote: 'A flagship hard-safety entry that models the two-layer discipline at its hardest: document the rasa shastra tradition\'s intent respectfully, then state with zero hedging that lead, mercury, and arsenic poison people and no purification makes them safe. It carries product-testing evidence, real poisoning cases (including pregnancy/children), a hard danger flag, and a clear "stop and get tested" line. Pairs with aristolochic acid and ephedra as the portal\'s documented-harm cluster.',
  enel: true
}, {
  i: 'reflex-microsystems',
  n: 'Reflexology & Ear Microsystems',
  fn: 'Maps of the Whole Body on a Foot or an Ear',
  tier: 1,
  ts: 80,
  sig: 'steady',
  hot: false,
  ev: 1,
  cats: ['bodywork', 'tradition', 'travel', 'traditional'],
  cls: 'Microsystem Bodywork',
  tradition: 'Reflexology (zone therapy) + Auriculotherapy / NADA ear acupuncture',
  traditions: ['Reflexology / zone therapy', 'Chinese & French auricular acupuncture', 'NADA protocol (clinical)'],
  region: 'Practiced worldwide; modern forms shaped in China, France, and the US',
  geo: [['East Asia (auricular roots)', 80], ['Europe (French auriculotherapy)', 70], ['North America (NADA, reflexology)', 75], ['Global wellness settings', 60]],
  cultural: 'Microsystem therapies share one elegant idea: that a small part of the body, the sole of the foot, the palm, or the outer ear, carries a map of the whole, so that pressing or needling a point can influence a distant organ. Reflexology (zone therapy) applies thumb-and-finger pressure to foot and hand zones; auriculotherapy treats points on the ear. The ear map was systematized in 1950s France by Paul Nogier and parallels older Chinese auricular practice; reflexology\'s modern form was popularized in the early 20th-century US, with antecedents in older pressure-and-zone traditions. In clinical settings the NADA protocol (five ear points, shen men, sympathetic, kidney, liver, lung) was developed in the 1970s at Lincoln Hospital in the Bronx as an addiction-support tool, and is offered as one part of a comprehensive program, never as a stand-alone cure.',
  mechanism: 'Proposed mechanisms are unproven for the "body-map" claim but plausible for general effects: relaxation and parasympathetic activation from touch, the rich nerve supply of the ear (which contains tissue from all embryonic layers and strong vagal innervation), and nonspecific effects of attention and ritual. There is no anatomical evidence that foot zones connect to specific distant organs.',
  evTier: 'mixed',
  evidence: 'The evidence splits sharply by claim. Reflexology: there is no convincing scientific evidence that it treats any specific medical condition or that foot "zones" map to organs, and it is often classified as a pseudomedical practice, though, like any pleasant foot massage, it can produce real relaxation and short-term wellbeing. Auriculotherapy/ear acupuncture: the evidence is mixed but less dismissive, overviews of systematic reviews report possible benefit for insomnia, smoking cessation, and pain, with rare adverse effects. The NADA addiction protocol has decades of clinical use and some supportive signals (especially combined with counseling), but remains under-studied by rigorous standards and is positioned as adjunctive, not curative.',
  risk: 'These are low-harm practices when done hygienically. Real risks are modest: ear-needle or ear-seed sites can become irritated or infected, and the main danger is indirect, relying on a microsystem therapy instead of effective care for a serious condition (the biggest risk with reflexology\'s organ-map claims). NADA and auriculotherapy in addiction or mental-health care should complement, not replace, evidence-based treatment. Anyone using these for a medical problem should keep their clinician informed.',
  diffusion: 'A striking case of convergent and cross-pollinated ideas: ear and body-surface "maps" appear in Chinese acupuncture, were re-systematized in 1950s France (Nogier), and merged with Western clinical practice in the US NADA protocol, while reflexology\'s zone idea echoes pressure traditions across cultures. The shared intuition, that the periphery mirrors the whole, recurs independently and then travels and hybridizes.',
  ev: 1,
  tag: 'A small map of the whole body on a foot or an ear: the organ-map claim is unsupported, but relaxation and some auricular effects are real.',
  facts: [['Core idea', 'A small area maps the whole body'], ['Reflexology evidence', 'No convincing organ-map effect'], ['Auriculotherapy evidence', 'Mixed; some signal (sleep, pain, smoking)'], ['NADA points', '5 ear points; addiction adjunct']],
  brief: 'Reflexology and ear microsystems share one elegant, ancient-feeling idea, that a small part of the body holds a map of the whole. The honest accounting separates two claims. The strong claim (pressing a foot zone heals a specific organ) has no convincing evidence and is widely regarded as pseudomedical. The softer reality (touch, relaxation, and the ear\'s rich nerve supply produce real, if nonspecific, effects) is better supported: auriculotherapy shows mixed but real signals for insomnia, pain, and smoking cessation, and the NADA five-point ear protocol has long clinical use in addiction support as an adjunct to counseling. Treated as relaxation and supportive care, these are low-risk; treated as a substitute for medicine, the organ-map claim is where caution belongs.',
  uses: ['Relaxation and stress relief (well supported)', 'Adjunctive support in addiction programs (NADA)', 'Possible help for insomnia, pain, smoking cessation (auricular, mixed)', 'A case study in the "periphery mirrors the whole" intuition'],
  mf: [['Pressing a zone on the foot directly heals the matching organ.', 'There is no anatomical or convincing clinical evidence for the organ-map claim. Reflexology can relax and soothe, but it does not treat specific organs through foot zones.'], ['Ear acupuncture is proven, or pure pseudoscience.', 'Neither extreme fits. Auriculotherapy shows mixed but real signals for some conditions (sleep, pain, smoking), and the NADA protocol is a long-used addiction adjunct, while reflexology\'s organ claims are unsupported. The evidence is uneven, not all-or-nothing.']],
  voices: [{
    n: 'Systematic reviews of reflexology',
    r: 'Evidence synthesis',
    stance: 'opposes',
    paid: false,
    q: 'Find no convincing evidence that reflexology treats any specific medical condition or that foot zones map to organs, though general relaxation effects are plausible.'
  }, {
    n: 'Auriculotherapy overview of reviews',
    r: 'Evidence synthesis',
    stance: 'mixed',
    paid: false,
    q: 'Reports possible benefit for insomnia, smoking cessation, and pain with rare adverse effects, while noting the evidence base is still limited.'
  }, {
    n: 'NADA / Lincoln Hospital tradition',
    r: 'Clinical addiction model',
    stance: 'caveats',
    paid: false,
    q: 'Positions the five-point ear protocol as one component of comprehensive care, effective and economical as an adjunct, explicitly not a stand-alone cure.'
  }, {
    n: 'Reflexology practitioners',
    r: 'Wellness providers',
    stance: 'endorses',
    paid: true,
    q: 'Often present reflexology as able to influence specific organs and conditions, a claim that outruns the evidence, while the relaxation people experience is real.'
  }],
  history: 'Body-surface "maps" are old and cross-cultural: Chinese medicine described ear points, and zone ideas recur in many pressure traditions. The modern forms crystallized in the 20th century, reflexology popularized in the early-1900s US, the systematic ear map developed by Paul Nogier in 1950s France, and the clinical NADA ear-acupuncture protocol created in the 1970s at Lincoln Hospital for addiction support, from which today\'s "acudetox" descends.',
  timeline: [['Antiquity', 'Ear and body-surface points described in Chinese practice'], ['Early 1900s', 'Reflexology / zone therapy popularized in the US'], ['1950s', 'Paul Nogier systematizes the auricular (ear) map in France'], ['1970s', 'NADA five-point ear protocol developed at Lincoln Hospital'], ['2010s-2020s', 'Reviews: reflexology organ-claims unsupported; auricular signals mixed']],
  rel: ['acupuncture', 'grounding', 'meaning-response', 'psilocybin'],
  enelNote: 'A clean "mixed, by claim" entry that models honest disaggregation: the romantic organ-map claim of reflexology is unsupported and we say so, while the softer, real effects (relaxation, the ear\'s genuine neuroanatomy, auricular signals for sleep/pain/smoking, NADA as an addiction adjunct) get their fair due. The microsystem idea is also a lovely convergence/diffusion story (China, France, the Bronx). We keep the "don\'t replace real care" line where the organ claim could mislead.',
  enel: true
}, {
  i: 'chamomile',
  n: 'Chamomile & Folk Digestive Teas',
  fn: 'The Grandmother\'s Cup for an Upset Stomach',
  tier: 1,
  ts: 78,
  sig: 'steady',
  hot: false,
  ev: 2,
  cats: ['herbal', 'food', 'tradition', 'travel', 'traditional'],
  cls: 'Herbal Remedy',
  tradition: 'European, Mesoamerican, Middle Eastern & global folk herbalism',
  traditions: ['European folk herbalism', 'Mexican/Mesoamerican home remedy (manzanilla)', 'Middle Eastern & North African herbal tradition', 'Unani & Ayurvedic use'],
  region: 'Worldwide; deep roots around the Mediterranean, Europe, and the Americas',
  geo: [['Europe & Mediterranean', 85], ['Mexico & Latin America (manzanilla)', 85], ['Middle East & North Africa', 75], ['South Asia', 55]],
  cultural: 'Few remedies are as universal and as domestic as a cup of chamomile (manzanilla) for an upset stomach, fussy baby, or sleepless night. It belongs to the grandmother-to-grandchild layer of medicine, passed down at the kitchen table rather than prescribed. In Mexican homes (including families in Michoacán) manzanilla is a first reach for stomach upset and colic; across Europe and the Mediterranean it is an ancient calming and digestive tea; in the Middle East and South Asia it sits among a wider family of after-meal herbal infusions (mint, anise, fennel, ginger). The cultural meaning is care itself, the making and offering of the tea is part of the medicine.',
  mechanism: 'Chamomile (Matricaria chamomilla) contains flavonoids (including apigenin) and volatile oils with documented anti-inflammatory, antispasmodic, and mild anxiolytic activity in lab and some clinical studies, plausible bases for soothing the gut and easing tension. Warm fluid and the ritual of rest also contribute.',
  evTier: 'mixed',
  evidence: 'Chamomile is a good example of a folk remedy with real, if modest, pharmacology. Evidence supports mild benefits for digestive discomfort and relaxation/sleep, and early trials suggest possible help with generalized anxiety, though studies are generally small and the effects gentle rather than dramatic. It is not a treatment for serious disease. Related folk digestive herbs (peppermint, ginger, fennel) have their own evidence, peppermint oil for irritable bowel and ginger for nausea being among the better-supported. The honest read: a soothing, low-risk traditional remedy with modest validated effects, not a cure.',
  risk: 'Chamomile is generally very safe. The main cautions: allergy (it is in the ragweed/daisy family, so people allergic to those may react), possible interaction with blood thinners at high intake, and the general rule that "natural" teas can still interact with medications. For infants and young children, herbal preparations should be discussed with a pediatrician, and honey (sometimes added) must never be given under 12 months. A persistent or severe stomach problem deserves medical evaluation rather than tea alone.',
  diffusion: 'Chamomile\'s spread tracks human movement: native to Europe and western Asia, carried across the Mediterranean in antiquity and to the Americas in the colonial era, where it merged with Indigenous herbal practice to become the beloved manzanilla. It now sits in a global family of after-meal "digestive tea" traditions that arose partly independently (mint in the Maghreb, fennel and ajwain in South Asia, ginger across Asia) and partly through trade, a fine example of both convergence and travel.',
  ev: 2,
  tag: 'The universal grandmother\'s cup for an upset stomach, with real, modest pharmacology behind the tradition, and a gentle reminder that natural is not risk-free.',
  facts: [['Plant', 'Matricaria chamomilla (manzanilla)'], ['Traditional use', 'Upset stomach, colic, calm, sleep'], ['Active compounds', 'Apigenin, volatile oils'], ['Evidence', 'Modest, real (digestion, calm, sleep)']],
  brief: 'Chamomile, manzanilla, is the quintessential grandmother remedy: a warm cup for an upset stomach, a fussy baby, or a restless night, passed down at kitchen tables from Michoacán to the Mediterranean to the Middle East. It also turns out to have genuine, if modest, pharmacology, flavonoids and oils with anti-inflammatory, antispasmodic, and mild calming activity, so the tradition and the evidence agree more than usual. The honest framing: real and low-risk, with gentle validated effects on digestion, relaxation, and sleep, not a treatment for serious illness. It anchors the everyday folk-herbal layer of this library and a global family of digestive teas (mint, ginger, fennel) with their own evidence.',
  uses: ['Soothing mild stomach upset and digestive discomfort', 'Relaxation and help with sleep', 'Part of a global family of after-meal digestive teas', 'A model of folk remedy with real, modest pharmacology'],
  mf: [['Chamomile is just a placebo with no real effect.', 'It has documented pharmacology, flavonoids like apigenin and volatile oils with anti-inflammatory, antispasmodic, and mild calming activity, supporting modest real effects on digestion and relaxation, even if gentle.'], ['If a tea is "natural," it is automatically safe for everyone.', 'Chamomile is in the ragweed/daisy family and can trigger allergy, may interact with blood thinners at high intake, and herbal teas for infants need a pediatrician\'s input (and never honey under 12 months). Natural does not mean risk-free.']],
  voices: [{
    n: 'Phytotherapy research',
    r: 'Herbal-medicine evidence',
    stance: 'endorses',
    paid: false,
    q: 'Supports chamomile\'s anti-inflammatory, antispasmodic, and mild anxiolytic activity, with modest clinical benefit for digestive discomfort, relaxation, and sleep.'
  }, {
    n: 'Folk and home-remedy tradition',
    r: 'Multigenerational practice',
    stance: 'champions',
    paid: false,
    q: 'Holds manzanilla as a trusted first reach for upset stomach, colic, and restlessness, with the making and offering of the tea part of the care itself.'
  }, {
    n: 'Allergy and pharmacology caution',
    r: 'Clinical safety',
    stance: 'caveats',
    paid: false,
    q: 'Notes ragweed-family cross-allergy, potential blood-thinner interaction at high doses, and the need for pediatric guidance with infants, "natural" still warrants care.'
  }, {
    n: 'Evidence-based clinicians',
    r: 'Integrative medicine',
    stance: 'endorses',
    paid: false,
    q: 'View chamomile as a reasonable, low-risk supportive remedy for minor complaints, while steering serious or persistent symptoms toward proper evaluation.'
  }],
  history: 'Chamomile has been used as a calming and digestive herb since antiquity around the Mediterranean and western Asia, recorded in Egyptian, Greek, and Roman sources. It spread through Europe and, via colonial exchange, to the Americas, where as manzanilla it fused with Indigenous home-remedy practice. Modern phytochemistry later identified its active compounds, giving an old kitchen-table remedy a measurable pharmacological basis.',
  timeline: [['Antiquity', 'Used as a calming/digestive herb around the Mediterranean'], ['Colonial era', 'Carried to the Americas; becomes beloved manzanilla'], ['20th-21st c.', 'Phytochemistry identifies apigenin and volatile oils'], ['2010s-2020s', 'Trials support modest effects on digestion, calm, and sleep']],
  rel: ['turmeric', 'meaning-response', 'willow-aspirin', 'sweat-bath'],
  enelNote: 'Chamomile grounds the everyday folk-herbal layer, the literal grandmother\'s cup, including the Michoacán manzanilla touchstone, and shows a case where tradition and evidence largely agree: real, modest pharmacology, low risk, not a cure. It opens onto a global digestive-tea family (mint, ginger, fennel) and lets us state the gentle but honest "natural is not risk-free" caution (ragweed allergy, infant/honey rule) without undercutting a genuinely useful remedy.',
  enel: true
}, {
  i: 'honey-wounds',
  n: 'Honey as Medicine',
  fn: 'An Ancient Wound Dressing the Evidence Backs',
  tier: 1,
  ts: 82,
  sig: 'rising',
  hot: false,
  ev: 2,
  cats: ['food', 'herbal', 'travel', 'validated', 'tradition'],
  cls: 'Wound Care / Food Medicine',
  tradition: 'Near-universal: Ancient Egyptian, Greek, Ayurvedic, TCM, Islamic, African & folk',
  traditions: ['Ancient Egyptian medicine', 'Greek & Roman medicine', 'Ayurveda', 'Traditional Chinese Medicine', 'Islamic medicine (Prophetic)', 'African & global folk practice'],
  region: 'Used on every inhabited continent across recorded history',
  geo: [['Middle East & North Africa', 85], ['Europe & Mediterranean', 80], ['South & East Asia', 80], ['Sub-Saharan Africa', 75], ['Modern clinical use (medical-grade)', 70]],
  cultural: 'Honey is perhaps the most universal medicine humans have: nearly every ancient tradition reached for it independently. Egyptian papyri (over 3,000 years old) record honey on wounds; Greek, Roman, Ayurvedic, Chinese, Islamic, and African traditions all used it for wounds, burns, coughs, and sore throats. Its cultural meaning blends the practical (it preserves, soothes, and rarely spoils) with the sacred (honey appears as a symbol of healing and blessing across religions). That so many separated cultures arrived at the same use is itself a clue that something real was being observed.',
  mechanism: 'Honey\'s wound-healing activity is well understood: it is hygroscopic (draws water, creating an osmotic environment hostile to microbes), mildly acidic, and produces low levels of hydrogen peroxide; certain honeys (notably Manuka) contain additional antibacterial compounds (methylglyoxal). Together these give antibacterial, moisture-balancing, and anti-inflammatory effects on wounds.',
  evTier: 'validated',
  evidence: 'This is a tradition that modern evidence substantially validates, in a specific domain. Medical-grade honey is an established wound-care product: evidence supports its use for burns and certain wounds, where it can aid healing and reduce infection, and it is used in mainstream clinical settings. For coughs, several reviews find honey modestly better than placebo or no treatment for symptom relief, a reasonable home measure for those over 1 year. The validation is real but bounded: it is a topical wound agent and symptomatic cough soother, not a systemic cure, and household honey is not equivalent to sterile medical-grade product for serious wounds.',
  risk: 'Two hard safety lines. First, honey must NEVER be given to infants under 12 months, it can cause infant botulism, which is serious. Second, for wounds, ordinary table honey is not sterile; deep, severe, or infected wounds need medical care and, where honey is used clinically, sterilized medical-grade product. Diabetics and others should account for honey\'s sugar. Used sensibly (medical-grade for wounds under guidance, a spoonful for cough in those over 1), honey is low-risk and genuinely useful.',
  diffusion: 'Honey is the portal\'s clearest case of near-universal independent discovery: dozens of unconnected cultures adopted it for wounds and coughs, almost certainly because its effects are real and reproducible. Where bees and people met, honey-as-medicine appeared, then traveled and was reinforced through trade and text (Egyptian, Greek, Ayurvedic, Islamic, and Chinese sources echo one another). Modern science later supplied the mechanism, closing a very long loop from observation to explanation.',
  ev: 2,
  tag: 'A wound medicine reached for independently by dozens of cultures, validated by modern science, with one absolute rule: never for babies under 12 months.',
  facts: [['Oldest records', 'Egyptian wound use >3,000 years ago'], ['Mechanism', 'Osmotic, acidic, peroxide, antibacterial'], ['Modern use', 'Medical-grade honey wound dressings'], ['Hard rule', 'NEVER under 12 months (botulism)']],
  brief: 'Honey may be the most universal medicine humans have, reached for independently by Egyptian, Greek, Ayurvedic, Chinese, Islamic, and African traditions for wounds, burns, and coughs. That near-universal convergence turned out to track something real: honey is hygroscopic, acidic, and mildly antibacterial (Manuka especially), and modern medicine has validated medical-grade honey as a genuine wound-care product, plus modest evidence for honey easing coughs. The validation is real but bounded, a topical wound agent and symptomatic soother, not a systemic cure, and it carries one absolute rule: never give honey to a baby under 12 months because of botulism risk. It is the library\'s cleanest "ancient practice, modern mechanism, real evidence" story.',
  uses: ['Wound and burn care (medical-grade, clinically)', 'Soothing cough and sore throat (over age 1)', 'A model of independent cross-cultural discovery', 'Tradition validated by a well-understood mechanism'],
  mf: [['Honey-as-medicine is just folklore with no real basis.', 'Honey has a well-understood antibacterial, osmotic mechanism, and medical-grade honey is an established wound-care product; reviews also support modest cough relief. The ancient use tracks a real, reproducible effect.'], ['If honey is healthy, it is fine for babies too.', 'Absolutely not. Honey must never be given under 12 months because of infant botulism risk. Its benefits for wounds and cough do not apply to infants, this is a hard safety line.']],
  voices: [{
    n: 'Wound-care evidence',
    r: 'Clinical reviews',
    stance: 'champions',
    paid: false,
    q: 'Support medical-grade honey for burns and certain wounds, where it can promote healing and reduce infection, an established part of modern wound care.'
  }, {
    n: 'Cough-symptom reviews',
    r: 'Evidence synthesis',
    stance: 'endorses',
    paid: false,
    q: 'Find honey modestly better than placebo or no treatment for cough symptom relief in those over 1 year, a reasonable home measure.'
  }, {
    n: 'Ancient & cross-cultural tradition',
    r: 'Egyptian, Greek, Ayurvedic, Islamic, African',
    stance: 'champions',
    paid: false,
    q: 'Independently adopted honey for wounds, burns, and coughs across millennia and continents, a convergence later explained by its measurable properties.'
  }, {
    n: 'Infant-botulism safety',
    r: 'Pediatric clinical rule',
    stance: 'caveats',
    paid: false,
    q: 'Stresses the absolute rule that honey must never be given under 12 months due to botulism risk, and that table honey is not sterile for serious wounds.'
  }],
  history: 'Honey appears as medicine in the oldest written records, including Egyptian papyri over three millennia old, and recurs across Greek, Roman, Ayurvedic, Chinese, Islamic, and African traditions. Eclipsed for a time by modern antibiotics, it returned to mainstream wound care in recent decades as medical-grade honey, once its antibacterial and osmotic mechanisms were characterized and trials supported its use, a full circle from ancient observation to validated practice.',

  cats: ['ceremonial', 'herbal', 'tradition', 'travel', 'traditional', 'region'],
  cls: 'Ceremonial Plant Medicine',
  tradition: 'Amazonian Indigenous traditions (Shipibo-Konibo, Quechua and others) + Brazilian syncretic churches',
  traditions: ['Amazonian Indigenous (Shipibo-Konibo, Quechua, and many peoples)', 'Mestizo curanderismo', 'Brazilian syncretic churches (Santo Daime, União do Vegetal, Barquinha)'],
  region: 'Western Amazon basin: Peru, Brazil, Colombia, Ecuador; now global',
  geo: [['Peruvian & Western Amazon', 90], ['Brazil (churches + Indigenous)', 85], ['Colombia & Ecuador', 70], ['Global retreat & research settings', 55]],
  cultural: 'Ayahuasca, Quechua for "vine of the soul" or "vine of the dead," is a ceremonial decoction central to many Amazonian Indigenous traditions, with the Shipibo-Konibo of the Peruvian Amazon among its most prominent stewards. It is taken at night in ceremony, led by a curandero or shaman, often with icaros (healing songs), dieta (dietary and behavioral preparation), and a communal ceremonial space (maloka). It is understood not as a recreational drug but as a medicine and teacher, used for healing, divination, and spiritual insight. In the 20th century it also became the sacrament of Brazilian syncretic churches (Santo Daime, União do Vegetal), which carried it worldwide. This entry documents the practice ethnographically and historically, it is not a how-to and contains no preparation or dosing guidance.',
  mechanism: 'Ayahuasca pairs two plants: the Banisteriopsis caapi vine (rich in harmala alkaloids, which are monoamine-oxidase inhibitors) with a DMT-containing plant such as Psychotria viridis. The MAOIs prevent the gut from breaking down DMT, allowing it to act, a sophisticated pharmacological combination Amazonian peoples arrived at empirically, long before the chemistry was understood. DMT acts on serotonin (5-HT2A) receptors, producing the altered state; the harmala alkaloids add their own effects.',
  evTier: 'mixed',
  evidence: 'Research interest is real and growing, but the evidence is early. Observational and small studies (often among Brazilian church members or in Shipibo-framework retreats) and a body of ethnographic work suggest possible benefits for depression, anxiety, and substance dependence, and pharmacological studies indicate ayahuasca is generally physiologically tolerable in controlled settings. However, to date rigorous placebo-controlled trials are scarce, and much evidence is naturalistic, so efficacy is suggested, not established. A recurring finding is that the ritual container, set, setting, ceremony, and integration, is deeply entangled with any benefit, which is itself an important clue about how such healing works.',
  risk: 'Serious cautions apply, and this is documentation, not encouragement. Because the brew contains MAOIs, it carries dangerous interactions with many medications (especially SSRIs and other serotonergic drugs, risking serotonin syndrome) and certain foods, and it can be hazardous for people with cardiovascular conditions or personal/family history of psychosis or bipolar disorder (risk of precipitating mania or psychosis). Vomiting and purging are expected parts of the experience. Unregulated retreats vary widely in safety and screening, and rare serious adverse events, including deaths, have occurred. It is illegal in most countries (with religious exemptions in some). Anyone considering it should disclose all medications and conditions to a physician; it is not compatible with many common prescriptions.',
  diffusion: 'A vivid travel story: ayahuasca was used across diverse Western Amazon cultures for millennia, spread within Brazil through 20th-century syncretic churches that blended Indigenous, Catholic, and African elements, and then went global, into research centers, retreat tourism, and legal religious use abroad. Its journey from rainforest ceremony to clinical trial and "drug tourism" is one of the clearest examples of a tradition crossing cultures, with all the promise and appropriation concerns that entails.',
  ev: 2,
  tag: 'A ceremonial Amazonian plant medicine, used for millennia, now studied for depression and addiction, documented here as fact, with serious safety cautions and no how-to.',
  facts: [['Name', 'Quechua: "vine of the soul"'], ['Plants', 'B. caapi (MAOI) + DMT plant'], ['Stewards', 'Shipibo-Konibo & many Amazonian peoples'], ['Research', 'Early; depression, addiction signals']],
  brief: 'Ayahuasca, the "vine of the soul," is a ceremonial Amazonian brew used for millennia by Indigenous peoples such as the Shipibo-Konibo, and later carried worldwide by Brazilian syncretic churches. Pharmacologically it is remarkable: Amazonian peoples empirically combined an MAOI-containing vine with a DMT-containing plant so the DMT becomes active, a sophistication science only later understood. Modern research, still early and largely naturalistic, suggests possible benefit for depression, anxiety, and addiction, with the ceremony itself deeply entangled in any healing. The safety picture is serious: dangerous drug and food interactions (MAOIs), risks for those with cardiac or psychosis-spectrum conditions, expected purging, and highly variable retreat safety. We document it as ethnographic and research fact, not as a how-to, and with no preparation or dosing detail.',
  uses: ['Ceremonial healing, divination, and insight (traditional context)', 'Early research interest for depression, anxiety, addiction', 'Understanding the ritual-as-medicine relationship', 'A flagship case of tradition meeting modern science'],
  mf: [['Ayahuasca is a proven cure for depression and addiction.', 'Research is early and largely naturalistic, with few rigorous placebo-controlled trials. It shows promising signals, not established efficacy, and the ceremonial context appears inseparable from the effect.'], ['Because it is natural and traditional, ayahuasca is safe for anyone.', 'It carries serious risks: MAOI drug and food interactions (including serotonin syndrome with antidepressants), danger for cardiac and psychosis-spectrum conditions, and variable retreat safety, with rare deaths. Natural does not mean safe.']],

  history: 'Ayahuasca has been used across the Western Amazon for an estimated three millennia, its two-plant pharmacology understood empirically long before modern chemistry. In the first half of the 20th century it became the sacrament of Brazilian syncretic churches, which spread it internationally; by the 21st century it had entered global research, retreat tourism, and legal religious use abroad, while remaining illegal in most countries.',
  timeline: [['~3,000 yrs ago', 'Ceremonial use established across the Western Amazon'], ['Early-mid 20th c.', 'Brazilian syncretic churches (Santo Daime, UDV) adopt and spread it'], ['1990s-2000s', 'International expansion; ethnographic and pharmacological study grows'], ['2010s-2020s', 'Early clinical research on depression and addiction; global retreat tourism']],
  rel: ['psilocybin', 'peyote', 'meaning-response', 'artemisinin'],
  enelNote: 'Ayahuasca completes the psychedelic cluster (with psilocybin and peyote) and is a flagship "tradition meeting modern science" entry. We honor the Amazonian stewardship and the astonishing empirical two-plant pharmacology, present the early-and-real research honestly (signals, not proof; ritual entangled with effect), and state the serious safety cautions plainly (MAOI interactions, psychosis/cardiac risk, retreat variability). Strictly documentation, no preparation or dosing, per the portal\'s ethics line. The ritual-as-medicine thread ties straight into meaning-response.',

}, {
  i: 'hijama-bloodletting',
  n: 'Cupping, Hijama & Bloodletting',
  fn: 'From Humoral Theory to the Modern Evidence',
  tier: 1,
  ts: 79,

  hot: false,
  ev: 1,
  cats: ['bodywork', 'tradition', 'travel', 'traditional', 'safety'],

  tradition: 'Greek-Galenic, Islamic/Unani (Hijama), and Chinese traditions',
  traditions: ['Ancient Egyptian', 'Greek-Galenic humoral medicine', 'Islamic / Prophetic medicine & Unani (Hijama)', 'Traditional Chinese Medicine'],
  region: 'Egypt, the Mediterranean, the Islamic world, India, and China; now global',
  geo: [['Middle East & North Africa (Hijama)', 88], ['South Asia (Unani)', 75], ['East Asia (TCM cupping)', 75], ['Europe (historical venesection)', 60]],
  cultural: 'Wet cupping (Hijama) and bloodletting (venesection) belong to one of the oldest and most widely-shared medical ideas in history: that illness reflects an imbalance of bodily humors or "morbid material," and that drawing a small amount of blood or fluid can restore balance. Documented in the Egyptian Ebers Papyrus, central to Greek-Galenic medicine (Hippocrates, Galen), systematized in the Islamic Golden Age (Avicenna) as Hijama within Prophetic and Unani medicine, and practiced in Chinese tradition as part of cupping, the same logic recurs across civilizations. In Islamic tradition Hijama carries religious as well as medical meaning. Dry cupping (suction without bloodletting) is the gentler, more common modern form; wet cupping involves small skin punctures and suction.',
  mechanism: 'The humoral rationale (removing excess or "bad" blood) is not how the body works and is obsolete. Proposed modern mechanisms for cupping\'s possible effects are limited and unproven: local increases in blood flow, mild counter-irritation, and nonspecific effects of touch and attention. There is no good evidence that bloodletting benefits the general conditions for which it was historically used.',
  evTier: 'mixed',
  evidence: 'The honest picture is weak-to-mixed. Several systematic reviews of wet and dry cupping find some low-quality evidence of short-term pain relief, sometimes as an adjuvant to conventional care, but the trials are few, small, and often methodologically poor, so firm conclusions are not justified. Historical therapeutic bloodletting for most diseases is now recognized as ineffective or harmful and was abandoned by mainstream medicine, though a narrow, genuine modern descendant survives: therapeutic phlebotomy is real medicine for specific conditions (such as hemochromatosis and polycythemia). So the tradition splits, broad humoral bloodletting is discredited; targeted phlebotomy is validated for a few specific diagnoses; cupping for pain has weak, mixed support.',
  risk: 'Wet cupping and bloodletting break the skin, so the real risks are infection, scarring, anemia from repeated blood loss, and transmission of bloodborne disease if equipment is not sterile, hygiene and single-use instruments are essential. People on blood thinners, with bleeding disorders, anemia, or diabetes, and pregnant people, should be especially cautious or avoid it. The largest danger remains using cupping or bloodletting in place of effective treatment for a serious condition. Dry cupping is lower-risk (bruising is common and expected). Therapeutic phlebotomy for a diagnosed condition is a different, medically-supervised matter.',
  diffusion: 'One of history\'s great medical diffusion stories: the humoral/bloodletting idea appears in Egypt, is formalized by the Greeks, carried and systematized through the Islamic world, and parallels Chinese cupping, spreading along the same trade and scholarly routes as much classical medicine. It is a case where a shared but mistaken theory traveled widely and persisted for millennia, a caution that broad adoption across cultures does not guarantee a practice is correct, even when (as with honey) it sometimes is.',
  ev: 1,
  tag: 'An ancient, near-global practice built on humoral theory: broad bloodletting is discredited, targeted phlebotomy is real medicine, and cupping for pain has weak, mixed support.',
  facts: [['Old rationale', 'Rebalancing bodily "humors" (obsolete)'], ['Oldest records', 'Egyptian Ebers Papyrus'], ['Cupping evidence', 'Weak/mixed; some short-term pain signal'], ['Validated descendant', 'Phlebotomy for specific diseases']],
  brief: 'Cupping (Hijama) and bloodletting rest on humoral theory, the idea that drawing blood or "morbid material" rebalances the body, an idea shared across Egyptian, Greek-Galenic, Islamic/Unani, and Chinese medicine for thousands of years. That near-universal adoption, unlike honey, does not mean it works: broad therapeutic bloodletting for most diseases is discredited and was abandoned by mainstream medicine. The honest accounting splits three ways: wet/dry cupping for pain has weak, mixed evidence (small, low-quality trials); historical humoral bloodletting is obsolete; and a narrow, genuine descendant, therapeutic phlebotomy, is real medicine for a few specific conditions like hemochromatosis. Because wet cupping breaks the skin, hygiene and the risk of replacing real care are the key cautions.',
  uses: ['Possible short-term pain relief (cupping; weak evidence)', 'Cultural and religious practice (Hijama)', 'Understanding humoral theory\'s global reach', 'Distinguishing obsolete bloodletting from validated phlebotomy'],
  mf: [['Bloodletting and cupping were used everywhere, so they must work.', 'Broad adoption across cultures reflects a shared but mistaken humoral theory. Historical bloodletting for most diseases is discredited, and cupping\'s evidence for pain is weak and mixed, popularity is not proof.'], ['Cupping and bloodletting have no place in modern medicine at all.', 'A narrow, genuine descendant survives: therapeutic phlebotomy is real, supervised medicine for specific conditions like hemochromatosis and polycythemia. The broad humoral version is obsolete; the targeted version is validated.']],
  voices: [{

    q: 'Find some low-quality evidence of short-term pain relief, sometimes as an adjuvant, but too few and too weak trials to support firm conclusions.'

    q: 'Document that broad humoral bloodletting for most diseases was ineffective or harmful and was abandoned by mainstream medicine as physiology was understood.'

    q: 'Hold Hijama as a valued preventive and therapeutic practice with religious as well as medical meaning, a cultural standing distinct from the question of biomedical efficacy.'

  history: 'Bloodletting and cupping are documented from ancient Egypt and were formalized in Greek-Galenic humoral medicine, then systematized in the Islamic Golden Age as Hijama and practiced in parallel in Chinese tradition. Dominant for over two millennia, broad bloodletting collapsed as scientific physiology emerged, surviving in mainstream medicine only as targeted phlebotomy, while cupping persists as a cultural and complementary practice with weak modern evidence.',
  timeline: [['Ancient Egypt', 'Cupping/bloodletting recorded (Ebers Papyrus)'], ['Antiquity', 'Formalized in Greek-Galenic humoral medicine'], ['Islamic Golden Age', 'Systematized as Hijama (Avicenna); parallels Chinese cupping'], ['19th-20th c.', 'Broad bloodletting abandoned; phlebotomy narrows to specific diseases']],
  rel: ['cupping', 'acupuncture', 'heavy-metal-bhasma', 'willow-aspirin'],
  enelNote: 'The deliberate counterpoint to honey: a practice adopted across just as many cultures, but built on a mistaken theory, so popularity did not equal truth. We split it three ways honestly (obsolete humoral bloodletting; weak-mixed cupping-for-pain; validated targeted phlebotomy), carry the real skin-breaking safety risks, and honor Hijama\'s cultural/religious standing as separate from its biomedical efficacy. A key teaching entry for the portal\'s "cross-cultural use is a clue, not a verdict" stance.',

  tradition: 'Ancient sun-healing traditions worldwide + modern heliotherapy & circadian medicine',
  traditions: ['Ancient Egyptian, Greek & Roman heliosis', 'Ayurvedic & yogic sun practice', 'Indigenous sun ceremony', 'Modern heliotherapy & chronobiology'],
  region: 'Universal across human cultures; modern science centered in Europe & North America',
  geo: [['Mediterranean & Middle East (ancient)', 80], ['South Asia (sun salutation/Surya)', 75], ['Global Indigenous sun ceremony', 70], ['Modern circadian & light medicine', 75]],
  cultural: 'The intuition that sunlight heals is as old and universal as humanity. Ancient Egyptians, Greeks (heliosis, sun-cure), and Romans prescribed sun exposure; Ayurvedic and yogic traditions honor the sun (Surya Namaskar, the sun salutation); Indigenous peoples across continents held sun ceremonies; and many faiths placed the sun near the center of healing and the sacred. This is the deep root beneath the more recent, documented heliotherapy of the early-20th-century sanatorium era and today\'s circadian science, a continuous human thread from sun reverence to chronobiology. It pairs naturally with grounding and sweat traditions as part of a family of "reconnect with natural forces" practices.',
  mechanism: 'Here the ancient intuition meets solid modern mechanism. Sunlight on skin drives vitamin D synthesis and releases nitric oxide (affecting blood vessels and immunity); light through the eyes sets the circadian clock via specialized retinal cells, governing sleep, hormone rhythms, mood, and metabolism. Bright morning light and darkness at night are now understood as genuine physiological signals, the scientific core beneath both ancient sun practice and modern light therapy.',
  evTier: 'validated',
  evidence: 'The general principle is well validated, with important limits. Light therapy is established for seasonal affective disorder and some circadian sleep disorders; morning light exposure measurably supports mood, alertness, and sleep timing; and the heliotherapy of the sanatorium era (Niels Finsen\'s 1903 Nobel for light therapy on lupus vulgaris; Auguste Rollier\'s Alpine clinics treating skeletal tuberculosis and rickets) had real success, later explained by vitamin D and nitric oxide. The validated message is "appropriate light and rhythm matter for health." The bounded caveat: ultraviolet sun exposure also causes skin cancer and aging, so the goal is sensible, not maximal, sun, and the modern thread is as much about light timing and circadian alignment as raw sunshine.',
  risk: 'The central tension is real: the same ultraviolet light that builds vitamin D and once helped treat tuberculosis is a proven cause of skin cancer and photoaging. So "more sun is better" is wrong, sun exposure should be moderate and protected against burning, and vitamin D can be obtained safely through diet and supplements where needed. Light therapy devices for mood/sleep should be used as directed; bright light can affect people with bipolar disorder or certain eye conditions, who should seek guidance. The healthy core, morning light, dark nights, and rhythm, carries little risk and is the part most worth adopting.',
  diffusion: 'Sun healing is a near-universal independent practice, every sun-exposed culture revered and used the sun, then specific scientific lineages (Finsen in Denmark, Rollier in Switzerland) formalized heliotherapy in early-1900s Europe before antibiotics eclipsed it, and modern chronobiology revived the core insight worldwide. It travels with us because the sun is everywhere; the modern contribution is mechanism and timing, not the basic discovery.',
  ev: 2,
  tag: 'The universal intuition that sun and light heal, from ancient sun reverence to sanatorium heliotherapy to circadian science, validated in principle, bounded by skin-cancer risk.',
  facts: [['Ancient roots', 'Egyptian, Greek, Ayurvedic, Indigenous sun practice'], ['Sanatorium era', 'Finsen (1903 Nobel), Rollier\'s Alpine clinics'], ['Mechanism', 'Vitamin D, nitric oxide, circadian clock'], ['Caveat', 'UV also causes skin cancer, moderate, not maximal']],
  brief: 'The belief that sunlight heals is one of humanity\'s oldest and most universal, Egyptian and Greek sun-cures, the Ayurvedic sun salutation, Indigenous sun ceremonies, and it turns out to sit on solid ground. Sun on skin makes vitamin D and releases nitric oxide; light through the eyes sets the circadian clock that governs sleep, mood, and metabolism. The early-20th-century sanatorium era formalized this as heliotherapy (Finsen\'s 1903 Nobel; Rollier\'s Alpine clinics treating tuberculosis and rickets), and modern light and circadian medicine validates the core principle: appropriate light and rhythm genuinely matter. The crucial caveat is that the same UV light also causes skin cancer, so the lesson is sensible, timed light and dark, not maximal sun. It threads ancient reverence to chronobiology and pairs with grounding and sweat traditions.',
  uses: ['Light therapy for seasonal affective disorder and circadian sleep issues', 'Morning light and dark nights for sleep, mood, and rhythm', 'Sensible sun for vitamin D (balanced against skin-cancer risk)', 'Connecting ancient sun practice to modern circadian science'],
  mf: [['Sun healing is just ancient superstition with no real basis.', 'The core is well validated: sunlight drives vitamin D and nitric oxide, light sets the circadian clock, and light therapy is established for seasonal depression and some sleep disorders. The ancient intuition tracks real physiology.'], ['If sunlight is healthy, more sun is always better.', 'No, the same UV light that builds vitamin D and once helped treat TB also causes skin cancer and aging. The goal is moderate, protected exposure and good light timing, not maximal sun.']],
  voices: [{
    n: 'Chronobiology & light-therapy research',

  }, {

  }],
  history: 'Sun healing spans recorded history, from Egyptian and Greco-Roman sun-cures and the Ayurvedic sun salutation to Indigenous sun ceremonies. It was formalized as heliotherapy in early-1900s Europe (Finsen\'s Nobel-winning light therapy; Rollier\'s Alpine tuberculosis clinics), faded when antibiotics arrived, and was revived in its essential insight by modern vitamin D and circadian science, with the crucial modern addition of UV\'s skin-cancer risk.',
  timeline: [['Antiquity', 'Egyptian, Greek, Ayurvedic and Indigenous sun-healing practices'], ['1903', 'Niels Finsen wins Nobel for light therapy (lupus vulgaris)'], ['1900s-1930s', 'Rollier\'s Alpine heliotherapy clinics treat TB and rickets'], ['1980s-2020s', 'Vitamin D, nitric oxide and circadian science validate the core principle']],
  rel: ['heliotherapy', 'grounding', 'sweat-bath', 'meaning-response'],
  enelNote: 'This is the connective-tissue entry Jeffrey asked for: the past-to-present arc from ancient sun reverence through sanatorium-era heliotherapy (Finsen, Rollier) to modern circadian science, a tradition whose core is genuinely validated, with the honest UV/skin-cancer bound kept prominent so it never reads as "sunbathe maximally." It ties grounding, sweat-bath, and heliotherapy together into a "reconnect with natural forces" family and models the "ancient intuition, modern mechanism" pattern at its cleanest.',

  i: 'medicinal-mushrooms',
  n: 'Medicinal Mushrooms',
  fn: 'From Ancient Tonics to the Oncology Ward',
  tier: 1,
  ts: 89,
  sig: 'hot',
  hot: true,
  ev: 2,
  cats: ['herbal', 'tradition', 'travel', 'validated', 'food', 'region'],
  cls: 'Fungi / Adaptogens',
  tradition: 'Traditional Chinese Medicine, Japanese Kampo, and global folk practice',
  traditions: ['Traditional Chinese Medicine', 'Japanese Kampo', 'Korean traditional medicine', 'Siberian & European folk use (chaga)'],
  region: 'East Asia (deepest roots); now global "functional mushroom" market',
  geo: [['China (TCM materia medica)', 90], ['Japan & Korea', 82], ['Siberia & N. Europe (chaga)', 55], ['Global supplement market', 75]],
  cultural: 'Mushrooms occupy a revered place in East Asian medicine. Reishi (lingzhi in China, "mushroom of immortality") is the most prized fungus in the Chinese pharmacopoeia, described in classical texts as a tonic for the spirit (shen); cordyceps was a precious tonic for vitality and endurance; shiitake, turkey tail (yunzhi), and lion\'s mane each carried specific roles. The framing was holistic, mushrooms "tonified qi," calmed the mind, or supported organs, and they were taken as teas, decoctions, and tonics over long periods for resilience and longevity rather than as quick cures. Chaga has parallel folk roots in Siberia and northern Europe. Today the same fungi anchor a booming global "functional mushroom" market of powders, lattes, and capsules.',
  mechanism: 'Mushrooms contain bioactive compounds with real pharmacology: beta-glucans and protein-bound polysaccharides (PSK, PSP, lentinan) that modulate immune function; in lion\'s mane, hericenones and erinacines that stimulate nerve growth factor; in cordyceps, cordycepin. These give plausible bases for immune, anti-tumor-adjuvant, and neurotrophic effects, though potency varies enormously by species, strain, extract, and preparation.',
  evTier: 'mixed',
  evidence: 'The evidence is genuinely a spectrum, which is the honest story. At the strong end: PSK (krestin), a turkey-tail polysaccharide, is an approved adjuvant cancer therapy in Japan, used alongside conventional treatment for decades with supportive trial and meta-analysis data; lentinan (from shiitake) is similarly used as a cancer adjunct. At the emerging end: lion\'s mane has small human trials suggesting benefit for mild cognitive impairment (one well-cited 16-week study) and mixed signals for mood, and reishi/cordyceps have early data for immune markers, fatigue, and metabolic health. At the weak end: much of the "shroom boom" marketing rests on petri-dish and inbred-mouse studies that do not transfer cleanly to people, with small, unreplicated human trials. The summary: a few validated clinical uses (notably PSK/lentinan as oncology adjuncts), promising but unproven cognitive and adaptogenic claims, and a lot of market hype outrunning the data.',
  risk: 'Standardized mushroom extracts at studied doses are generally well tolerated, with serious adverse events rare and no major liver or blood toxicity seen for the well-studied immune mushrooms. Real cautions: immune-modulating mushrooms warrant care in people with autoimmune disease or on immunosuppressants; anyone in cancer care should use them only in coordination with their oncology team, not as a replacement for treatment; product quality varies widely (mycelium-on-grain vs fruiting-body extracts differ greatly, and contamination/mislabeling occur). Foraged wild mushrooms carry serious misidentification risk. The biggest danger is treating an unproven "brain" or "immune" mushroom as a substitute for real medical care.',
  diffusion: 'Medicinal mushroom use radiated from East Asia, China at the center, into Japan and Korea, with independent folk traditions (chaga) in Siberia and northern Europe. In recent decades it has spread worldwide as a wellness category, while a parallel scientific thread (PSK/lentinan in Japanese oncology) traveled from tradition into the clinic, a clean example of a remedy crossing both cultures and the line between folk tonic and approved adjunct therapy.',
  ev: 2,
  tag: 'Ancient East Asian tonics now spanning the full evidence spectrum, from an approved Japanese cancer adjunct to "shroom boom" hype that outruns the data.',
  facts: [['Most prized', 'Reishi (lingzhi)'], ['Strongest evidence', 'PSK (turkey tail), Japanese cancer adjunct'], ['Cognitive interest', 'Lion\'s mane (small trials)'], ['Caveat', 'Much research is lab/mouse, not people']],
  brief: 'Mushrooms are among the most revered medicines in East Asia, reishi the "mushroom of immortality," cordyceps a vitality tonic, turkey tail and shiitake and lion\'s mane each with classical roles, taken over time for resilience and longevity. Their modern story spans the whole evidence spectrum honestly: at the strong end, PSK from turkey tail and lentinan from shiitake are approved cancer adjuncts in Japan with decades of supportive data; in the middle, lion\'s mane has small but real human trials for mild cognitive impairment and reishi/cordyceps show early immune and metabolic signals; at the weak end, much "functional mushroom" marketing rests on petri-dish and mouse studies that do not transfer cleanly to people. A few validated clinical uses, real promise, and a lot of market hype, with quality and oncology-coordination the key cautions.',
  uses: ['Adjunct in cancer care (PSK, lentinan, with oncology team)', 'Possible cognitive support (lion\'s mane; early evidence)', 'Immune and adaptogenic interest (reishi, cordyceps)', 'A model of tradition spanning validated-to-hyped evidence'],
  mf: [['Medicinal mushrooms are unproven folk magic with no real basis.', 'Some are genuinely validated: PSK (turkey tail) and lentinan (shiitake) are approved cancer adjuncts in Japan with trial and meta-analysis support. The category is real, even where individual marketing claims outrun the evidence.'], ['Any mushroom supplement will boost immunity or brainpower as advertised.', 'Much "functional mushroom" marketing rests on lab and mouse studies, with small, unreplicated human trials. Potency varies hugely by species and extract, and most consumer claims outrun the clinical evidence.']],

  history: 'Mushrooms feature in the oldest East Asian materia medica, reishi prized for millennia, and were used as long-term tonics across China, Japan, and Korea, with parallel folk use of chaga in Siberia and Europe. In 20th-century Japan, polysaccharides like PSK and lentinan were isolated and entered oncology as adjuncts, and in the 21st century a global wellness market revived the broader category, pulling well ahead of the clinical evidence for most products.',

}, {
  i: 'african-traditional',
  n: 'African Traditional Medicine',
  fn: 'Healers, Plants, and the Drugs They Gave the World',
  tier: 1,
  ts: 84,
  sig: 'rising',
  hot: false,
  ev: 2,
  cats: ['herbal', 'bodywork', 'tradition', 'region', 'travel', 'traditional'],
  cls: 'Traditional Medicine System',
  tradition: 'The many traditional medicine systems of Africa (not one tradition)',
  traditions: ['Diviner-healer traditions (sangoma, etc.)', 'Herbalist traditions across regions', 'Traditional bone-setting & physical practice', 'Ethiopian, West African, Southern African and other distinct systems'],
  region: 'The whole African continent; major plant exports worldwide',
  geo: [['Southern Africa', 82], ['West Africa', 80], ['East Africa & Horn', 78], ['Global (exported herbs)', 60]],
  cultural: '"African traditional medicine" is not one system but hundreds of distinct, living traditions across the continent, each with its own pharmacopeia, healers, and cosmology. Many share a holistic view, that illness can stem from spiritual or social imbalance as well as physical cause, and combine herbal remedies (teas, ointments, steam baths, tinctures) with divination, ritual, midwifery, and physical practices including traditional bone-setting, cupping, scarification, and tooth extraction. Healers, diviners, herbalists, and birth attendants, hold deep, orally transmitted knowledge and, critically, remain the primary or only accessible health care for large numbers of people, especially in rural areas where clinical facilities are scarce and costly. This is medicine as lived reality for a huge share of humanity, not a curiosity.',
  mechanism: 'Where these remedies work, the mechanisms are the same plant pharmacology found everywhere: African flora is rich in phytochemicals, and several have well-characterized actions. The cultural and ritual dimensions also engage the meaning response. Mechanisms for the spiritual-diagnostic elements are not biomedical claims and are not assessed as such.',
  evTier: 'mixed',
  evidence: 'The evidence is mixed and, crucially, under-studied relative to TCM and Ayurveda, but African plants have given modern medicine genuine drugs and validated remedies. Pelargonium sidoides (umckaloabo) has clinical support for acute respiratory infections and is sold widely in the West; rooibos and honeybush are established as antioxidant-rich teas; devil\'s claw has some evidence for pain; and the Madagascar periwinkle yielded the chemotherapy drugs vincristine and vinblastine, transforming childhood leukemia survival. Many other remedies are traditional-use-only, plausible but not rigorously tested, and some are unstudied. The honest picture: a tradition that has already contributed validated medicines and exported remedies, alongside a large body of practice that simply has not been researched, not because it failed testing, but because it was never funded or studied.',
  risk: 'Real risks span quality, dose, and integration. Herbal preparations can be contaminated, adulterated, or variable in potency; some plants are toxic at the wrong dose; and traditional physical practices (bone-setting, scarification) carry infection and injury risk if done non-hygienically. Crucially, herb-drug interactions matter, patients should tell clinicians what they take. The largest danger is delay: relying solely on traditional treatment for a serious, treatable condition (HIV, TB, severe infection, obstetric emergencies) can be fatal. Many African health systems now work toward integrating and regulating traditional healers rather than dismissing them, recognizing both their reach and these risks.',
  diffusion: 'African remedies have traveled widely, often without credit: rooibos, honeybush, devil\'s claw, gum arabic (acacia), and Pelargonium are now global products, and Madagascar periwinkle became a worldwide pharmaceutical. Within the continent, practices and plants spread along trade and migration routes among neighboring peoples. The diffusion story here is also one of extraction, valuable knowledge and species flowing outward to global markets and pharma, raising real questions of benefit-sharing and recognition.',
  ev: 2,
  tag: 'Not one tradition but hundreds, primary health care for millions, under-studied yet already the source of real medicines from umckaloabo to childhood-leukemia chemotherapy.',
  facts: [['Scope', 'Hundreds of distinct systems'], ['Reality', 'Primary care for millions'], ['Validated export', 'Pelargonium sidoides (respiratory)'], ['Gave the world', 'Vincristine (Madagascar periwinkle)']],
  brief: 'African traditional medicine is not one system but hundreds of distinct, living traditions, combining herbal remedies with divination, ritual, midwifery, and physical practices like bone-setting, and remaining the primary or only health care for millions where clinics are scarce. It is markedly under-studied compared to TCM or Ayurveda, yet it has already given modern medicine real drugs: Pelargonium sidoides (umckaloabo) for respiratory infections, rooibos and honeybush as antioxidant teas, and the Madagascar periwinkle, source of the chemotherapy agents vincristine and vinblastine that transformed childhood leukemia. Much of the rest is traditional-use-only, plausible but never funded for rigorous study. The honest read honors a tradition of real medicines and real reach, flags the quality, interaction, and delay-of-care risks, and names the extraction of its knowledge to global markets.',
  uses: ['Primary health care access where clinics are scarce', 'Validated remedies (Pelargonium for respiratory infection)', 'Source of major drugs (vincristine, vinblastine)', 'A tradition under-studied, not disproven'],
  mf: [['African traditional medicine is just superstition with nothing of real value.', 'It has already given the world validated medicines, Pelargonium sidoides for respiratory infection, and the chemotherapy drugs vincristine and vinblastine from Madagascar periwinkle, and serves as primary care for millions. Much of it is under-studied, not disproven.'], ['Because a remedy is traditional and natural, it is safe to use instead of seeing a doctor.', 'Herbal preparations vary in quality and dose, can interact with medications, and relying on them alone for serious conditions like TB, HIV, or obstetric emergencies can be fatal. Integration with clinical care, not replacement of it, is the safe path.']],

    n: 'Pharmacognosy research',

    q: 'Note that African remedies and species have become global products and pharmaceuticals often without recognition or benefit-sharing for source communities.'
  }],
  history: 'Africa\'s traditional medicine systems are ancient and diverse, sustained through oral transmission across hundreds of peoples. Colonial medicine marginalized them, yet they persisted as primary care for much of the population. In the 20th century African plants entered global pharmacopeias (Madagascar periwinkle\'s alkaloids, Pelargonium), and in recent decades the WHO and national systems have moved toward integrating and regulating traditional healers rather than dismissing them.',
  timeline: [['Ancient', 'Diverse herbal, ritual, and physical healing traditions across Africa'], ['Colonial era', 'Marginalized by colonial medicine; persist as primary care'], ['1950s-60s', 'Madagascar periwinkle yields vincristine/vinblastine for leukemia'], ['2000s-2020s', 'WHO and national efforts to integrate and regulate traditional healers']],
  rel: ['turmeric', 'honey-wounds', 'willow-aspirin', 'heavy-metal-bhasma'],
  enelNote: 'This entry honors the global-inclusion rule directly: African medicine is not one tradition but hundreds, it is primary care for millions, and it is under-studied rather than disproven, while having already given the world real drugs (Pelargonium, vincristine). We name peoples and practices specifically where the record allows, carry honest quality/interaction/delay-of-care risks, and surface the extraction-and-benefit-sharing dimension that the other system entries do not. A key counterweight to any TCM/Ayurveda-centric view of "traditional medicine."',
