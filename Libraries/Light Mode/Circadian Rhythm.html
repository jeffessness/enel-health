</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{background:#FBFEF5;font-family:"Helvetica Neue",Helvetica,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::selection{background:#2D9AAD;color:#fff;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(133,212,224,0.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(133,212,224,0.32);}
input::placeholder{color:#5f7888;}
input:focus{outline:none;border-color:rgba(91,196,214,0.5)!important;box-shadow:0 0 0 2px rgba(45,154,173,0.12);}
button{font-family:inherit;}
#mainscroll{scroll-behavior:smooth;}
table{font-family:inherit;}

/* ── GLOBAL COSMIC STAGE (behind detail/category/search/compare) ── */
.cosmic-stage{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 44% at 50% 4%, rgba(212,160,23,0.10), transparent 58%),
    radial-gradient(ellipse 80% 50% at 50% 10%, rgba(45,154,173,0.12), transparent 60%),
    radial-gradient(ellipse 90% 55% at 50% 112%, rgba(45,154,173,0.10), transparent 62%),
    linear-gradient(180deg,#FFFBEB 0%,#FBFEF5 40%,#EAF7F0 100%);}
/* faint diagonal galaxy arc */
.mw-arc{position:absolute;inset:auto -16% 24% -16%;height:54%;
  background:
    radial-gradient(ellipse 60% 58% at 42% 60%, rgba(140,175,225,0.16) 0%, rgba(140,175,225,0.05) 40%, transparent 70%),
    radial-gradient(ellipse 44% 44% at 64% 52%, rgba(175,135,225,0.11) 0%, transparent 64%),
    radial-gradient(ellipse 40% 40% at 30% 66%, rgba(130,205,224,0.10) 0%, transparent 64%);
  transform:rotate(-13deg);filter:blur(6px);opacity:.85;}

/* ── REALISTIC STARFIELD ──
   Three coordinated layers: fine field, mid field, and bright glow-stars.
   Bright stars get a soft halo via a larger faint radial at the same point. */
.stars,.mw-stars{position:absolute;inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 7% 18%,#eaf3ff 99%,transparent),
    radial-gradient(1px 1px at 13% 41%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 19% 9%,#fff 99%,transparent),
    radial-gradient(1.4px 1.4px at 23% 63%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 29% 27%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 34% 78%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 39% 14%,#fff 99%,transparent),
    radial-gradient(1px 1px at 44% 49%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 48% 88%,#c4d8ff 99%,transparent),
    radial-gradient(1.4px 1.4px at 53% 33%,#fff 99%,transparent),
    radial-gradient(1px 1px at 58% 70%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 63% 11%,#bcd2ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 68% 54%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 73% 84%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 78% 23%,#fff 99%,transparent),
    radial-gradient(1.3px 1.3px at 83% 61%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 88% 38%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 93% 73%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 97% 16%,#fff 99%,transparent);
  background-repeat:no-repeat;animation:twinkle 7s ease-in-out infinite alternate;}
.stars.layer-2{
  background-image:
    radial-gradient(1px 1px at 5% 55%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 16% 84%,#fff 99%,transparent),
    radial-gradient(1px 1px at 27% 47%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 36% 92%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 49% 19%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 61% 87%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 71% 40%,#fff 99%,transparent),
    radial-gradient(1px 1px at 82% 92%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 91% 57%,#dce9ff 99%,transparent);
  animation-duration:10s;animation-direction:alternate-reverse;opacity:.7;}
/* bright glow-stars: a sharp core + a soft halo around a handful of points */
.stars-bright,.mw-stars-bright{position:absolute;inset:0;
  background-image:
    radial-gradient(2px 2px at 21% 30%,#fff 60%,rgba(255,255,255,0.0) 100%),
    radial-gradient(7px 7px at 21% 30%,rgba(207,224,255,0.5) 0%,transparent 70%),
    radial-gradient(2px 2px at 57% 22%,#fff 60%,transparent 100%),
    radial-gradient(8px 8px at 57% 22%,rgba(173,135,225,0.4) 0%,transparent 70%),
    radial-gradient(2.4px 2.4px at 79% 58%,#fff 60%,transparent 100%),
    radial-gradient(9px 9px at 79% 58%,rgba(130,205,224,0.45) 0%,transparent 70%),
    radial-gradient(2px 2px at 40% 70%,#fff 60%,transparent 100%),
    radial-gradient(7px 7px at 40% 70%,rgba(207,224,255,0.4) 0%,transparent 70%);
  background-repeat:no-repeat;animation:twinkle 5s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.5}50%{opacity:.95}100%{opacity:.6}}

  discr: 'Alan N. Drury & Albert Szent-Gyorgyi, University of Cambridge (1929, cardiac action); sleep role established by Porkka-Heiskanen et al., Harvard (1997)',
  tag: 'The molecule that tracks how long you have been awake, and the one caffeine blocks to hide the bill.',
  facts: [['What it is', 'An endogenous purine nucleoside that accumulates with waking and signals sleep pressure'], ['Process', 'The homeostatic Process S of the two-process model'], ['How caffeine works', 'Competitive antagonist at A1 and A2A adenosine receptors'], ['Why supplements fail', 'IV half-life near 10 seconds; does not cross the blood-brain barrier']],
  brief: 'Adenosine is the leading molecular candidate for Process S, the homeostatic arm of Alexander Borbely\'s 1982 two-process model of sleep regulation. As neurons consume energy across the waking day, adenosine accumulates in the extracellular space of specific brain regions, raising sleep pressure; during sleep it is cleared and pressure falls. The landmark evidence came from Porkka-Heiskanen and colleagues at Harvard (Science, 1997), who showed extracellular adenosine in the cat basal forebrain rises during prolonged waking and that blocking its transport induces sleep. Human evidence is direct. Elmenhorst et al. (2007) used [18F]CPFPX PET to show that 24 hours of sleep deprivation upregulates A1 adenosine receptor availability across the cortex, peaking in the orbitofrontal cortex, and a 2017 follow-up found recovery sleep restores it. Genetic work led by Hans-Peter Landolt links ADORA2A and adenosine-deaminase variants to individual differences in caffeine sensitivity and in the slow-wave (delta) rebound after sleep loss. Caffeine, a roughly equipotent A1/A2A antagonist, promotes wakefulness; mouse knockout studies show the arousal effect depends on A2A receptors, particularly in the nucleus accumbens shell. The picture is not settled. A 2018 meta-analysis (Leenaars et al.) confirmed a large adenosine rise in the basal forebrain during deprivation (about 75 percent over baseline) but found the cortical signal rests on only two studies, so region-specificity and generalizability remain open. Reviewers including Reichert, Deboer and Landolt (2022) note adenosine is rapidly metabolized and question whether it alone can carry long-term homeostasis; ATP, P2X7-driven cytokines, and BDNF are co-implicated. A 2020 Science study (Peng et al.) traced the adenosine rise to basal forebrain glutamatergic, not cholinergic, neurons, revising the original cellular model. Adenosine is widely accepted as a sleep-regulatory substance, but the claim that it is the sole substrate of Process S is not established.',
  uses: ['Conceptual basis for caffeine timing: avoiding substantial caffeine within about 6 hours of bedtime (Drake et al., 2013)', 'Explains the coffee-nap: a short nap lowers adenosine while ingested caffeine arrives ~20 min later to occupy freed receptors', 'Framework for understanding why sleep debt builds with extended wakefulness', 'IV adenosine itself is a cardiology drug (PSVT conversion, pharmacologic stress imaging), unrelated to consumer sleep use'],
  risk: 'Adenosine is not a consumer sleep supplement and no oral or sublingual product meaningfully raises brain adenosine: it is destroyed in seconds by adenosine deaminase and does not cross the blood-brain barrier. IV adenosine (Adenocard, Adenoscan) is a prescription drug; the FDA has warned of rare heart attack and death risk with adenosine and regadenoson stress agents, and it can provoke severe bradycardia, asystole and bronchospasm. These are clinical-grade cardiac effects and have nothing to do with self-managed sleep. Persistent insomnia, excessive daytime sleepiness, suspected sleep apnea, or heavy reliance on caffeine to function should be evaluated by a licensed sleep physician rather than self-treated.',
  mf: [['Caffeine removes or flushes out adenosine, giving you energy', 'Caffeine does not remove adenosine; it blocks A1/A2A receptors so accumulated adenosine cannot signal. The sleep pressure is still building underneath, which is why alertness can crash when the caffeine clears (Reichert et al., 2022; Fredholm pharmacology).'], ['Adenosine supplements or sublingual adenosine improve sleep', 'There is no clinical evidence for this. Circulating adenosine has a half-life near 10 seconds and does not cross the blood-brain barrier, so oral or sublingual dosing cannot raise the brain adenosine that drives sleep pressure.'], ['Adenosine is definitively THE molecule that causes sleep', 'It is the leading candidate for Process S and is widely accepted as sleep-regulatory, but its sufficiency is debated; ATP, P2X7-mediated cytokines and BDNF are co-implicated, and the cortical microdialysis evidence rests on very few studies (Leenaars et al., 2018; Reichert et al., 2022).']],

  history: 'Adenosine the molecule is a 20th-century discovery with no traditional or pre-modern use, because it cannot be eaten, brewed, or applied to any effect: it is an intracellular metabolite with a half-life of seconds. Alan N. Drury and Albert Szent-Gyorgyi first described its physiological action at Cambridge in 1929, in the heart, not the brain. Its role in sleep was not proposed until the late 20th century and not directly demonstrated until Porkka-Heiskanen and colleagues at Harvard in 1997. What humans did exploit for millennia was the adenosine SYSTEM, through its antagonist caffeine. Tea from Camellia sinensis enters Chinese tradition by legend with the emperor Shennong (around 2700 BCE) and was adopted by Chan and other Buddhist monks to sustain alertness during long meditation. Coffee emerged from the Ethiopian highlands and was formalized as a beverage by Sufi communities in 15th-century Yemen, who drank qahwa to stay awake for night-long zikr devotions; from Yemen it spread through the Ottoman, Safavid and Mughal worlds. Cultures across the Americas, Africa and Asia independently used caffeine-bearing plants: guarana and yerba mate (Guarani and other South American peoples), cacao (Mesoamerica), cola nut (West Africa), and guayusa (Amazonian Kichwa). None of these traditions named adenosine; all were, in effect, manipulating it. The mechanistic link, that caffeine works by blocking adenosine receptors, was established largely through the pharmacology synthesized by Bertil Fredholm and colleagues in the late 20th century.',

  enelNote: 'The central open question is whether deliberately accelerating brain adenosine clearance during sleep improves next-day function in real people, or whether adenosine is merely a correlate. Enel is positioned to run, not yet having run, a randomized crossover study in roughly 40 verified habitual short-sleepers (chronic 5 to 6 hours), each genotyped for ADORA2A 1976C>T and adenosine-deaminase variants. The intervention would compare three nights of an evening exercise plus consistent-sleep-timing protocol designed to maximize slow-wave sleep against a yoked control of equal time in bed without the protocol, in a within-subject design with a one-week washout. The primary endpoint would be morning slow-wave-activity rebound and overnight EEG delta power quantified by home polysomnography, with psychomotor vigilance task lapses at wake plus 30 minutes as the functional readout. This matters because every current claim, from coffee naps to caffeine-timing apps, assumes that manipulating the adenosine system changes outcomes, yet the human evidence is observational or PET-based, not interventional on next-day performance. A genotype-stratified result would show whether sleep-pressure management is universal or genetically gated, which is the difference between a generic tip and a personalized protocol.',

  facts: [['DSM-5-TR status', 'A \'with seasonal pattern\' specifier of major depression or bipolar disorder, not a standalone diagnosis'], ['Standard light protocol', '10,000 lux, ~30 min, early morning'], ['Sex ratio', 'Roughly 4:1 female to male'], ['US prevalence range', '~1% (Florida) to ~9% (Alaska)']],
  brief: 'Seasonal affective disorder is a pattern of recurrent major depressive episodes that begin in autumn or winter and remit in spring. DSM-5-TR does not list it as a separate disorder; it is the \'with seasonal pattern\' specifier applied to major depressive disorder or bipolar disorder. Rosenthal and colleagues at the US National Institute of Mental Health first described the syndrome in 1984, after Rosenthal, who grew up in the milder light of Johannesburg, noticed his own mood drop in the darker winters of the northeastern United States. Winter-pattern SAD typically brings low mood with atypical features: hypersomnia, increased appetite, carbohydrate craving, and weight gain. The leading mechanistic account is Alfred Lewy\'s phase-shift hypothesis. Shorter winter days delay the internal clock relative to the sleep schedule in most patients, measured as a later dim-light melatonin onset. Morning bright light advances the clock back toward alignment, and across trials the size of that phase advance tracks the size of the antidepressant response. This is why morning light outperforms evening light in head-to-head winter-depression trials. Latitude matters but does not fully determine risk. A 2025 systematic review and meta-analysis of 24 studies and 32,866 participants found higher latitude significantly associated with higher SAD and subsyndromal SAD prevalence. Yet residents of Tromso, Norway, far above the Arctic Circle, report wintertime wellbeing comparable to far southern populations, which points to cultural and psychological moderators alongside daylength. SAD sits on a spectrum. Subsyndromal SAD, the so-called winter blues, involves milder seasonal dips that do not meet the threshold for a major depressive episode. Clinical SAD is a depressive disorder that can carry suicide risk and warrants professional assessment.',
  uses: ['Clinical framing of recurrent winter-pattern depression for evaluation by a qualified provider', 'Context for bright light therapy, a treatment with multiple positive randomized trials for SAD', 'Context for dawn simulation as a lower-intensity alternative studied in controlled trials', 'Understanding circadian phase (delayed clock) as a mechanism and a timing rationale for morning light'],
  risk: 'SAD is a clinical depressive disorder, not a lifestyle complaint. Depression carries suicide risk, and SAD can heighten suicidality during peak episodes. This entry is educational and is not self-diagnosis or self-treatment guidance. Anyone with persistent low mood, hopelessness, or thoughts of self-harm should consult a qualified mental-health provider (psychiatrist, psychologist, or physician); in a crisis, contact local emergency services or a suicide prevention line such as 988 in the US. Light therapy is not risk-free: it can trigger hypomania or mania in people with bipolar disorder and should be supervised in that group, and headache, eye strain, agitation, and sleep disruption occur in a minority of users. People with eye disease or on photosensitizing medication should be assessed before use. Light boxes sold for SAD are unregulated wellness products with no standardized output; device choice and timing should be guided by a clinician.',
