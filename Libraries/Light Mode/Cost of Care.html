</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{background:#FBFEF5;font-family:"Helvetica Neue",Helvetica,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::selection{background:#2D9AAD;color:#fff;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(133,212,224,0.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(133,212,224,0.32);}
input::placeholder{color:#5f7888;}
input:focus{outline:none;border-color:rgba(91,196,214,0.5)!important;box-shadow:0 0 0 2px rgba(45,154,173,0.12);}
button{font-family:inherit;}
#mainscroll{scroll-behavior:smooth;}
table{font-family:inherit;}

/* ── GLOBAL COSMIC STAGE (behind detail/category/search/compare) ── */
.cosmic-stage{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 44% at 50% 4%, rgba(212,160,23,0.10), transparent 58%),
    radial-gradient(ellipse 80% 50% at 50% 10%, rgba(45,154,173,0.12), transparent 60%),
    radial-gradient(ellipse 90% 55% at 50% 112%, rgba(45,154,173,0.10), transparent 62%),
    linear-gradient(180deg,#FFFBEB 0%,#FBFEF5 40%,#EAF7F0 100%);}
/* faint diagonal galaxy arc */
.mw-arc{position:absolute;inset:auto -16% 24% -16%;height:54%;
  background:
    radial-gradient(ellipse 60% 58% at 42% 60%, rgba(140,175,225,0.16) 0%, rgba(140,175,225,0.05) 40%, transparent 70%),
    radial-gradient(ellipse 44% 44% at 64% 52%, rgba(175,135,225,0.11) 0%, transparent 64%),
    radial-gradient(ellipse 40% 40% at 30% 66%, rgba(130,205,224,0.10) 0%, transparent 64%);
  transform:rotate(-13deg);filter:blur(6px);opacity:.85;}

/* ── REALISTIC STARFIELD ──
   Three coordinated layers: fine field, mid field, and bright glow-stars.
   Bright stars get a soft halo via a larger faint radial at the same point. */
.stars,.mw-stars{position:absolute;inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 7% 18%,#eaf3ff 99%,transparent),
    radial-gradient(1px 1px at 13% 41%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 19% 9%,#fff 99%,transparent),
    radial-gradient(1.4px 1.4px at 23% 63%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 29% 27%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 34% 78%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 39% 14%,#fff 99%,transparent),
    radial-gradient(1px 1px at 44% 49%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 48% 88%,#c4d8ff 99%,transparent),
    radial-gradient(1.4px 1.4px at 53% 33%,#fff 99%,transparent),
    radial-gradient(1px 1px at 58% 70%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 63% 11%,#bcd2ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 68% 54%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 73% 84%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 78% 23%,#fff 99%,transparent),
    radial-gradient(1.3px 1.3px at 83% 61%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 88% 38%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 93% 73%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 97% 16%,#fff 99%,transparent);
  background-repeat:no-repeat;animation:twinkle 7s ease-in-out infinite alternate;}
.stars.layer-2{
  background-image:
    radial-gradient(1px 1px at 5% 55%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 16% 84%,#fff 99%,transparent),
    radial-gradient(1px 1px at 27% 47%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 36% 92%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 49% 19%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 61% 87%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 71% 40%,#fff 99%,transparent),
    radial-gradient(1px 1px at 82% 92%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 91% 57%,#dce9ff 99%,transparent);
  animation-duration:10s;animation-direction:alternate-reverse;opacity:.7;}
/* bright glow-stars: a sharp core + a soft halo around a handful of points */
.stars-bright,.mw-stars-bright{position:absolute;inset:0;
  background-image:
    radial-gradient(2px 2px at 21% 30%,#fff 60%,rgba(255,255,255,0.0) 100%),
    radial-gradient(7px 7px at 21% 30%,rgba(207,224,255,0.5) 0%,transparent 70%),
    radial-gradient(2px 2px at 57% 22%,#fff 60%,transparent 100%),
    radial-gradient(8px 8px at 57% 22%,rgba(173,135,225,0.4) 0%,transparent 70%),
    radial-gradient(2.4px 2.4px at 79% 58%,#fff 60%,transparent 100%),
    radial-gradient(9px 9px at 79% 58%,rgba(130,205,224,0.45) 0%,transparent 70%),
    radial-gradient(2px 2px at 40% 70%,#fff 60%,transparent 100%),
    radial-gradient(7px 7px at 40% 70%,rgba(207,224,255,0.4) 0%,transparent 70%);
  background-repeat:no-repeat;animation:twinkle 5s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.5}50%{opacity:.95}100%{opacity:.6}}

/* gold celestial beam, V9 signature, behind dark views */
.beam-gold{position:absolute;left:50%;top:-20%;width:220px;height:92%;transform:translateX(-50%) rotate(8deg);

const CATS = [{id:'all',label:'All Topics',n:42,icon:'◎',desc:'The complete cost-of-care and health-economics library'},{id:'trending',label:'Most Discussed',n:16,icon:'▲',desc:'The most-discussed topics in 2026'},{id:'us-system',label:'United States',n:15,icon:'★',desc:'The US system: spending, payers, pricing, debt, taxation, and reform'},{id:'pricing',label:'How Prices Are Set',n:21,icon:'◈',desc:'Chargemasters, the $25 aspirin, drug pricing, PBMs, and admin cost'},{id:'europe',label:'Europe',n:3,icon:'⊕',desc:'The EU, the NHS, and Bismarck vs Beveridge financing'},{id:'canada',label:'Canada',n:2,icon:'◉',desc:'Single-payer Medicare, access, and wait times'},{id:'latin-america',label:'Latin America',n:3,icon:'✸',desc:'Mexico, South America, and traditional healers'},{id:'japan',label:'Japan',n:1,icon:'◐',desc:'Universal coverage and the national fee schedule'},{id:'asia',label:'Rest of Asia & Russia',n:4,icon:'⬡',desc:'China, India, Russia, and Asian financing models'},{id:'other-regions',label:'Africa, Middle East & Oceania',n:4,icon:'◇',desc:'Sub-Saharan Africa, MENA, Australia, and the Pacific'},{id:'access',label:'Access & Equity',n:20,icon:'❖',desc:'Who can actually get care, and the global equity gap'},{id:'comparative',label:'Care Per Dollar',n:28,icon:'⚖',desc:'Cross-country value: what people get for what is spent'},{id:'influence',label:'Markets & Influence',n:2,icon:'⇆',desc:'Social media, influencers, universities, and the incentive web behind health claims'},{id:'history',label:'History & Culture',n:14,icon:'⧖',desc:'How cost, beliefs, and who-pays evolved over time'},{id:'religion',label:'Religion & Care',n:1,icon:'✚',desc:'How faith and medicine have been intertwined'},{id:'research',label:'Research & Evidence',n:5,icon:'✓',desc:'Methodology, the evidence hierarchy, and proven vs de rigueur'}];
const P = [
{i:'how-to-read',n:'How to Read This Library',fn:'Our agnostic stance and method',tier:1,ts:100,sig:'stable',hot:true,ev:5,cats:['trending','comparative'],cls:'Editorial preamble',orig:'concept',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:0,parts:'Editorial preamble for the Cost of Care library',ctry:'Global',geo:[['Global',100]],disc:2026,discr:'Ēnel Health editorial, 2026',tag:'Ēnel takes no side on policy, party, or who pays. We follow the evidence and the truth.',facts:[['Where we stand','We take no political or party side'],['Main sources we rely on','OECD, WHO, World Bank, CMS, KFF, and peer-reviewed studies (defined below)'],['How we present things','Good and bad points shown side by side'],['What we promise','Every figure names its source and its year']],brief:'Welcome. This library explains what health care costs around the world: how prices are set, how doctors and other providers get paid, and how access and health results compare from country to country. Ēnel Health takes no side. We do not favor any health-care practice, policy, payer (whoever foots the bill, such as an insurer or a government), donor, or political position. Our job is to give you evidence-based information and the truth as far as it can be established. Every number we cite names a trustworthy source and a year, for example the OECD (a group of mostly wealthy democracies that publishes comparable statistics), the WHO (the World Health Organization, the UN\'s health agency), the World Bank, CMS (the US Centers for Medicare and Medicaid Services), KFF (a nonpartisan US health-policy research group), national statistics offices, or peer-reviewed research (studies checked by independent experts before publication). When a topic is disputed, we lay out the measurable points on each side and name the analysts who hold them. We do not endorse or oppose any system, party, payer, or reform. When the evidence is uncertain, or when different sources measure things in different ways, we say so and give a range instead of a single falsely exact number. We do not treat any one institution as the final word on a question; we check figures against several independent sources rather than trusting a single name. Age and tradition are not proof: the fact that a practice, an institution, or a data source has been around a long time does not make it more accurate or more true. We judge each claim on the strength of today\'s evidence, not on its pedigree.',uses:['Understanding what the library covers and why it stays neutral','Knowing how figures are sourced and what cautions come with them'],risk:'This library is for information only. It is not medical, financial, legal, or policy advice. The figures are estimates drawn from the sources we cite, and each carries the specific limits noted in its entry. Comparisons between countries are never exact, because countries count spending, coverage, and health outcomes in different ways.',mf:[['A health-cost library has to pick a political side','It does not. Ēnel takes no side on policy or party. We present sourced evidence and show the different ways a disputed question can be read.'],['Older or longer-established sources and practices deserve more trust','Age is not proof. We judge each claim by the quality of today\'s data, treat no single institution as the sole authority, and cross-check across independent sources.']],adv:[],counter:[],history:'Ēnel built this library to answer a simple question that turns out to be surprisingly hard to answer plainly: what does care cost, who pays for it, and what do people get in return, across the world and across time. The goal is to describe first and judge later.',timeline:[['2026','Cost of Care library established with an agnostic, evidence-first mandate']],rel:['us-healthcare-overview','care-per-dollar','monetization-over-time'],enelNote:'Read every entry as a map, not a verdict. We try to state what the data show, what they do not show, and where credible analysts disagree. If an entry ever reads as arguing for or against a policy, party, or payer, that is a flaw we want to fix, because our only commitment is to the evidence and to the truth as far as it can be known.',enel:false},
{i:'us-healthcare-overview',n:'US Healthcare System Overview',fn:'The US system at a glance: spend, coverage, outcomes',tier:1,ts:96,sig:'hot',hot:true,ev:5,cats:['trending','us-system','comparative','pricing','access'],cls:'Health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:7,parts:'US national population (~335 million), all payers, 2023 spending year',ctry:'United States',geo:[['United States',100]],disc:1965,discr:'Medicare and Medicaid enacted 1965, establishing the modern mixed public-private structure',tag:'The US spends more on health per person than any other country, yet its people live shorter lives on average than those in peer nations.',facts:[['Total health spending in 2023','$4.9 trillion, reported by CMS (the US Centers for Medicare and Medicaid Services)'],['Health spending as a share of GDP in 2023','17.6% of GDP, a country\'s total yearly economic output (CMS)'],['Spending per person in 2023','$14,570 (CMS)'],['Share of people with no insurance in 2023','7.6 to 8.0% (CDC and the Census Bureau)']],brief:'This entry sums up how the US pays for health care and what it gets for the money. In 2023, total US health spending reached $4.9 trillion, which works out to $14,570 per person and equals 17.6 percent of GDP, a country\'s total yearly economic output (CMS National Health Expenditure Accounts, released December 2024). That was a 7.5 percent rise over 2022. The system is a mix of public and private money: in 2023 private health insurance covered 30 percent of the spending, Medicare (the federal program for people 65 and older) 21 percent, Medicaid (the federal-state program for low-income people) 18 percent, and out-of-pocket payments, meaning money patients pay themselves, 10 percent (CMS NHE 2023). The share of people with no insurance was about 7.6 percent by one government survey (the CDC\'s NHIS) and 8.0 percent by another (the Census Bureau\'s CPS) in 2023, near record lows, leaving roughly 25 to 26 million people uninsured. The US spends more per person than any country in the OECD, a group of mostly wealthy democracies that publishes comparable statistics, yet a US baby born in 2023 could expect to live 78.4 years, below the roughly 82-year average of comparable countries (OECD Health at a Glance 2023; Commonwealth Fund 2026).',uses:['What the US spends on health care in total and per person','How that spending splits between public programs and private insurers','How US spending and health results compare with other countries'],risk:'Different government surveys (NHIS, ACS, CPS) report slightly different uninsured rates because they ask in different ways and over different time periods, so we give a range. The spending figures track dollars by who paid them, not by how many people were covered. Life expectancy depends on many things outside the health system, including injuries, homicides, and drug overdoses, so the gap between high spending and shorter lives should not be blamed on the health system alone. This entry reports measured amounts only and takes no position on any policy or payer.',mf:[['The US health system is entirely private','Public payers (Medicare, Medicaid, the Veterans Administration, and others) paid for roughly half of all US health spending in 2023, according to CMS.'],['Spending more automatically buys better health','The US spends the most per person yet ranks near the bottom of its wealthy-country peers on life expectancy and on deaths that timely care could have prevented (OECD 2023; Commonwealth Fund 2026).']],adv:[{n:'CMS National Health Expenditure Accounts',r:'Official US health spending statistics',paid:false,note:'Main source for the total, per-person, and share-of-GDP figures (2023 data, released Dec 2024).'},{n:'OECD Health at a Glance',r:'Harmonized cross-country health data',paid:false,note:'Source for the international spending and life-expectancy comparisons (2023 edition).'},{n:'US Census Bureau and CDC NHIS',r:'Official coverage statistics',paid:false,note:'Sources for insurance coverage and the uninsured rate (2023).'}],counter:[{n:'Peterson-KFF Health System Tracker',cred:'Health policy research collaboration',q:'Gaps in health results between countries partly reflect social, behavioral, and population differences outside the medical system, not just how well the health care itself performs.'},{n:'OECD methodology notes',cred:'OECD Health Statistics',q:'Differences in currency buying power and accounting mean that even carefully matched per-person spending comparisons carry some uncertainty.'}],history:'Before 1929 most Americans paid for care directly out of pocket. Prepaid hospital plans (Blue Cross, 1929) and employer coverage grew during the World War II years. The Social Security Amendments of 1965 created Medicare and Medicaid, locking in a mixed public-private structure. Managed care reshaped private coverage in the 1980s and 1990s. The Affordable Care Act, the 2010 US health law also called Obamacare, expanded coverage through new insurance marketplaces and a larger Medicaid program, helping push the uninsured rate to record lows by the early 2020s.',timeline:[['1929','First Blue Cross prepaid hospital plan at Baylor Hospital'],['1965','Medicare and Medicaid enacted under the Social Security Amendments'],['2010','Affordable Care Act signed into law'],['2023','US health spending reaches $4.9 trillion, 17.6 percent of GDP (CMS)']],rel:['us-payer-system','employer-insurance','medicare','medicaid','aca-obamacare','us-admin-costs','us-outcomes-vs-spend','care-per-dollar'],enelNote:'The data show that the United States spends more on health care than any other high-income country, whether measured in total dollars, per person, or as a share of GDP, and that it delivers coverage through a mix of private insurers and large public programs rather than one single system. The data also show that the US has a lower life expectancy and more preventable deaths than most of its wealthy-country peers despite all that spending. What the data do not show is cause and effect: the gap reflects medical-system factors alongside injuries, violence, overdoses, diet, and other non-medical causes, so it cannot be pinned on how care is paid for alone. Coverage estimates vary by survey method, and spending figures track dollars by who paid, not by who was covered. These are descriptive measurements from matched official sources. They neither praise nor criticize any way of paying for care; they map the ground so readers can weigh the trade-offs on the evidence.',enel:true},
{i:'us-payer-system',n:'US Payer System',fn:'How the multi-payer US system finances care',tier:1,ts:91,sig:'hot',hot:true,ev:5,cats:['trending','us-system','pricing','comparative'],cls:'Health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:6,parts:'US insured population across private and public payers, 2023',ctry:'United States',geo:[['United States',100]],disc:1973,discr:'HMO Act of 1973 accelerated managed care and the modern multi-payer structure',tag:'Many separate payers each negotiate their own prices, so a single service can carry many different prices.',facts:[['Share paid by private insurance in 2023','30% ($1,464.6 billion)'],['Share paid by Medicare in 2023','21% ($1,029.8 billion)'],['Share paid by Medicaid in 2023','18% ($871.7 billion)'],['Share patients paid themselves in 2023','10% out-of-pocket ($505.7 billion)']],brief:'A payer is whoever foots the bill for care, such as an insurer or a government program. The US pays for care through many payers operating at the same time. In 2023 private health insurance covered 30 percent of national health spending, Medicare (the federal program for people 65 and older) 21 percent, Medicaid (the federal-state program for low-income people) 18 percent, and out-of-pocket payments, meaning money patients pay themselves, 10 percent (CMS National Health Expenditure Accounts, 2023). CMS is the US Centers for Medicare and Medicaid Services. Private coverage is mostly job-based plans, with smaller markets for individuals and for the ACA marketplaces (the Affordable Care Act is the 2010 US health law also called Obamacare). Providers are paid in two main ways: under fee-for-service, where each service is billed separately, and increasingly under value-based arrangements, which tie payment to quality and to keeping total costs down. Because each payer bargains on its own, a single procedure can carry many prices at once: a hospital\'s official list price (the chargemaster), a different negotiated rate for each insurer, and set rates for Medicare and Medicaid. The paperwork and overhead tied to all this fragmentation is large: one peer-reviewed study estimated US health administration at 34.2 percent of spending in 2017, compared with 17.0 percent in Canada (Himmelstein and Woolhandler, Annals of Internal Medicine, 2020).',uses:['How the US divides health spending among different payers','Why the same service can have many different prices','How fee-for-service differs from value-based payment'],risk:'Payer shares measure dollars by their source, not the number of people covered. Estimates of administrative cost vary depending on how it is defined and which activities are counted, and the cited 34.2 percent figure is from 2017. Negotiated prices are mostly kept confidential, so the evidence on how much prices vary is incomplete even after recent transparency rules. This entry describes how the system works and what it measurably costs, and takes no position on any payer or payment model.',mf:[['There is one standard price for a medical service','Each payer negotiates its own rate, so a single service carries several prices at once, including the hospital list price, the negotiated insurer rates, and the government rates.'],['Administrative cost in the US is tiny','Peer-reviewed work estimates US health administration far above single-payer peers (countries with one public insurer), at 34.2 percent of spending versus Canada\'s 17.0 percent in 2017.']],adv:[{n:'CMS National Health Expenditure Accounts',r:'Official payer-share statistics',paid:false,note:'Source for the 2023 share of spending by payer.'},{n:'Annals of Internal Medicine',r:'Peer-reviewed journal',paid:false,note:'Published the Himmelstein and Woolhandler 2020 US-Canada administrative-cost comparison.'},{n:'KFF',r:'Independent health policy research',paid:false,note:'Source for the structure of the payer market and coverage analysis. KFF is a nonpartisan US health-policy research group.'}],counter:[{n:'America\'s Health Insurance Plans',cred:'Insurer trade association',q:'Some administrative spending pays for coordinating care, preventing fraud, and running quality programs, so not all overhead is wasted.'},{n:'Health-economics methodologists',cred:'Health-services research',q:'Estimates of administrative cost depend heavily on how categories are defined, which produces a wide range of plausible figures across studies.'}],history:'Commercial insurance and Blue Cross plans grew from the 1930s and 1940s, paying providers mostly fee-for-service. Medicare and Medicaid (1965) added large public payers with government-set prices. The HMO Act of 1973 and the spread of managed care in the 1980s and 1990s brought in provider networks and negotiated rates. The 2010s brought pilot programs tying pay to value, and federal rules requiring hospitals and insurers to disclose prices took effect in 2021 and 2022.',timeline:[['1965','Medicare and Medicaid add major public payers with government-set prices'],['1973','HMO Act speeds up managed care and negotiated provider networks'],['2010','ACA establishes individual marketplaces and value-based pilots'],['2021','Federal hospital price-transparency rule takes effect']],rel:['us-healthcare-overview','employer-insurance','medicare','medicaid','pbms','hospital-chargemaster','us-admin-costs','care-per-dollar'],enelNote:'The data show that the United States pays for care through many payers operating side by side, that public programs and private insurance each cover large shares, and that because each payer bargains separately, the same service carries several different prices. Peer-reviewed evidence shows that the administrative costs tied to this structure are high compared with single-payer peers, though the exact figure depends on what is counted and which year is measured. What the data do not give is a single verdict on the model: fragmentation adds administrative complexity, while supporters argue that competition and a variety of plans serve different needs. Negotiated prices stay mostly confidential even after the transparency rules. These are plain descriptions of how the system works and measurements of what it costs to run, presented without endorsing or opposing any payer arrangement.',enel:true},
{i:'employer-insurance',n:'Employer-Sponsored Insurance',fn:'Job-based coverage: origins, premiums, tax subsidy',tier:1,ts:89,sig:'hot',hot:true,ev:5,cats:['trending','us-system','history','pricing'],cls:'Health coverage',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:6,parts:'~154 million nonelderly Americans with job-based coverage, 2024',ctry:'United States',geo:[['United States',100]],disc:1943,discr:'1943 IRS ruling and War Labor Board decision made employer health premiums tax-free',tag:'Job-based coverage started as a wartime workaround and is still the largest source of private insurance in the US.',facts:[['People covered in 2024','154 million (KFF, a nonpartisan health-policy research group)'],['Average yearly family premium in 2024','$25,572 (KFF)'],['Average yearly single-person premium in 2024','$8,951 (KFF)'],['Tax revenue given up for job-based coverage in 2024','$252 billion (US Treasury)']],brief:'Employer-sponsored insurance means the health coverage you get through a job. It is the largest source of private health coverage in the US, reaching about 154 million working-age people in 2024 (KFF Employer Health Benefits Survey, 2024; KFF is a nonpartisan US health-policy research group). The average yearly premium, the amount paid for the plan, was $25,572 for family coverage and $8,951 for a single person. On average, workers paid $6,296 of the family premium and $1,368 of the single premium, with employers covering the rest. The arrangement dates to World War II: a federal board capped wages, so employers competed for workers by adding health benefits, and a 1943 IRS ruling, written into the Internal Revenue Code of 1954, made employer-paid premiums exempt from employees\' income tax. That tax break is one of the largest in the federal budget, costing an estimated $252.4 billion in income tax not collected in 2024 (US Treasury). Economists note it can cause job lock, where workers stay in a job they would otherwise leave just to keep their coverage.',uses:['Why most working-age Americans get coverage through a job','How much job-based premiums cost and who pays which part','How the tax break makes job-based coverage cheaper'],risk:'The premium and contribution figures are survey averages and vary widely by company size, region, and plan; they leave out the extra costs patients pay when they use care, such as deductibles. Estimates of the tax break differ by agency and method (the Treasury and the Joint Committee on Taxation count it differently). The evidence on how large the job-lock effect is remains mixed. This entry describes the structure, the cost, and the history only, and takes no position on the tax treatment or on any reform.',mf:[['Employers pay the full cost of job-based coverage','Workers paid about $6,296 of the average family premium in 2024, and economists note that premiums come at the expense of higher wages.'],['Tying insurance to jobs was a deliberate national plan','It began as a way around World War II wage caps, then was locked in by the 1943 IRS ruling and the 1954 tax code.']],adv:[{n:'KFF Employer Health Benefits Survey',r:'Leading annual survey of employer coverage',paid:false,note:'Source for the 2024 premiums, worker contributions, and enrollment.'},{n:'US Treasury Office of Tax Analysis',r:'Official tax-expenditure estimates',paid:false,note:'Source for the 2024 estimate of the job-based-coverage tax break.'},{n:'Institute of Medicine (Employment and Health Benefits)',r:'Documented institutional history',paid:false,note:'Source for the World War II origins and the 1943 and 1954 tax history.'}],counter:[{n:'Joint Committee on Taxation',cred:'Nonpartisan congressional scorekeeper',q:'The size of the tax break depends on the baseline used and on whether payroll-tax effects are included, giving a range above the Treasury\'s income-tax-only figure.'},{n:'Labor economists',cred:'Peer-reviewed labor economics',q:'Estimates of job lock vary: some studies find a meaningful effect on whether people change jobs, while others find a smaller one.'}],history:'Before the 1940s, health coverage was a minor job benefit. During World War II a federal board limited wage increases, so employers added health insurance to attract scarce workers. A 1943 IRS ruling held that employer-paid group premiums were not taxable income, and the Internal Revenue Code of 1954 made the exemption permanent. The number of covered Americans rose from roughly 12 million in 1940 to over 70 million by the early 1950s.',timeline:[['1942','National War Labor Board caps wages, prompting employers to add health benefits'],['1943','IRS ruling makes employer health premiums tax-free to employees'],['1954','Internal Revenue Code codifies the ESI tax exclusion'],['2024','Average family ESI premium reaches $25,572 (KFF)']],rel:['us-healthcare-overview','us-payer-system','aca-obamacare','us-health-taxation','history-of-medical-cost','medicare'],enelNote:'The data and the historical record show that job-based coverage is the largest source of private insurance in the US, that it began as a response to World War II wage caps rather than as a deliberate national plan, and that the tax break confirmed in 1943 and made permanent in 1954 cemented it in place. KFF data show today\'s premium levels and how the cost splits between employer and worker, and Treasury estimates show the tax break is among the largest in the federal budget. What the data do not settle is whether tying coverage to a job is, on balance, a good thing: it spreads risk efficiently within a company, but it can also cause job lock and concentrate a large tax subsidy on people who have job-based plans. The premium figures are averages that hide wide variation and leave out the costs of actually using care. These are descriptive facts, presented to explain how and why job-based coverage exists and what it costs, without endorsing or opposing the arrangement.',enel:true},
{i:'medicare',n:'Medicare',fn:'US federal insurance for people 65+ and some disabled',tier:1,ts:84,sig:'stable',hot:true,ev:5,cats:['trending','us-system'],cls:'Public insurance',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:4,parts:'national US program, ~68M beneficiaries (2024)',ctry:'United States',geo:[['United States',100]],disc:1965,discr:'Social Security Amendments of 1965 (Title XVIII), signed by President Lyndon B. Johnson',tag:'Federal insurance for older and disabled Americans, costing about $1.1 trillion in 2024.',facts:[['People covered in 2024','67.6 million (Medicare Trustees)'],['Total cost in 2024','about $1.1 trillion (Trustees)'],['In Medicare Advantage private plans in 2024','32.8 million people, 54% (KFF)'],['When the hospital trust fund runs short','projected for 2036 (Trustees)']],brief:'Medicare is the US federal health insurance program created by the Social Security Amendments of 1965, signed by President Lyndon B. Johnson. It mainly covers people aged 65 and older, plus some younger people with disabilities or with end-stage kidney disease. It has four parts: Part A pays for hospital stays, Part B pays for doctor visits and outpatient care, Part C (called Medicare Advantage) lets private plans deliver the coverage, and Part D pays for prescription drugs (added in 2003, started in 2006). In 2024 it covered 67.6 million people at a total cost of roughly $1.1 trillion, and 32.8 million of them (54 percent) were in Medicare Advantage private plans (Medicare Trustees Report 2024; KFF 2024). KFF is a nonpartisan US health-policy research group. The 2024 Trustees Report projected that the Part A hospital trust fund, the savings account that pays hospital bills, would run short in 2036, after which incoming payroll taxes would still cover about 89 percent of Part A costs. The Inflation Reduction Act of 2022 let Medicare, for the first time, negotiate prices on selected high-cost drugs; the first ten negotiated prices (38 to 79 percent below the list price) take effect January 1, 2026 (CMS 2025).',uses:['Hospital, doctor, outpatient, and prescription drug coverage for eligible older and disabled Americans'],risk:'Medicare does not cover most long-term custodial care (everyday help such as bathing and dressing over months or years), most dental, vision, and hearing care, and Original Medicare puts no yearly cap on what a patient can owe out of pocket. Neutrality note: the program widens access for older and disabled people, while it also faces documented long-term funding pressure (the hospital trust fund is projected to run short in 2036) and a debate over whether Medicare Advantage plans are paid more than traditional Medicare costs; both are reported by official sources without endorsement.',mf:[['Medicare covers all of seniors\' health costs','Original Medicare sets no cap on out-of-pocket spending and leaves out most long-term care, dental, vision, and hearing (KFF 2024).'],['Medicare is about to go bankrupt','The 2024 Trustees projected the hospital trust fund would run short in 2036, after which payroll taxes would still cover about 89% of Part A costs; Parts B and D are paid for by premiums and general tax revenue and cannot run short.']],adv:[{n:'Centers for Medicare and Medicaid Services',r:'Program administrator and statistics',paid:false,note:'Data source.'},{n:'Medicare Boards of Trustees',r:'Annual financial report',paid:false,note:'Data source.'},{n:'KFF',r:'Independent health policy analysis',paid:false,note:'Data source.'}],counter:[{n:'Medicare Advantage payment debate',cred:'KFF / MedPAC analysis',q:'Whether private Medicare Advantage plans are paid more than equivalent traditional Medicare beneficiaries (estimated at 122% on average, about $83 billion in 2024 per KFF) is disputed among analysts.'}],history:'Created in 1965 (Title XVIII); Part C (first called Medicare+Choice, later Medicare Advantage) added in 1997; the Part D prescription drug benefit passed in 2003 and started in 2006; the Inflation Reduction Act\'s drug-price negotiation passed in 2022, with the first prices taking effect in 2026.',timeline:[['1965','Medicare established under Social Security Amendments, signed by President Johnson'],['1997','Medicare+Choice (later Medicare Advantage) created by Balanced Budget Act'],['2003','Medicare Modernization Act adds Part D drug benefit'],['2022','Inflation Reduction Act authorizes Medicare drug-price negotiation'],['2026','First ten negotiated drug prices take effect']],rel:['us-healthcare-overview','us-payer-system','medicaid','aca-obamacare','us-drug-pricing'],enelNote:'Medicare is the main US public insurer for older and disabled Americans, covering 67.6 million people at roughly $1.1 trillion in 2024 (Medicare Trustees 2024). Its measurable markers point in two directions at once: broad and stable access for a group that private insurers historically priced out, alongside a hospital trust fund projected to run short in 2036 and unsettled questions about how much Medicare Advantage plans are paid. The 2022 Inflation Reduction Act\'s drug-price negotiation, effective 2026, is an early, measurable policy change whose long-term effect on costs and access is not yet known. Readers should weigh the expanded coverage against the documented funding strain, with neither framing treated as the final word.',enel:true},
{i:'medicaid',n:'Medicaid',fn:'Joint US federal-state coverage for low-income people',tier:1,ts:80,sig:'stable',hot:true,ev:5,cats:['trending','us-system'],cls:'Public insurance',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:4,parts:'national US program, ~79M enrollees (Oct 2024)',ctry:'United States',geo:[['United States',100]],disc:1965,discr:'Social Security Amendments of 1965 (Title XIX), signed by President Lyndon B. Johnson',tag:'The largest US insurer by number of people covered, and the main payer for long-term care.',facts:[['People enrolled in October 2024','about 79 million in Medicaid and CHIP (CMS/KFF)'],['Peak enrollment in March 2023','94 million, before the post-pandemic drop (KFF)'],['Federal share of state costs (FMAP) by law','50% to 83% (Congressional Research Service)'],['Share of US long-term care spending it pays','61%, paid by Medicaid (KFF 2023)']],brief:'Medicaid is a joint federal-state health coverage program created by the Social Security Amendments of 1965 (Title XIX), signed by President Lyndon B. Johnson. It covers low-income children, adults, pregnant people, older adults, and people with disabilities. States run their own programs within federal rules, and the federal government pays a share of each state\'s costs through the Federal Medical Assistance Percentage, or FMAP, the federal share of state Medicaid costs, which by law ranges from 50 to 83 percent depending on how wealthy the state is (Congressional Research Service 2025). The Affordable Care Act of 2010, the US health law also called Obamacare, let states widen Medicaid to cover adults earning up to 138 percent of the federal poverty line; by 2024, 40 states plus Washington DC had done so (KFF 2024). KFF is a nonpartisan US health-policy research group. Medicaid is the biggest payer for long-term care, covering 61 percent of all US spending on long-term services and supports in 2023 (KFF). Combined Medicaid and CHIP (the Children\'s Health Insurance Program) enrollment peaked at 94 million in March 2023 under a pandemic-era rule that kept people continuously enrolled, then fell to about 79 million by October 2024 as that rule ended and states rechecked eligibility, a process known as the unwinding (KFF; CMS 2024).',uses:['Health and long-term care coverage for eligible low-income and disabled Americans, run by the states'],risk:'Who qualifies, what is covered, and how much providers are paid vary a lot from state to state, and lower payments to providers can make it harder to see some specialists. Neutrality note: the ACA expansion and the pandemic continuous-enrollment rule pushed coverage to record levels, while the 2023-to-2024 unwinding caused large drops in enrollment, including roughly five million children, with some losing coverage for paperwork reasons rather than because they no longer qualified (KFF 2024); both outcomes are documented without endorsement.',mf:[['Medicaid is one national program with the same benefits everywhere','Who qualifies and what is covered vary by state; ten states had the minimum 50% federal match (FMAP) in fiscal year 2025, the government\'s budget year, and ten had not adopted the ACA expansion.'],['Medicaid only covers routine care for poor people','Medicaid is the biggest payer for long-term care, covering 61% of all US spending on long-term services and supports in 2023 (KFF).']],adv:[{n:'Centers for Medicare and Medicaid Services',r:'Federal administrator and enrollment data',paid:false,note:'Data source.'},{n:'KFF',r:'Independent enrollment and unwinding tracking',paid:false,note:'Data source.'},{n:'MACPAC',r:'Nonpartisan congressional Medicaid advisory commission',paid:false,note:'Data source.'}],counter:[{n:'Unwinding interpretation',cred:'KFF / GAO analysis',q:'Analysts differ on how much of the 2023-to-2024 drop in enrollment reflected people who genuinely no longer qualified versus people blocked by paperwork; the GAO (the government\'s audit agency) found that drop-off patterns varied widely across states (GAO 2025).'}],history:'Created in 1965 (Title XIX); a child screening and treatment benefit (EPSDT) added in 1967; coverage for pregnant women and children expanded through the 1980s; the ACA adult expansion became an option from 2014 after the Supreme Court\'s NFIB v. Sebelius (2012) made it voluntary for states; pandemic continuous-enrollment ran from 2020 to 2023; the unwinding ran from 2023 to 2024.',timeline:[['1965','Medicaid established under Social Security Amendments, signed by President Johnson'],['2010','ACA enacted, authorizing Medicaid expansion to 138% of poverty'],['2012','NFIB v. Sebelius makes ACA Medicaid expansion optional for states'],['2014','First wave of state Medicaid expansions take effect'],['2023','Continuous-enrollment ends; enrollment peaks at 94 million; unwinding begins'],['2024','Enrollment falls to ~79 million; 40 states plus DC have adopted expansion']],rel:['us-healthcare-overview','medicare','aca-obamacare','us-payer-system','medical-debt'],enelNote:'Medicaid is the largest US insurer by number of people covered, reaching about 79 million in October 2024 and serving as the main payer for long-term care at 61 percent of national spending on long-term services and supports in 2023 (CMS; KFF). Its measurable markers are mixed by design: the ACA expansion and the pandemic rules pushed coverage to a record 94 million in 2023, while the 2023-to-2024 unwinding cut enrollment by roughly 15 million on net, including about five million children, with drop-off patterns varying sharply from state to state. The federal-state structure produces wide differences in who qualifies, what is covered, and how much providers are paid. Readers should weigh the broad access for low-income people and for long-term care against the state-by-state inconsistency and the documented swings in coverage during the unwinding, with neither presented as a verdict.',enel:true},
{i:'aca-obamacare',n:'Affordable Care Act (Obamacare)',fn:'2010 US law: exchanges, subsidies, Medicaid expansion',tier:1,ts:88,sig:'hot',hot:true,ev:5,cats:['trending','us-system'],cls:'Health law',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:6,parts:'national US law; ~21.4M marketplace enrollees (2024)',ctry:'United States',geo:[['United States',100]],disc:2010,discr:'Patient Protection and Affordable Care Act, signed by President Barack Obama, March 23, 2010',tag:'The share of Americans with no health insurance fell (from 15.5% to 7.9%), but the cost of buying coverage on your own doubled between 2013 and 2017.',facts:[['Share of Americans with no insurance, 2010 to 2023','Fell from 15.5% to 7.9% (US Census American Community Survey, an annual government population survey)'],['People who signed up through the insurance marketplaces, 2024','21.4 million, an all-time high (CMS, the US Centers for Medicare and Medicaid Services)'],['Penalty for going uninsured set to zero','2019, under a 2017 tax law'],['Price of buying your own coverage, 2013 to 2017','More than doubled (KFF, a nonpartisan US health-policy research group)']],brief:'The Affordable Care Act, often called Obamacare, is the 2010 US health law that reshaped how Americans get health insurance. Signed by President Barack Obama on March 23, 2010, it created online insurance marketplaces where people can shop for coverage, with government help paying premiums for those with lower incomes. It let states expand Medicaid (the public insurance program for low-income people) to cover anyone earning up to 138 percent of the poverty line, and it barred insurers from refusing coverage or charging more because of a pre-existing health condition. The share of people with no insurance fell from 15.5 percent in 2010 to a record-low 7.9 percent in 2023 (Census American Community Survey), and 21.4 million people signed up through the marketplaces in 2024, about 92 percent of them getting financial help (CMS, the US Centers for Medicare and Medicaid Services, 2024). The penalty for going without insurance was set to zero starting in 2019 by the 2017 Tax Cuts and Jobs Act, and a 2012 Supreme Court ruling (NFIB v. Sebelius) made the Medicaid expansion optional for each state. On the cost side, the rules requiring insurers to cover everyone at similar prices helped push the cost of buying your own coverage to more than double between 2013 and 2017 (KFF, a nonpartisan US health-policy research group), and the Congressional Budget Office estimated that removing the no-insurance penalty would raise those prices about 10 percent.',uses:['A framework for buy-your-own coverage, financial help paying premiums, expanded Medicaid, and consumer protections against insurers'],risk:'The results cut both ways depending on which measure you look at. On the positive side: the uninsured rate fell from 15.5% in 2010 to 7.9% in 2023 (Census American Community Survey), insurers can no longer turn people away for pre-existing conditions (before the law, KFF found roughly 18% of people who applied for their own coverage were denied), and marketplace sign-ups hit a record 21.4 million in 2024 (CMS). On the negative or disputed side: the cost of buying your own coverage more than doubled from 2013 to 2017 (KFF), the Congressional Budget Office estimated that ending the no-insurance penalty would raise those prices about 10%, and roughly 1.4 million adults still fall into a coverage gap in the ten states that did not expand Medicaid (KFF). This entry is informational, not advice.',mf:[['The ACA eliminated the problem of people having no insurance','The uninsured rate fell to 7.9% in 2023 but did not reach zero; about 25.3 million people under 65 still had no insurance (Census American Community Survey, 2023).'],['The ACA only raised prices and gave nothing back','The cost of buying your own coverage more than doubled from 2013 to 2017 (KFF), but over the same period the uninsured rate dropped 7.6 percentage points and insurers stopped denying people for pre-existing conditions; both outcomes are documented.']],adv:[{n:'US Census Bureau',r:'Uninsured-rate measurement (ACS)',paid:false,note:'Data source.'},{n:'CMS',r:'Marketplace enrollment and subsidy data',paid:false,note:'Data source.'},{n:'Congressional Budget Office',r:'Nonpartisan premium and enrollment estimates',paid:false,note:'Data source.'},{n:'KFF',r:'Independent premium and pre-existing-condition analysis',paid:false,note:'Data source.'}],counter:[{n:'Premium-increase attribution',cred:'KFF vs Heritage Foundation analyses',q:'Analysts disagree on how much of the post-2013 increase in buy-your-own coverage prices came from the rules forcing insurers to cover everyone at similar rates, versus prices having been set too low before the law and changes in who was buying.'},{n:'Coverage-gain attribution',cred:'Brookings / ASPE analysis',q:'Some of the drop in the uninsured rate, especially from 2019 to 2023, is partly due to pandemic-era Medicaid rules and extra subsidies under the 2021 American Rescue Plan Act, rather than the original ACA design alone.'}],history:'Enacted March 23, 2010; major coverage provisions effective January 2014; NFIB v. Sebelius (2012) upheld the law but made expansion optional; individual mandate penalty zeroed effective 2019; California v. Texas (2021) left the law standing.',timeline:[['2010','ACA signed by President Obama on March 23'],['2012','Supreme Court upholds ACA, makes Medicaid expansion optional (NFIB v. Sebelius)'],['2014','Marketplaces, subsidies, Medicaid expansion, and guaranteed issue take effect'],['2017','Tax Cuts and Jobs Act zeros the individual mandate penalty'],['2021','Supreme Court leaves ACA in place (California v. Texas); ARPA enhances subsidies'],['2024','Marketplace enrollment reaches record 21.4 million (CMS)']],rel:['us-healthcare-overview','medicaid','medicare','employer-insurance','us-outcomes-vs-spend'],enelNote:'The Affordable Care Act, signed in 2010 and largely in effect by 2014, is the most far-reaching recent change to how Americans get insured, and its track record points in both directions. On the positive side: the uninsured rate fell from 15.5 percent in 2010 to a record-low 7.9 percent in 2023 (Census American Community Survey), insurers stopped denying people for pre-existing conditions, and marketplace sign-ups reached a record 21.4 million in 2024 with most people getting financial help (CMS). On the other side: the cost of buying your own coverage more than doubled from 2013 to 2017 (KFF), the Congressional Budget Office tied ending the no-insurance penalty to roughly 10 percent higher prices, and about 1.4 million adults still fall into a coverage gap in states that did not expand Medicaid. Analysts also disagree about how much of the coverage gains after 2019 came from pandemic Medicaid rules and extra subsidies. We present these attributed measures side by side without reaching a verdict.',enel:true},
{i:'cost-of-advil',n:'The $25 Hospital Aspirin',fn:'Why a hospital bills $25 for a single Advil',tier:1,ts:78,sig:'stable',hot:false,ev:4,cats:['pricing','us-system','access'],cls:'Billing practice',orig:'practice',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:2,parts:'3,400+ US acute-care hospitals (chargemaster markup study, 1996-2017)',ctry:'United States',geo:[['United States',100]],disc:2013,discr:'Public attention crystallized in 2013 with Steven Brill\'s Time investigation of hospital chargemasters',tag:'You are not paying for the pill; you are paying for the whole hospital that hands it to you.',facts:[['What the tablet costs at a drugstore','Under $0.10 (2013)'],['What hospitals have been reported to charge','$10 to $25 per tablet (2014)'],['Average charge for every $100 the care actually costs the hospital','$432; at for-profit hospitals, $631 (2017)'],['Rise in list prices on the hospital price file, 1996 to 2017','Up 155% on average (2020 study)']],brief:'A hospital bill that lists $25 for a single aspirin is not charging you for the pill; it is charging you for the institution that dispenses it. According to Healthcare Finance News (2014), that charge rolls in a documented chain of labor (a doctor ordering it, a nurse entering the order, the pharmacy filling it, a pharmacist checking it, a nurse delivering it and recording it) plus building overhead, utilities, the cost of meeting regulations, and the legally required medication record. The list price itself comes from the chargemaster, which is a hospital\'s internal master price list of 10,000 to 50,000 items. Those list prices rose an average of 155 percent between 1996 and 2017 (a peer-reviewed study of more than 3,400 hospitals, 2020). A separate Health Affairs study found the average hospital charged $432 for every $100 the care actually cost it, rising to $631 at for-profit hospitals (2017 data); that ratio of charge to cost is called the markup. Hospitals also point to cross-subsidizing: because Medicare and Medicaid (the public insurance programs) pay them less than care costs, hospitals inflate the charges they send to private insurers to make up the difference. Insured patients rarely pay the full list price because their insurer negotiates a discount, but uninsured patients and those who go outside their insurer\'s network can be billed at or near the full list price.',uses:['Shows how itemized US hospital bills turn fixed overhead into a charge for each individual item','Explains why list prices are so far above what the item costs the hospital to buy'],risk:'The $25 aspirin is a famous example, but specific dollar figures come from individual patients\' bills and from journalism rather than one audited national database; actual charges vary by hospital, by insurer, and by year. List prices are not what most insured patients actually pay. The charge-to-cost ratio describes how the charge compares to the cost, not profit, since few insurers pay the full list price.',mf:[['A hospital aspirin costs $25 because the pill itself is expensive','The pill costs pennies; the $25 rolls in the labor to dispense it, overhead, the cost of meeting regulations, and making up for care the hospital is not fully paid for, all priced from the chargemaster (the hospital\'s internal master price list).'],['The list price on the chargemaster is what people actually pay','Most insured patients pay negotiated rates far below the list price; the charge is not the same as the payment.']],adv:[{n:'Health Affairs (Bai and Anderson markup research)',r:'Peer-reviewed charge-to-cost analysis',paid:false,note:'Documented $432 charge per $100 cost; $631 at for-profits.'},{n:'Healthcare Finance News',r:'Trade journalism on cost accounting',paid:false,note:'Detailed the labor and overhead chain behind a $25 aspirin (2014).'},{n:'CMS Hospital Price Transparency rule',r:'Federal disclosure requirement',paid:false,note:'Since 2021, hospitals must post chargemaster and negotiated rates.'}],counter:[{n:'American Hospital Association',cred:'National hospital trade association',q:'List prices rarely match what patients or insurers actually pay, and the charge on each item helps make up for care the hospital is not paid for plus fixed overhead.'},{n:'Provider cost-accounting perspective',cred:'Hospital finance',q:'The charge reflects the full process of dispensing the pill and the cost of running the institution, not the wholesale price of the tablet.'}],history:'Hospital chargemasters date to mid-20th-century cost-reimbursement billing; public scrutiny intensified after Steven Brill\'s 2013 Time investigation and again under federal price-transparency rules effective 2021.',timeline:[['2013','Time publishes Bitter Pill, bringing chargemaster pricing to mass attention'],['2014','Healthcare Finance News documents the cost-accounting chain behind a $25 aspirin'],['2020','Peer-reviewed study finds chargemaster markups up 155% (1996-2017)'],['2021','CMS Hospital Price Transparency rule takes effect, requiring posted prices']],rel:['hospital-chargemaster','hospital-bed-night','us-admin-costs','medical-debt','us-drug-pricing','care-per-dollar'],enelNote:'The aspirin charge is a useful starting point precisely because it is so vivid, but the figure is best understood as a symptom of how US hospitals spread fixed overhead and the cost of unpaid-for care across each itemized line, rather than as the cost of a pill. The evidence is strong on the charge-to-cost ratios and the dispensing process, and weaker on any single authoritative national price for one tablet, since those figures come from individual bills. Charges are not payments; most insured patients pay negotiated rates far below the list price. We present this as informational, not as a judgment about any hospital\'s conduct.',enel:true},
{i:'hospital-bed-night',n:'A Night in a Hospital Bed',fn:'What one inpatient day actually costs',tier:1,ts:74,sig:'stable',hot:false,ev:4,cats:['pricing','us-system','comparative'],cls:'Cost benchmark',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:3,parts:'US community hospitals (AHA annual survey, compiled by KFF); ICU cost studies',ctry:'United States',geo:[['United States',100]],disc:2024,discr:'Figures reflect AHA/KFF expense-per-inpatient-day reporting for 2024',tag:'The bed itself is cheap; the around-the-clock hospital wrapped around it is not.',facts:[['What a day costs a nonprofit hospital to provide, 2024','$3,449 (KFF, a nonpartisan health-policy group, using American Hospital Association data)'],['What a day costs a for-profit hospital to provide, 2024','$2,623 (KFF/AHA)'],['Range across states','Under $700 to over $6,000 (2024)'],['Intensive care unit versus a regular ward','Roughly 2 to 3 times more; the first day in intensive care is the most expensive']],brief:'A night in a hospital bed is shorthand for a whole bundle: the room, around-the-clock nursing, monitoring, medicines, tests, and the hospital\'s fixed overhead spread across each day of care. Using American Hospital Association data compiled by KFF (a nonpartisan health-policy research group), the average cost to provide one day of care in 2024 was about $3,449 at nonprofit hospitals and $2,623 at for-profit hospitals, with state averages ranging from under $700 to over $6,000. These are estimates of what a day of care costs the hospital to deliver, not the charges billed to patients and not the payments hospitals receive. Intensity matters: peer-reviewed studies (in the journals Critical Care Medicine and Annals ATS) find a day in intensive care costs roughly two to three times a day on a general medical or surgical ward, with the first intensive-care day the most expensive because the admission workup and procedures pile up early. International comparisons consistently show US per-day hospital costs among the highest of the wealthy OECD countries, though the comparisons are imperfect because countries differ in what a single day includes and in how long patients typically stay.',uses:['A benchmark for how inpatient costs add up day by day','The gaps between nonprofit and for-profit hospitals, and between intensive care and a regular ward','How the US compares with other countries'],risk:'The per-day figures are accounting estimates of what care costs the hospital, not the charges patients see or the payments insurers make, and the standard measure (the adjusted inpatient day) blends inpatient and outpatient activity together. State and ownership averages hide wide differences from one hospital to the next. International comparisons are limited because countries define a hospital day differently and patients stay for different lengths of time.',mf:[['A night in a hospital bed costs about what a hotel costs','The US average cost to provide one inpatient day is roughly $2,600 to $3,400, because it bundles around-the-clock staffing, monitoring, and standby capacity, not just a room.'],['The daily figure listed is what it costs the hospital','These per-day figures are estimates of the hospital\'s cost, which is different from the charges billed and from the payments received.']],adv:[{n:'KFF State Health Facts',r:'Nonpartisan compilation of AHA data',paid:false,note:'Expenses per adjusted inpatient day by state and ownership, 2024.'},{n:'American Hospital Association',r:'Source of the underlying annual survey',paid:false,note:'Annual hospital survey data.'},{n:'Critical Care Medicine / Annals ATS',r:'Peer-reviewed ICU cost research',paid:false,note:'First ICU day costliest; ICU 2-3x general ward.'}],counter:[{n:'American Hospital Association',cred:'Hospital trade association',q:'The per-day cost reflects around-the-clock staffing, the capacity that has to be ready at all times, and regulatory requirements, not just the bed itself.'},{n:'Health economists (OECD comparison caveat)',cred:'Methodological perspective',q:'Per-day costs cannot be compared directly across countries because how long patients stay and what a day includes both differ.'}],history:'Per-diem cost reporting grew out of mid-20th-century hospital cost accounting; KFF has tracked expenses per inpatient day from AHA surveys for decades, with annual updates.',timeline:[['2005','Critical Care Medicine study quantifies high first-day ICU costs'],['2015','Annals ATS shows daily cost patterns differ for medical vs surgical ICU patients'],['2024','KFF/AHA: ~$3,449 nonprofit and ~$2,623 for-profit per inpatient day']],rel:['hospital-chargemaster','us-admin-costs','cost-of-advil','care-per-dollar','medical-debt'],enelNote:'The per-day figure is one of the more reliable cost benchmarks available because it comes from the American Hospital Association\'s standardized survey data, compiled neutrally by KFF, but readers should keep two cautions in mind: these are the hospital\'s costs, not the patient\'s bill, and the standard measure folds in some outpatient activity. The gap between nonprofit and for-profit hospitals and the higher cost of intensive care are well documented in peer-reviewed work. International comparisons should be read as rough direction rather than precise figures, given the different definitions of a hospital day. We present these benchmarks for information, without endorsing any conclusion about whether a given cost level is justified.',enel:true},
{i:'us-admin-costs',n:'US Health Care Admin Costs',fn:'How much US health spending goes to billing/admin',tier:1,ts:72,sig:'stable',hot:false,ev:5,cats:['pricing','us-system','comparative'],cls:'System overhead',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:4,parts:'National health-expenditure datasets for US and Canada; micro-costing of billing',ctry:'United States',geo:[['United States',100]],disc:2003,discr:'Himmelstein and Woolhandler NEJM US-Canada administrative-cost comparison, 2003; updated Annals 2020',tag:'A large share of every health dollar goes to paperwork and overhead and never reaches actual care.',facts:[['Share of US health spending that went to administration, 2017','34.2% (Annals of Internal Medicine, 2020)'],['US administrative cost per person','$2,497 versus $551 in Canada (2017)'],['Share of a hospital\'s revenue spent on administration','About 19% (Congressional Budget Office, 2020)'],['US spending on billing and insurance paperwork, 2018','About $195 billion (hospitals plus doctors)']],brief:'How much the US spends on health care administration depends on what you count. Administrative cost here means the paperwork and overhead of running insurance and billing, not direct patient care. A narrower measure that counts only billing-and-insurance-related work puts it in the mid-teens to roughly 25 percent of spending, while the broadest accounting goes higher: Himmelstein, Woolhandler and colleagues (Annals of Internal Medicine, 2020) found administration ate up 34.2 percent of US health spending in 2017, about twice Canada\'s share, equal to $2,497 per person versus $551. A 2020 Congressional Budget Office analysis of a single-payer system estimated hospitals spend about 19 percent of their revenue on administration and private insurers keep about 16 percent of premiums, identifying roughly $528 billion a year in excess administrative cost compared with a single-payer alternative. Detailed bottom-up studies found US hospitals and doctors\' offices together spent about $195 billion on billing and insurance paperwork in 2018. The common thread across studies is the complexity of having many different insurers: coding, claims, getting procedures pre-approved, checking eligibility, and chasing payments. Traditional Medicare\'s overhead is often cited at around 2 percent, against roughly 12 percent for private insurers, though analysts note Medicare passes some of that work onto providers.',uses:['Measures the share of US health spending that goes to administration and billing rather than care','Frames the single-payer versus many-insurers overhead debate with evidence-based ranges'],risk:'Estimates hinge on what counts as administration, so the 34.2 percent figure (broad) and the mid-teens billing-and-insurance figures (narrow) do not contradict each other; they measure different things. The Medicare 2 percent comparison is disputed because Medicare spends far more per person (making its percentage look smaller) and some of its administrative work is done elsewhere. Single-payer savings estimates are projections of a hypothetical, not results that were actually observed.',mf:[['US health administration costs are a rounding error','Estimates run from the mid-teens (the narrow billing-and-insurance measure) to 34.2% of all spending (the broad measure, Annals 2020), far above comparable single-payer countries.'],['Medicare\'s 2% overhead proves a single-payer system would be cheaper','The comparison is disputed: Medicare spends far more per person, which shrinks its percentage, and some of its administrative work is handed off to providers and other agencies.']],adv:[{n:'Annals of Internal Medicine (Himmelstein and Woolhandler, 2020)',r:'Peer-reviewed US-Canada comparison',paid:false,note:'34.2% of US spending administrative; $2,497 vs $551 per capita.'},{n:'Congressional Budget Office (2020 single-payer report)',r:'Nonpartisan federal analysis',paid:false,note:'~19% hospital admin; ~$528B excess admin vs single-payer.'},{n:'BMC Health Services Research (BIR micro-costing)',r:'Peer-reviewed cost synthesis',paid:false,note:'Physician BIR ~13% of revenue; bottom-up estimates.'}],counter:[{n:'America\'s Health Insurance Plans',cred:'Insurer trade association',q:'Administrative spending pays for coordinating care, preventing fraud, and quality programs, not pure waste, and Medicare\'s low overhead reflects costs shifted to other agencies.'},{n:'Methodological critics of the 2% figure',cred:'Health policy analysts',q:'Comparing Medicare\'s overhead percentage to private insurers is misleading because they spend very different amounts per person and Medicare offloads some functions.'}],history:'Research on US administrative excess dates to Himmelstein and Woolhandler\'s 1991 and 2003 studies, updated in 2020; the CBO modeled single-payer administrative effects in 2020.',timeline:[['2003','NEJM: US administration far exceeds Canada\'s (Himmelstein, Woolhandler)'],['2018','US hospitals + physicians spend ~$195B on billing-related activity'],['2020','Annals: 34.2% of US health spending is administrative (2017 data)'],['2020','CBO single-payer analysis estimates ~$528B excess administrative cost']],rel:['hospital-chargemaster','cost-of-advil','hospital-bed-night','medical-debt','care-per-dollar','us-drug-pricing'],enelNote:'Administrative cost is among the best-studied features of US health spending, which is why we rate the evidence highly, but the single most-quoted number (34.2 percent) sits at the broad end of a range that runs down to the mid-teens for the narrow billing-and-insurance measure; both are legitimate measures of different things. The gap with Canada holds up across many studies and decades. We deliberately include the insurers\' point that some administrative spending pays for coordination and oversight, and we flag that single-payer savings figures are projections of a hypothetical. This entry is informational and takes no position on which way of paying for health care is preferable.',enel:true},
{i:'medical-debt',n:'US Medical Debt',fn:'Medical debt in the United States',tier:1,ts:80,sig:'hot',hot:true,ev:4,cats:['trending','us-system','pricing','access'],cls:'Financial burden',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:12,parts:'National household surveys (SIPP, Census, KFF) covering the US adult population',ctry:'United States',geo:[['United States',100]],disc:2022,discr:'KFF Health News and NPR Diagnosis: Debt investigation, 2022',tag:'At least $220 billion is owed; by a broad count, about 100 million Americans carry some kind of health-care debt.',facts:[['Total medical debt (US Census income survey, end of 2021)','At least $220 billion (KFF, a nonpartisan health-policy group)'],['Adults carrying medical debt','About 20 million, nearly 1 in 12'],['Broader count of health-care debt of all kinds','About 100 million people, or 41% of adults'],['Medical debts removed from credit reports','About 70%, after a rule erased balances under $500 (2023)']],brief:'Looking at the Census Survey of Income and Program Participation (SIPP, a US Census survey that tracks household income and use of government programs), Americans owed at least $220 billion in medical debt as of December 2021, with roughly 20 million adults (nearly 1 in 12) carrying it (KFF, a nonpartisan health-policy research group, 2022). A broader KFF-NPR count that also includes medical bills people put on credit cards or borrowed from family put the figure near 100 million people, or about 41 percent of adults. The debt is heavily concentrated: KFF reported that 0.3 percent of adults owe more than half of the total. How much medical bills drive bankruptcy is disputed: Himmelstein and colleagues estimated 62.1 percent of 2007 bankruptcies were medical (Health Affairs, 2009), while Dranove and Millenson put the share where medical bills played a part closer to 17 percent (Health Affairs, 2006). Starting in July 2022 the three nationwide credit bureaus removed paid medical collections from credit reports, and by April 2023 they removed balances under $500, wiping out about 70 percent of medical-debt entries on those reports.',uses:['The size of US medical debt, how it is measured, and how policy has treated it'],risk:'Estimates differ by definition and data source: the $220 billion Census survey figure leaves out debt people shifted to credit cards or relatives, while broader measures capture those and come out higher. The bankruptcy share is methodologically disputed and, in some studies, self-reported. The figures are presented to inform, not to argue a side; reasonable analysts disagree on causes and remedies.',mf:[['Medical bills cause most US bankruptcies','Estimates range widely: Himmelstein et al. put medical bankruptcies at 62.1% (2009), while Dranove and Millenson estimated medical bills played a part in about 17% (2006).'],['Medical debt is a small, niche problem','A broad KFF-NPR count found about 100 million people, 41% of adults, carry some form of health-care debt.']],adv:[{n:'KFF (Kaiser Family Foundation)',r:'Health policy research organization',paid:false,note:'The Burden of Medical Debt in the United States, 2022.'},{n:'US Census Bureau',r:'Federal statistical agency',paid:false,note:'SIPP data on household medical debt, 2021.'},{n:'Consumer Financial Protection Bureau',r:'Federal regulator',paid:false,note:'Analysis of medical-debt credit-reporting changes, 2023.'}],counter:[{n:'David Dranove and Michael Millenson',cred:'Northwestern University (Kellogg) scholars',q:'Re-examined the data and estimated medical bills played a part in roughly 17% of personal bankruptcies, far below the 62% figure (Health Affairs, 2006).'}],history:'Medical debt grew as a measured phenomenon alongside rising cost-sharing and high-deductible plans in the 2000s and 2010s. The 2022 KFF-NPR Diagnosis: Debt project reframed it as a roughly 100-million-person issue. In 2022 and 2023 the major credit bureaus and the CFPB acted to limit its appearance on credit reports.',timeline:[['2006','Dranove and Millenson dispute high medical-bankruptcy estimates (Health Affairs)'],['2009','Himmelstein et al. estimate 62.1% of 2007 bankruptcies were medical (Health Affairs)'],['2021','SIPP measures at least $220 billion in medical debt'],['2022','KFF-NPR Diagnosis: Debt; credit bureaus begin removing paid and recent medical collections'],['2023','Medical collections under $500 removed from credit reports']],rel:['us-health-taxation','us-outcomes-vs-spend','us-healthcare-overview','care-per-dollar','monetization-over-time','global-access-equity'],enelNote:'Medical debt is reported here as an objective marker, with figures attributed to KFF, the Census Bureau, and the Consumer Financial Protection Bureau. Both the narrower $220 billion Census survey estimate and the broader 100-million-person count are shown so readers can see how the definition changes the picture. The bankruptcy question is presented with named estimates on both sides rather than a single number. Ēnel takes no position on policy responses; the entry is informational and not financial advice.',enel:true},
{i:'us-health-taxation',n:'How the US Funds Health via Taxation',fn:'US health financing through taxation',tier:1,ts:68,sig:'rising',hot:false,ev:4,cats:['us-system','pricing','history'],cls:'Public financing',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:9,parts:'US federal and state budgets and the national health expenditure accounts',ctry:'United States',geo:[['United States',100]],disc:1965,discr:'Enactment of Medicare and Medicaid, 1965',tag:'Counting taxes plus tax breaks, government pays for roughly half of all US health care.',facts:[['Basic Medicare payroll tax','2.9% of wages total, split between employer and employee'],['Extra Medicare tax on high earners','0.9% on wages above $200,000 (single) or $250,000 (joint), since 2013'],['Federal revenue given up through health tax breaks','About $398 billion (KFF, fiscal year 2024)'],['Federal government\'s share of all US health spending','About 32% (CMS national health expenditure accounts, 2023)']],brief:'The US pays for health care through a mix of dedicated taxes, general tax revenue, and tax breaks rather than one single system. Medicare Part A (the part covering hospital stays) is funded mainly by the Hospital Insurance payroll tax of 2.9 percent of wages (1.45 percent paid by the employer and 1.45 percent by the employee), plus an extra 0.9 percent on wages above $200,000 for single filers and $250,000 for joint filers, added in 2013 under the Affordable Care Act (IRS, 2025). The federal government spent about $1.9 trillion on health programs in fiscal year 2024, including roughly $839 billion on Medicare and $584 billion in federal funding for Medicaid and the Children\'s Health Insurance Program (KFF, 2024). A large indirect subsidy comes from not taxing the value of employer-provided health insurance as income; that tax break plus part of the ACA\'s premium help meant the government collected about $398 billion less in revenue in fiscal year 2024. Broken down by who pays, CMS (the US Centers for Medicare and Medicaid Services) estimated the federal government covered about 32 percent of all US health spending in 2023, households about 27 percent, private businesses about 18 percent, and state and local governments about 16 percent. Adding direct public spending and the tax breaks together, government\'s role in paying for US health care approaches roughly half. (GDP, gross domestic product, is the total value of everything a country produces in a year, a common yardstick for the size of such spending.)',uses:['The tax and budget machinery that pays for US health care'],risk:'How big the public share looks depends on whether you count tax breaks and the government\'s own role as an employer providing insurance; different conventions give answers from roughly one-third to over one-half. The value of tax breaks is a projection that shifts from year to year. The entry describes the machinery neutrally and takes no position on the merits of any way of funding health care.',mf:[['US health care is privately funded','Counting direct public spending plus the tax break for employer insurance, government pays for close to half of US health care; the federal share alone was about 32% in 2023 (CMS).'],['Tax breaks for health are minor','The tax break for employer insurance plus ACA premium help meant about $398 billion in revenue given up in fiscal year 2024 (KFF), one of the largest federal tax breaks of any kind.']],adv:[{n:'CMS National Health Expenditure Accounts',r:'Official payer/sponsor statistics',paid:false,note:'Source for the federal/household/business/state shares (2023).'},{n:'KFF',r:'Health policy research organization',paid:false,note:'What Does the Federal Government Spend on Health Care?, 2024.'},{n:'Internal Revenue Service',r:'Federal tax authority',paid:false,note:'Medicare withholding rates, 2025.'}],counter:[{n:'Congressional Budget Office',cred:'Nonpartisan federal budget analyst',q:'Has scored options to limit the tax break for employer insurance, noting its large revenue effect but also the trade-offs for who pays and for coverage (2024).'}],history:'Federal tax financing of health expanded sharply with Medicare and Medicaid in 1965, funded by payroll taxes and general revenue. The employer-insurance tax exclusion, rooted in the World War II era and a 1954 tax-code provision, grew into the single largest federal tax expenditure. The ACA added the 0.9 percent high-earner Medicare surtax and premium tax credits beginning in 2013 and 2014.',timeline:[['1954','Tax code formalizes exclusion of employer health premiums from income'],['1965','Medicare and Medicaid enacted; Hospital Insurance payroll tax created'],['2013','Additional 0.9% Medicare tax on high earners takes effect (ACA)'],['2014','ACA premium tax credits begin'],['2024','ESI and ACA tax subsidies forgo about $398 billion in federal revenue (KFF)']],rel:['medical-debt','us-outcomes-vs-spend','us-healthcare-overview','medicare','aca-obamacare','care-per-dollar','monetization-over-time'],enelNote:'This entry explains the plumbing of how the US pays for health care, with figures attributed to CMS, KFF, and the IRS, and named years. It deliberately shows that the public share ranges depending on whether you count tax breaks and the government\'s role as an employer, rather than asserting one number. Payroll-tax rates and income thresholds are stated as published by the IRS. Ēnel presents these mechanisms neutrally and takes no view on whether any approach to funding is preferable; the content is informational, not tax advice.',enel:true},
{i:'us-outcomes-vs-spend',n:'US Outcomes vs Spending',fn:'US health outcomes relative to spending',tier:1,ts:90,sig:'hot',hot:true,ev:5,cats:['trending','comparative','access'],cls:'Comparative performance',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:15,parts:'Cross-national comparisons across ~10 high-income countries plus US vital statistics',ctry:'United States',geo:[['United States',70],['Other high-income',30]],disc:2004,discr:'Commonwealth Fund Mirror, Mirror comparative series, first edition 2004',tag:'The US spends the most on health care but has a shorter average lifespan, even as its cancer survival ranks among the best. The evidence cuts both ways.',facts:[['Share of the whole economy spent on health (the economy\'s total yearly output is called GDP, or gross domestic product)','17.6% in 2023 (CMS, the federal Centers for Medicare and Medicaid Services)'],['Average lifespan from birth','78.4 years in 2023 (CDC, the federal Centers for Disease Control and Prevention)'],['Deaths of mothers from pregnancy or childbirth','22.3 per 100,000 in 2022 (CDC)'],['Share of breast-cancer patients still alive 5 years after diagnosis','About 90.2% (CONCORD-3, 2010-14)']],brief:'This entry asks a simple question: the US spends more on health care than any comparable wealthy country, so what does it get for the money? The answer is mixed. CMS, the federal Centers for Medicare and Medicaid Services, reported that US health spending reached $4.9 trillion in 2023, equal to 17.6 percent of GDP (gross domestic product, the total yearly value of everything the economy produces). Yet the CDC, the federal Centers for Disease Control and Prevention, put US average lifespan at 78.4 years in 2023, among the lowest of wealthy nations, and the Commonwealth Fund (a health policy research foundation) ranked the US last overall among ten countries in its 2024 Mirror, Mirror report, which scores health systems on outcomes, access, and fairness.
