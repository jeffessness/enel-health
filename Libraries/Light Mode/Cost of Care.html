 US deaths of mothers from pregnancy or childbirth were 22.3 per 100,000 live births in 2022, more than triple the rate in countries such as the Netherlands and Norway, and the death rate for infants in their first year was about 5.4 per 1,000 in 2020, the highest among the countries compared. On the other side, the CONCORD-3 study (a peer-reviewed global cancer-survival study published in the journal The Lancet in 2018) found that US cancer patients are among the most likely in the world to still be alive five years after diagnosis, including about 90.2 percent of those with breast cancer diagnosed between 2010 and 2014. The US is also a leading place for medical innovation and tends to have shorter waits for non-emergency procedures than several peer countries. But the gap in deaths that timely care could have prevented stays wide: about 160 such deaths per 100,000 people in the US versus roughly 45 to 57 in Switzerland, Sweden, and the Netherlands (Commonwealth Fund, 2024).',uses:['Sets US health spending next to its health results, the good and the bad, side by side'],risk:'Comparing countries is tricky because they count things differently. How a death of a mother is recorded, how much average lifespan is dragged down by non-medical causes such as injuries and drug overdoses, and the fact that earlier cancer screening can make survival look longer simply because the clock starts sooner, all shift the rankings. The US strengths (cancer survival, innovation, short waits) and weaknesses (lifespan, deaths of mothers and infants, preventable deaths) are presented together and each is attributed to a named source. None is offered as a final judgment on any policy.',mf:[['Because the US spends the most, it must get the best results overall','The US ranks last overall among ten wealthy countries on outcomes, access, and fairness (Commonwealth Fund 2024) despite spending the most.'],['US care is the worst by every measure','On treatment-specific measures such as five-year cancer survival, the US ranks among the best in the world (CONCORD-3, 2018). The picture is mixed, not uniformly bad.']],adv:[{n:'Commonwealth Fund',r:'Health policy research foundation',paid:false,note:'Mirror, Mirror 2024 and US Health Care from a Global Perspective.'},{n:'CDC National Center for Health Statistics',r:'Federal vital-statistics agency',paid:false,note:'Mortality and maternal-mortality reports, 2024.'},{n:'CONCORD-3 (Allemani et al., Lancet)',r:'Peer-reviewed global cancer-survival study',paid:false,note:'Worldwide 5-year cancer survival, 2018.'}],counter:[{n:'Analysts citing non-system factors',cred:'Health economists and researchers',q:'They argue that the US lifespan gap partly reflects drug overdoses, gun deaths, and car crashes, which lie outside the medical system, so comparisons of spending to results should be read with care.'}],history:'International comparisons of US health performance gained prominence with the Commonwealth Fund Mirror, Mirror series beginning in 2004 and OECD Health at a Glance reporting. Over two decades the recurring pattern has been high US spending alongside mid-to-low population outcomes, even as treatment-specific metrics such as cancer survival ranked near the top.',timeline:[['2018','CONCORD-3 reports US among highest 5-year cancer survival (Lancet)'],['2020','US infant mortality about 5.4 per 1,000, highest among compared nations'],['2022','US maternal mortality 22.3 per 100,000 live births (CDC)'],['2023','US health spending 17.6% of GDP; life expectancy 78.4 years (CMS; CDC)'],['2024','Commonwealth Fund Mirror, Mirror ranks US last overall among 10 countries']],rel:['medical-debt','us-health-taxation','us-healthcare-overview','care-per-dollar','global-access-equity','monetization-over-time'],enelNote:'This entry deliberately places good and bad measurable facts side by side: high spending and weaker results on lifespan, deaths of mothers and infants, and preventable deaths, set against top-tier cancer survival, innovation, and short waits. Each is attributed to CMS (the federal Centers for Medicare and Medicaid Services), the CDC (the federal Centers for Disease Control and Prevention), the Commonwealth Fund, or CONCORD-3, with the year named. A counterpoint notes that non-medical factors such as overdoses and injuries affect US lifespan comparisons. Ēnel draws no political conclusion; the material is informational and is not medical or policy advice.',enel:true},
{i:'us-drug-pricing',n:'US Prescription Drug Pricing',fn:'Why the US pays the most for prescription drugs',tier:1,ts:86,sig:'hot',hot:true,ev:5,cats:['trending','us-system','pricing'],cls:'Drug pricing system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:4,parts:'33 OECD comparison nations; US national pricing data through 2022',ctry:'United States',geo:[['United States',85],['Other OECD',15]],disc:2024,discr:'RAND international price comparison published February 2024',tag:'Americans pay about 2.78 times what other wealthy nations pay for drugs overall, and 4.22 times more for brand-name drugs.',facts:[['US prices vs other wealthy nations, all drugs','2.78 times higher on average (RAND, a nonprofit research organization, 2024)'],['US prices vs others, brand-name drugs','4.22 times higher on average (RAND, 2024)'],['US prices for generic drugs (lower-cost copies of drugs whose patents have expired)','67% of the comparison-country average (RAND, 2024)'],['First negotiated price cut, the diabetes drug Januvia','$527 down to $113, a 79% cut (CMS, the federal Centers for Medicare and Medicaid Services, 2024)']],brief:'This entry explains why the same prescription medicines cost far more in the US than almost anywhere else. A 2024 study by RAND (a nonprofit research organization) using 2022 data found that US drug prices average 2.78 times those in 33 other wealthy nations belonging to the OECD (the Organisation for Economic Co-operation and Development, a club of mostly high-income countries that share economic data), and 4.22 times higher for brand-name drugs specifically. Even after RAND lowered the US figure to account for confidential rebates (after-the-fact discounts drugmakers quietly pay back to insurers and middlemen), US brand prices still ran more than three times those abroad. The story differs for generic drugs, which are lower-cost copies of medicines whose patents have expired and which make up about 90 percent of US prescriptions: those run cheaper in the US, at roughly 67 percent of the comparison-country average. The high US prices are driven mainly by brand-name drugs protected by patents and other exclusive selling rights, with prices set by manufacturers rather than negotiated for the whole country. That began to change with the Inflation Reduction Act of 2022, which for the first time let Medicare (the federal health insurance program for people 65 and older) negotiate prices. CMS, the federal Centers for Medicare and Medicaid Services, announced negotiated prices for the first 10 high-spending drugs, effective January 1, 2026, cutting 38 to 79 percent off 2023 list prices. On insulin, the three big makers cut their list prices 50 to 80 percent in 2024, and the new law caps what Medicare patients pay for insulin at $35 a month.',uses:['Why identical medicines cost far more in the US than abroad','How patents, exclusive selling rights, and the gap between sticker price and actual paid price shape what buyers pay'],risk:'Cross-country price comparisons depend heavily on method (whether prices are weighted by how much of each drug is sold, and which exchange rates are used) and on confidential rebates that make the true US net price impossible to see directly. RAND starts from list (sticker) prices and adjusts them with estimated discounts, so the exact multiple is uncertain. The negotiated Medicare prices apply only to selected drugs and only to Medicare, not to private insurance.',mf:[['High US prices reflect higher US manufacturing or research costs paid here','RAND attributes the gap mainly to the absence of nationwide price negotiation and to brand-name exclusivity, not to US-specific production costs (RAND, 2024).'],['The list (sticker) price is what buyers actually pay','Net prices after rebates can differ a lot from the list price; for brand-name drugs the gap between sticker and actual price is large.']],adv:[{n:'RAND Corporation',r:'Federally funded research report',paid:false,note:'2024; 2.78x and 4.22x figures, 2022 data.'},{n:'CMS Medicare Drug Price Negotiation Program',r:'Federal agency',paid:false,note:'2024; first 10 negotiated prices, 38-79% cuts.'},{n:'KFF Health News',r:'Independent health policy org',paid:false,note:'2024; corroborates US pays roughly double or more.'}],counter:[{n:'Pharmaceutical industry (PhRMA)',cred:'Industry trade group',q:'Argues that higher US prices fund medical innovation worldwide and that net prices after rebates are well below the list price.'}],history:'US drug pricing evolved without centralized negotiation; the 2003 Medicare Modernization Act expressly barred Medicare from negotiating, a prohibition partially reversed by the 2022 Inflation Reduction Act.',timeline:[['2003','Medicare Part D created with non-interference clause barring negotiation'],['2022','Inflation Reduction Act authorizes Medicare drug price negotiation'],['2023','Insulin cost-sharing capped at $35/month for Medicare enrollees'],['2024','RAND reports US prices 2.78x OECD; CMS announces first 10 negotiated prices'],['2026','First negotiated maximum fair prices take effect January 1']],rel:['pbms','hospital-chargemaster','medicare','cost-of-advil','monetization-over-time'],enelNote:'Ēnel presents these figures to inform, not to push a policy. The price multiples vary with method, and confidential rebates mean published US sticker prices overstate what big buyers actually pay; the true gap is smaller but, by RAND\'s estimate, still large for brand-name drugs. Medicare negotiation is new and narrow, affecting selected drugs for one program. Readers should note who is being measured (patients, insurers, or Medicare), whether the figure is a sticker price or a net price, and the year of the data.',enel:true},
{i:'pbms',n:'Pharmacy Benefit Managers',fn:'The middlemen who manage drug benefits and prices',tier:1,ts:84,sig:'hot',hot:true,ev:5,cats:['trending','us-system','pricing'],cls:'Drug supply chain intermediary',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:2,parts:'FTC 6(b) study of the three largest PBMs; 51 specialty generic drugs, 2017-2022',ctry:'United States',geo:[['United States',100]],disc:2024,discr:'FTC interim staff report on prescription drug middlemen, July 2024',tag:'Three middlemen companies (called PBMs) handle about 80 percent of all US prescriptions.',facts:[['Share of prescriptions handled by the top 3 PBMs','~80% of 6.6 billion in 2023 (FTC, the federal Federal Trade Commission, 2024)'],['Share handled by the top 6 PBMs','Over 90% (FTC, 2024)'],['Revenue the big PBMs took above what the drugs cost them, for specialty generic drugs','$7.3 billion, 2017-2022 (FTC, 2025)'],['Specialty generic drugs marked up more than 1,000% over cost','More than 1 in 5 (FTC, 2025)']],brief:'This entry explains a powerful but little-understood middleman in US drug costs: the pharmacy benefit manager, or PBM, the company that runs the drug side of your insurance. PBMs decide which drugs a plan covers (the formulary, or approved drug list), negotiate rebates (after-the-fact discounts from drugmakers), and pay pharmacies. A report by the FTC, the federal Federal Trade Commission (the government\'s competition and consumer-protection agency), published July 9, 2024, found that the three largest PBMs handled nearly 80 percent of the roughly 6.6 billion prescriptions filled in the US in 2023, and the top six handled more than 90 percent. The big three are Caremark (owned by CVS Health, which also owns the insurer Aetna), Express Scripts (owned by Cigna), and OptumRx (owned by UnitedHealth Group). Each is part of a larger company that also owns an insurer and pharmacies, an arrangement called vertical integration, where one company controls multiple links in the same chain. A second FTC report, published January 14, 2025, found that the big three and their own specialty pharmacies took in more than $7.3 billion above what the drugs actually cost them between 2017 and 2022, marked up more than one in five specialty generic drugs by over 1,000 percent, and earned an additional $1.4 billion from spread pricing (billing the health plan more than they pay the pharmacy and keeping the difference). The agency sued the three largest PBMs in September 2024 over their handling of insulin rebates.',uses:['How a hard-to-see middleman shapes which drugs your insurance covers','How rebates and spread pricing affect what plans and patients pay'],risk:'The FTC reports are staff findings from an investigation (a so-called 6(b) study), not court rulings, and PBM trade groups dispute how they are framed, arguing that PBMs lower overall costs by negotiating discounts. The figures cover specific drug categories and a set time window, so they should not be read as the total effect of PBMs on all drug spending.',mf:[['PBMs simply pass manufacturer rebates straight through to lower what patients pay','The FTC found that rebate and coverage arrangements can favor drugs with higher sticker prices and bigger rebates, and that spread pricing and markups generated billions in PBM revenue (FTC 2024, 2025).'],['The PBM market has many competing players','Three vertically integrated firms handle about 80 percent of prescriptions and six handle over 90 percent (FTC, 2024).']],adv:[{n:'FTC (Powerful Middlemen interim report)',r:'Federal agency',paid:false,note:'July 2024; 80% share, vertical integration findings.'},{n:'FTC (Specialty Generic Drugs report)',r:'Federal agency',paid:false,note:'January 2025; $7.3B markups, 1,000%+ on over 1 in 5.'},{n:'KFF',r:'Independent health policy org',paid:false,note:'Corroborates market concentration and policy context.'}],counter:[{n:'Pharmaceutical Care Management Association',cred:'PBM industry trade group',q:'Contends that PBMs reduce overall drug costs for plans and patients and that the FTC reports rely on cherry-picked examples.'}],history:'PBMs began as claims processors in the 1960s-70s, consolidated through mergers, and integrated with insurers and pharmacies; major deals include CVS-Caremark (2007), Express Scripts-Medco (2012), and Cigna-Express Scripts (2018).',timeline:[['2007','CVS acquires Caremark'],['2018','Cigna acquires Express Scripts; CVS acquires Aetna'],['2024','FTC issues first interim report (July) and sues Big 3 PBMs (September)'],['2025','FTC second interim report details specialty generic markups']],rel:['us-drug-pricing','hospital-chargemaster','medicare','us-admin-costs','monetization-over-time'],enelNote:'Ēnel reports the FTC findings as documented evidence while noting that they are staff findings from an ongoing investigation, not court rulings, and that the PBM industry contests them. The clearly established facts are concentration (about three firms handle roughly 80 percent of prescriptions) and vertical integration with insurers and pharmacies; the disputed question is whether this structure raises or lowers overall costs. Spread pricing and specialty markups are documented in specific categories, not measured across all drugs. Readers should separate the undisputed structural facts from contested interpretations of the net effect.',enel:true},
{i:'hospital-chargemaster',n:'The Hospital Chargemaster',fn:'Hospital list prices and how they detach from cost',tier:1,ts:70,sig:'rising',hot:false,ev:4,cats:['us-system','pricing'],cls:'Hospital pricing system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:3,parts:'1,599 hospitals across 14 common services; HHS OIG audit of 100 hospitals',ctry:'United States',geo:[['United States',100]],disc:2022,discr:'Linde and Egede price-variation study published 2022',tag:'Hospitals set sticker prices far above what care actually costs, then discount them unevenly, so the same service ends up with three different prices.',facts:[['How much hospital charges exceed their actual costs','About 3.4 times cost (2022)'],['Sticker (list) price vs the price insurers negotiate','164% higher on average (2022)'],['Cash price (for the uninsured) vs the negotiated price','60% higher on average (2022)'],['Hospitals breaking the federal price-transparency rule','37 of 100 audited (HHS OIG, the Health and Human Services Office of Inspector General, 2024)']],brief:'This entry explains the chargemaster, a hospital\'s master price list for every item and service it provides. Hospitals set these prices internally, and they have little to do with what the care actually costs. There are really three prices for the same service: the list price (the chargemaster sticker price, which almost no one pays in full), the negotiated price (what an insurer has bargained down to), and the cash price (a discounted rate for people paying out of pocket). A peer-reviewed 2022 study of 1,599 hospitals across 14 common services found that list prices averaged 164 percent higher than the prices insurers negotiated, while cash prices averaged 60 percent higher than negotiated prices (Linde and Egede, 2022). Other research on the ratio of charges to costs found the average hospital charges about 3.4 times what its care costs, with some charging more than ten times. For-profit hospitals priced about 39 percent higher than government-owned ones in the same study. Starting January 1, 2021, a federal Hospital Price Transparency rule required hospitals to publish their list prices, cash prices, and the specific rates negotiated with each insurer. Compliance has been spotty: a November 2024 audit by the HHS OIG (the Health and Human Services Office of Inspector General, the watchdog inside the federal health department) found that 37 of 100 hospitals sampled failed at least one key requirement.',uses:['Why the charge on a hospital bill rarely matches what insurers or cash-paying patients actually pay','How transparency rules let patients compare negotiated, cash, and list prices'],risk:'Chargemaster prices are sticker prices that few people pay in full; insured patients pay negotiated rates and many uninsured patients get discounts, so the charges overstate what people typically pay. Compliance estimates depend on how the audit is done and on the shifting definition of which services patients can shop for in advance.',mf:[['The chargemaster sticker price is what most patients pay','Insurers pay negotiated rates roughly 60 to 164 percent below the list price, and cash prices are also discounted from the charges (2022).'],['List prices reflect what it actually costs to provide care','Charges average about 3.4 times cost and can exceed 10 times, with wide variation unrelated to actual cost (2022).']],adv:[{n:'Linde and Egede (price transparency study)',r:'Peer-reviewed study',paid:false,note:'2022; 1,599 hospitals; 164% list and 60% cash premiums over negotiated.'},{n:'HHS Office of Inspector General',r:'Federal oversight body',paid:false,note:'November 2024; 37 of 100 noncompliant.'},{n:'CMS Hospital Price Transparency rule',r:'Federal regulation',paid:false,note:'Effective January 1, 2021; required charge disclosures.'}],counter:[{n:'American Hospital Association',cred:'Hospital industry trade group',q:'Argues that chargemaster prices are not what patients actually owe and that the requirement to publish machine-readable price files is burdensome and of little use to ordinary patients.'}],history:'Chargemasters grew in the era of cost-plus reimbursement and persisted as a billing reference even after payers shifted to negotiated and prospective payment, leaving list prices increasingly disconnected from cost.',timeline:[['2019','CMS finalizes hospital price transparency requirements'],['2021','Transparency rule takes effect January 1'],['2022','Peer-reviewed study quantifies list, cash, and negotiated price gaps'],['2024','HHS OIG audit finds widespread noncompliance']],rel:['hospital-bed-night','us-drug-pricing','us-admin-costs','care-per-dollar','cost-of-advil'],enelNote:'Ēnel presents the chargemaster as a documented feature of US hospital billing without endorsing a fix. The established core is that list prices sit well above negotiated and cash prices, and above cost, and that compliance with the transparency rule is still partial according to the federal audit. The key caveat is that chargemaster figures are not what most patients actually pay; quoting a sticker charge as a real cost would mislead. Readers comparing hospital prices should check which of the three prices is being cited and the year.',enel:true},
{i:'eu-healthcare',n:'European Health Systems',fn:'How Europe organizes and pays for universal care',tier:1,ts:78,sig:'stable',hot:false,ev:5,cats:['europe','comparative','pricing','access'],cls:'Health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:6,parts:'27 EU member states plus wider OECD Europe',ctry:'European Union',geo:[['Western Europe',45],['Northern Europe',20],['Southern Europe',20],['Central and Eastern Europe',15]],disc:1883,discr:'Bismarck social insurance, Germany 1883',tag:'Two ways of paying for care, the Bismarck and Beveridge models, with one shared goal: cover everyone.',facts:[['Share of the whole economy spent on health, 2022 (the economy\'s total yearly output is called GDP)','10.4% (OECD, a club of mostly wealthy nations, 2024)'],['Health spending per person, 2022','EUR 3,685, adjusted so currencies buy the same amount across countries (Eurostat, the EU\'s statistics office, 2024)'],['Average lifespan from birth, 2023','81.5 years (OECD 2024)'],['Share of population aged 65 and over, 2023','Over 21%, up from 16% in 2000']],brief:'This entry explains how European countries pay for health care that covers everyone, and the two main approaches they use. The first is the Bismarck model (named after the 19th-century German chancellor Otto von Bismarck), in which workers and employers pay into nonprofit insurance pools called sickness funds; Germany, France, and the Netherlands use this approach. The second is the Beveridge model (named after British economist William Beveridge), in which care is paid for out of general taxes through a single government payer; the United Kingdom, Sweden, Italy, and Spain use this one. Both descriptions follow the OECD (the Organisation for Economic Co-operation and Development, a club of mostly wealthy countries) Health at a Glance Europe 2024. Across the EU, health spending was 10.4 percent of GDP (gross domestic product, the total yearly value of everything the economy produces) in 2022, down from 10.9 percent in 2021 as pandemic emergency support ended, equal to about EUR 3,685 per person once adjusted so that a euro buys the same amount of care in each country (Eurostat, the EU\'s statistics office, 2024). Every EU member covers all or nearly all of its people, and average lifespan in the EU reached 81.5 years in 2023, though an eight-year gap separates the highest and lowest member states. Europe holds costs down through fixed hospital budgets, set fee schedules, and centralized drug-price negotiation rather than letting the market set prices. The pressures are similar everywhere: aging populations, staff shortages estimated at roughly 1.2 million health workers in 2022, and backlogs of care built up during COVID-19. Neither funding model, on its own, reliably produces better health results.',uses:['A framework for comparing how wealthy nations pay for universal coverage and hold down costs'],risk:'Country averages hide wide differences in access, waiting times, and results; sorting systems into Bismarck or Beveridge is a simplification, since many now mix features of both. The figures are from 2022 to 2023, and pandemic effects distort year-to-year comparisons.',mf:[['All European systems are basically the same single-government-payer model','They split into Bismarck (worker-and-employer insurance funds) and Beveridge (tax-funded) traditions, and many now blend both (OECD 2024).'],['Universal coverage means no waiting and no unmet need','Coverage on paper still coexists with waiting times and regional gaps across both models.']],adv:[{n:'OECD / European Commission',r:'Health at a Glance Europe 2024',paid:false,note:'Spending and outcome comparisons.'},{n:'Eurostat',r:'EU statistical office',paid:false,note:'Per-capita spending in purchasing power standards, 2022.'}],counter:[{n:'Sustainability analysts',cred:'Public-finance economists',q:'Point to rising long-term care and pension costs alongside health spending, which raise questions about whether the finances hold up as populations age.'},{n:'Access critics',cred:'Patient advocacy groups',q:'Coverage on paper does not eliminate waiting times, regional gaps, or unmet need.'}],history:'Origins trace to Germany\'s 1883 social insurance law (Bismarck) and the United Kingdom\'s 1948 NHS (Beveridge). Postwar Europe extended coverage toward universality through the late 20th century. The 2008 financial crisis prompted austerity-era cost controls, and COVID-19 drove a spending spike followed by retrenchment.',timeline:[['1883','Germany enacts the first statutory social health insurance'],['1948','United Kingdom launches the tax-funded NHS'],['1978','WHO Alma-Ata declaration affirms health for all'],['2022','EU health spending settles at 10.4 percent of GDP post-pandemic'],['2024','OECD flags longevity and workforce gaps']],rel:['uk-nhs','germany-france-nordics','us-healthcare-overview','care-per-dollar','global-access-equity','canada-medicare'],enelNote:'European systems share a commitment to covering everyone but differ in how they raise the money and how they decide what to fund. Bismarck models spread the cost across employers and workers through insurance funds; Beveridge models pay for care from general taxes. Both keep spending below US levels through negotiated prices and fixed budgets, and both report strong average lifespans. The same tools that restrain cost can also create waiting lists and access gaps, and aging populations strain every version. Ēnel presents these as engineering tradeoffs, not verdicts.',enel:true},
{i:'uk-nhs',n:'UK National Health Service',fn:'Tax-funded care free at point of use since 1948',tier:1,ts:76,sig:'rising',hot:false,ev:5,cats:['europe','access','pricing','history'],cls:'Health system',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:6,parts:'UK-wide system serving about 68 million people',ctry:'United Kingdom',geo:[['England',84],['Scotland',8],['Wales',5],['Northern Ireland',3]],disc:1948,discr:'NHS founded by Aneurin Bevan, 5 July 1948',tag:'Free when you use it, paid for by taxes, but strained by long waits for non-urgent care.',facts:[['NHS England budget, 2024-25','GBP 181.4 billion (2024)'],['Founding date','5 July 1948 under health minister Aneurin Bevan'],['England waiting list for non-urgent treatment, end of 2024','About 7.5 million cases waiting'],['Value-for-money threshold used by NICE (Britain\'s National Institute for Health and Care Excellence, which advises the UK health service on which treatments to fund)','GBP 20,000-30,000 for each year of healthy life gained, rising in 2026']],brief:'This entry explains the National Health Service, Britain\'s government-run health system. It launched on 5 July 1948 under health minister Aneurin Bevan and was the first system in the West to give an entire population comprehensive medical care that is free at the point of use, meaning you are not charged when you receive care because it is paid for mainly through general taxes. NHS England\'s protected day-to-day budget rose 4.7 percent to GBP 181.4 billion for 2024 to 2025. Deciding which new treatments are worth funding falls to NICE, Britain\'s National Institute for Health and Care Excellence, which advises the UK health service. NICE weighs a treatment\'s cost against a measure called the quality-adjusted life year, or QALY, which counts one extra year of full health as one unit and adjusts downward for years lived in poor health. NICE generally funds treatments costing up to GBP 20,000 to 30,000 for each such year of healthy life gained, a range set to rise to GBP 25,000 to 35,000 per QALY from April 2026. The system\'s main strain is the wait for non-urgent (elective) treatment: the list reached about 7.5 million cases at the end of 2024, with only 58.9 percent of patients treated within the 18-week target the NHS is supposed to meet, against a goal of 92 percent. The government has pledged to restore the 92 percent standard by March 2029. The NHS pairs low administrative overhead and fair access with chronic shortages of capacity and long waits, both made worse after COVID-19.',uses:['A reference example of a single-government-payer, tax-funded system covering everyone','An example of openly rationing care by cost-effectiveness through NICE'],risk:'The waiting list counts cases, not individual people (about 6.2 million people in 2025, since one person can be on the list for more than one treatment), so the headline number can overstate how many individuals are affected. Budget and list figures change every quarter. The NICE cost threshold is debated and does not capture every kind of value.',mf:[['Free when you use it means the NHS is free overall','It is paid for by taxes; care is free at the moment you use it but funded collectively through general taxation.'],['NICE rationing is arbitrary','NICE uses a published cost-per-healthy-year-gained threshold, an openness many systems lack, even though the exact level is debated.']],adv:[{n:'NHS England',r:'System operator and statistics',paid:false,note:'Waiting-time and budget data.'},{n:'NICE',r:'Cost-effectiveness body',paid:false,note:'QALY threshold framework.'}],counter:[{n:'Pharmaceutical industry (ABPI)',cred:'Industry trade body',q:'Argues that the NICE threshold has not kept up with inflation and should rise to widen access to new medicines.'},{n:'Threshold economists',cred:'Health economics researchers',q:'Some estimate that the NHS\'s true threshold, based on what spending elsewhere has to be given up, is closer to GBP 15,000 per healthy year gained, meaning a higher threshold could cost more health than it adds.'}],history:'The NHS Act 1946 took effect on 5 July 1948, establishing comprehensive, universal, needs-based care. NICE was created in 1999. Austerity after 2010 slowed real budget growth. COVID-19 from 2020 drove elective backlogs to record levels.',timeline:[['1946','National Health Service Act passes'],['1948','NHS opens on the appointed day, 5 July'],['1999','NICE established to assess cost-effectiveness'],['2020','COVID-19 halts elective care and grows the backlog'],['2024','Waiting list near 7.5 million; budget GBP 181.4 billion']],rel:['eu-healthcare','germany-france-nordics','care-per-dollar','us-healthcare-overview','global-access-equity'],enelNote:'The NHS is the clearest large-scale example of tax-funded care, run by a single government payer and free at the point of use. Its strengths are fair access and low administrative cost; its defining strain is the wait for non-urgent care, with the England list near 7.5 million cases at the end of 2024. NICE makes its rationing decisions in the open through a published cost-per-healthy-year-gained threshold, an openness many systems lack but one that draws criticism from both industry and economists. Ēnel treats the NHS as a documented case of the tradeoff between covering everyone and having enough capacity to serve them quickly.',enel:true},
{i:'germany-france-nordics',n:'Germany, France, and the Nordics',fn:'Three European financing models compared',tier:1,ts:68,sig:'stable',hot:false,ev:5,cats:['europe','comparative','access','pricing','history'],cls:'Health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:6,parts:'Germany ~84M, France ~68M, Nordic countries ~27M combined',ctry:'Germany, France, Sweden, Norway, Denmark, Finland',geo:[['Germany',47],['France',38],['Nordic countries',15]],disc:1883,discr:'Bismarck statutory sickness funds, Germany 1883',tag:'Three different ways to pay for health care that all reach nearly everyone: required insurance through public funds, near-universal top-up insurance, and care paid for by taxes.',facts:[['Germany health spending as a share of GDP, the total value of everything a country produces in a year (2023)','About 12.6 to 12.8 percent, the highest in the European Union'],['Germany statutory health insurance coverage, meaning the legally required public insurance (2023)','About 89 percent of people, spread across 96 public insurance funds'],['France top-up insurance (the private \'complementaire\' that pays the part the public system does not)','About 95 percent of people hold it'],['World Health Organization (WHO, the United Nations\' health body) 2000 ranking','France ranked 1st, Germany 25th']],brief:'This entry compares three different ways European countries pay for health care, all of which cover nearly everyone. Germany uses the original \'Bismarck\' model, named after the 1883 law that created legally required public insurance funds called sickness funds. As of December 2023 these funds covered about 89 percent of Germans through 96 competing funds, with the rest in private insurance that replaces the public option; German health spending was about 12.6 to 12.8 percent of GDP (gross domestic product, the total value of everything a country produces in a year) in 2023, the highest in the European Union. France combines required public insurance, which leaves patients owing small co-payments (the share of a bill the patient pays), with near-universal top-up private insurance called a complementaire that covers most of that gap: about 95 percent of residents hold one, public funds paid 80.1 percent of all health spending in 2023, and the money patients paid directly out of their own pockets was just 7.5 percent, among the lowest in the OECD (the Organisation for Economic Co-operation and Development, a group of mostly wealthy nations that compiles comparable statistics); French spending was about 11.9 percent of GDP in 2023. The WHO World Health Report 2000 ranked France first overall and Germany 25th, a famous result but one many experts say was built on questionable methods. The Nordic countries (Sweden, Norway, Denmark, Finland) pay for care mainly through taxes and run it through regional governments, a design known as the Beveridge model; Sweden and Norway each spent about 10.5 percent of GDP in recent years. All reach universal coverage with high public satisfaction, but they differ in how much patients pay and how long they wait.',uses:['A reference point for comparing care paid for through required insurance versus care paid for through taxes, and how each handles the share patients pay themselves'],risk:'The WHO 2000 ranking is widely criticized for its methods and has never been repeated, so it should not be treated as a current scorecard. Spending shares change from year to year and depend on how each source defines them. The Nordic figures are lumped together even though the four countries genuinely differ.',mf:[['France is objectively the best health system because the WHO ranked it first','That single 2000 ranking leaned on disputed scoring choices and estimated, rather than measured, data, and was never repeated; treat it as history, not proof of how things stand now.'],['Reaching everyone requires one single national system','Germany does it through 96 competing public insurance funds, France through required insurance plus top-up insurance, and the Nordic countries through regional taxes.']],adv:[{n:'Commonwealth Fund',r:'International system profiles',paid:false,note:'Germany and France structure and coverage.'},{n:'Eurostat / OECD',r:'EU and OECD statistics',paid:false,note:'Spending shares by country.'}],counter:[{n:'WHO 2000 methodology critics',cred:'Health-measurement researchers',q:'The single combined score that ranked France first relied on disputed weightings and estimated data.'},{n:'Cost-sustainability analysts',cred:'Public-finance economists',q:'Germany\'s EU-leading spending share raises questions about whether its shared-funding model can stay affordable as the working-age population shrinks.'}],history:'Germany\'s statutory health insurance dates to Bismarck\'s 1883 law, the world\'s first. France developed social insurance through the 20th century, adding complementary insurance and later state-subsidized coverage for low earners. Nordic countries built tax-funded, regionally run systems in the postwar welfare-state era.',timeline:[['1883','Bismarck establishes statutory sickness funds in Germany'],['1945','France expands social health insurance postwar'],['1960','Nordic countries consolidate tax-funded regional care'],['2000','WHO ranks France 1st, Germany 25th overall'],['2023','Germany leads EU on health spending share of GDP']],rel:['eu-healthcare','uk-nhs','care-per-dollar','us-healthcare-overview','global-access-equity'],enelNote:'Germany, France, and the Nordic countries all cover nearly everyone, but by very different routes. Germany pools money in competing public insurance funds, the world\'s oldest such system, and spends the largest share of its economy on health in the EU. France stacks near-universal top-up private insurance on top of required public insurance, which leaves patients paying among the least out of pocket in the OECD. The Nordic countries pay for care from taxes and run it through regional governments. The WHO 2000 ranking that crowned France is a genuine milestone, but its methods are disputed and the result is now decades old. The common thread: similar coverage can come from very different ways of paying, each with its own trade-offs.',enel:true},
{i:'canada-medicare',n:'Canada Medicare',fn:'Canada\'s single-payer universal Medicare system',tier:1,ts:62,sig:'stable',hot:false,ev:5,cats:['canada'],cls:'Publicly funded universal health insurance',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:4,parts:'~41 million residents across 13 provincial and territorial plans',ctry:'Canada',geo:[['Canada',100]],disc:1962,discr:'Saskatchewan\'s universal medical insurance plan, 1962',tag:'A single public insurer covers doctor and hospital care for everyone from the first dollar, but leaves gaps for prescription drugs and dental care.',facts:[['Health spending as a share of GDP, the total value of everything a country produces in a year (2024 estimate)','12.4 percent, per CIHI, Canada\'s national health-data agency, in 2024'],['Total spending (2025 estimate)','399 billion Canadian dollars, about 9,626 dollars per person'],['Public share of spending (2022)','About 71 percent paid by government, about 29 percent paid privately'],['Pharmacare Act, the new federal law to start covering some prescription drugs','Signed into law on October 10, 2024']],brief:'Canada\'s Medicare is a \'single-payer\' system, meaning one public insurer covers everyone for medically necessary doctor and hospital care, paid for with public money. It is run by 13 separate provincial and territorial plans rather than one national plan, under shared rules set by the Canada Health Act of 1984. It began with Premier Tommy Douglas\'s government in Saskatchewan, where universal medical insurance took effect July 1, 1962 and triggered a 23-day doctors\' strike. The 1984 Canada Health Act set five conditions a province must meet to receive federal money: it must be publicly run, comprehensive, cover everyone, stay valid when people move between provinces, and not charge patients at the point of care. Total health spending was estimated at 12.4 percent of GDP (gross domestic product, the total value of everything a country produces in a year) in 2024 and projected near 399 billion Canadian dollars in 2025, about 9,626 dollars per person. Gaps remain for prescription drugs, dental, and vision care, which people largely pay for privately or out of their own pockets. Canada\'s Pharmacare Act, a new law to start publicly covering some medicines, was signed into law October 10, 2024, beginning with birth control and diabetes drugs, alongside a new federal dental benefit.',uses:['Covering doctor and hospital care for everyone with no charge at the time of service'],risk:'The system does not cover most prescription drugs taken at home, dental, or vision care; whether it stays affordable is debated; services differ from province to province; the figures are estimates awaiting final reconciliation by CIHI, Canada\'s health-data agency.',mf:[['Canadian Medicare covers everything','It covers medically necessary hospital and doctor care but largely leaves out home prescription drugs, dental, and vision care (per CIHI, Canada\'s health-data agency, 2023).'],['Canada has one national health system','It is actually 13 separate provincial and territorial single-payer plans operating under shared federal rules.']],adv:[{n:'Canadian Institute for Health Information',r:'National health-data agency',paid:false,note:'Spending estimates.'},{n:'Canadian Doctors for Medicare',r:'Physician advocacy organization',paid:false,note:'Supports strengthening the single-payer model.'}],counter:[{n:'Fraser Institute',cred:'Canadian public-policy think tank',q:'Argues the system costs a lot relative to how quickly patients can actually be seen, and favors a larger private role.'},{n:'Brian Day (Cambie Surgeries)',cred:'Surgeon and private-clinic owner',q:'Argues that limits on paying privately for care make people wait longer.'}],history:'1947 Saskatchewan hospital insurance; 1957 federal Hospital Insurance Act; 1962 Saskatchewan medical insurance; 1966 Medical Care Act; 1984 Canada Health Act; 2024 Pharmacare Act.',timeline:[['1947','Saskatchewan introduces universal hospital insurance'],['1962','Saskatchewan launches universal medical insurance amid doctors\' strike'],['1966','Medical Care Act extends cost-sharing nationally'],['1984','Canada Health Act sets five funding conditions'],['2024','Pharmacare Act and Canadian Dental Care Plan expand coverage']],rel:['canada-access','care-per-dollar','us-healthcare-overview','eu-healthcare','uk-nhs','global-access-equity'],enelNote:'Ēnel notes that Canada\'s Medicare covers nearly everyone for doctor and hospital care from the first dollar, and that the country also has above-average life expectancy and below-average rates of deaths that timely care could have prevented (OECD, the wealthy-nations statistics group, 2023). The same design leaves home prescription drugs, dental, and vision care largely outside public coverage, shifting roughly a quarter to a third of spending onto private and out-of-pocket payments. The 2024 drug and dental measures are new and limited in scope. Both the broad access and the coverage gaps are real features of the same system.',enel:true},
{i:'canada-access',n:'Canadian Access and Wait Times',fn:'Access, wait times, and the private-care debate',tier:1,ts:66,sig:'rising',hot:false,ev:5,cats:['canada','access'],cls:'Health-system access and timeliness',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:4,parts:'National survey of physicians across 12 specialties plus CIHI data',ctry:'Canada',geo:[['Canada',100]],disc:1993,discr:'Fraser Institute begins national wait-time survey, 1993',tag:'Everyone is covered, but patients face measured delays for non-emergency and specialist care.',facts:[['Typical wait from family-doctor referral to treatment (2024)','30.0 weeks, per the Fraser Institute think tank'],['Adults without a regular primary-care provider (2024)','About 5.9 million, per the Canadian Medical Association\'s OurCare project'],['Typical wait for an MRI scan and a CT scan (2024)','16.2 weeks for an MRI, 8.1 weeks for a CT'],['Typical wait for orthopedic (bone and joint) surgery (2024)','57.5 weeks']],brief:'Canada covers everyone for hospital and doctor care, but how quickly people can actually get that care is a long-running problem. The Fraser Institute, a Canadian think tank, reported in its 2024 survey a typical wait of 30.0 weeks from a family-doctor referral to treatment, up from 27.7 weeks in 2023 and the longest in the survey\'s history; that wait splits roughly evenly between waiting to see a specialist and waiting for treatment after that visit. Scan delays included a typical 16.2 weeks for an MRI (a detailed body-imaging scan) and 8.1 weeks for a CT scan. Getting a regular family doctor is also hard: about 5.9 million adults had no regular family doctor or nurse practitioner in 2024, down from roughly 6.5 million reported in 2022 (per the Canadian Medical Association\'s OurCare project). The debate over allowing private care came to a head in Cambie Surgeries Corporation v. British Columbia, where the British Columbia Supreme Court ruled in 2020 that limits on paying privately for medically necessary care did not violate Canada\'s constitution (the Charter); the Supreme Court of Canada declined to hear the appeal in 2023.',uses:['Measuring how quickly patients get care and guiding policy on wait times and family-doctor shortages'],risk:'The Fraser Institute wait estimates come from doctors reporting their own impressions in a survey with uneven response rates, and may differ from CIHI\'s record-based figures; differences in method and in which specialties are surveyed affect how comparable the numbers are; the family-doctor figures come from population surveys.',mf:[['Universal coverage in Canada means timely care','Coverage is universal, but the 2024 typical wait from referral to treatment was a record 30.0 weeks (Fraser Institute).'],['The wait-time figure is an undisputed official number','The headline 30-week figure comes from doctors reporting their own estimates in a survey; CIHI\'s record-based data show many high-priority procedures meeting target times.']],adv:[{n:'Fraser Institute',r:'Publisher of the annual wait-time survey',paid:false,note:'Cross-province wait estimates since 1993.'},{n:'Canadian Medical Association',r:'National physician association',paid:false,note:'Tracks primary-care access via OurCare.'}],counter:[{n:'Canadian Doctors for Medicare',cred:'Physician advocacy group',q:'Argues that expanding private care would pull staff away and make public-system waits worse.'},{n:'Canadian Institute for Health Information',cred:'National health-data agency',q:'Reports that many high-priority procedures meet target times, and warns against summing up waits in a single figure.'}],history:'1993 first Fraser survey; 2004 federal-provincial Wait Times Reduction accord; 2020 Cambie BC Supreme Court ruling; 2023 SCC declines appeal; 2024 record median wait.',timeline:[['1993','First national wait-time survey records 9.3-week median'],['2004','First Ministers\' 10-Year Plan targets wait-time reduction'],['2020','BC Supreme Court rules against Cambie\'s private-care challenge'],['2023','Supreme Court of Canada declines to hear Cambie appeal'],['2024','Median referral-to-treatment wait reaches 30.0 weeks']],rel:['canada-medicare','care-per-dollar','us-healthcare-overview','uk-nhs','global-access-equity'],enelNote:'Ēnel observes that Canada pairs near-universal coverage with measured delays for non-emergency and specialist care, and that the headline 30-week figure comes from a Fraser Institute survey of doctors\' own estimates, a method that differs from CIHI\'s record-based data, which shows many high-priority procedures meeting target times. Both pictures rest on evidence and capture different slices of access. The family-doctor shortage and the Cambie court case are documented facts, not endorsements of any solution.',enel:true},
{i:'care-per-dollar',n:'Care Per Dollar',fn:'Comparative value of care received per dollar spent',tier:1,ts:74,sig:'hot',hot:true,ev:4,cats:['trending','comparative'],cls:'Cross-national value comparison',orig:'concept',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:5,parts:'10 high-income countries (Commonwealth Fund); ~38 OECD member states',ctry:'International (OECD comparison)',geo:[['Other high-income',40],['United States',20],['Europe',25],['Canada',10],['Japan',5]],disc:2004,discr:'Commonwealth Fund Mirror, Mirror comparison series begins, 2004',tag:'Spending more does not reliably buy better results; what counts as good value depends on which measure you care about most.',facts:[['Top-ranked systems (2024)','Australia, Netherlands, UK'],['Highest spending, lowest overall rank','United States'],['US spending per person (2022)','About 12,555 US dollars, the highest in the OECD wealthy-nations group'],['OECD average health spending (2022)','About 9.2 percent of GDP, the total value of everything a country produces in a year']],brief:'Care per dollar is the idea of judging a health system not by how much it spends but by how much it gives back for that money: access, quality, fairness, and efficiency. The Commonwealth Fund (a US health-policy research foundation) report Mirror, Mirror 2024 ranked ten wealthy countries on getting care, the care process itself, paperwork efficiency, fairness across income groups, and health outcomes. It placed Australia, the Netherlands, and the United Kingdom highest and the United States last overall, even though the US spends the most. Data from the OECD (the Organisation for Economic Co-operation and Development, a group of mostly wealthy nations that compiles comparable statistics) put US health spending near 12,555 US dollars per person in 2022, the highest of any member, against an OECD average of about 9.2 percent of GDP, the total value of everything a country produces in a year (OECD Health at a Glance 2023). Yet the US ranked second on the care process, reflecting strong prevention and patient-safety scores, which shows that one overall ranking can hide big differences area by area. So the value you get per dollar depends on which yardstick, outcomes, access, fairness, or paperwork efficiency, you weigh most heavily.',uses:['Comparing systems on outcomes, access, fairness, and efficiency relative to what they spend'],risk:'Overall rankings depend on which measures are picked and how heavily each is weighted; the Commonwealth Fund covers only 10 wealthy nations; spending and outcome data lag by one to two years; outcomes are also shaped by things outside health care, such as diet, violence, and income inequality.',mf:[['The country that spends the most gets the best care','The US spends the most per person yet ranks last overall among ten wealthy countries (Commonwealth Fund 2024).'],['A single ranking captures how good a system is','The US ranks last overall but second on the care process; value depends on the specific area, not one number.']],adv:[{n:'Commonwealth Fund',r:'Health-policy foundation',paid:false,note:'Mirror, Mirror cross-national comparisons.'},{n:'OECD Health Division',r:'Publisher of Health at a Glance',paid:false,note:'Standardizes cross-national spending.'}],counter:[{n:'Critics of composite rankings',cred:'Health-services researchers',q:'How the measures are weighted, and the small number of countries compared, can drive the headline placements.'},{n:'Market-oriented analysts',cred:'Policy economists',q:'US spending reflects higher incomes, more innovation, and more intensive treatment that simple value ratios understate.'}],history:'2004 first Commonwealth Fund Mirror, Mirror; 2010 OECD value-for-money emphasis; 2021 and 2024 updated rankings with US last overall.',timeline:[['2004','Commonwealth Fund launches cross-national comparison series'],['2014','US ranks last among 11 countries despite highest spend'],['2021','US ranks last overall; top spots to Norway, Netherlands, Australia'],['2024','Mirror, Mirror ranks Australia, Netherlands, UK top; US last']],rel:['canada-medicare','us-healthcare-overview','eu-healthcare','uk-nhs','global-access-equity','monetization-over-time'],enelNote:'Ēnel stresses that value per dollar is not one number but a family of measures, and the same system can lead on the care process while trailing on access, as the US does in Commonwealth Fund 2024. Spending more does not reliably buy better outcomes, yet overall rankings are sensitive to which measures are chosen and cover only a handful of wealthy nations, so they describe the question rather than settle it. Outcomes also reflect factors outside the health system.',enel:true},
{i:'mexico-healthcare',n:'Mexico Healthcare',fn:'Mexico\'s mixed public-private system and costs',tier:1,ts:82,sig:'hot',hot:true,ev:5,cats:['trending','latin-america','pricing','access'],cls:'Health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:14,parts:'national, ~130 million people',ctry:'Mexico',geo:[['Mexico',92],['US cross-border patients',6],['Other',2]],disc:1943,discr:'IMSS founded 1943; system reorganized through 2024',tag:'Coverage is split up and tied to whether you have a formal job, and patients pay one of the highest shares out of their own pockets in the region.',facts:[['Health spending as a share of GDP, the total value of everything a country produces in a year','About 5.7 percent in 2022 (World Bank and WHO, the UN health body)'],['Share of health spending patients pay directly out of pocket','41 percent, 2021 to 2023 (WHO)'],['People the expanded IMSS-Bienestar public program aims to cover','About 70 million people without insurance (2024)'],['Medical travelers visiting Mexico for care','About 1.35 million in 2024 (industry estimate)']],brief:'Mexico runs a health system split into separate pieces: government insurance institutes for people with formal jobs (IMSS, the main social-security health insurer, founded in 1943, and ISSSTE, the equivalent for government workers), a public program for people without formal jobs, and a large private sector. The program for people without formal work changed names and form twice in a few years: Seguro Popular (launched 2004) was replaced by INSABI in 2020, which was then folded into an expanded program called IMSS-Bienestar in 2023 and 2024. Total health spending was roughly 5.7 percent of GDP (gross domestic product, the total value of everything a country produces in a year) in 2022 according to World Bank and WHO (World Health Organization, the UN health body) data, below the regional average. Payments patients made directly out of their own pockets made up about 41 percent of current health spending in the 2021 to 2023 period (WHO Global Health Expenditure Database), one of the highest shares in the Americas. Cost differences push people across the border for care, with Mexico drawing an estimated 1.35 million medical travelers in 2024, many for dental work near the US border (industry estimates). Figures vary by source and year, and money pressures on IMSS-Bienestar are widely reported.',uses:['Public coverage of doctor visits, hospital stays, medicines, and emergency care','Private care paid for out of pocket or through private insurance'],risk:'Being covered on paper does not always mean care is actually available; high out-of-pocket costs, medicine shortages, and shortages of staff in rural areas are documented. Figures differ across the World Bank, WHO, OECD, and Mexican national sources, and by year.',mf:[['Mexico has one unified public health system','Coverage is split across IMSS, ISSSTE, and the public program for people without insurance, depending on a person\'s job status.'],['Public coverage means low out-of-pocket cost','Out-of-pocket spending near 41 percent is among the highest in the Americas (WHO 2021 to 2023).']],adv:[{n:'IMSS',r:'Social-security insurer for formal workers',paid:false,note:'Founded 1943; largest single provider.'},{n:'IMSS-Bienestar',r:'Public scheme for people without social security',paid:false,note:'Expanded 2023-2024 to replace INSABI.'}],counter:[{n:'Inter-American Dialogue analysts',cred:'Regional policy institute',q:'Repeatedly reorganizing the program for the uninsured has left coverage and continuity uncertain for millions.'}],history:'IMSS established 1943; Seguro Popular 2004; INSABI 2020; IMSS-Bienestar expansion 2023-2024.',timeline:[['1943','IMSS social-security institute founded'],['2004','Seguro Popular launched for the uninsured'],['2020','INSABI replaces Seguro Popular'],['2023','INSABI dissolved; IMSS-Bienestar expanded'],['2024','IMSS-Bienestar rollout continues across states']],rel:['latin-america-healthcare','curanderas','global-access-equity','history-of-medical-cost','care-per-dollar'],enelNote:'Ēnel presents Mexico\'s system as documented by the World Bank, WHO, OECD, and Mexican sources, without endorsing any party or reform. Figures such as the roughly 5.7 percent of GDP spent on health (2022) and the 41 percent paid out of pocket (2021 to 2023) come from the WHO Global Health Expenditure Database and vary by year and method. This entry is informational and is not medical or financial advice.',enel:true},
{i:'latin-america-healthcare',n:'Latin America Healthcare',fn:'Health systems and costs across Latin America',tier:1,ts:64,sig:'stable',hot:false,ev:5,cats:['latin-america','pricing','access','comparative'],cls:'Health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:18,parts:'regional, Latin America and the Caribbean',ctry:'Regional (Brazil, Colombia, Chile, Argentina and others)',geo:[['Brazil',33],['Mexico',20],['Colombia',8],['Argentina',8],['Chile',4],['Other LAC',27]],disc:1988,discr:'Brazil\'s SUS established by the 1988 Constitution',tag:'Countries aim to cover everyone but access is uneven, and patients pay more out of their own pockets than the wealthy-nations norm.',facts:[['Regional health spending','About 6.9 percent of GDP, the total value of everything a country produces in a year, 2019 (OECD and PAHO)'],['Share of spending patients pay directly out of pocket','About 32.4 percent, 2019 (OECD)'],['Share paid by government and required insurance','About 57 percent of spending, 2019'],['Rural versus urban access gap','21 percent of rural versus 16 percent of urban households were unable to get care, 2020']],brief:'Latin American countries share the goal of covering everyone but differ widely in how their systems are built and paid for. Brazil built the Sistema Unico de Saude (SUS, meaning \'Unified Health System\'), a tax-funded system for everyone, after the 1988 Constitution declared health a right of every citizen, with the details set out by Law 8080 in 1990. Colombia runs a model where regulated insurers compete for members, Chile mixes a public fund called FONASA with private insurers called ISAPREs, and Argentina blends union-run social-security plans (obras sociales) with public and private care. Across Latin America and the Caribbean, health spending averaged about 6.9 percent of GDP (gross domestic product, the total value of everything a country produces in a year) in 2019, below the average of 8.5 percent among the wealthy nations of the OECD (the Organisation for Economic Co-operation and Development, a group of mostly rich countries that compiles comparable statistics) (OECD Health at a Glance LAC 2023). Payments patients made directly out of their own pockets made up roughly 32.4 percent of health spending in 2019, well above the OECD\'s 20 percent, while government and required insurance covered about 57 percent. Access is uneven: in 2020, 21 percent of rural households reported being unable to get care, versus 16 percent of urban households. Figures vary by country, source, and year.',uses:['Public and social-security coverage of basic, hospital, and emergency care','Private insurance and out-of-pocket purchase of extra services'],risk:'High out-of-pocket shares expose households to costs large enough to cause financial ruin; gaps in access between city and countryside and between income groups are well documented. Regional averages hide large differences between countries and within them.',mf:[['Latin America has a single regional model','Designs range from Brazil\'s tax-funded SUS to Colombia\'s competing-insurers model and Chile\'s public-private mix.'],['Aiming to cover everyone means low household cost','Out-of-pocket spending around 32 percent regionally is well above the wealthy-nations norm (OECD 2019).']],adv:[{n:'Pan American Health Organization',r:'WHO regional office',paid:false,note:'Regional health-financing trend reports.'},{n:'Brazil Ministry of Health / SUS',r:'Operates universal public system',paid:false,note:'Established under the 1988 Constitution.'}],counter:[{n:'OECD Health at a Glance LAC analysts',cred:'Multilateral statistical body',q:'Leaning on out-of-pocket payments leaves many households exposed to financial hardship when illness strikes.'}],history:'Brazil\'s SUS founded 1988-1990; varied insurance and social-security models across the region.',timeline:[['1988','Brazil\'s Constitution declares health a citizen right'],['1990','Law 8080 organizes Brazil\'s SUS'],['1993','Colombia\'s Law 100 creates managed-competition insurance'],['2019','Regional health spend ~6.9% of GDP (OECD/PAHO)'],['2023','PAHO reports continued out-of-pocket reliance across LAC']],rel:['mexico-healthcare','curanderas','global-access-equity','history-of-medical-cost','care-per-dollar'],enelNote:'Ēnel summarizes regional patterns from PAHO, WHO, OECD, and the World Bank without ranking countries or endorsing any model. Headline figures such as about 6.9 percent of GDP and about 32.4 percent paid out of pocket (both 2019, OECD/PAHO) are regional averages that hide large differences between countries and within them, and they shift from year to year.',enel:true},
{i:'curanderas',n:'Curanderas and Traditional Healers',fn:'Indigenous and folk healers and how they are paid',tier:1,ts:58,sig:'stable',hot:false,ev:3,cats:['latin-america','history','access','comparative'],cls:'Traditional practice',orig:'practice',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:9,parts:'community and regional, many Indigenous and rural populations',ctry:'Mexico, Peru, Bolivia, Ecuador and across Latin America',geo:[['Mexico',30],['Andean countries',40],['Amazon basin',15],['Other LAC',15]],disc:1983,discr:'Practices predate colonization; the WHO 80% figure dates to 1983',tag:'Local healers paid by donation, trade of goods, or whatever a patient can afford. Often the closest care available.',facts:[['World Health Organization (WHO, the United Nations agency for global health) usage estimate','About 80% of people in developing countries rely on traditional care (WHO, 1983)'],['Chile usage','About 71% report using traditional medicine (PAHO, the Pan American Health Organization, which is the WHO office for the Americas)'],['Colombia usage','About 40% report using traditional medicine (PAHO/WHO)'],['WHO strategy','Traditional Medicine Strategy 2025-2034']],brief:'Traditional healers are community members who treat illness using long-established local knowledge rather than hospital medicine. In Mexico and across Latin America these healers are called curanderos and curanderas, and their practice blends Indigenous knowledge, Spanish folk medicine, and Catholic ritual. They work alongside parteras (midwives, who help women give birth) and Andean and Amazonian specialists such as the kallawaya of Bolivia. Payment is usually informal: healers commonly accept donations, the trade of goods, or whatever a patient can afford, often live in the communities they serve, and may depend on other work for income. The WHO (the World Health Organization, the United Nations agency for global health) has long estimated that about 80 percent of people in developing countries use traditional healing as their main source of care, a figure first published in 1983 and now treated with caution. PAHO (the Pan American Health Organization, the WHO office for the Americas) and WHO report wide variation from country to country, including roughly 71 percent of people in Chile and 40 percent in Colombia using traditional medicine. Several countries have begun bringing these practices into the official system: Ecuador made traditional medicine legal in its 2008 Constitution, and the WHO Traditional Medicine Strategy 2025-2034 calls for combining it respectfully with formal care. These practices carry deep cultural meaning and, in many places, are the easiest care to reach, but they are not a replacement for emergency care or proven medical treatment when that is what a condition requires.',uses:['Community healing of physical, emotional, and spiritual concerns; help with childbirth; herbal remedies','Often the easiest care to reach in remote areas'],risk:'Healers\' training and the range of what they treat vary widely and are largely unregulated, so quality and safety are not standardized. These practices are not a replacement for emergency care or proven treatment of serious conditions. Usage numbers, especially the 1983 WHO 80 percent figure, are old and uncertain.',mf:[['The claim that 80 percent of the developing world uses traditional healers is a solid, proven statistic','That figure comes from a single 1983 WHO publication and is widely seen as unverified; treat it as disputed, not settled.'],['Traditional healing can take the place of hospital medicine','It carries real cultural value and is often the nearest care, but it is not a replacement for emergency care or proven treatment of serious conditions.']],adv:[{n:'World Health Organization',r:'Sets traditional-medicine strategy',paid:false,note:'Traditional Medicine Strategy 2025-2034.'},{n:'Ecuador National Directorate of Intercultural Health',r:'State office integrating traditional medicine',paid:false,note:'Created after 2008 Constitution.'}],counter:[{n:'Intercultural-health researchers',cred:'Peer-reviewed ethnographic analysis',q:'Integration efforts can be asymmetrical, with biomedicine dominating and traditional knowledge incompletely respected.'}],history:'Practices predate Spanish colonization; blend Indigenous, Iberian, and Catholic elements; recognized in 21st-century constitutions and WHO strategy.',timeline:[['1983','WHO publishes the ~80% traditional-care use estimate'],['2008','Ecuador\'s Constitution recognizes traditional medicine'],['2009','UNESCO lists Bolivia\'s Kallawaya worldview as intangible heritage'],['2025','WHO Traditional Medicine Strategy 2025-2034 takes effect']],rel:['mexico-healthcare','latin-america-healthcare','global-access-equity','religion-and-healthcare','care-per-dollar'],enelNote:'Ēnel describes traditional and Indigenous healing respectfully and as documented by WHO, PAHO, and ethnographic sources, neither romanticizing nor dismissing it. Usage figures, including the WHO 80 percent estimate, date to 1983 and are uncertain; national rates such as ~71 percent in Chile and ~40 percent in Colombia come from PAHO and WHO. This entry is informational and is not medical advice; traditional practices are not substitutes for emergency care or proven treatment of serious conditions.',enel:true},
{i:'japan-healthcare',n:'Japan Healthcare System',fn:'Japan: universal statutory insurance and uniform fees',tier:1,ts:72,sig:'stable',hot:false,ev:5,cats:['japan','comparative','pricing','access'],cls:'National health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:4,parts:'Entire resident population (~124 million), mandatory enrollment',ctry:'Japan',geo:[['Japan',100]],disc:1961,discr:'Achievement of universal health insurance coverage, 1961',tag:'Everyone is covered, and costs are kept in check by one nationwide government price list for medical care.',facts:[['Health spending as a share of GDP (gross domestic product, the total value of everything a country produces in a year)','10.6% vs 9.3% average for the OECD, a group of mostly wealthy democracies (OECD 2025)'],['Life expectancy at birth','84.5 years, 4.2 above the OECD average (2023)'],['Standard share of the bill paid by the patient','30% for most working-age adults'],['Price list revision','Every 2 years since 1958']],brief:'Japan covers its entire population through health insurance: it reached universal coverage in 1961 by legally requiring all residents to join a social health insurance plan, and coverage is still effectively 100 percent. Every covered treatment and medicine is paid for at a single national fee schedule (a government-set price list for medical services) that the Ministry of Health, Labour and Welfare updates every two years. This price list, in place since 1958, keeps prices the same across the country and is the main way Japan controls costs (Ikegami, Globalization and Health 2019). Patients typically pay 30 percent of the bill themselves, with lower shares of 10 to 20 percent for young children, people aged 70 to 74, and lower-income people aged 75 and over. Health spending was 10.6 percent of GDP (gross domestic product, the total value of everything a country produces in a year), above the average of 9.3 percent for the OECD (the Organisation for Economic Co-operation and Development, a group of mostly wealthy democracies). Life expectancy at birth was 84.5 years, 4.2 years above the OECD average and among the highest in the world (OECD Health at a Glance 2025). A rapidly aging population, known in Japan as the 2040 Problem, is the biggest long-term financial strain on the system.',uses:['Government insurance funded by taxes and premiums that covers doctor visits, hospital care, and medicines at regulated nationwide prices'],risk:'An aging population and a shrinking working-age population raise doubts about long-term affordability; the two-year fee cuts can squeeze what providers earn; the figures cited are national totals that hide differences between regions.',mf:[['Japan controls costs through market competition','A single government-set national price list, updated every two years since 1958, is the main cost-control tool.'],['High life expectancy proves the health system by itself is the best','Japan\'s 84.5-year life expectancy reflects diet and lifestyle as well as the health system, not the system on its own.']],adv:[{n:'Naoki Ikegami',r:'Health policy scholar on Japanese UHC',paid:false,note:'Documented how regulated fee-setting achieved universal coverage with cost control (2019).'}],counter:[{n:'OECD fiscal analyses',cred:'International economic body',q:'Health spending above the OECD average combined with aging raises long-run fiscal sustainability questions (2025).'}],history:'1958 single fee schedule introduced; 1961 universal coverage achieved; biennial fee revisions ongoing.',timeline:[['1958','Single national fee schedule established'],['1961','Universal health insurance coverage achieved'],['2008','Late-stage elderly medical care system introduced'],['2025','Health spending reported at 10.6% of GDP']],rel:['china-healthcare','india-healthcare','asia-healthcare','care-per-dollar','global-access-equity','us-healthcare-overview'],enelNote:'Japan illustrates a model where a single government-set fee schedule, revised every two years, applies uniform prices nationwide. Supporters point to universal coverage and one of the world\'s highest life expectancies achieved at moderate per-capita cost; critics note that an aging population and biennial fee adjustments create ongoing fiscal and provider-margin tension. Ēnel presents these as documented trade-offs, not endorsements.',enel:true},
{i:'china-healthcare',n:'China Healthcare System',fn:'From barefoot doctors to near-universal insurance',tier:1,ts:66,sig:'rising',hot:false,ev:4,cats:['asia','comparative','access','history'],cls:'National health system',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:5,parts:'Over 90% of China\'s population covered (~1.3 billion+)',ctry:'China',geo:[['China',100]],disc:2009,discr:'Launch of comprehensive health system reform, 2009',tag:'Insurance expanded fast to cover almost everyone, but patients still pay a large share of their own bills.',facts:[['Population with health insurance','Under 25% (early 2000s) to over 90% (2010)'],['Share of bills patients pay themselves (out-of-pocket)','About 60% (2000) to about 27-32% (2021-2023)'],['Health spending as a share of GDP (the total value of everything the country produces in a year)','About 7% recently, up from about 5.2%'],['Barefoot doctors at peak','About 1 million before the title was retired in 1985']],brief:'China\'s rural health care was once built around barefoot doctors, briefly trained village health workers who numbered around 1 million before that title was officially retired in 1985 (The Lancet 2008). After market reforms in the 1980s and 1990s eroded rural coverage, the share of health spending that patients paid out of their own pockets (called out-of-pocket spending) reached about 60 percent of the total by 2000. The New Rural Cooperative Medical Scheme (a government insurance plan first tested in 2003) and a major reform in 2009 pushed insurance coverage from under a quarter of the population to over 90 percent by 2010. Out-of-pocket spending has since fallen to roughly 27 to 32 percent of health spending by 2021 to 2023, though it is still a real burden on households (World Bank; PMC 2024). Health spending was around 7 percent of GDP (the total value of everything the country produces in a year) in recent years, up from about 5.2 percent a decade earlier. The system is still centered on hospitals and, as a stated principle of the 2009 reform, officially promotes using traditional Chinese medicine alongside Western medicine.',uses:['Three main government insurance plans that pay for hospital and outpatient care, combining traditional and Western medicine'],risk:'Patients still pay a larger share of their own bills than in many wealthy countries; gaps between cities and the countryside remain; some overall spending figures differ depending on the source and how they are measured.',mf:[['China has always had universal health coverage','Insurance covered under a quarter of the population in the early 2000s and only passed 90 percent after the 2009 reform.'],['Expanding coverage ended the cost burden on households','Out-of-pocket spending fell from about 60 percent but is still roughly 27 to 32 percent, which remains a real burden.']],adv:[{n:'Commonwealth Fund country analysts',r:'Comparative health systems researchers',paid:false,note:'Documented the rise past 90% by 2010.'}],counter:[{n:'Health Policy and Planning researchers',cred:'Peer-reviewed health economics',q:'Coverage expansion did not fully resolve out-of-pocket burden and access inequities (2014).'}],history:'1949 onward rural health drives; 1966-76 barefoot doctor expansion; 1985 title retired; 2003 NRCMS pilot; 2009 major reform.',timeline:[['1968','Barefoot doctor program promoted nationwide'],['1985','Barefoot doctor job title officially removed'],['2003','New Rural Cooperative Medical Scheme piloted'],['2009','Comprehensive health system reform launched'],['2010','Insurance coverage surpasses 90% of population']],rel:['japan-healthcare','india-healthcare','asia-healthcare','care-per-dollar','global-access-equity','us-healthcare-overview'],enelNote:'China shows a system that moved from minimal rural coverage to over 90 percent insured within roughly a decade after the 2009 reform. Supporters cite the speed of coverage expansion and falling out-of-pocket share; critics note that household out-of-pocket spending remains substantial, the system is hospital-centric, and urban-rural gaps persist. Ēnel attributes both the gains and the limitations to specific years and sources.',enel:true},
{i:'india-healthcare',n:'India Healthcare System',fn:'Low public spend, large private sector, new insurance',tier:1,ts:66,sig:'rising',hot:false,ev:4,cats:['asia','comparative','access','pricing'],cls:'National health system',orig:'policy',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:5,parts:'PM-JAY targets ~500 million low-income people',ctry:'India',geo:[['India',100]],disc:2018,discr:'Launch of Ayushman Bharat and PM-JAY, 2018',tag:'A mix: the government spends little, a large private sector dominates, patients pay a lot themselves, and a big new insurance plan is rolling out.',facts:[['Government health spending as a share of GDP (the total value of everything the country produces in a year)','About 2.1% in 2023, up from 1.4% in 2020'],['Share of bills patients pay themselves (out-of-pocket)','About 64% (2013-14) to about 39% (2021-22)'],['Ayushman Bharat insurance cards created (1 crore = 10 million)','Over 34.7 crore by June 2024'],['PM-JAY hospital admissions (1 lakh crore = 1 trillion rupees)','About 7.37 crore worth about Rs 1 lakh crore by 2024']],brief:'India runs a mixed system in which low government spending sits alongside a large private sector and heavy payments by patients themselves. Government health spending was about 2.1 percent of GDP (the total value of everything the country produces in a year) in 2023, up from 1.4 percent in 2020 but still low compared with other countries. Out-of-pocket spending (money patients pay directly), historically over 60 percent of total health spending, fell from roughly 64 percent in 2013 to 14 down to about 39 percent in 2021 to 22, according to National Health Accounts data. Ayushman Bharat, launched in September 2018, added a large government-funded insurance plan called PM-JAY (also known as Pradhan Mantri Jan Arogya Yojana, India\'s public insurance scheme) aimed at around 500 million lower-income people, with over 34.7 crore cards created and about 7.37 crore hospital admission
