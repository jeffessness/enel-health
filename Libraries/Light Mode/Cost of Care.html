 posts could move a global market, with #Ozempic views rising from about 2 million in 2021 to roughly 1.2 billion in 2023. A parallel supplement wave followed: berberine as nature\'s Ozempic in 2023, the Sleepy Girl Mocktail magnesium surge in 2023, and continued growth in sea moss and functional-mushroom products. Throughout, peer-reviewed audits documented high inaccuracy in viral health content, while other research showed patient and rare-disease communities generating legitimate research leads.',timeline:[['2020','WHO popularizes the term infodemic as COVID-19 drives a surge of online health claims'],['2021','KFF finds about 14 percent of US adults believe ivermectin treats COVID-19; #Ozempic views near 2 million'],['2022','FDA tracks semaglutide shortages; analyses link ivermectin prescribing spikes to misinformation'],['2023','#Ozempic views reach about 1.2 billion; berberine branded nature\'s Ozempic; Sleepy Girl Mocktail drives magnesium sales'],['2024','Otolaryngology HNS study finds about 44 percent of TikTok sinusitis videos non-factual; Lilly and Novo Nordisk sell over $40 billion in GLP-1 drugs'],['2025','Reports put the sea moss market near $3 billion by 2030 on largely unproven claims; FDA semaglutide shortage resolves']],rel:['universities-and-medicine','research-methodologies','monetization-over-time','us-drug-pricing','care-per-dollar'],enelNote:'Read social-media health content as a signal to investigate, not a verdict. The same channel that spread inaccurate ivermectin and supplement claims (documented by KFF in 2021 and by several 2023 to 2024 peer-reviewed audits) also lets rare-disease patients surface real symptoms that researchers later study. Two checks help. First, follow the money on every side: promoters who use affiliate links, own brands, or sell supplement lines, and critics who may earn institutional or media income. Second, weigh the quality of the evidence over the view count, since reach and years of staying power measure popularity and algorithm fit, not validity. FTC rules require revealing paid relationships, but audits show many posts do not comply, so the absence of an ad label is not proof a post is independent. When a trend goes viral, the honest reading is that it has flagged a question worth rigorous testing, nothing more and nothing less.',enel:true},
{i:'universities-and-medicine',n:'Universities and Academic Medicine',fn:'Universities and academic medical centers in health',tier:1,ts:83,sig:'hot',hot:true,ev:4,cats:['trending','influence','research','us-system','history','comparative'],cls:'Institutional and financial analysis of academic medicine',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:3,parts:'Hundreds of thousands of researchers; NIH FY2023 extramural awards supported more than 300,000 individuals at over 2,500 institutions (NIH, 2024)',ctry:'Global',geo:[['North America',42],['Europe',30],['Asia',22],['Rest of world',6]],disc:1980,discr:'The modern financial structure of US academic research crystallized with the Bayh-Dole Act of 1980, which let universities own and license patents on federally funded inventions (US Public Law 96-517, 1980).',tag:'An engine of new discoveries and a large financial institution at the same time.',facts:[['NIH (the US National Institutes of Health, the main public funder of medical research) total budget, FY2024','About $47.3 billion, first decline since FY2013 (Congressional Research Service, 2024)'],['Share of NIH budget sent to outside institutions','Nearly 82% (called extramural funding) as of FY2023 (Congressional Research Service, 2024)'],['US/Canada university income from licensing inventions','About $3.8 billion in FY2022 (AUTM, 2023)'],['Largest university endowment (a permanent investment fund)','Harvard at $53.2 billion, FY2024']],brief:'This entry is about the double role universities and academic medical centers play: they are the main place where basic medical research and doctor training happen, and they are also large financial institutions. In the United States, the National Institutes of Health (NIH, the main public funder of medical research) had a total budget of about $47.3 billion in 2024, its first drop since 2013, and roughly 82 percent of that went out to universities, medical schools, and hospitals as extramural funding (research money sent to outside institutions) as of 2023, with just ten universities receiving about 22 percent of those grants (Congressional Research Service, 2024). The Bayh-Dole Act of 1980 (a US law that let universities patent inventions made with federal research money) created a licensing business; AUTM, the association of university technology-transfer offices, reported about $3.8 billion in US and Canadian gross licensing income in 2022, with nearly 7,000 active university spinout companies, though a single institution alone accounted for almost 30 percent of that income (AUTM, 2023). Harvard held the largest university endowment (a permanent investment fund) at $53.2 billion in 2024, even as US academic medical centers ran a median operating margin near or below zero, around minus 0.8 percent in 2022, meaning they roughly broke even or lost money on operations (McKinsey, 2023). On research integrity: a 2017 review by the Cochrane group (a nonprofit that summarizes medical evidence), led by Andreas Lundh and colleagues, found that industry-funded drug and device studies more often reported favorable conclusions, about 1.34 times as often; and the 2015 Reproducibility Project led by Brian Nosek was able to reproduce only 36 percent of 97 notable psychology findings (Open Science Collaboration, 2015). Globally, the Nobel Assembly at Karolinska Institutet has awarded the medicine prize since 1901, while China became the largest producer of scientific papers, about 27 percent of world output in 2022, and was linked to more than half of retracted papers in one analysis published in Nature.',uses:['Understanding where medical discoveries and doctor training come from','Tracing how public research money moves from government to institutions','Weighing disclosed financial ties when reading a medical study','Putting prestige and citation counts in context against how often findings can be reproduced'],risk:'Many headline figures come from self-reported surveys (such as AUTM) or single-year snapshots and vary by accounting method. Operating-margin estimates differ across consulting firms and sample sizes. Counts of retractions and fraudulent papers depend on detection, so they undercount misconduct that goes unnoticed and may overrepresent regions under closer scrutiny. A link between industry funding and favorable results does not prove intent in any single study, and a failure to reproduce a finding does not by itself prove the original was false.',mf:[['A discovery from a prestigious, long-established university is more likely to be true.','Prestige and age do not establish that a finding is valid. The 2015 Reproducibility Project reproduced only 36 percent of notable findings drawn from top-ranked journals.'],['Industry funding of a study does not affect its results.','A 2017 Cochrane review found industry-funded studies more often reached conclusions favorable to the funder, about 1.34 times as often, beyond what standard bias checks explained (Lundh et al., 2017).'],['University patenting under the Bayh-Dole Act purely serves the public.','It created a genuine path to turn research into products, and also a money and ownership incentive. AUTM reported about $3.8 billion in 2022 licensing income, with one institution taking nearly 30 percent.']],adv:[{n:'Association of American Universities',r:'University consortium',paid:false,note:'Defends the Bayh-Dole Act and turning research into products as drivers of innovation; represents member universities\' interests.'},{n:'AUTM',r:'Association of university technology-transfer offices',paid:false,note:'Publishes the licensing survey cited; its membership benefits from a positive view of university commercialization.'},{n:'Association of American Medical Colleges',r:'Body representing medical schools and teaching hospitals',paid:false,note:'Advocates for NIH funding and guides disclosure of industry payments to doctors; represents the institutions being described.'}],counter:[{n:'Andreas Lundh and Lisa Bero',cred:'Authors of the 2017 Cochrane review on industry funding',q:'Drug and device studies funded by industry more often report favorable results and conclusions; the authors are academic researchers with no commercial product at stake.'},{n:'Brian Nosek',cred:'Co-founder, Center for Open Science; led 2015 Reproducibility Project',q:'Only about a third of high-profile psychology findings could be reproduced; the Center for Open Science is funded to promote reproducibility reforms.'},{n:'Nature and Chemistry World reporting',cred:'Science journalism on retracted papers',q:'Chinese institutions appeared on more than half of retracted papers in one analyzed sample; the outlets cite database evidence but also compete for attention.'}],history:'Universities have trained physicians since medieval Europe, but the research university model expanded sharply in the twentieth century. In the United States, Vannevar Bush\'s 1945 report Science, the Endless Frontier argued for sustained federal funding of basic science, leading to the growth of the NIH. For decades inventions from federally funded research belonged to the government, and few were commercialized. The Bayh-Dole Act of 1980 reversed that, letting universities own patents, which spawned technology transfer offices and a licensing economy. Over the same period medical schools shifted from federal research dollars toward clinical service revenue, and concerns about industry influence grew, producing the Physician Payments Sunshine Act of 2010 and, in 2015, broad public attention to the replication crisis.',timeline:[['1901','Nobel Assembly at Karolinska Institutet begins awarding the Prize in Physiology or Medicine'],['1945','Vannevar Bush\'s report Science, the Endless Frontier urges federal funding of basic research'],['1980','Bayh-Dole Act lets universities patent federally funded inventions (US Public Law 96-517)'],['2010','Physician Payments Sunshine Act enacted t
