s worth roughly Rs 1 lakh crore approved by mid-2024 (Ministry of Health and Family Welfare 2024). Here a crore equals 10 million and a lakh crore equals 1 trillion rupees. India is also a major destination for medical tourism, where people travel from abroad for cheaper care, a market estimated near USD 8.7 billion in 2025, and it maintains AYUSH (India\'s official traditional medicine systems, including Ayurveda and yoga) alongside conventional Western medicine. Gaps in rural access persist, with most fully trained doctors concentrated in cities.',uses:['Tax-funded public clinics and hospitals plus a large private sector','PM-JAY insurance for hospital stays, AYUSH traditional medicine systems, and medical tourism'],risk:'Government spending stays low; the share patients pay themselves, though falling, is still high; gaps between rural and urban access are large; some figures use crore units and India\'s April-to-March fiscal year, which can confuse comparisons.',mf:[['India\'s government health spending is on par with other large economies','At about 2.1 percent of GDP in 2023 it remains low compared with other countries.'],['PM-JAY made care free for all Indians','PM-JAY is aimed at lower-income groups for hospital stays; the share patients pay themselves, though falling, was still about 39 percent in 2021-22.']],adv:[{n:'Observer Research Foundation analysts',r:'Policy researchers',paid:false,note:'Documented the fall in out-of-pocket share to ~39% by 2021-22.'}],counter:[{n:'Commonwealth Fund country analysts',cred:'Comparative health systems researchers',q:'Persistently low public spending and rural access gaps limit financial protection (2023).'}],history:'Mixed public-private system; February 2018 Health and Wellness Centres; September 2018 PM-JAY launch; ongoing coverage expansion.',timeline:[['2018','Health and Wellness Centres and PM-JAY launched under Ayushman Bharat'],['2020','Public health spending about 1.4% of GDP'],['2022','Out-of-pocket share down to about 39% of health spending'],['2023','Public health spending rises to about 2.1% of GDP'],['2024','Over 34.7 crore Ayushman cards created']],rel:['japan-healthcare','china-healthcare','asia-healthcare','care-per-dollar','global-access-equity','us-healthcare-overview'],enelNote:'India demonstrates a mixed model with low public health spending, a large private sector, and a major new public insurance scheme. Supporters highlight PM-JAY\'s scale, with over 34.7 crore cards by 2024, and a sharp fall in out-of-pocket share; critics point to public spending near 2 percent of GDP, continued household burden, and rural-urban access gaps. Ēnel presents these documented gains and limitations with years and sources.',enel:true},
{i:'russia-healthcare',n:'Russia',fn:'From Semashko to mandatory health insurance',tier:1,ts:58,sig:'stable',hot:false,ev:4,cats:['asia','other-regions','comparative','history'],cls:'National health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:18,parts:'National population ~146 million (Rosstat, 2023)',ctry:'Russian Federation',geo:[['Russia',100]],disc:1993,discr:'Mandatory Medical Insurance (OMS) law, 1993',tag:'Everyone is officially covered on a tight budget, but care varies by region and patients often pay extra unofficially.',facts:[['Current health spending as a share of GDP (the total value of everything the country produces in a year)','7.4% (World Bank, 2021)'],['Life expectancy at birth','73.3 years (Rosstat, Russia\'s federal statistics agency, 2023)'],['Male vs female life expectancy','67.3 vs 79.0 years (Rosstat, 2023)'],['OMS (Russia\'s mandatory medical insurance) introduced','1993 (Federal MHI law)']],brief:'Russia inherited the Soviet Semashko model, the old centrally run, tax-funded health system that gave broad geographic coverage but was badly underfunded by the late 1980s (OECD, 2007). After the Soviet Union broke up in 1991, a 1993 law created OMS (Obligatory Medical Insurance, Russia\'s mandatory medical insurance), a stream of money set aside from payroll taxes that funds care alongside regional budgets, and Article 41 of the 1993 Constitution promised free medical care. Russia spent about 7.4 percent of GDP (the total value of everything the country produces in a year) on health in 2021, with a relatively low government share compared with Europe and significant payments by patients themselves, both official and unofficial (World Bank, 2021). Life expectancy reached roughly 73.3 years in 2023, recovering from the lows of the 1990s but still showing a wide gap of about 12 years between men and women (Rosstat, Russia\'s federal statistics agency, 2023). Studies document large differences between regions in funding and the availability of providers. Unofficial payments remain a documented feature, with surveys reporting that a notable share of patients pay under the table for both clinic and hospital care.',uses:['Social-insurance coverage of a defined set of benefits, with hospital and clinic care delivered by public providers'],risk:'The figures combine official statistics with peer-reviewed survey estimates; how common unofficial payments are varies by region and by how each study measures them, and recent economic upheaval makes data after 2022 harder to compare.',mf:[['A constitutional right to free care means Russian households pay nothing','Tight government spending pushes real costs onto households through direct payments and documented under-the-table payments.'],['Coverage is the same everywhere in the country','Studies document large regional differences in funding and the availability of providers across Russia\'s regions.']],adv:[{n:'OECD',r:'Healthcare Reform in Russia review',paid:false,note:'Documents Semashko legacy and reform trajectory.'},{n:'WHO / European Observatory',r:'Russian Federation Health System Review',paid:false,note:'Describes OMS structure and financing.'}],counter:[{n:'International Journal of Health Policy and Management',cred:'Peer-reviewed journal',q:'Reports financial risk protection gaps and unmet need in Russia.'}],history:'1918-1980s Semashko model; 1991 USSR dissolution; 1993 OMS law and constitutional right; 2010-2011 MHI law reforms.',timeline:[['1918','Soviet Semashko centralized health system established'],['1991','Dissolution of the USSR; fiscal strain on health budgets'],['1993','Obligatory Medical Insurance (OMS) introduced'],['2011','Federal law on compulsory medical insurance reforms financing'],['2023','Life expectancy recovers to about 73.3 years (Rosstat)']],rel:['asia-healthcare','china-healthcare','global-access-equity','care-per-dollar'],enelNote:'Russia illustrates how a country can maintain near-universal nominal coverage while constrained public spending shifts real costs onto households through out-of-pocket and informal payments. For cost-of-care comparison, the gap between formal entitlement and actual access matters as much as headline GDP shares. Readers should weigh official statistics alongside peer-reviewed survey evidence and treat post-2022 data cautiously.',enel:true},
{i:'asia-healthcare',n:'Asia (selected systems)',fn:'Asia: contrasting paths to universal coverage',tier:1,ts:66,sig:'rising',hot:false,ev:4,cats:['asia','comparative','access','pricing'],cls:'Comparative health systems',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:22,parts:'Multi-country: South Korea, Taiwan, Singapore, Thailand, Indonesia',ctry:'South Korea, Taiwan, Singapore, Thailand, Indonesia',geo:[['East Asia',55],['Southeast Asia',45]],disc:1995,discr:'Taiwan single-payer National Health Insurance, 1995',tag:'Several different ways of paying for care, all reaching everyone or nearly everyone, at very different costs.',facts:[['Taiwan National Health Insurance (NHI, a government-run plan covering the whole population) health spending','About 6.6% of GDP, the total value of everything the country produces in a year (Brookings, 2020)'],['Korea life expectancy','83.5 years (OECD, a group of mostly wealthy democracies, 2023)'],['Indonesia JKN (its national health insurance program) enrollment','About 218 million people (~82%) (2023)'],['Korea share of bills patients pay themselves (out-of-pocket)','29% of health spending (OECD, 2023)']],brief:'Asian systems show that everyone can be covered through very different ways of paying for care. South Korea reached universal National Health Insurance (NHI, a government-run health plan covering the whole population) in 1989 and merged it into a single nationwide insurer between 2000 and 2003, reaching a life expectancy of 83.5 years but with patients paying about 29 percent of health costs out of their own pockets, above the 18 percent average for the OECD (the Organisation for Economic Co-operation and Development, a group of mostly wealthy democracies). Taiwan launched a single government-run insurance plan (a single-payer system, where one public fund pays for everyone\'s care) in 1995 that covers about 99 percent of residents at roughly 6.6 percent of GDP (the total value of everything the country produces in a year), with running costs reported under 1 percent and public satisfaction above 90 percent. Singapore combines required personal health savings accounts (Medisave) with insurance for very large bills (MediShield) and a safety-net fund for those who cannot pay (MediFund), putting more of the cost on the individual. Thailand introduced its Universal Coverage Scheme in 2002, at first with a 30-baht charge per visit, extending care to workers without formal jobs. Indonesia\'s JKN, its national health insurance program launched in 2014, is among the world\'s largest single public insurance funds, covering about 218 million people (2023).',uses:['Approaches range from tax-and-premium single public insurers to required savings accounts plus big-bill insurance and tax-funded universal plans'],risk:'These cross-country comparisons mix official and secondary sources; the GDP shares and coverage percentages use different starting years and definitions, so direct cost rankings should be read with caution.',mf:[['Covering everyone requires high spending','Taiwan covers about 99 percent of residents at roughly 6.6 percent of GDP with running costs under 1 percent.'],['All Asian systems use a single government insurer','They range from a single government insurer (Taiwan, Korea, Indonesia) to required personal savings accounts (Singapore) and tax-funded plans (Thailand).']],adv:[{n:'Brookings Institution',r:'Taiwan health care analysis',paid:false,note:'Reports Taiwan NHI cost and coverage.'},{n:'OECD',r:'Health at a Glance 2023',paid:false,note:'Korea life expectancy and out-of-pocket data.'}],counter:[{n:'Taiwan Insight (academic commentary)',cred:'University-affiliated analysis',q:'Notes Taiwan NHI financing sustainability pressures despite high satisfaction.'}],history:'1989 Korea universal NHI; 1995 Taiwan NHI; 2002 Thailand UCS; 2014 Indonesia JKN.',timeline:[['1989','South Korea achieves universal National Health Insurance'],['1995','Taiwan launches single-payer NHI'],['2002','Thailand implements Universal Coverage Scheme nationwide'],['2014','Indonesia launches JKN single-payer scheme']],rel:['japan-healthcare','china-healthcare','india-healthcare','global-access-equity','care-per-dollar'],enelNote:'These systems are instructive for cost-of-care because they reach universal or near-universal coverage through very different trade-offs: Taiwan\'s low-cost single payer, Korea\'s higher patient cost-sharing, Singapore\'s savings-account model, and Thailand\'s tax-funded scheme. Each balances spending, access, and out-of-pocket burden differently, so the right comparison depends on which dimension a reader prioritizes.',enel:true},
{i:'global-access-equity',n:'Global Access and Equity',fn:'Global access and equity in health coverage',tier:1,ts:72,sig:'rising',hot:false,ev:5,cats:['access','comparative'],cls:'Cross-national equity analysis',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:30,parts:'Global; 138 countries with monitoring data (WHO/World Bank, 2023)',ctry:'Global',geo:[['Low- and middle-income regions',70],['High-income regions',30]],disc:2023,discr:'WHO/World Bank UHC Global Monitoring Report, 2023',tag:'Half the world cannot get all the essential care it needs, and the money patients must pay out of their own pockets is the part of the system that hits the poor hardest.',facts:[['Not fully covered by essential services (basic care everyone should be able to get)','About 4.5 billion people (2021 data)'],['Severe financial hardship from health costs','About 2 billion people (2023)'],['Pushed or further pushed into poverty','About 1.3 billion people (2023)'],['UHC service coverage index (a 0-to-100 score for how much essential care a country actually delivers; UHC means universal health coverage, the goal that everyone can get the care they need without financial ruin)','Rose from 45 (2000) to 68 (2021)']],brief:'This entry is about who around the world can actually get basic health care, and who is harmed financially when they try to pay for it. The 2023 report by the WHO (World Health Organization, the United Nations agency for global health) and the World Bank found that about 4.5 billion people, more than half of everyone alive, did not have full access in 2021 to essential health services, meaning the basic care people should be able to count on. About 2 billion people suffer severe financial hardship from out-of-pocket health payments, the money patients must hand over themselves at the point of care, and about 1.3 billion are pushed or pushed further into poverty by those costs, including 300 million already in extreme poverty. Out-of-pocket payment is the most regressive way to fund care, meaning it takes the biggest toll on the poor and uninsured, and it is the main cause of catastrophic health spending, costs large enough to drive a household into hardship, and of spending that pushes families below the poverty line. The overall coverage score rose a lot after 2000 but then stalled, with no gain recorded between 2019 and 2021. People in rural and remote areas consistently have less access than people in cities. Of the 138 countries with data, most were off-track on either delivering services, protecting people financially, or both.',uses:['A framework for measuring universal health coverage, scoring countries on both how much care they deliver and how well they protect people from health costs, under the United Nations Sustainable Development Goal target 3.8'],risk:'The scores depend on how much data each country reports and on statistical modeling to fill gaps; the most recent figures lag reality by about two years, and countries define essential services differently, which limits how precise these worldwide totals can be.',mf:[['The world is steadily closing in on covering everyone','Progress stalled after 2015, with no improvement in the coverage score between 2019 and 2021 (WHO/World Bank 2023).'],['Money paid out of pocket is a minor financing detail','It is the way of paying that hurts the poor most and the leading cause of health costs that push families into hardship or poverty.']],adv:[{n:'World Health Organization',r:'UHC Global Monitoring Report 2023',paid:false,note:'Coverage and financial-protection figures.'},{n:'World Bank',r:'Billions Left Behind (2023)',paid:false,note:'Poverty-impact estimates.'}],counter:[{n:'World Economic Forum analysis',cred:'Policy commentary citing WHO data',q:'Highlights that UHC progress has stagnated since 2015 despite long-run gains.'}],history:'2015 SDG 3.8 adopted; 2017, 2019, 2021, 2023 UHC global monitoring rounds; 2019 UN high-level meeting on UHC.',timeline:[['2000','UHC service coverage index baseline (about 45)'],['2015','SDG 3.8 universal health coverage target adopted'],['2019','UN high-level meeting commits to UHC'],['2021','Coverage index about 68; no gain from 2019 amid disruption'],['2023','WHO/World Bank report: 4.5 billion lack full essential coverage']],rel:['asia-healthcare','russia-healthcare','india-healthcare','care-per-dollar','africa-healthcare'],enelNote:'Access and fairness are the backdrop for any comparison of what care costs: a low advertised price means little if the service is not available, or if paying for it ruins the household. The data show that out-of-pocket payment, money patients pay themselves, is the least fair way to fund care, and that worldwide progress has stalled since 2015. Readers should remember that these scores lag by a couple of years and rely on modeling, so they show direction and rough scale rather than exact current levels.',enel:true},
{i:'africa-healthcare',n:'Sub-Saharan Africa Healthcare',fn:'Low public spend, high out-of-pocket, donor reliance',tier:1,ts:71,sig:'rising',hot:false,ev:4,cats:['other-regions','access','comparative'],cls:'Regional health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:40,parts:'48 Sub-Saharan African countries, ~1.2 billion people',ctry:'Sub-Saharan Africa (regional)',geo:[['Sub-Saharan Africa',100]],disc:2004,discr:'Rwanda national community-based health insurance, 2004',tag:'Governments spend little on health, households pay a lot themselves, and foreign donors fill much of the gap, with a few standout reforms.',facts:[['Median public health spend per person','~USD 14 (2012-2020)'],['Out-of-pocket share (portion of health costs paid directly by patients)','~35.8% avg (2012-2020)'],['Countries meeting the Abuja 15% target (a 2001 pledge by African governments to put 15% of their budgets toward health)','4 of region (2022)'],['Rwanda Mutuelles coverage (its community health insurance program)','~86% (2008)']],brief:'This entry describes how health care is paid for across Sub-Saharan Africa, the part of the continent south of the Sahara. The pattern is low government spending, little pooling of risk (sharing costs across many people so no one family bears the full hit), heavy out-of-pocket payment by patients themselves, and reliance on money from foreign donors. Government health spending averaged about 1.9 percent of GDP, the total value of a country\'s yearly output, in the WHO Africa region in 2017, versus a global average of 3.3 percent; the WHO is the World Health Organization, the United Nations health agency. Out-of-pocket payments, the money patients pay directly, averaged about 35.8 percent of all current health spending from 2012 to 2020. In 2022 only four countries met the Abuja Declaration target, a 2001 pledge by African governments to spend at least 15 percent of their budgets on health. Rwanda\'s community-based health insurance, known as Mutuelles de sante, where members of a community pay into a shared fund, launched nationwide in 2004 and reached about 86 percent of the population by 2008; it has been shown to reduce catastrophic out-of-pocket spending, costs big enough to push a family into hardship (IMF Working Paper, 2019). Nigeria\'s National Health Insurance Authority Act (2022) and Kenya\'s Social Health Insurance Act (2023) are recent moves toward covering everyone in countries where patients pay more than 70 percent of costs directly, as in Nigeria.',uses:['Primary care, mother-and-child care, infectious-disease care, and increasingly the treatment of long-term illnesses such as diabetes and heart disease, across very different national systems'],risk:'With 48 countries that differ widely, broad statements rarely hold for all of them. The often-repeated claim that about 80 percent of Africans use traditional healers traces back to a single 1983 WHO publication and has never been backed by data; treat it as disputed. The per-person and out-of-pocket figures are regional averages that hide large differences between countries.',mf:[['The popular figure that 80 percent of Africans use traditional healers is solid','It traces to a 1983 WHO publication and has no supporting data, yet is repeated without evidence (Africa Check, 2013).'],['Sub-Saharan Africa is a single health system','It is dozens of systems, from Rwanda\'s well-studied community insurance to places where households pay most costs out of pocket.']],adv:[{n:'WHO Regional Office for Africa',r:'Regional health data',paid:false,note:'Health Expenditure Atlas; Abuja target tracking.'},{n:'World Bank',r:'Development financier',paid:false,note:'Funds health-financing and coverage reforms.'}],counter:[{n:'Health-financing economists',cred:'Peer-reviewed (Springer/PMC, 2020)',q:'External donor dependence raises sustainability concerns as aid flows shift.'},{n:'Africa Check fact-checkers',cred:'Fact-checking organization (2013)',q:'The popular 80 percent traditional-healer statistic is unproven and repeatedly cited without underlying data.'}],history:'Colonial-era systems; post-independence public networks; Bamako Initiative (1987) user fees; Abuja Declaration (2001); insurance reforms 2004-2024.',timeline:[['1987','Bamako Initiative introduces community financing and user fees'],['2001','Abuja Declaration: 15% government-budget-to-health pledge'],['2004','Rwanda rolls out national community-based health insurance'],['2022','Nigeria National Health Insurance Authority Act makes coverage mandatory'],['2023','Kenya enacts Social Health Insurance Act']],rel:['middle-east-healthcare','global-access-equity','care-per-dollar','curanderas','religion-and-healthcare'],enelNote:'Sub-Saharan Africa is not one system but dozens, ranging from Rwanda\'s much-studied community insurance to places where households pay most costs directly. The evidence is strongest for spending totals from the WHO and World Bank and for programs that have actually been evaluated, such as Rwanda\'s Mutuelles; it is weakest for sweeping claims about behavior, like the unverified 80 percent traditional-healer figure. Readers comparing systems should weigh both the documented funding gaps and the measured gains where cost-sharing pools have been set up.',enel:true},
{i:'middle-east-healthcare',n:'Middle East and North Africa Healthcare',fn:'Oil-funded Gulf systems, Israeli HMOs, Iranian rural network',tier:1,ts:68,sig:'stable',hot:false,ev:4,cats:['other-regions','access','comparative'],cls:'Regional health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:35,parts:'MENA region, ~20 countries spanning low-, middle-, and high-income',ctry:'Middle East and North Africa (regional)',geo:[['Middle East',65],['North Africa',35]],disc:1995,discr:'Israel National Health Insurance Law establishing universal coverage, 1995',tag:'Wildly different systems in one region: oil-funded Gulf states with separate tiers for foreign workers, Israel\'s regulated health funds, and Iran\'s rural care network.',facts:[['Israelis entitled to coverage','100% (since 1995 law)'],['Iran rural health houses (small village clinics staffed by trained local health workers)','Over 17,000 facilities'],['Turkey insurance coverage rise','64% to 98% (2002-2012)'],['Gulf citizen vs expatriate (foreign worker living in the country)','Free public care for citizens; mandatory private insurance for many foreign workers']],brief:'This entry covers health care in the Middle East and North Africa, often shortened to MENA, a region of roughly 20 countries that fall into three broad groups: low-income (such as Yemen and Djibouti); middle-income (including Iran, Egypt, Turkey, and Morocco); and the wealthy Gulf states, which use oil money to fund near-universal public care. Israel\'s National Health Insurance Law (1995) entitles all residents to a defined set of covered services delivered by four competing nonprofit health funds, paid for by a dedicated health tax. Iran\'s primary care network runs more than 17,000 rural health houses, small village clinics staffed by trained local health workers called behvarz, a setup credited with sharply cutting deaths among rural infants. Turkey\'s Health Transformation Program, launched in 2003, raised insurance coverage from 64 percent to 98 percent between 2002 and 2012 and lifted coverage of the poorest tenth of the population from 24 percent to 85 percent. In Gulf states such as Saudi Arabia and the United Arab Emirates, citizens generally get free public care, while many foreign workers must rely on private insurance bought through their employer.',uses:['Public, insurance-based, and private care across systems shaped by oil wealth, population makeup, and reform'],risk:'MENA is highly varied, so regional summaries hide war-torn systems such as Yemen and Syria where the data cannot be trusted. In the Gulf, the split between citizens and foreign workers means coverage figures for citizens do not describe what migrant workers actually get. Some claims that a program lowered death rates are based on observed trends rather than proof of cause and effect.',mf:[['The Middle East has one regional health model','It ranges from oil-funded Gulf public systems to Israel\'s regulated multi-fund model and Iran\'s network of village health workers.'],['Universal coverage in the Gulf applies to everyone there','Citizens generally get free public care, while many migrant workers rely on limited mandatory private insurance.']],adv:[{n:'WHO Eastern Mediterranean Region',r:'Regional coordination',paid:false,note:'Universal-coverage goals (Vision 2023).'},{n:'Commonwealth Fund',r:'Health-policy research',paid:false,note:'Profiles Israeli and Iranian system structures.'}],counter:[{n:'Migrant-rights researchers',cred:'Advocacy and documentation (2023)',q:'Gulf systems split access by nationality, leaving many migrant workers with limited private coverage.'},{n:'Health-financing scholars',cred:'Peer-reviewed (2017)',q:'Oil-dependent financing raises long-run sustainability questions for Gulf universal access.'}],history:'Mandate-era and post-independence systems; Iran post-1979 primary-care expansion; Israel NHI Law 1995; Turkey HTP from 2003; Gulf reforms 2000s-2020s.',timeline:[['1985','Iran expands rural health house network nationally'],['1995','Israel enacts National Health Insurance Law for universal coverage'],['2003','Turkey launches Health Transformation Program'],['2012','Turkey reaches ~98% insurance coverage'],['2024','UAE moves to mandatory health insurance across all emirates']],rel:['africa-healthcare','global-access-equity','care-per-dollar','religion-and-healthcare'],enelNote:'MENA holds some of the world\'s most different health setups inside one region: care funded by taxes and oil money in the Gulf, a regulated system of competing nonprofit funds in Israel, and a network of village health workers in Iran that is often cited in global writing on primary care. The evidence is strongest for Israel\'s coverage law, Turkey\'s reform numbers, and the size of Iran\'s network, and weakest for war-torn states where reporting has broken down. Comparisons should separate what a system promises on paper from who actually receives care in practice.',enel:true},
{i:'oceania-and-others',n:'Oceania and Other Systems',fn:'Australia Medicare, NZ tax-funded care, Pacific challenges',tier:1,ts:64,sig:'stable',hot:false,ev:5,cats:['other-regions','access','comparative'],cls:'Regional health system',orig:'system',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:30,parts:'Australia, New Zealand, and Pacific island countries',ctry:'Oceania (regional)',geo:[['Australia',55],['New Zealand',25],['Pacific islands',20]],disc:1984,discr:'Australia establishes universal Medicare, 1984',tag:'Two well-established systems that cover everyone, sitting alongside small island states with severe shortages.',facts:[['Australia health spending (2023-24)','AUD 270.5 billion, ~10.1% of GDP (the country\'s total yearly output)'],['Australia per person (2023-24)','~AUD 10,037'],['New Zealand health spending (2022)','~10% of GDP, ~USD 4,820 per person'],['Pacific countries spending USD 500 or less per person','10 of 14 countries']],brief:'This entry covers Oceania, meaning Australia, New Zealand, and the Pacific island countries. Australia\'s Medicare, its public health program covering all residents, was reinstated in 1984 and is paid for by a dedicated Medicare tax plus general taxes, alongside a large private sector. In 2023 to 2024 Australia spent AUD 270.5 billion on health, about 10.1 percent of GDP, the value of everything the country produces in a year, or roughly AUD 10,037 per person; governments funded 69.6 percent and patients paid about AUD 44.0 billion out of their own pockets (AIHW, 2025). New Zealand\'s system, paid for mostly through taxes, was reorganized on 1 July 2022 under the Pae Ora (Healthy Futures) Act, which abolished the regional district health boards and created a single national agency, Health New Zealand (Te Whatu Ora); the country spends about 10 percent of GDP, roughly USD 4,820 per person, with the government covering about 81 percent. The Pacific island countries face very different limits: 10 of 14 spend USD 500 or less per person a year, and these small states struggle with shortages of medical staff and a heavy load of long-term illnesses such as diabetes and heart disease, which account for about 80 percent of deaths in Fiji.',uses:['Full universal care in Australia and New Zealand, and resource-limited basic and referral care across the Pacific island states'],risk:'Lumping Australia and New Zealand together with tiny Pacific island states spans a huge gap in wealth and capacity, so a combined figure would be meaningless and the data are reported country by country instead. Averages for small Pacific states swing sharply because their populations are tiny and donor money arrives in bursts. New Zealand\'s 2022 overhaul is recent, so results are still limited.',mf:[['Oceania can be described with one regional average','Australia and New Zealand spend close to 10 percent of GDP while 10 of 14 Pacific states spend USD 500 or less per person; averaging them together is misleading.'],['Universal coverage removes all cost pressure','Australia\'s Medicare has faced steady strain since 2000 over doctors billing the government directly and over patients\' own out-of-pocket costs.']],adv:[{n:'Australian Institute of Health and Welfare',r:'Official statistics agency',paid:false,note:'Australian health expenditure data.'},{n:'World Bank Pacific health program',r:'Development financier',paid:false,note:'Supports health-access investments across Pacific island states.'}],counter:[{n:'Medical Journal of Australia analysts',cred:'Peer-reviewed (2023)',q:'Medicare faces sustained pressure on bulk-billing and out-of-pocket costs since 2000.'},{n:'Lowy Institute researchers',cred:'Policy institute',q:'Pacific health spending is heavily shaped by foreign aid, raising sustainability and volatility concerns.'}],history:'Australia Medibank 1975, Medicare 1984; New Zealand Social Security Act 1938 then 2022 Pae Ora reforms; Pacific systems shaped by small scale and donor support.',timeline:[['1938','New Zealand Social Security Act lays groundwork for public health funding'],['1975','Australia introduces Medibank universal insurance'],['1984','Australia reinstates universal Medicare'],['2022','New Zealand Pae Ora Act creates Health New Zealand'],['2024','World Bank Fiji Health Sector Review flags NCD crisis']],rel:['africa-healthcare','middle-east-healthcare','global-access-equity','care-per-dollar'],enelNote:'Oceania pairs two mature, well-documented systems that cover everyone with some of the world\'s most resource-strapped island states, so this entry reports them separately rather than blending them into one average. The evidence is strong and recent for Australia and New Zealand and thinner for the small Pacific states, where tiny populations and donor money make per-person figures jump around. The instructive contrast is that spending near 10 percent of GDP coexists, in the same region, with countries spending under USD 500 per person.',enel:true},
{i:'monetization-over-time',n:'Monetization of Health Care Over Time',fn:'Has health care been monetized more over time?',tier:1,ts:88,sig:'hot',hot:true,ev:4,cats:['trending','comparative','history','pricing'],cls:'Macro trend in health financing',orig:'concept',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:40,parts:'Cross-national, multi-decade national-accounts data',ctry:'United States and OECD comparison group',geo:[['United States',45],['Europe',25],['Asia',15],['Other regions',15]],disc:1960,discr:'Modern health-accounts era (1960 onward)',tag:'A claim worth testing, not assuming: by some measures care has become more of a money business over time, and by others less.',facts:[['US health spend as share of GDP, 1960 (GDP is the country\'s total yearly output)','5.0% (CMS NHE, the US government\'s national health-spending accounts)'],['US health spend as share of GDP, 2024','18.0% (CMS / Peterson-KFF)'],['OECD spending paid through government or compulsory insurance (the OECD is a group of mostly wealthy democracies)','Over 76% (OECD 2023)'],['US physicians bought by private equity, 2019-2023 (private equity means investment firms that buy companies, here medical practices)','65% of acquisitions (AHA 2023)']],brief:'This entry tests a common claim: that health care has been turned into a money business more and more over time. The data both support and contradict it, so it has to be checked rather than taken on faith. In the United States, health spending rose from 5.0 percent of GDP, the value of all the country produces in a year, in 1960 to 17.7 percent in 2023 and 18.0 percent in 2024 (CMS National Health Expenditure Accounts, the US government\'s official health-spending tally, and Peterson-KFF). Signs of financialization, meaning care being treated as an investment to profit from, also rose: private equity firms, investment companies that buy up businesses, accounted for about 65 percent of all physician practices acquired during 2019 to 2023, and roughly 488 US hospitals (about 8.5 percent of private hospitals) were owned by private equity. The opposite trend is just as well documented: across the OECD, a group of mostly wealthy democracies, more than 76 percent of all health spending is now paid through government or compulsory insurance rather than by patients on the open market, and in the US the public-and-compulsory share itself rose to roughly 85 percent after the Affordable Care Act took effect in 2014. Back in 1980 the OECD average public share was already 76 percent while the US sat at 42 percent, so several systems moved toward more shared, collective funding over this period, not less. The honest reading is mixed: in the US, dollar spending grew and ownership became more investor-driven, while across much of the world the share of costs paid through public or compulsory pooling expanded.',uses:['Framing whether health systems have become more market-driven, for comparing countries\' policies and for historical analysis'],risk:'Spending measured as a share of GDP reflects both prices and the size of the economy underneath; the 2020 jump to 19.7 percent partly reflects the economy shrinking during the pandemic rather than any new push to profit. Countries define the public share differently, and compulsory private insurance is sometimes counted as public. Private equity ownership data is incomplete because many deals are never made public.',mf:[['Health care has simply become more of a money business everywhere over time','US dollar spending and for-profit ownership rose, but the share paid through government or compulsory pooling also rose in most OECD systems; the trend runs in more than one direction at once.'],['A rising share of GDP proves more money-making','Share of GDP is a ratio, not a pure price signal; the size of the economy underneath matters, especially the 2020 pandemic dip.']],adv:[{n:'Peterson-KFF Health System Tracker',r:'Health spending data aggregator',paid:false,note:'Long-run US and cross-country spending series.'},{n:'OECD Health Division',r:'International statistics body',paid:false,note:'Financing-scheme shares used to test the public-versus-private balance.'}],counter:[{n:'Public-financing scholars',cred:'Health economics',q:'Rising GDP share does not by itself prove monetization; in most OECD systems the collectively financed share grew, indicating de-marketization in financing even as prices rose.'},{n:'Market-consolidation critics',cred:'Health policy research',q:'Private-equity and for-profit ownership data understate the trend because many transactions are undisclosed.'}],history:'1960s modern health accounts begin; 1980 OECD average public share 76 percent versus US 42 percent; 2000 US reaches 13.3 percent of GDP; 2014 ACA raises the US public and compulsory share; 2024 US reaches 18.0 percent of GDP.',timeline:[['1960','US health spending at 5.0% of GDP (CMS NHE)'],['1980','OECD average public share 76%; US public share 42% (OECD)'],['2000','US health spending reaches 13.3% of GDP (CMS)'],['2014','ACA implementation raises US public/compulsory financing share'],['2024','US health spending at 18.0% of GDP (CMS / Peterson-KFF)']],rel:['history-of-medical-cost','us-healthcare-overview','us-outcomes-vs-spend','care-per-dollar','religion-and-healthcare'],enelNote:'Ēnel treats this as worth studying precisely because the popular claim cuts both ways. The dollar volume and for-profit ownership of US care clearly rose across the modern era, yet across most OECD systems the share funded through public or compulsory pooling grew rather than shrank. Reporting only one side would mislead. The neutral position is that turning care into a money business is many things at once: prices, ownership structure, and who foots the bill can move in opposite directions at the same time, so any verdict has to say which of these it means and which country it describes.',enel:true},
{i:'history-of-medical-cost',n:'History of Medical Cost and Who Pays',fn:'How societies decided who pays for care, across history',tier:1,ts:71,sig:'rising',hot:false,ev:4,cats:['history','pricing','comparative'],cls:'Cultural and economic history of financing',orig:'concept',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:30,parts:'Cross-cultural historical record from medieval era to the twentieth century',ctry:'Europe, Middle East, and United States (cross-cultural)',geo:[['Europe',45],['United States',30],['Other regions',25]],disc:1929,discr:'Baylor Plan and birth of modern hospital insurance',tag:'A long shift in who pays for care, from charity and poorhouses to insurance and the state.',facts:[['English hospitals and almshouses (charity homes for the poor and sick) by mid-1500s','Roughly 800 institutions'],['Baylor Plan launched, Dallas (an early prepaid hospital plan)','1929, 50 cents per month'],['Dallas teachers enrolled by Dec 1929','About 75%'],['UK NHS (National Health Service, Britain\'s tax-funded public health system) founded','5 July 1948']],brief:'This entry traces how societies, over the centuries, decided who pays for medical care. For most of recorded history, care was funded by charity, religion, trade guilds, and direct household payment rather than organized insurance. In medieval Europe, roughly 800 hospitals and almshouses, charity homes for the poor and sick, often run by religious orders where prayer was considered as important as treatment, offered shelter and basic relief by the mid-1500s. Barber-surgeons, early practitioners who both cut hair and performed surgery, were organized through guilds, the trade associations of the day, and patients who could pay did so directly. Germ theory, the discovery that tiny microbes cause disease, advanced by Louis Pasteur and Robert Koch from the 1860s to the 1880s, turned medicine from mere custodial care into treatment that actually worked, which raised both the value and the cost of hospital care. Modern prepaid hospital insurance, paying a small amount in advance to cover future hospital bills, is usually dated to the 1929 Baylor Plan in Dallas, where teachers paid 50 cents a month for up to 21 days of hospital care and about 75 percent signed up within the year; this became Blue Cross. After the Second World War, societies split over who pays: the United Kingdom created the National Health Service (NHS) in 1948, a system funded by taxes and free at the point of use, while the United States expanded insurance provided through employers, a fork in the road that still shapes who bears the cost today.',uses:['Background for why financing systems differ between countries and how responsibility for cost shifted from charity to insurance to the state'],risk:'Historical records vary in quality across regions and eras; counts of institutions and enrollment figures come from different methods. Calling the Baylor Plan the origin of hospital insurance is a common shorthand, but earlier mutual-aid groups and sickness funds existed in Europe and are sometimes credited instead.',mf:[['Health care has always been expensive','For centuries care was cheap mainly because it could do so little; cost climbed as germ theory, the understanding that microbes cause disease, made treatment actually work.'],['Hospital insurance began with the 1929 Baylor Plan everywhere','Baylor is a US shorthand; Germany\'s Bismarck sickness funds, government-backed worker health funds set up in 1883, and earlier European mutual-aid societies came before it.']],adv:[{n:'Texas State Historical Association',r:'Historical archive',paid:false,note:'Documents the Baylor Plan and Justin Ford Kimball\'s 1929 design.'},{n:'Historic England',r:'Heritage research body',paid:false,note:'Sources for medieval hospital and almshouse counts.'}],counter:[{n:'European social-insurance historians',cred:'History of medicine',q:'Crediting 1929 Baylor as the start of health insurance overlooks Bismarck-era German sickness funds from 1883 and earlier mutual-aid societies.'},{n:'Economic historians',cred:'Health economics history',q:'Cost rose less because of greed than because effective medicine after germ theory became capable of doing, and charging for, far more.'}],history:'Medieval era: religious and guild charity dominate. 1860s-1880s: germ theory makes intervention effective. 1883: Germany establishes statutory sickness insurance under Bismarck. 1929: Baylor Plan launches prepaid hospital insurance. 1930s-1940s: Blue Cross spreads; US employer coverage expands during wartime wage controls. 1948: UK founds the NHS.',timeline:[['1500','Roughly 800 hospitals and almshouses across England'],['1880','Germ theory established by Pasteur and Koch'],['1883','Germany enacts statutory sickness insurance under Bismarck'],['1929','Baylor Plan launches prepaid hospital insurance'],['1948','UK National Health Service founded']],rel:['monetization-over-time','religion-and-healthcare','us-healthcare-overview','care-per-dollar','us-outcomes-vs-spend'],enelNote:'Ēnel frames the history of cost as a story about shifting responsibility rather than rising villainy. For centuries care was cheap mainly because it could do little, and was funded by charity, faith, guilds, and direct payment. The germ-theory revolution of the 1860s to 1880s, the discovery that microbes cause disease, made treatment genuinely effective, which is also what made it expensive to provide. How societies then chose to share that cost, through taxes, compulsory insurance, employer plans, or out-of-pocket payment by patients themselves, was as much a values choice as an economic one. We lay out these paths without ranking them.',enel:false},
{i:'religion-and-healthcare',n:'Religion and Health Care',fn:'Religion and Health Care: Faith Within Healing',tier:1,ts:78,sig:'stable',hot:false,ev:3,cats:['religion','history','comparative','access'],cls:'Belief, spirituality, and faith communities as they shape how people seek, receive, refuse, and make sense of medical care.',orig:'concept',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:4000,parts:'All faith traditions, secular patients, clinicians, chaplains, and folk healers',ctry:'Global',geo:[['Asia-Pacific',30],['Sub-Saharan Africa',16],['Europe',15],['Latin America',13],['North America',12],['Middle East and North Africa',9],['South Asia',5]],disc:1879,discr:'No single discovery date applies; faith and healing have been linked since prehistory. The year 1879 marks the founding of the Church of Christ, Scientist, a notable modern case of faith intersecting with medical care.',tag:'Faith can comfort, and it can complicate. Care meets belief in both directions.',facts:[['First bimaristan (early Islamic hospital), Damascus','8th century, under Caliph al-Walid'],['US hospital beds in Catholic facilities','About 1 in 6, roughly 14% (2023)'],['Catholic hospitals worldwide','More than 5,500, about 65% in developing countries'],['Research on religion and health','Thousands of studies; quality mixed and debated (2010s)']],brief:'For most of human history, healing and belief were not separate activities; people prayed for the sick, anointed them, and sought meaning in illness long before there were hospitals. Today many patients still draw on faith for comfort, hope, and community when they are ill, and many hospitals employ chaplains, who are trained providers of spiritual and emotional support, to sit with patients of any belief or none. Ritual and belief can also shape how the body responds; the placebo effect, sometimes called the meaning response, describes real improvement that follows from expectation and care rather than from an active treatment. At the same time, faith can limit openness to care: some Jehovah\'s Witnesses decline blood transfusions, some Christian Scientists have historically chosen prayer over medical treatment, and some believers object to particular vaccines, contraception, or end-of-life interventions. Faith also raises hard questions that medicine alone cannot settle, such as why suffering happens, when to keep treating or let go, and how a family weighs a hoped-for miracle against a doctor\'s prognosis, meaning the expected course of an illness. In many cultures the spiritual and the medical are still one thing, and folk or indigenous healers such as curanderos, Spanish for traditional folk healers, treat body and spirit together. Research on whether religion improves health is genuinely mixed: some studies link religious participation or spiritual coping to better mental health, while careful critics argue the links are weak, confounded, or overstated. This entry presents faith in health care agnostically, as both a real source of meaning and a real source of friction, without endorsing or criticizing any belief.',uses:['Understanding why some patients accept, delay, or refuse specific treatments','Helping clinicians and families discuss spiritual needs respectfully','Contextualizing hospital chaplaincy and spiritual-care services','Interpreting research claims about religion and health with appropriate caution','Recognizing folk and indigenous healing within a patient\'s worldview'],risk:'This entry is informational only and is neither medical nor religious advice. The research linking religion or spirituality to health is mixed, often confounded by social and lifestyle factors, and contested by serious scholars; associations should not be read as proof of cause. Examples of faith-based refusal or objection describe documented practices, not the views of every member of any tradition, and individual believers vary widely. Decisions about treatment should be made with qualified clinicians, and decisions about belief belong to the patient and their community.',mf:[['Faith healing always means rejecting medicine.','Most religious traditions encourage both prayer and medical care; outright refusal is the exception, associated with specific groups or doctrines rather than belief in general.'],['Science has proven that religious people are healthier.','Some studies report associations between religious participation and better mental-health or coping outcomes, but the literature is mixed and confounded, and respected critics argue the links are weak or overstated; no firm causal claim is established.'],['A hospital chaplain is there to convert patients.','Chaplaincy is trained to support patients of any faith or none, focusing on listening, meaning, and comfort rather than persuasion.']],adv:[{n:'Hospital and palliative-care chaplains (professional associations)',r:'Spiritual care within clinical settings',paid:false,note:'Provide nondenominational support; useful neutral perspective on faith at the bedside.'},{n:'Harold G. Koenig, Duke University',r:'Researcher who reviews associations between religion and health',paid:false,note:'Represents the side of the debate that finds positive associations; read alongside critics.'},{n:'Medical ethics and bioethics scholars',r:'Analyze conscience, refusal, and end-of-life questions',paid:false,note:'Help frame the hard questions neutrally, balancing patient autonomy and clinician conscience.'}],counter:[{n:'Richard P. Sloan, Columbia University',cred:'Behavioral medicine researcher; author of Blind Faith (2006)',q:'Argues that much of the research linking religion to health is methodologically weak and that the claimed connections are overstated.'},{n:'Patient-autonomy advocates',cred:'Bioethics and civil-liberties voices',q:'Caution that conscience-based refusals by clinicians or institutions can limit patient access to legal care, especially for reproductive and end-of-life services.'},{n:'Secular and skeptical clinicians',cred:'Evidence-focused medical practitioners',q:'Hold that spiritual care should never substitute for effective treatment and that belief and evidence must be kept distinct in clinical decisions.'}],history:'Belief and healing have been intertwined since prehistory. In ancient Greece, the sick slept in temples of Asclepius, the god of medicine, seeking cures through dreams, even as Hippocratic physicians around 400 BCE began separating natural causes from divine ones. Across the medieval Islamic world and Christian Europe, prayer, relics, and anointing of the sick sat beside early bedside care. Religious institutions also built and ran much of that care: the first bimaristans, early Islamic hospitals open to all regardless of faith, appeared in 8th-century Damascus under Caliph al-Walid, and today the Catholic Church alone operates more than 5,500 hospitals worldwide, about 65 percent of them in developing countries, while faith-based providers deliver an estimated 40 to 70 percent of care in parts of rural sub-Saharan Africa. That institutional role is one facet of a much larger relationship. In 1879 Mary Baker Eddy founded the Church of Christ, Scientist, which historically taught that prayer, not medicine, was the proper response to illness. In 1945 a Watch Tower publication declared blood transfusion contrary to scripture, a doctrine enforced among Jehovah\'s Witnesses from 1961. The mid-twentieth century saw hospital chaplaincy professionalize, with clinical pastoral education training chaplains to serve patients of every faith and none. From the 1980s onward, Harold Koenig and colleagues published reviews associating religious involvement with better outcomes, while Richard Sloan and others argued in the late 1990s and 2000s that the evidence was weak and overstated, a debate that continues. Throughout, folk and indigenous traditions, from curanderos in Latin America to shamans across Asia and the Americas, have treated body and spirit as one.',timeline:[['c. 400 BCE','Hippocratic physicians in Greece begin attributing illness to natural rather than divine causes, even as temple healing continues.'],['8th century','The first bimaristans, early Islamic hospitals open to all, are founded in Damascus under Caliph al-Walid.'],['1879','Mary Baker Eddy founds the Church of Christ, Scientist, historically favoring prayer over medical treatment.'],['1945','A Watch Tower publication opposes blood transfusion; the doctrine is enforced among Jehovah\'s Witnesses from 1961.'],['1960s','Clinical pastoral education and hospital chaplaincy professionalize, serving patients of any belief.'],['1999','Richard Sloan and colleagues publish a prominent critique questioning links between religion and health.'],['2006','Sloan\'s book Blind Faith argues the religion-health evidence is overstated.'],['2012','Harold Koenig publishes a widely cited review summarizing associations between religion, spirituality, and health.']],rel:['curanderas','history-of-medical-cost','us-healthcare-overview','care-per-dollar'],enelNote:'We treat faith in health care as a genuine two-sided reality. For many people, belief is a real source of comfort, meaning, and community in illness, and spiritual care can ease fear and loneliness at the bedside; some research links religious participation or spiritual coping to better mental health. At the same time, faith can introduce friction: documented refusals such as declining blood transfusions, objections to certain vaccines or contraception, and conscience-based refusals by clinicians or institutions can delay or limit care, and belief can collide with evidence over miracles, prognosis, and end-of-life choices. The research is mixed, confounded, and contested, so we report associations without claiming cause, and we name both the scholars who find links and those who say the links are overstated. Ēnel neither endorses nor criticizes any belief; we describe how faith and healing meet, in both directions, and leave the judgments to patients, families, and their communities.',enel:true},
{i:'research-methodologies',n:'Research Methodologies',fn:'How medical research is designed, funded, and biased',tier:1,ts:74,sig:'rising',hot:false,ev:4,cats:['research','comparative','history'],cls:'The evidence engine',orig:'concept',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:2000,parts:'Spans all clinical research; meta-research draws on thousands of trials',ctry:'Global',geo:[['United States',35],['Europe',30],['Asia',20],['Other regions',15]],disc:1948,discr:'Modern RCT methodology dated to the 1948 UK MRC streptomycin trial, led by Austin Bradford Hill',tag:'The system that produces medical evidence, and the funding and publishing pressures that shape it.',facts:[['First modern RCT (randomized controlled trial, where people are split into groups by chance for a fair comparison)','1948 trial of streptomycin by the UK Medical Research Council, led by Bradford Hill'],['Funding effect','Drug trials paid for by industry more often favor the sponsor\'s drug'],['Publication bias','Studies with positive results are far more likely to get published'],['Reform tool','Registering a trial\'s plan in advance (ClinicalTrials.gov, started 2000)']],brief:'This entry is about how medical evidence gets made, and why who designs and pays for a study matters as much as what it finds. Studies come in a ranked order of trustworthiness. Near the top are randomized controlled trials (RCTs), where people are split into groups by chance so the comparison is fair; the modern version dates to the 1948 UK Medical Research Council trial of the antibiotic streptomycin, led by Austin Bradford Hill. Below those are observational and cohort studies (which follow groups of people over time without assigning treatments by chance), and more recently real-world evidence drawn from medical records and registries. Funding shapes results: a 2017 review by the Cochrane group (a nonprofit that summarizes medical evidence), led by Andreas Lundh and colleagues, found that drug and device studies paid for by industry more often reach conclusions favorable to the sponsor than studies funded otherwise. Publication bias makes this worse: trials with positive results are more likely to be published, so the overall body of literature can overstate how well treatments work. John Ioannidis argued in his 2005 paper Why Most Published Research Findings Are False (in the journal PLoS Medicine) that small studies, small effects, flexible analysis, and financial interest make many published claims unreliable. Reforms such as registering a trial\'s plan in advance (the ClinicalTrials.gov registry launched in 2000) and committing to publish results either way aim to curb cherry-picking, though they are not used consistently.',uses:['A checklist for judging any medical claim: what study design produced it, who paid for it, whether its plan was registered in advance, and whether the full result was reported'],risk:'No study design is free of bias. RCTs may not reflect ordinary patients, observational studies can be thrown off by hidden differences between groups, and reviews of many studies are only as good as the studies they include. Because of funding and publication bias, the absence of published harm is not proof that something is safe.',mf:[['A published study means the matter is settled','Industry funding and publication bias mean published findings can overstate benefit; the study\'s design and funding source are part of the evidence (Cochrane review 2017; Ioannidis 2005).'],['RCTs always give the real-world answer','RCTs prove cause and effect under controlled conditions but may not apply to everyday patients; real-world data from records and registries fills gaps RCTs cannot.']],adv:[{n:'Austin Bradford Hill',r:'Statistician, MRC streptomycin trial',paid:false,note:'Helped establish the modern randomized trial in 1948.'},{n:'John Ioannidis',r:'Stanford researcher who studies research itself',paid:false,note:'Authored the 2005 paper on unreliable published findings.'}],counter:[{n:'Trial methodologists',cred:'Clinical epidemiology',q:'Funding bias is real but it is documented and partly fixable through advance registration and data sharing, not a reason to throw out all industry research.'},{n:'Real-world evidence advocates',cred:'Health data science',q:'Data from registries and medical records can answer questions RCTs cannot, as long as hidden differences between groups are handled carefully.'}],history:'Bradford Hill\'s 1948 MRC streptomycin trial; Archie Cochrane\'s Effectiveness and Efficiency (1972) urging RCTs; Ioannidis 2005 metascience essay; ClinicalTrials.gov preregistration mandated under US FDAAA 2007.',timeline:[['1948','MRC streptomycin RCT sets modern trial standard'],['1972','Cochrane\'s Effectiveness and Efficiency urges rigorous RCTs'],['2000','ClinicalTrials.gov registry launched'],['2005','Ioannidis Why Most Published Research Findings Are False'],['2017','Cochrane Lundh review quantifies industry sponsorship effect']],rel:['evidence-hierarchy','de-rigueur-practices','monetization-over-time','us-outcomes-vs-spend','care-per-dollar'],enelNote:'How a study is built determines how much weight its finding deserves. The same question can get different answers from an industry-funded trial, an academic study that follows patients over time, and an analysis of medical records, and each carries its own kind of bias. The point is not that research cannot be trusted but that design and funding are part of the evidence, not background details. When comparing care across countries, readers should ask not only what a study found but who designed it, who paid for it, and whether the full result was reported.',enel:true},
{i:'evidence-hierarchy',n:'Evidence Hierarchy',fn:'Ranking evidence from meta-analyses to expert opinion',tier:1,ts:70,sig:'stable',hot:false,ev:5,cats:['research','history','comparative'],cls:'Evidence-based medicine\'s ranking of study types',orig:'concept',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:100,parts:'Framework adopted by 100+ organizations including WHO, NICE, and Cochrane',ctry:'Global',geo:[['United States',30],['Canada',20],['Europe',30],['Other regions',20]],disc:1992,discr:'Term evidence-based medicine popularized 1992 by David Sackett and colleagues; coined 1991 by Gordon Guyatt',tag:'The ranking of study types from strongest to weakest, sharpened by GRADE, a system for rating how certain evidence is.',facts:[['Top of the ranking','Systematic reviews and meta-analyses (combining many studies) of RCTs'],['Bottom of the ranking','Expert opinion and single case reports'],['Key date','The term evidence-based medicine was made popular in 1992 (Sackett, in the journal JAMA)'],['Certainty tool','GRADE working group, founded 2000']],brief:'This entry is about the ranking doctors use to decide which kinds of studies count as stronger proof. The evidence hierarchy orders study designs by how well they guard against bias. Traditionally at the top are systematic reviews and meta-analyses (methods that combine many studies into one overall result) of randomized controlled trials (RCTs, where people are split into groups by chance for a fair comparison). In the middle are single RCTs and cohort studies (which follow groups over time). At the bottom are single case reports and expert opinion. The term evidence-based medicine was coined in 1991 by Gordon Guyatt at McMaster University and made popular by a 1992 paper in the journal JAMA by David Sackett and colleagues, building on Archie Cochrane\'s 1972 call for rigorous trials. Guyatt and Sackett published an early formal ranking in 1995. The GRADE working group, founded in 2000, sharpened the approach: GRADE (a system for rating how certain evidence is) labels the certainty of evidence as high, moderate, low, or very low, and keeps that separate from how strongly something is recommended. GRADE is now used by more than 100 organizations including the World Health Organization (WHO), the UK\'s National Institute for Health and Care Excellence (NICE), and the Cochrane group (which summarizes medical evidence). Critics note that a rigid ranking can undervalue studies of how a treatment works in the body and observational studies, and that population averages do not always fit an individual patient.',uses:['Helps doctors and guideline writers weigh conflicting studies and judge how much confidence a recommendation deserves'],risk:'A rigid ranking can mislead: a well-run cohort study can beat a flawed RCT, and a review that combines studies inherits the biases of the studies it includes. The ranking measures how well a study controls bias, not how relevant it is to a given patient, and expert judgment is still needed where trials do not exist or are not practical.',mf:[['Anything below an RCT is worthless evidence','A well-run cohort study can outrank a flawed RCT, and some questions cannot ethically be tested by chance assignment; ranking is not the same as relevance.'],['A high-certainty average applies to every patient','The ranking measures how well a study controls bias, not how well it fits one person; GRADE deliberately separates how certain the evidence is from how strong the recommendation is.']],adv:[{n:'David Sackett',r:'Clinical epidemiologist, McMaster',paid:false,note:'Popularized evidence-based medicine in 1992.'},{n:'Gordon Guyatt',r:'McMaster University, GRADE co-founder',paid:false,note:'Coined the term evidence-based medicine in 1991 and helped build GRADE.'}],counter:[{n:'Critics of evidence-based medicine (2011 review)',cred:'Philosophy of medicine',q:'A rigid ranking can dismiss studies of how a treatment works and observational studies, and can hide differences between individual patients.'},{n:'Real-world evidence proponents',cred:'Health services research',q:'Some questions cannot be tested ethically or practically by chance assignment, so a lower-ranked study can be the best evidence available.'}],history:'Cochrane 1972; Guyatt coins EBM 1991; Sackett JAMA paper 1992; Guyatt and Sackett hierarchy 1995; GRADE working group founded 2000.',timeline:[['1972','Cochrane Effectiveness and Efficiency urges trial-based medicine'],['1991','Guyatt coins evidence-based medicine'],['1992','Sackett and colleagues popularize EBM in JAMA'],['1995','Guyatt and Sackett publish early evidence hierarchy'],['2000','GRADE working group founded']],rel:['research-methodologies','de-rigueur-practices','monetization-over-time','us-outcomes-vs-spend','care-per-dollar'],enelNote:'The ranking is a useful default, not a law. It orders study designs by how well they control bias, which is why reviews combining RCTs sit on top, but ranking is not the same as relevance. A high-certainty average can still be wrong for a particular patient, and a question that cannot ethically be tested by chance assignment may leave a careful cohort study as the best available evidence. GRADE\'s split between how certain the evidence is and how strong the recommendation is reflects this. Treat the ranking as a starting question, not a final verdict.',enel:true},
{i:'de-rigueur-practices',n:'De Rigueur Practices',fn:'Care that became standard by convention, not proof',tier:1,ts:67,sig:'rising',hot:false,ev:4,cats:['research','history','comparative'],cls:'Routines adopted on habit rather than rigorous evidence',orig:'practice',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:146,parts:'Prasad 2013 reviewed over 2000 NEJM articles, identified 146 reversed practices',ctry:'Global',geo:[['United States',40],['Europe',25],['Asia',20],['Other regions',15]],disc:2013,discr:'Medical reversal framework formalized 2013 by Vinay Prasad and colleagues, Mayo Clinic Proceedings',tag:'Standard of care is not the same as proven.',facts:[['Practices later overturned','146 contradicted practices (Prasad, 2013)'],['Annual physical','2019 Cochrane review: little or no effect on deaths'],['Hormone therapy reversed','Women\'s Health Initiative trial, July 2002'],['Key book','Ending Medical Reversal (Prasad and Cifu, 2015)']],brief:'This entry is about medical routines that became standard out of habit or early enthusiasm rather than solid proof, and that were sometimes overturned once they were properly tested. Doctors Vinay Prasad and Adam Cifu call this pattern medical reversal: a standard practice later overturned by better evidence. In their 2013 paper A Decade of Reversal (in the journal Mayo Clinic Proceedings), Prasad and colleagues reviewed more than 2,000 articles in the New England Journal of Medicine and found 146 established practices that good trials reversed; of the articles that tested an existing practice, about 40 percent found it useless or harmful. Their 2015 book Ending Medical Reversal lists examples from surgery, screening, and prevention. The routine yearly physical is a common example: a 2019 Cochrane review (led by Krogsboll, covering 11 trials and 233,298 people) found that general health checks have little or no effect on deaths overall, from cancer, or from heart disease. In July 2002, the Women\'s Health Initiative trial overturned the routine use of hormone replacement therapy (estrogen and related hormones given after menopause) to prevent long-term disease, though later analyses that broke results down by age gave a more nuanced picture. A practice adopted by convention differs from a proven one precisely because it rests on habit until a trial confirms or refutes it.',uses:['Prompts doctors and patients to ask whether a standard treatment has trial evidence that it helps, or is simply customary'],risk:'Calling a practice unproven is not the same as proving it useless; a missing trial may reflect cost or ethics, not failure. Reversals can also overshoot, as the hormone therapy debate showed, where dropping it across the board may have harmed some patients who would have benefited.',mf:[['Standard of care means it has been scientifically proven','About 40 percent of tested established practices were found useless or harmful (Prasad 2013); standard practice can rest on convention.'],['If a practice shows no benefit for survival it is worthless','A missing trial, or no measurable effect on deaths, is not proof of no value; reversals themselves can overshoot, as later Women\'s Health Initiative analyses showed.']],adv:[{n:'Vinay Prasad',r:'Blood-cancer doctor and researcher',paid:false,note:'Co-authored the 2013 reversal analysis and 2015 book.'},{n:'Adam Cifu',r:'Internist, University of Chicago',paid:false,note:'Co-author of Ending Medical Reversal (2015).'}],counter:[{n:'Primary care defenders',cred:'Family medicine',q:'Yearly visits build relationships and catch problems that survival trials do not measure, so no effect on deaths is not the same as no value.'},{n:'Reversal critics',cred:'Clinical epidemiology',q:'Some reversals rest on a single trial, and the framework can understate how much remains uncertain, as later Women\'s Health Initiative hormone analyses showed.'}],history:'WHI hormone therapy reversal July 2002; Prasad A Decade of Reversal 2013; Prasad and Cifu Ending Medical Reversal 2015; Cochrane general health checks review updated 2019.',timeline:[['2002','Women\'s Health Initiative reverses routine HRT for prevention'],['2012','Cochrane health-checks review finds no mortality benefit'],['2013','Prasad A Decade of Reversal identifies 146 reversed practices'],['2015','Ending Medical Reversal published'],['2019','Updated Cochrane review confirms minimal health-check benefit']],rel:['research-methodologies','evidence-hierarchy','monetization-over-time','us-outcomes-vs-spend','care-per-dollar'],enelNote:'That a practice is universal does not mean it is proven; many routines spread before trials existed to test them. The yearly physical and routine preventive hormone therapy are textbook cases where habit ran ahead of evidence. The honest reading cuts both ways: unproven should not become a slogan for abandoning care, because a missing trial can mean a question is hard to study, not that the practice fails. Reversals themselves can overshoot. The useful habit is to ask, for any standard treatment, which trial showed it helps and for whom.',enel:true},
{i:'social-media-health',n:'Social Media and Health Influence',fn:'How platforms and influencers move health beliefs and markets',tier:1,ts:91,sig:'hot',hot:true,ev:4,cats:['trending','influence','comparative','research'],cls:'Information environment / health communication phenomenon',orig:'concept',aa:0,fdaS:'none',fda:'Not applicable',wada:'Not applicable',rcts:0,studies:60,parts:'Billions of platform users worldwide; individual content audits typically review 100 to 1,000 videos each',ctry:'Global',geo:[['North America',34],['Asia-Pacific',30],['Europe',20],['Latin America',9],['Africa and Middle East',7]],disc:2020,discr:'Health content auditing on short-video platforms became a distinct research field around 2020 to 2021 as TikTok scaled and COVID-19 drove an infodemic; the WHO popularized the term infodemic in 2020.',tag:'Going viral is a loudspeaker, not a verdict.',facts:[['TikTok sinusitis videos containing false information (Otolaryngology Head and Neck Surgery, 2024)','About 44%'],['Instagram influencers following FTC disclosure rules (Inkifi, 2020)','About 25% overall; 16% of health and fitness creators'],['#Ozempic TikTok views, 2021 to 2023','2 million rising to about 1.2 billion'],['US adults who believed ivermectin treated COVID (KFF, 2021)','About 14%']],brief:'This entry is about how social media platforms and the people with large followings on them shape what the public believes about health, and even what products people buy. Health content on TikTok, Instagram, YouTube, and X reaches billions of people, and study after study finds a large share of it is wrong. A 2024 study in the journal Otolaryngology Head and Neck Surgery found that about 44 percent of popular TikTok videos about sinus infections contained false information, and a 2023 analysis found roughly 77 percent of top YouTube videos about prostate cancer carried misleading or biased content. Platforms can clearly move markets. Views of the hashtag #Ozempic on TikTok jumped from about 2 million in 2021 to roughly 1.2 billion by 2023 (reported by Euronews, 2023) as celebrity and influencer posts helped drive prescriptions for GLP-1 drugs (a class of medicines used for diabetes and weight loss) and contributed to shortages that the US Food and Drug Administration (FDA) tracked from 2022 into 2025; drugmakers Eli Lilly and Novo Nordisk sold over $40 billion of these drugs in 2024. The same effect boosted supplements backed by far weaker evidence: berberine was branded nature\'s Ozempic in 2023 despite only modest weight-loss effects when trials are pooled together (CNN and CBC, 2023); magnesium sales spiked after the viral Sleepy Girl Mocktail trend in 2023; and the global sea moss market is projected to approach $3 billion by 2030 (Grand View Research, cited 2025) on largely unproven claims. Disclosure of paid promotion is patchy: a 2020 Inkifi audit of 800 accounts found only about 25 percent of Instagram influencers followed US Federal Trade Commission (FTC) rules requiring them to reveal paid promotion, and just 16 percent among health and fitness creators. Yet going viral can also surface real signals: published research shows that rare-disease and patient communities can generate early leads and information about unmet needs that scientists later study formally. The overall lesson across these sources is that reach and staying power are not proof a claim is valid, only signals that it deserves rigorous testing.',uses:['Surfacing patient-reported symptoms, side effects, and unmet needs that official records miss','Building rare-disease communities and finding cases faster across borders','Delivering public-health messages and health education quickly and at large scale','Generating ideas to test later (off-label uses, unusual symptom patterns) through proper study'],risk:'Each audit covers specific topics over specific time windows, so the share of misinformation varies widely by subject and does not transfer cleanly to other topics. Most of these studies simply analyze content at one point in time rather than tracking outcomes, so they measure accuracy and reach, not actual harm to users. Hashtag view counts and market projections come from companies and the press using different methods and should be read as rough orders of magnitude. Disclosure-compliance audits define compliance differently. The link between a viral trend and a change in sales or prescriptions is usually inferred from timing, not proven.',mf:[['If a health claim has millions of views and has trended for years, it must be true.','Reach and staying power measure popularity and how well content fits the platform\'s algorithm, not accuracy; several published audits (2023 to 2024) found high rates of inaccuracy in widely viewed health videos.'],['Anyone who criticizes a viral supplement is a paid shill for the drug industry.','Some critics do have conflicts, but many are salaried doctors or academics with no product to sell; incentives exist on both the promoting and the opposing sides and should be checked one person at a time.'],['A doctor or nurse on camera means the information is reliable.','Credentials raise the odds of accuracy but do not guarantee it; some flagged content comes from licensed professionals, and disclosure of paid partnerships is often missing.']],adv:[{n:'Celebrity and lifestyle influencers',r:'Drove mainstream awareness of GLP-1 weight loss and supplements like sea moss and magnesium',paid:false,note:'Mixed: some posts are unpaid personal sharing, others are disclosed or undisclosed brand deals; the FTC requires disclosure of any paid or material connection.'},{n:'Supplement brands and affiliate marketers',r:'Promote sea moss, berberine, mushroom coffee and magnesium via paid partnerships and affiliate links',paid:true,note:'Direct financial incentive through product sales, brand ownership and affiliate commissions; 2020 Inkifi audit found low disclosure compliance among health creators.'},{n:'Rare-disease patient advocates and online support groups',r:'Build communities and surface symptoms and unmet needs that researchers later study',paid:false,note:'Typically unpaid, driven by belief and personal experience; published research (2020 to 2024) shows genuine value for tracking disease patterns.'},{n:'Public-health agencies and academic doctors on social platforms',r:'Use the same channels to deliver evidence-based education and counter misinformation',paid:false,note:'Salaried, not selling products; their reach is generally smaller than commercial or celebrity accounts.'}],counter:[{n:'Researchers who audit content (Otolaryngology Head and Neck Surgery, 2024)',cred:'Academic doctors who publish counts of video accuracy',q:'Roughly 44 percent of popular TikTok sinus-infection videos were false, and videos by non-medical influencers were more likely to contain misinformation. These are salaried researchers, not financially motivated.'},{n:'Doctors and dietitians quoted by CNN and CBC on berberine (2023)',cred:'Physicians and dietitians citing pooled trial results',q:'There is no real nature\'s Ozempic; combined trials show only modest weight-loss effects. They sell no product, though some earn institutional or media income.'},{n:'KFF and public-health bodies on ivermectin (2021 to 2022)',cred:'Survey and regulatory institutions (KFF, FDA, NIH, CDC)',q:'About 14 percent of US adults wrongly believed ivermectin treated COVID-19, and use spiked after later-retracted studies and social posts. Publicly funded; critics note that institutions have their own incentives.'}],history:'The phenomenon scaled with short-form video. WHO popularized infodemic in 2020 as COVID-19 spread alongside a flood of online claims. Ivermectin became a flashpoint in 2021, with KFF finding about 14 percent of US adults believing it treated COVID-19 and a 2022 analysis linking prescribing spikes to misinformation and later-retracted studies. From 2022 onward, GLP-1 drugs showed how influencer and celebrity
