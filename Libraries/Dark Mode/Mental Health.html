{i:'meditation-apps',n:'Meditation Apps',fn:'Calm, Headspace, Insight Timer',tier:1,ts:80,sig:'rising',hot:true,ev:3,cats:['mindfulness','neurotech','trending'],cls:'Digital product',orig:'digital',aa:0,fdaS:'none',fda:'Consumer wellness apps; not regulated products. Headspace announced in 2020 that it wanted approval from the US Food and Drug Administration (FDA) for a separate prescription product, but the everyday consumer apps remain uncleared.',wada:'Not applicable',rcts:15,studies:100,parts:'hundreds of millions of downloads',ctry:'USA, UK',geo:[['USA',50],['Europe',25],['Asia',15],['Other',10]],disc:2010,discr:'Headspace co-founded by Andy Puddicombe and Rich Pierson (2010); Calm by Michael Acton Smith and Alex Tew (2012)',tag:'Smartphone apps such as Calm and Headspace that offer guided meditation, sleep stories, and breathing exercises.',facts:[['Leaders','Calm, Headspace, and Insight Timer'],['Valuations','Calm is worth roughly US$2B; Headspace Health roughly US$3B'],['Evidence','Mixed; the studies are often too small to draw firm conclusions'],['Drop-out','High; about half of participants quit in some studies']],brief:'Meditation and mental-health apps offer guided sessions, sleep content, and breathing exercises to large numbers of people through a phone. A 2022 review in JMIR Mental Health by Simon Goldberg and colleagues, which gathered the existing studies, found 14 randomized controlled trials (RCTs, studies that randomly assign people to the app or to a comparison group) of Headspace and only 1 of Calm. Headspace improved depression in 75% of the studies that measured it, but results were mixed for stress, anxiety, mindfulness, and general wellbeing, and the studies were generally too small to be conclusive. The same review found that half of the Headspace trials (7 of 14) reported a conflict of interest, often free access to the paid version of the app, and that Headspace employees helped design or analyze some of the studies. A 2024 review focused on drop-out found that around half of users quit in some studies, which can make the apps look more effective than they are because the people who stay tend to be those it helped. Insight Timer offers a large free library but comparatively little independent study evidence.',uses:['Guided meditation for beginners','Help with sleep and relaxation','Short daily stress relief','Building a regular mindfulness habit'],risk:'These are wellness tools, not crisis lines or clinical services, and should not be relied on for serious mental illness or emergencies. Because so many people quit, many users see little benefit. Watch the privacy terms; some apps have been criticized over sharing user data. Studies funded by the app makers, and the offer of free paid access to participants, can tilt the reported results. If you are in distress, contact a licensed provider; in the US call or text 988 (Suicide and Crisis Lifeline).',mf:[['These apps are clinically proven treatments','They are unregulated consumer wellness products; the studies are mixed, often too small, and frequently funded by or tied to the companies that make the apps'],['A meditation app can replace therapy','Apps are not a substitute for professional care and are not crisis tools']],adv:[{n:'Andy Puddicombe',r:'Co-founder, Headspace',paid:true,note:'Founder; commercial interest in app adoption'},{n:'Michael Acton Smith',r:'Co-founder, Calm',paid:true,note:'Founder of a company valued around US$2B'}],counter:[{n:'Dr. Simon Goldberg',cred:'University of Wisconsin-Madison',q:'Many app trials are underpowered and carry conflicts of interest, so confident claims of clinical efficacy are premature.'}],history:'The apps are a recent commercial repackaging of much older contemplative practices that began outside the West, chiefly Buddhist meditation traditions from South and East Asia and breathing disciplines from Indian pranayama. Headspace was co-founded in 2010 in the UK by Andy Puddicombe, a former Buddhist monk, and Rich Pierson; Calm launched in 2012 in San Francisco, co-founded by Michael Acton Smith and Alex Tew. Calm was valued at roughly US$1B in 2019 and about US$2B by 2020, while Headspace merged with the telehealth company Ginger in 2021 to form Headspace Health, valued near US$3B. In 2020 Headspace said it wanted to seek US Food and Drug Administration (FDA) clearance for a separate prescription digital product; the everyday consumer apps themselves remain unregulated.',timeline:[['2010','Headspace launches (UK)'],['2012','Calm launches (San Francisco)'],['2019','Calm reaches ~US$1B valuation'],['2021','Headspace merges with Ginger to form Headspace Health'],['2022','JMIR review documents COIs in app RCTs']],rel:['mbsr','mbct','breathwork','cbt-i','self-compassion','tm','journaling'],enelNote:'Enel treats meditation apps as a convenient way into practices that are genuinely valuable, while staying skeptical of the marketing. Calm says it helps with sleep and stress, and Headspace says it has clinical backing; Enel does not present these claims as established fact. The independent picture, captured in Goldberg and colleagues\' 2022 JMIR Mental Health review, is mixed: Headspace looked best for depression but inconsistent everywhere else, the studies were often too small, and half reported conflicts of interest, including company employees involved in the research and free paid access for participants. A 2024 review flagged that about half of users quit in some studies, which can make the measured benefits look bigger than they are. These are unregulated consumer products, not approved medical devices; Headspace\'s 2020 plan for a prescription product is separate and has not turned the everyday apps into regulated treatments. The companies are worth billions of dollars, so they have a strong incentive to publish favorable evidence. Used realistically, an app can help you build a habit and wind down. It cannot replace therapy and is not a crisis tool. If you are struggling, reach a provider or call 988.',enel:false},
{i:'exercise',n:'Exercise',fn:'Exercise for depression and anxiety',tier:1,ts:88,sig:'rising',hot:true,ev:4,cats:['movement','trending','evidence'],cls:'Physical Activity',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:218,studies:1000,parts:'tens of thousands',ctry:'Global',geo:[['USA',30],['Europe',35],['Asia',25],['Other',10]],disc:1905,discr:'modern study (1905)',tag:'Planned physical activity that lowers symptoms of depression and anxiety, working best as an add-on to standard treatment rather than a replacement.',facts:[['How much','About 150 minutes a week of moderate activity, or 3 or more sessions'],['Best forms','Walking, jogging, yoga, strength training'],['Strength of evidence','Moderate; it weakens in the most carefully designed trials'],['Cost','Free to low']],brief:'Exercise means planned, repeated physical activity such as walking, jogging, or lifting weights. The question here is whether it eases depression and anxiety. In 2023, a research team led by Ben Singh published a review-of-reviews (an analysis that combines the results of many earlier review papers) in the British Journal of Sports Medicine. Pooling 97 reviews, they found medium-sized improvements in depression and anxiety compared with usual care; the effect size, a standard measure of how big a difference is, was about -0.43 for depression and about -0.42 for anxiety (negative numbers mean fewer symptoms). In 2024, a team led by Michael Noetel published a network meta-analysis in the same journal. A meta-analysis statistically combines many studies; a network version also compares treatments that were never tested head-to-head. Across 218 trials, they ranked walking, jogging, yoga, and strength training as most effective, with bigger effects at higher intensity. Now the honest caveat. The Cochrane review (catalog number CD004366, 39 trials; Cochrane is an independent group known for strict standards) found a moderate effect overall. But when it looked only at the six best-run trials, those that properly hid who got which treatment, counted everyone who started, and had symptoms judged by assessors who did not know the group assignment, the benefit was no longer statistically reliable. The reason is structural: you cannot hide from people whether they are exercising, and symptoms are usually self-reported, so a person\'s expectations, plus the tendency to publish positive results over negative ones, likely inflate the reported benefit.',uses:['depression','anxiety','ongoing psychological distress','sleep','general wellbeing'],risk:'Generally very safe. Build up gradually, and if you are older or have been inactive, get checked for heart risk first. Exercise is an add-on, not a replacement, for talk therapy or medication when illness is moderate to severe. If you are in crisis or having thoughts of self-harm, contact a healthcare provider or call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['Exercise cures depression by itself','It reduces symptoms and works best alongside therapy or medication, especially in moderate to severe cases'],['The benefit is huge and beyond doubt','The benefit is moderate and shrinks in the most carefully blinded trials; the bias toward publishing positive results is well documented']],adv:[{n:'Ben Singh',r:'Researcher, University of South Australia',paid:false,note:'Lead author of the 2023 umbrella review'},{n:'Michael Noetel',r:'Psychologist, University of Queensland',paid:false,note:'Lead author of the 2024 BMJ network meta-analysis'}],counter:[{n:'Dr. Gary Cooney',cred:'Cochrane review co-author',q:'When we restricted analysis to the highest quality, properly blinded trials, the apparent benefit of exercise for depression largely disappeared.'}],history:'Greek and Roman physicians including Hippocrates linked activity to health, and Galen prescribed exercise. Systematic Western study of exercise and mood began in the early 20th century (around 1905 onward) and accelerated from the 1980s with controlled trials; the 2013 and updated Cochrane reviews and the 2023 Singh umbrella review and 2024 Noetel network meta-analysis define the current evidence base. Movement-as-medicine traditions are far older and global, including Indian yoga and Chinese tai chi and qigong.',timeline:[['1905','Early experimental work on exercise and mental state'],['1980s','Controlled trials of aerobic exercise for depression emerge'],['2013','Cochrane review (CD004366) updated; quality caveats highlighted'],['2023','Singh BMJ umbrella review of 97 reviews'],['2024','Noetel BMJ network meta-analysis of 218 trials']],rel:['yoga','tai-chi','mediterranean-diet','cbt'],enelNote:'Exercise has the strongest non-drug evidence in this portal, and we still rate it 4 rather than 5 on purpose. The headline numbers from the 2023 Singh umbrella review and 2024 Noetel network meta-analysis are genuinely encouraging, but the Cochrane review exposed the field\'s core weakness: you cannot blind someone to whether they are exercising, outcomes are mostly self-reported, and the effect fades in the few well-controlled trials. The tendency to publish positive results over negative ones makes this worse. None of that means exercise does not help; it means the honest size of the benefit is moderate, not miraculous. For mild to moderate symptoms, regular activity is a reasonable first or co-first step. For moderate to severe depression or anxiety, treat it as an add-on alongside psychotherapy or medication, not a substitute. Walking, jogging, strength training, and yoga all carry decent support, and the best dose is the one a person will actually sustain. If you or someone you know is in crisis, reach a provider or call or text 988.',enel:false},
{i:'yoga',n:'Yoga',fn:'Yoga for depression and anxiety',tier:1,ts:80,sig:'rising',hot:true,ev:3,cats:['movement','mindfulness','somatic','trending'],cls:'Mind-Body Practice',orig:'traditional',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:24,studies:300,parts:'thousands',ctry:'Global',geo:[['India',20],['USA',30],['Europe',25],['Other',25]],disc:-200,discr:'Patanjali\'s Yoga Sutras, India (c. 200 CE)',tag:'A practice from India combining breathing, body postures, and meditation, with modest evidence as an add-on for depression and anxiety.',facts:[['Origin','India; described in Patanjali\'s Yoga Sutras'],['Main parts','Postures, breathing exercises, and meditation'],['Strength of evidence','Modest; weak when compared against another active treatment'],['Typical schedule','Often 1 to 3 sessions a week over 8 to 12 weeks']],brief:'Yoga is a practice from India that combines physical postures (called asana), breathing exercises (called pranayama), and meditation. The question here is whether it helps with depression and anxiety. A 2024 systematic review and meta-analysis (a method that searches for all relevant studies and statistically combines them) by Moosburner and colleagues, published in the journal Depression and Anxiety, pooled 24 studies with about 1,395 participants. It found that yoga produced a real short-term drop in depression compared with passive controls (people put on a waitlist or given only usual care), but no clear advantage over active controls (people given some other genuine activity). A 2018 meta-analysis by Holger Cramer in the same journal found small short-term reductions in anxiety compared with no treatment. The 2024 Noetel network meta-analysis (a statistical method that compares treatments even when they were never tested directly against each other), published in the British Journal of Sports Medicine, ranked yoga among the better-tolerated and more effective forms of exercise for depression, though confidence in those estimates was low. Evidence quality is the main caveat. You cannot hide from people that they are doing yoga, the styles studied vary widely, many participants drop out, and side effects are reported inconsistently. Because of this, the risk that people\'s expectations color the results is judged to range from some concern to high.',uses:['depression','anxiety','stress','sleep'],risk:'Generally safe. Injuries can happen with forceful postures, and people with glaucoma (raised pressure in the eye), uncontrolled high blood pressure, or a recent injury should adapt the practice or get guidance. Yoga is an add-on, not a replacement, for treatment when illness is moderate to severe. In a crisis, contact a healthcare provider or call or text 988 (US).',mf:[['Yoga outperforms antidepressants and therapy','Its effects are modest and not clearly better than other active treatments'],['All yoga has been studied the same way','Trials vary widely, so results from one style do not carry over to another']],adv:[{n:'Holger Cramer',r:'Director of Research, Bosch Health Campus',paid:false,note:'Author of multiple yoga meta-analyses'},{n:'International Association of Yoga Therapists',r:'Professional body',paid:'unclear',note:'Promotes yoga therapy; funding interests vary'}],counter:[{n:'Dr. Simon Gilbody',cred:'University of York',q:'Mind-body interventions like yoga show promise, but most trials lack blinded outcomes and active controls, so we should be cautious about the size of any benefit.'}],history:'Yoga\'s roots lie in ancient India, with practices referenced in the Vedas and Upanishads over two millennia ago. The sage Patanjali codified the eight-limbed (ashtanga) system in the Yoga Sutras, dated roughly 200 BCE to 400 CE. Medieval Hatha Yoga, emphasizing posture and breath, developed from around the 9th to 15th centuries, with Swami Swatmarama\'s Hatha Yoga Pradipika compiled in the 15th century. Modern postural yoga was shaped in 20th-century India by Tirumalai Krishnamacharya and his students (including B.K.S. Iyengar and Pattabhi Jois) in Mysore, from which it spread worldwide.',timeline:[['c. 200 CE','Patanjali compiles the Yoga Sutras in India'],['15th c.','Swatmarama compiles the Hatha Yoga Pradipika'],['1920s','Krishnamacharya teaches postural yoga in Mysore'],['2018','Cramer meta-analysis on yoga for anxiety'],['2024','Moosburner meta-analysis on yoga for depression']],rel:['exercise','tai-chi','meditation-apps','mbsr','breathwork','mbct'],enelNote:'Yoga earns a 3 from us: real but modest evidence, weighed down by the same problems that limit most movement research, namely that you cannot hide who is doing it and the studies vary so much. The honest reading of the 2024 Moosburner meta-analysis is that yoga helps compared with doing nothing, but its advantage over a fair comparison, such as another form of exercise or a matched activity, is not clearly established. That distinction matters, because some of the apparent benefit likely comes from attention, expectation, and the social contact of a group, rather than from yoga itself. We also respect its lineage. This is a tradition set down by Patanjali in India and refined over centuries, not a modern wellness invention, and its breathing and meditation parts overlap with mindfulness practices that have their own support. For mild to moderate symptoms, yoga is a reasonable, well-tolerated option many people enjoy and keep up. For moderate to severe illness, treat it as an add-on alongside professional care. If you are in crisis, reach a provider or call or text 988.',enel:false},
{i:'tai-chi',n:'Tai Chi',fn:'Tai Chi for mood and wellbeing in older adults',tier:1,ts:68,sig:'rising',hot:false,ev:3,cats:['movement','somatic','mindfulness'],cls:'Mind-Body Practice',orig:'traditional',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:20,studies:210,parts:'thousands',ctry:'Global',geo:[['China',40],['USA',25],['Europe',20],['Other',15]],disc:1670,discr:'Chen Wangting, Chen village, China (c. 17th c.)',tag:'A slow, flowing Chinese martial art with Daoist roots that shows modest benefit for mood and wellbeing, especially in older adults.',facts:[['Origin','Chen village, Henan Province, China'],['Style','Slow forms with shifting weight, done with controlled breathing'],['Strength of evidence','Modest; study quality is often low'],['Best evidence','Strongest in older adults']],brief:'Tai Chi is a slow, flowing Chinese practice, part martial art and part exercise, in which the body shifts weight gently through set sequences of movement paired with controlled breathing. The question here is whether it helps mood and wellbeing. A 2023 updated systematic review and meta-analysis (a method that gathers all relevant studies and combines them statistically), published by Springer in BMC Complementary Medicine and Therapies, pooled 12 trials with 731 participants and found Tai Chi meaningfully improved depression in middle-aged and older adults. A 2023 network meta-analysis (which also compares treatments not tested directly against each other), published in Frontiers in Public Health, pooled 20 studies with about 1,798 participants and found Tai Chi reduced both anxiety and depression compared with control groups in older adults. A 2025 Bayesian dose analysis, a statistical approach that updates estimates as evidence accumulates, looked at the best length of practice. The honest caveat is large. A 2022 critical overview of 210 systematic reviews of Tai Chi found the methods generally poor: most trials did not properly report how people were randomly assigned, whether the assignment was concealed, or whether assessors were kept unaware of who got which treatment. And 94 percent of the clinical studies reported positive results, a lopsided pattern that points to bias. As with all movement practices, you cannot hide from people that they are doing it, and many trials come from a single region, which raises the chance that negative results went unpublished and that expectations shaped the outcomes.',uses:['depression','anxiety','wellbeing in older adults','balance','sleep'],risk:'Very gentle on the body and well-suited to older adults; the risk of falling is low, though supervision helps for frail people. Tai Chi is an add-on, not a replacement, for treatment when illness is moderate to severe. If you or someone you know is in crisis, contact a healthcare provider or call or text 988 (US).',mf:[['Tai Chi moves a measurable life energy through the body','Its benefits are best explained by gentle exercise, breathing, and focused attention, not by any unproven energy'],['The evidence is settled and conclusive','Most trials are low quality and lean heavily toward positive results, a sign of bias']],adv:[{n:'Tai Chi for Health Institute',r:'Education organization (Dr. Paul Lam)',paid:'unclear',note:'Promotes standardized health-oriented forms'},{n:'Peter Wayne',r:'Director, Osher Center, Harvard Medical School',paid:false,note:'Researches Tai Chi mind-body effects'}],counter:[{n:'Dr. Edzard Ernst',cred:'Emeritus Professor, University of Exeter',q:'Tai Chi is pleasant and low-risk, but the trial evidence is dominated by low-quality studies that almost uniformly report positive findings, which should make us cautious.'}],history:'Tai chi (taijiquan) was formalized in the 17th century by Chen Wangting, a retired military officer in Chenjiagou (Chen village), Henan Province, China, during the Ming-Qing transition around the 1670s. He blended martial techniques with Daoist principles of yin-yang harmony, daoyin and tu na breathing methods, and classical Chinese medical theory of qi and meridians. Long a closely guarded Chen family tradition, it later spawned the Yang, Wu, Sun, and other styles and spread globally in the 20th century as a health and wellbeing practice.',timeline:[['c. 1670','Chen Wangting formalizes taijiquan in Chen village'],['19th c.','Yang and other styles develop and spread'],['20th c.','Tai chi popularized worldwide for health'],['2022','Critical overview of 210 Tai Chi systematic reviews'],['2023','Updated meta-analyses on depression and anxiety in older adults']],rel:['exercise','yoga','breathwork','meditation-apps','acupuncture'],enelNote:'Tai Chi sits at a 3 for us, a gentle practice with genuine appeal for older adults and a modest, honestly uncertain evidence base. The 2023 meta-analyses do show reductions in depression and anxiety in middle-aged and older people, and its very gentle, weight-shifting movement makes it one of the safest options here, with the bonus of better balance and fewer falls. The catch is study quality. The 2022 overview of 210 systematic reviews found most trials poorly reported and overwhelmingly positive, a warning sign that negative results went unpublished and that expectations shaped outcomes, and Tai Chi, like all movement, cannot be hidden from the people doing it. We name its origins plainly: this is a 17th-century Chinese martial art set down by Chen Wangting, rooted in Daoist philosophy, not a modern wellness product. For older adults seeking a sustainable, sociable, low-risk practice, Tai Chi is a sensible add-on. It is not a substitute for professional care in moderate to severe illness. In crisis, reach a provider or call or text 988.',enel:false},
{i:'forest-bathing',n:'Forest Bathing',fn:'Shinrin-yoku / forest therapy',tier:1,ts:62,sig:'rising',hot:false,ev:2,cats:['nature','caution'],cls:'Lifestyle practice',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product; it is a behavioral practice, not a medical device or treatment.',wada:'Not applicable',rcts:8,studies:127,parts:'thousands (most studies under 100 each)',ctry:'Japan, South Korea, China',geo:[['Asia',55],['Europe',20],['USA',15],['Other',10]],disc:1982,discr:'Tomohide Akiyama, Japanese Forestry Agency (1982)',tag:'Spending slow, unhurried, sensory time in a forest, promoted as a way to reduce stress.',facts:[['Typical session','About two hours walking slowly through woodland'],['Where the name came from','Japan, 1982, coined by Tomohide Akiyama'],['Best-supported benefit','Short-term drops in anxiety and blood pressure'],['Cost','Free if a forest is nearby']],brief:'Forest bathing means spending slow, attentive time among trees, using your senses, as a way to relax and lower stress. It is not exercise or hiking; the point is to slow down and notice the surroundings. A 2020 review that combined the results of many studies (Kotera and colleagues) screened 971 articles, kept 22, and pooled 8 together, finding short-term reductions in anxiety. A separate pooled analysis (Antonelli et al., 2019) of 13 studies and 1,786 participants reported a small drop in the stress hormone cortisol measured in saliva. Another review pooled 21 studies on blood pressure. Across all this research the caveats are real: the groups studied were small, people obviously know whether they are in a forest (so there is no way to run a hidden comparison), and almost no one was followed for long. So the benefits look like a pleasant, short-term calming and little more is proven. The popular claim that airborne compounds released by trees, called phytoncides, boost the immune system, linked mainly to Dr. Qing Li of Nippon Medical School, rests on small studies that mostly lacked proper comparison groups and is not confirmed.',uses:['everyday stress','mild anxiety','low mood','general wellbeing'],risk:'Generally very safe. It is not a treatment for clinical depression, anxiety disorders, post-traumatic stress disorder (PTSD), or any psychiatric condition, and should not replace proven care. If you are struggling, please talk to a licensed mental-health provider. In the US you can call or text 988 (the Suicide and Crisis Lifeline) any time.',mf:[['Forests heal you through airborne tree compounds called phytoncides','The idea that phytoncides boost immunity comes from small studies that mostly lacked proper comparison groups and is not proven'],['It treats depression','The evidence supports only short-term calming and mood effects, not treatment of a clinical condition']],adv:[{n:'Qing Li',r:'Physician, Nippon Medical School; author of popular forest-bathing books',paid:true,note:'Earns from books and forest-medicine activities; leading phytoncide proponent.'},{n:'Association of Nature and Forest Therapy',r:'Guide-certification body',paid:true,note:'Sells paid guide training and certification.'}],counter:[{n:'Dr. Kirsten McEwan',cred:'University of Derby, nature-and-wellbeing researcher',q:'The relaxation effects are real but modest; the literature is dominated by small studies with high risk of bias, and grand health claims outrun the evidence.'}],history:'Tomohide Akiyama, director of the Japanese Forestry Agency, coined shinrin-yoku (forest bathing) in 1982 to encourage forest use amid rapid urbanization. Japan and South Korea later built networks of designated therapy trails. The practice draws on far older roots: Shinto and Buddhist reverence for forests in Japan, and long-standing Indigenous traditions of nature-connection and healing across many cultures, including First Nations and Aboriginal Australian relationships to land predating any Western framework. Western theory arrived separately: Erich Fromm described biophilia (1964), E.O. Wilson popularized it (1984), and Rachel and Stephen Kaplan proposed Attention Restoration Theory in the 1980s.',timeline:[['1964','Fromm describes biophilia'],['1982','Akiyama coins shinrin-yoku in Japan'],['1980s','Kaplans publish Attention Restoration Theory'],['2010s','Qing Li popularizes forest medicine and phytoncide research'],['2019','Antonelli meta-analysis on cortisol'],['2020','Kotera meta-analysis on mental health']],rel:['light-therapy','social-connection','mbsr','exercise'],enelNote:'Enel views forest bathing as a low-cost, low-risk way to feel calmer, not as a medical treatment. The honest read of the science is that unhurried time among trees produces small, short-term drops in anxiety, blood pressure, and stress hormones, mostly measured in small studies that cannot hide from participants which group they are in and rarely follow people for long. We are skeptical of the more dramatic claims, especially that inhaled tree compounds called phytoncides meaningfully strengthen immunity; that idea, championed by a small number of advocates, is not supported by rigorous trials. None of this means forest bathing is worthless. Being outside, moving slowly, and unplugging are genuinely good for most people. But if you live with depression, an anxiety disorder, or trauma, a walk in the woods is a complement to care, never a substitute. Please work with a licensed provider, and if you are in crisis, call or text 988 in the US.',enel:false},
{i:'light-therapy',n:'Bright Light Therapy',fn:'Light box therapy for depression',tier:1,ts:78,sig:'rising',hot:false,ev:4,cats:['nature','neurotech','evidence'],cls:'Light-based intervention',orig:'device',aa:0,fdaS:'none',fda:'Consumer light boxes are sold as unregulated wellness products. The US Food and Drug Administration (FDA) has not cleared light boxes as a treatment for depression, and the devices are not standardized for medical claims.',wada:'Not applicable',rcts:23,studies:80,parts:'thousands across trials',ctry:'USA, Canada, Netherlands',geo:[['USA',35],['Europe',40],['Canada',15],['Other',10]],disc:1984,discr:'Norman Rosenthal and colleagues, NIMH (1984)',tag:'Sitting near a very bright lamp each day, studied as a treatment for seasonal and year-round depression.',facts:[['Typical routine','10,000 lux (a measure of light brightness), about 30 minutes each morning'],['Seasonal recovery rate','40.7% recovered on light vs 23.5% in the comparison group (2024 pooled analysis)'],['Main limitation','Hard to run a fair hidden comparison: people can tell bright light from dim light'],['Regulatory status','Light boxes are not FDA-cleared for depression']],brief:'Bright light therapy means sitting near a special lamp (a light box) that shines far brighter than normal indoor lighting, usually for about 30 minutes each morning. It was first studied for winter depression and is now also studied for year-round depression. A 2024 review that combined many trials, published in the journal JAMA Psychiatry (Hsu and colleagues), pooled 11 trials and 858 patients with non-seasonal depression and found more of them recovered (40.7% vs 23.5%; people on light were about 2.4 times as likely to recover) when bright light was added to their usual care. Earlier pooled analyses, including one in 2016 and a 2020 review of 23 randomized controlled trials (studies that randomly assign people to treatment or comparison groups) with 1,120 participants, point the same way. The research began with Norman Rosenthal and colleagues at the US National Institute of Mental Health (NIMH), who described seasonal affective disorder (SAD, the winter-pattern depression) and tested bright versus dim light in 1984. One key caveat: because people can tell bright light from a dim fake, there is no way to run a truly hidden comparison, which may make the effect look bigger than it is.',uses:['seasonal affective disorder (winter-pattern depression)','year-round depression (as an add-on to other care)','depression during and after pregnancy','resetting the body clock for sleep timing'],risk:'Generally well tolerated; possible eye strain, headache, or, rarely, a swing into mania (an overactive, high-energy state) in people with bipolar disorder, so anyone with bipolar disorder should be supervised by a clinician. People with eye disease or taking medicines that increase light sensitivity should check with a doctor. Light therapy works best alongside, not instead of, professional care for depression. Please consult a licensed provider, and in a crisis call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['A light box is FDA-approved to treat depression','Consumer light boxes are unregulated wellness products and are not FDA-cleared for depression'],['Any bright lamp works the same','Trials use a very bright light (about 10,000 lux) at a set distance and time of day; ordinary lamps are far dimmer']],adv:[{n:'Center for Environmental Therapeutics',r:'Nonprofit founded by light-therapy researchers',paid:false,note:'Provides guidance and protocols; nonprofit, founded by researchers including Michael Terman.'},{n:'Light-box manufacturers',r:'Consumer device sellers',paid:true,note:'Sell light boxes directly; marketing claims often outrun regulatory status.'}],counter:[{n:'Dr. Robert Levitan',cred:'University of Toronto, mood-disorders researcher',q:'The signal is real, but the inability to truly blind a bright-light study means effect sizes should be read with caution.'}],history:'Bright light therapy emerged from Western chronobiology. Norman Rosenthal and colleagues at the US National Institute of Mental Health described seasonal affective disorder and tested bright versus dim light in 1984. Researchers including Alfred Lewy, Michael Terman, and Anna Wirz-Justice built the field over following decades, extending study from seasonal to non-seasonal depression, perinatal depression, and circadian sleep disorders. The practice has no single non-Western origin, though sunlight and seasonal rhythm have featured in healing traditions worldwide, from heliotherapy in ancient Greece and Egypt to longstanding cultural attunement to seasonal light in high-latitude and Indigenous communities.',timeline:[['1984','Rosenthal et al. describe SAD and trial light at NIMH'],['1990s','Light therapy established as first-line for SAD'],['2016','Meta-analysis supports use in non-seasonal depression'],['2020','23-RCT meta-analysis favors light therapy'],['2024','JAMA Psychiatry meta-analysis confirms adjunct benefit']],rel:['forest-bathing','cbt-i','exercise','social-connection'],enelNote:'Of the three nature-linked entries here, bright light therapy has the strongest evidence, which is why we rate it a 4 rather than a 5. Several reviews that combine many trials, including a 2024 JAMA Psychiatry review, show that roughly 30 minutes of very bright (10,000 lux) light each morning improves recovery in both seasonal and year-round depression, usually as an add-on to other care. Two honest cautions keep us from calling it settled. First, you cannot truly hide from someone whether they are getting bright light or a dim fake, so some of the measured benefit may simply reflect expectation. Second, the boxes you buy are unregulated wellness products; the FDA has not cleared them as a depression treatment, and their quality and brightness vary. People with bipolar disorder, eye disease, or who take light-sensitizing drugs should involve a clinician, since light can occasionally trigger mania. Used thoughtfully and alongside professional treatment, it is a reasonable, low-cost tool. If you are struggling, reach a licensed provider, and in the US call or text 988.',enel:false},
{i:'social-connection',n:'Social Connection',fn:'Relationships and belonging as health factors',tier:1,ts:88,sig:'rising',hot:true,ev:4,cats:['social','nature','trending','evidence'],cls:'Psychosocial determinant',orig:'natural',aa:0,fdaS:'none',fda:'Not a product; it is a social and psychological factor that shapes health, not a regulated intervention.',wada:'Not applicable',rcts:0,studies:200,parts:'millions (combined large population studies)',ctry:'USA, UK, global cohorts',geo:[['USA',35],['Europe',35],['Asia',15],['Other',15]],disc:2010,discr:'Julianne Holt-Lunstad et al. meta-analysis (2010)',tag:'Relationships work in both directions: strong ties and belonging are linked to better health and longer life, while loneliness is linked to worse outcomes.',facts:[['Survival link','About 50% better odds of survival for people with strong relationships (2010 pooled analysis)'],['Loneliness risk','Roughly 26% higher risk of dying for lonely people (2015 pooled analysis)'],['What seems to matter most','The quality and felt support of ties, not the sheer number of contacts'],['Type of evidence','Mostly observational (tracking people over time), not randomized experiments']],brief:'This entry is about relationships themselves as a health factor, working in both directions. On the positive side, having strong social ties, close relationships, and a sense of belonging is linked to better mental and physical health and longer life. On the other side, loneliness (the painful feeling of lacking connection) and isolation (having few contacts) are linked to worse outcomes. A 2010 analysis combining 148 studies, by Julianne Holt-Lunstad, Timothy Smith, and J. Bradley Layton in the journal PLOS Medicine, found people with stronger relationships had about 50% greater odds of survival. A 2015 follow-up (Holt-Lunstad et al.) found that being socially isolated, feeling lonely, and living alone raised the risk of dying by roughly 29%, 26%, and 32%. These findings shaped the 2023 advisory from the US Surgeon General (the nation\'s top public-health official), with Holt-Lunstad as lead scientific editor, which compared the mortality impact of disconnection to smoking up to 15 cigarettes a day. On what builds and sustains connection, the observational evidence points to several recurring patterns: close confiding relationships (a partner, family, or a trusted friend) appear most protective; participation in groups, clubs, faith communities, and civic or hobby organizations is associated with better wellbeing; volunteering and helping others is linked to lower depression and, in some cohorts, lower death rates; and structural or design factors (walkable neighborhoods, shared public spaces, schools and workplaces that foster contact, and cultural models of belonging such as African Ubuntu and other collectivist traditions) shape how easily people form ties. Researchers describe two broad routes by which connection may support health: a direct route, where supportive ties ease stress and steady mood and habits, and a buffering route, where support cushions the effect of hard events. The crucial caveat applies across all of it: this evidence is almost entirely observational, meaning it tracks people over time rather than running controlled experiments. It shows strong links in both directions, not proof that loneliness directly causes harm or that adding connection reliably reverses it, and there are still few experiments showing that changing connection improves major health outcomes.',uses:['lowering depression risk','anxiety','brain and memory health','general wellbeing and longer life'],risk:'Connection itself carries little risk, but loneliness and isolation are serious and can go hand in hand with depression or suicidal thoughts. Strained or abusive relationships can harm rather than help, so the quality and safety of relationships matters more than the number. If you feel persistently isolated or hopeless, please reach out to a licensed mental-health provider. In the US, call or text 988 (the Suicide and Crisis Lifeline) any time; you do not have to be in immediate danger to call.',mf:[['Loneliness literally equals 15 cigarettes a day','That is a plain-language comparison for risk of dying, drawn from observational data, not an exact biological equivalence'],['More friends always means better health','The quality, safety, and felt support of relationships matter more than the sheer number of people you know, and a few close, trusted ties can matter more than a wide circle'],['Belonging is just a private matter of personality','The evidence suggests connection is also shaped by community ties, group participation, and the design of neighborhoods and institutions, not by individual effort alone']],adv:[{n:'Julianne Holt-Lunstad',r:'Professor of psychology and neuroscience, Brigham Young University',paid:false,note:'Leading researcher; lead scientific editor of the 2023 Surgeon General advisory.'},{n:'US Surgeon General (Vivek Murthy)',r:'Public-health official, 2023 advisory',paid:false,note:'Issued the loneliness advisory; government public-health role, not a commercial seller.'}],counter:[{n:'Dr. Andrew Steptoe',cred:'University College London, epidemiologist',q:'The associations between isolation and poor health are robust, but because the data are observational, we should be cautious about treating loneliness as a single, easily reversible cause.'}],history:'Concern with belonging is ancient, from Aristotle calling humans social animals to communal care woven through Indigenous, African Ubuntu, and many collectivist traditions that locate wellbeing in the group rather than the individual. These older traditions framed connection mainly as something built and maintained by community and ritual, not only as a risk when absent. The modern scientific case is recent and largely Western-led: Julianne Holt-Lunstad and colleagues quantified social ties and survival in a 2010 meta-analysis, expanded the loneliness and isolation evidence in 2015, and shaped the 2023 US Surgeon General advisory, which set out both the harms of disconnection and approaches communities and institutions can take to rebuild it. The UK appointed a Minister for Loneliness in 2018, signaling the issue as public policy and prompting community-based programs to foster connection.',timeline:[['2010','Holt-Lunstad meta-analysis links social ties to survival'],['2015','Loneliness and isolation quantified as mortality risks'],['2018','UK appoints a Minister for Loneliness'],['2023','US Surgeon General advisory on loneliness, Holt-Lunstad lead editor']],rel:['forest-bathing','exercise','gratitude','animal-therapy'],enelNote:'Enel treats social connection as one of the most important, and most overlooked, factors in mental and physical health, and we read it as a two-way street rather than only a danger when missing. On the constructive side, the evidence links close confiding relationships, community and group participation, faith and civic life, and volunteering to better mood, sharper memory in later life, and longer survival, anchored by Julianne Holt-Lunstad\'s pooled analyses showing about 50% better odds of survival for well-connected people. On the other side, isolation and loneliness predict worse outcomes, including depression, memory decline, and earlier death, which the 2023 US Surgeon General advisory elevated to a national concern. We rate it a 4 rather than a 5 for one honest reason: almost all of this evidence is observational, meaning it tracks people over time rather than testing the question in controlled experiments. It shows that connected people tend to fare better, but it cannot fully prove that adding social contact reverses the risk, and experiments that change connection and then change major health outcomes are still few. Two practical notes the evidence does support: quality matters more than quantity, so a harmful relationship is not protective and a few trusted ties can outweigh a large network; and belonging is shaped by surroundings as well as effort, since walkable neighborhoods, shared spaces, and welcoming groups make ties easier to form. The widely quoted line that loneliness equals 15 cigarettes a day is a useful comparison, not a literal measurement. If loneliness is weighing on you, it is worth taking seriously and worth talking to a provider about. In the US, 988 is available by call or text at any time.',enel:false},
{i:'omega-3',n:'Omega-3 (EPA/DHA)',fn:'Fish oil fatty acids for depression',tier:1,ts:62,sig:'stable',hot:false,ev:3,cats:['nutrition'],cls:'Nutraceutical / marine fatty acid',orig:'natural',aa:0,fdaS:'none',fda:'Dietary supplement, not FDA-evaluated for depression. Prescription icosapent ethyl is approved only for triglycerides, not mood.',wada:'Not applicable',rcts:26,studies:300,parts:'thousands (~2,160 main MDD meta-analysis; ~18,000 VITAL-DEP)',ctry:'Global',geo:[['Europe',30],['USA',30],['Asia',30],['Other',10]],disc:1998,discr:'Modern depression research, Stoll/Horrobin (1998-1999)',tag:'Omega-3 is a fat found in oily fish, sold as fish-oil supplements. There are two main types: EPA and DHA. EPA-rich products show a small antidepressant effect when added to standard care, but DHA-heavy products and trials testing it for prevention mostly fail.',facts:[['Form that works','EPA should be at least 60 percent of the EPA-plus-DHA total; up to 1 gram of EPA per day'],['Average effect','A small improvement (standardized effect size about -0.28), pooled across 26 randomized controlled trials'],['Result consistency','Results varied widely from trial to trial (a statistic called I-squared was about 75 percent, meaning high inconsistency)'],['Prevention','The large VITAL-DEP trial (about 18,000 people) found no benefit']],brief:'Omega-3 is a type of fat found in oily fish and sold as fish-oil supplements. Its two main forms are EPA and DHA (the abbreviated names of the two key omega-3 fatty acids). It is taken in hopes of easing depression. A 2019 pooled analysis (Liao and colleagues, in the journal Translational Psychiatry) combined 26 placebo-controlled randomized controlled trials, or RCTs (studies in which people are randomly assigned to the supplement or a dummy pill), covering about 2,160 people. It found a small overall benefit for depression symptoms (a standardized effect size of about -0.28). The benefit came only from products that were pure EPA or mostly EPA (at least 60 percent EPA), at up to 1 gram of EPA per day; products dominated by DHA showed no benefit. Results varied a lot between trials (a measure of inconsistency, I-squared, was about 75 percent). David Mischoulon of Harvard and Massachusetts General Hospital and others stress that EPA must dominate and that omega-3 works only as an add-on. Importantly, the large VITAL-DEP trial (Okereke, in the journal JAMA, 2021; about 18,000 adults aged 50 and older) found omega-3 did NOT prevent depression or improve mood in the general public. The honest summary: a modest add-on for people already diagnosed with depression, not a standalone treatment and not a preventive.',uses:['added on top of standard treatment for major depression, using an EPA-dominant product','a possible role in depression during and after pregnancy, and in bipolar depression (the evidence here is weaker)'],risk:'Generally well tolerated; possible fishy aftertaste, acid reflux, and loose stools, plus a possible increase in bleeding risk at high doses or when combined with blood-thinning drugs (such as warfarin, aspirin, and the newer anticoagulants called DOACs). It is not a substitute for prescribed treatment. Do not stop psychiatric medication in order to use a supplement. If you have thoughts of self-harm or are in crisis, contact a licensed provider or call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['Fish oil treats depression','It has only a small add-on effect, and only in EPA-dominant products; DHA-heavy products show no benefit.'],['Everyone should take it to prevent depression','The large VITAL-DEP trial found no preventive benefit in the general older population.']],adv:[{n:'Dr. David Mischoulon',r:'Director, Depression Clinical and Research Program, MGH',paid:false,note:'Academic researcher; has received research support from omega-3 suppliers (disclosed); emphasizes EPA dominance and adjunctive role.'},{n:'Nordic Naturals / fish oil supplement brands',r:'commercial sellers',paid:true,note:'Sell omega-3 products; market mood and brain benefits commercially.'}],counter:[{n:'Dr. Olivia Okereke',cred:'Massachusetts General Hospital, VITAL-DEP lead',q:'There is no reason for adults in the general population to take omega-3 supplements solely to prevent depression or maintain mood.'},{n:'FTC',cred:'US Federal Trade Commission',q:'Warned marketers of children\'s omega-3 supplements (2010) that mood, cognition, and brain claims may be deceptive without scientific proof; sued Amare Global (2026) over mental-health supplement claims.'}],history:'Marine omega-3 fatty acids (EPA and DHA) concentrate in cold-water fish; coastal and Indigenous Arctic peoples (Inuit, coastal Japanese, Mediterranean and Scandinavian fishing communities) have eaten oily fish for millennia, and 20th-century epidemiology in Greenland Inuit (Dyerberg and Bang, 1970s) first linked high marine-fat intake to low cardiovascular disease. Mood-specific research is recent and Western-led: Andrew Stoll and David Horrobin\'s late-1990s work on bipolar and unipolar depression launched the clinical field. The story since has been one of shrinking effect sizes as larger, better-controlled trials accumulated.',timeline:[['1970s','Dyerberg and Bang link Greenland Inuit marine-fat diet to low heart disease'],['1998-1999','Stoll and Horrobin publish early omega-3 trials in mood disorders'],['2010','FTC warns children\'s omega-3 marketers over mood and brain claims'],['2019','Liao et al. meta-analysis: small benefit, EPA-dominant, high heterogeneity'],['2021','VITAL-DEP (JAMA): no preventive benefit in older adults']],rel:['mediterranean-diet','saffron','psychobiotics','exercise'],enelNote:'Omega-3 is one of the better-studied supplements for depression, and that is exactly why honesty matters here: the more rigorously it is tested, the smaller the effect looks. The defensible position is narrow. If omega-3 helps mood at all, it is as an add-on for people already diagnosed with depression, using an EPA-dominant product (at least 60 percent EPA, 1 to 2 grams of EPA daily), not a DHA-heavy general fish oil. Because results varied so much from trial to trial (the inconsistency measure I-squared was around 75 percent), the average effect hides wide variation, and the large VITAL-DEP prevention trial was flatly negative. Industry funding is common in this research and should color how confident product marketing sounds. In practice: omega-3 is cheap, safe for most people, and reasonable to discuss with a prescriber as an add-on, but it is not a replacement for therapy or medication. Watch for bleeding risk if you take blood thinners. If you are struggling, reach a licensed provider; in the US, call or text 988.',enel:false},
{i:'saffron',n:'Saffron (Crocus sativus)',fn:'Saffron stigma extract for depression',tier:1,ts:58,sig:'rising',hot:false,ev:3,cats:['nutrition'],cls:'Botanical / standardized extract',orig:'natural',aa:0,fdaS:'none',fda:'Dietary supplement, not FDA-evaluated for depression or anxiety. No FDA-approved saffron drug for mood.',wada:'Not applicable',rcts:15,studies:50,parts:'hundreds (~600 across an 11-trial meta-analysis)',ctry:'Predominantly Iran (origin of most trials)',geo:[['Middle East (Iran)',70],['Europe',12],['Australia',10],['Other',8]],disc:2005,discr:'Modern RCT era, Akhondzadeh trials in Iran (mid-2000s)',tag:'Saffron is a spice with deep Persian, Greek, and Ayurvedic roots, taken as a standardized extract. Small, short trials from Iran suggest it works about as well as standard antidepressants for mild-to-moderate depression.',facts:[['Typical dose','30 mg per day of standardized extract, made from the flower\'s thread-like stigma or its petal'],['Trial length','Usually 6 to 8 weeks, which is short'],['Compared against','Often matched head-to-head with the antidepressants fluoxetine or imipramine'],['Main limitation','Most trials are small and were run in Iran']],brief:'Saffron is the spice made from the dried thread-like stigmas of the Crocus sativus flower. As a treatment it is taken as a standardized extract, about 30 mg per day from the stigma or petal, whose active compounds are called crocin and safranal. It has been tested mostly in small 6-to-8-week randomized controlled trials, or RCTs (studies that randomly assign people to saffron or a dummy pill), led by Shahin Akhondzadeh and colleagues in Iran. In these, saffron beat the dummy pill and worked about as well as the antidepressants fluoxetine and imipramine for mild-to-moderate major depression. A 2024 pooled analysis (in the journal Nutrition Reviews) comparing saffron with SSRIs (selective serotonin reuptake inhibitors, the most common class of antidepressants) found no meaningful difference for depression (standardized effect size about 0.10) or anxiety (about 0.04), with fewer side effects on saffron. The main cautions: the trials are small, short, concentrated in one country, often run by the same overlapping groups of authors, use products of varying strength and consistency (stigma versus petal), and show signs of publication bias (positive results being more likely to get published than negative ones). Branded commercial extracts (for example, one called affron) are now studied and sold, so claims about a specific product should be credited to the seller.',uses:['mild-to-moderate depression (used both as an add-on and on its own in trials)','anxiety symptoms','studied for low mood before menstruation and after childbirth (weaker evidence)'],risk:'Generally well tolerated at the doses used in studies; reported effects include nausea, headache, appetite change, and dizziness. High doses (far above what is used in cooking or supplements, around 5 grams) are toxic, and very high doses are dangerous, especially in pregnancy (saffron can stimulate the uterus, and miscarriage has been reported historically). It may add to the effects of antidepressants and blood thinners, so discuss it with a prescriber before combining. It is not a substitute for prescribed care. If you are in crisis or having thoughts of self-harm, contact a licensed provider or call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['Saffron is proven to work as well as antidepressants','It looked comparable only in small, short Iranian trials; this is not established in large, independent, long-term studies.'],['Natural means safe at any dose','Saffron is toxic in high doses and risky in pregnancy.']],adv:[{n:'Prof. Shahin Akhondzadeh',r:'University of Tehran psychiatry researcher',paid:false,note:'Lead author on many foundational saffron depression RCTs; overlapping author teams are noted as a bias concern in meta-analyses.'},{n:'affron / Pharmactive and other extract brands',r:'commercial extract suppliers',paid:true,note:'Sell standardized saffron extracts and fund or supply branded-product trials; attribute product claims to them.'}],counter:[{n:'Marx et al. (meta-analysis authors)',cred:'Nutrition Reviews systematic review',q:'Evidence is limited by small samples, restricted settings (largely Iran), variable standardization, and risk of publication bias; further independent trials are needed.'},{n:'FTC',cred:'US Federal Trade Commission',q:'Mood and mental-health claims for supplements require competent scientific evidence; the agency has acted against deceptive mental-health supplement marketing (Amare Global, 2026).'}],history:'Saffron, the dried stigma of Crocus sativus, has been cultivated and used medicinally for roughly 4,000 years across Persia, the eastern Mediterranean, and South Asia. In classical Greek and Roman medicine it was prescribed for many ailments, and the Persian polymath Avicenna (Ibn Sina, 980-1037 CE) explicitly described saffron as an antidepressant and mood remedy in The Canon of Medicine, alongside uses as a hypnotic and anti-inflammatory. In Ayurvedic tradition saffron (kesar) was used to balance the three doshas and lift mood. This documented non-Western lineage, especially the Persian and Greco-Islamic record, directly anticipates the modern research question and is why contemporary Iranian groups led the first clinical trials.',timeline:[['~2000 BCE','Saffron cultivated and used medicinally in Persia and the Mediterranean'],['1st c. CE','Greco-Roman physicians prescribe saffron for varied ailments'],['~1025 CE','Avicenna\'s Canon of Medicine describes saffron as an antidepressant'],['2005','Akhondzadeh and colleagues publish early Iranian saffron-vs-fluoxetine RCT'],['2019','Meta-analyses confirm benefit over placebo for mild-to-moderate depression'],['2024','Saffron-vs-SSRI meta-analysis: comparable efficacy, fewer adverse events, bias caveats']],rel:['mediterranean-diet','omega-3','st-johns-wort','ashwagandha'],enelNote:'Saffron is a genuinely interesting case where a non-Western medical tradition (Persian, Greco-Islamic, and Ayurvedic) named the mood use a thousand years before modern trials tested it, and Avicenna\'s description of it as an antidepressant deserves credit, not erasure. The modern evidence is real but thin in a specific way: most randomized trials are small, last only six to eight weeks, come overwhelmingly from Iran, and sometimes share the same author teams, which reviewers flag as a bias and publication-bias concern. Within those limits, 30 mg per day of standardized extract looks comparable to low-dose SSRIs (the most common antidepressants) for mild-to-moderate depression, with fewer side effects, which is a reasonable thing to raise with a prescriber. Two honesty notes: branded extracts such as affron are commercial products whose marketing should not be confused with independent science, and natural does not mean harmless, saffron is toxic at high doses and risky in pregnancy. It can also interact with antidepressants. Treat it as a possible add-on, not a replacement for care. In crisis, contact a provider or call or text 988.',enel:false},
{i:'mediterranean-diet',n:'Mediterranean diet',fn:'Diet quality and nutritional psychiatry',tier:1,ts:66,sig:'rising',hot:false,ev:3,cats:['nutrition'],cls:'Dietary pattern / lifestyle',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product; a dietary pattern, not FDA-evaluated as a depression treatment.',wada:'Not applicable',rcts:6,studies:50,parts:'hundreds in RCTs (SMILES 67; AMMEND 72); tens of thousands in cohorts',ctry:'Global (origin: Mediterranean basin)',geo:[['Europe',40],['Australia',25],['USA',20],['Other',15]],disc:2017,discr:'First depression RCT, SMILES trial (Jacka, 2017)',tag:'The Mediterranean diet is an eating pattern rich in vegetables, fish, and olive oil. Shifting toward it produced large improvements in two small trials, so the idea is promising but still early-stage.',facts:[['Landmark trial','SMILES (Jacka, 2017), 67 people, 12 weeks'],['Size of effect in SMILES','A large effect (Cohen\'s d, a standard measure of effect size, about -1.16 on a depression rating scale called the MADRS); about 4 people needed to treat for 1 to benefit'],['Recovery rate in SMILES','32.3 percent of the diet group recovered, versus 8.0 percent of the control group'],['Replication','AMMEND (2022), in young men, showed a roughly 14.4-point average improvement on a depression questionnaire called the BDI']],brief:'The Mediterranean diet is the traditional eating pattern of the Mediterranean region: lots of vegetables, beans, whole grains, fish, and olive oil, with little red meat or sugar. Researchers have begun testing whether improving diet quality toward this pattern can ease depression. The SMILES trial (Felice Jacka, in the journal BMC Medicine, 2017) was the first randomized controlled trial, or RCT (a study that randomly assigns people to one approach or another), of dietary improvement for major depression: 67 adults with moderate-to-severe depression received either dietitian-led coaching toward a modified Mediterranean diet or a friendly social-support comparison, both for 12 weeks. The diet group improved far more on a standard depression rating scale called the MADRS (a large effect, Cohen\'s d about -1.16), with 32.3 percent recovering versus 8.0 percent, meaning roughly 4 people needed to follow the diet for 1 extra person to benefit. AMMEND (Bayes and colleagues, 2022; 72 young men) repeated the study and again found a large benefit (about a 14.4-point improvement on a depression questionnaire called the BDI). Large studies that follow people over time also link better diet quality to lower depression risk. Honest cautions: the trials are small, and because people obviously know what they are eating, diet trials cannot be fully blinded; the effect also shrinks when many studies are pooled together. This is a low-risk, whole-person approach with promising but early evidence.',uses:['an added dietary approach alongside standard treatment for major depression','supporting general mental wellbeing and lowering depression risk','extra benefits for heart and metabolic health'],risk:'Very low risk and broadly healthy; the main barriers are cost, access to good food, cooking skill, and time, which are real fairness concerns and can themselves affect mood. Sudden large diet changes can be a problem for people with eating disorders or certain medical conditions, so tailor changes with a clinician or dietitian. Diet is an add-on, not a replacement for therapy or medication. If you are in crisis or having thoughts of self-harm, contact a licensed provider or call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['Changing your diet cures depression','Two small trials showed large add-on effects; the broader evidence is modest and early, not curative.'],['A pill or supplement equals the whole-diet effect','The trials tested a whole eating pattern with dietitian support, not isolated nutrients in a capsule.']],adv:[{n:'Prof. Felice Jacka',r:'Director, Food and Mood Centre, Deakin University; SMILES lead',paid:false,note:'Founding figure of nutritional psychiatry; academic, founded the International Society for Nutritional Psychiatry Research.'},{n:'Olive oil, supplement, and meal-plan brands',r:'commercial marketers',paid:true,note:'Some commercial products invoke Mediterranean-diet mood claims to sell goods; attribute such claims to the seller.'}],counter:[{n:'Editorial commentary on SMILES',cred:'academic commentary, 2018',q:'SMILES is an important but preliminary first step; small sample, single-blind design, and difficulty blinding diet trials limit certainty.'},{n:'Diet-trial meta-analysts',cred:'Annals of Internal Medicine and others',q:'Pooled dietary-intervention effects on depression are smaller and less certain than the headline single trials suggest; longer, larger studies are needed.'}],history:'The Mediterranean dietary pattern is not a modern invention but the everyday cuisine of the Mediterranean basin, rich in vegetables, legumes, whole grains, fish, and olive oil, with little red meat or sugar. Its health profile was first documented scientifically by American physiologist Ancel Keys in the Seven Countries Study (1958-1964), which contrasted Crete, southern Italy, and Greece with higher-disease populations. UNESCO inscribed the Mediterranean diet on its Representative List of the Intangible Cultural Heritage of Humanity in 2010, recognizing it as a shared social and cultural practice (initially Greece, Italy, Spain, and Morocco, later expanded), explicitly valuing how food is grown, cooked, and shared, not just its nutrients. Nutritional psychiatry adapted this pattern for mood only from 2017 onward.',timeline:[['1958-1964','Ancel Keys\'s Seven Countries Study documents Mediterranean diet health benefits'],['2010','UNESCO inscribes the Mediterranean diet as Intangible Cultural Heritage of Humanity'],['2017','SMILES trial (Jacka): first RCT of diet for major depression, large effect'],['2018','Commentaries call SMILES an important but preliminary first step'],['2022','AMMEND replicates large benefit in young men'],['2025','Meta-analyses temper effect sizes; longer, larger trials urged']],rel:['omega-3','saffron','psychobiotics','exercise'],enelNote:'Using diet to treat mental health is the most exciting and the most over-hyped corner of this portal, and both can be true at once. The SMILES trial genuinely changed the field: a large effect (Cohen\'s d, a standard effect-size measure, around -1.16), a third of the diet group recovering versus 8 percent of the comparison group, and only about 4 people needing to follow the diet for 1 extra person to benefit are striking results for a behavior change, and the AMMEND trial repeated a big effect in young men. But these are small trials (67 and 72 people), diet cannot be fully blinded because people know what they are eating, and pooling many studies brings the average effect down. The right framing is a low-risk add-on with real extra benefits for heart and metabolic health, not a cure that replaces therapy or medication. Note the fairness dimension honestly: a Mediterranean pattern can be cheaper than processed food but requires access, time, and skill that not everyone has. Honor the cultural roots, UNESCO recognized this as living heritage, rather than reducing it to a supplement. If you are struggling, reach a provider; in the US, call or text 988.',enel:false},
{i:'psychobiotics',n:'Psychobiotics',fn:'Probiotics for mood via the gut-brain axis',tier:1,ts:42,sig:'rising',hot:false,ev:2,cats:['nutrition','caution'],cls:'Live microorganisms',orig:'natural',aa:0,fdaS:'none',fda:'In the US probiotics are regulated as dietary supplements or foods, not drugs; none is FDA-approved to treat or prevent any psychiatric condition. Mood claims are structure/function statements.',wada:'Not applicable',rcts:45,studies:300,parts:'thousands',ctry:'Global',geo:[['Europe',35],['Asia',28],['USA',27],['Other',10]],disc:2013,discr:'term coined by Ted Dinan and John Cryan, Ireland (2013)',tag:'Probiotics are live bacteria taken to benefit health. Psychobiotics are specific bacterial strains proposed to ease anxiety and low mood through the gut-brain axis, the two-way communication between the digestive system and the brain. Human evidence is thin and mixed.',facts:[['Researchers who coined the term','Dinan and Cryan, 2013'],['Common strains studied','Lactobacillus rhamnosus and Bifidobacterium longum 1714 (two specific gut bacteria)'],['Strength of evidence','mixed; many small, short trials'],['Key caution','effects depend on the exact strain, and trials often find no benefit at all']],brief:'Psychobiotics are specific strains of live bacteria taken by mouth and proposed to improve mood and ease anxiety by acting on the gut-brain axis, the two-way communication system linking the digestive tract and the brain. The human evidence is genuinely mixed. Liu et al. (2019, Neuroscience and Biobehavioral Reviews) and several systematic reviews (studies that pool many trials together) report small reductions in depression symptoms, but the benefit usually shows up only in people who are already clinically depressed or under 60, and disappears in healthy adults. Many trials are small, short, and test different bacterial strains, so a result for one product tells you little about another. Two further problems weaken the field: publication bias (studies showing a benefit are more likely to get published than those showing nothing) and high variability between trials. Encouraging results in animals have not reliably carried over to people.',uses:['a possible add-on for mild depression symptoms','stress-related dips in mood','being studied for anxiety'],risk:'Generally well tolerated in healthy adults, with mild gas or bloating at worst. Serious infections in the blood (caused by the bacteria or by yeast) are rare but have been documented in people with weakened immune systems, the critically ill, or those with a central intravenous line; such people should not take probiotics without medical advice. Supplement strength and strain labeling are inconsistent and often not independently verified. Psychobiotics are not a substitute for proper treatment of moderate or severe depression. If you have thoughts of self-harm or your symptoms are getting worse, contact a licensed provider; in the US call or text 988 (Suicide and Crisis Lifeline).',mf:[['Probiotics reliably treat depression','Any benefit is small, depends on the exact strain, and is often absent in healthy people'],['Any probiotic counts as a psychobiotic','Only a few specific strains have any mood data; the common strains in yogurt do not']],adv:[{n:'John Cryan',r:'neuroscientist, University College Cork',paid:false,note:'co-coined the term; academic researcher, not a seller'},{n:'Ted Dinan',r:'psychiatrist, University College Cork',paid:false,note:'co-coined the term; academic, has consulted for industry'}],counter:[{n:'Dr. Edzard Ernst',cred:'Emeritus Prof., University of Exeter',q:'Marketing for mood-boosting probiotics far outpaces the weak, inconsistent clinical evidence.'}],history:'Ideas linking gut and mind are ancient: Ayurvedic medicine in India emphasized digestion (agni) as central to mental balance, and Traditional Chinese Medicine tied the Spleen and Stomach to worry and thought. Russian-born Nobel laureate Elie Metchnikoff proposed in 1907 that fermented-milk bacteria could prolong life and improve wellbeing. The modern gut-brain framing emerged in the 2000s, and Ted Dinan and John Cryan of University College Cork, Ireland, coined psychobiotics in a 2013 Biological Psychiatry paper.',timeline:[['1907','Metchnikoff links gut bacteria to health'],['2004','Sudo et al. show gut microbes shape stress response in mice'],['2013','Dinan and Cryan coin psychobiotics'],['2019','Liu et al. meta-analysis finds small, inconsistent mood effects']],rel:['omega-3','mediterranean-diet','ashwagandha'],enelNote:'Psychobiotics sit at the honest edge of nutrition science: a real mechanism (the gut-brain axis, the well-established two-way link between the digestive system and the brain) attached to clinical results that remain small, dependent on the exact bacterial strain, and easy to oversell. Enel rates the human mood evidence at 2 of 5. The most cited reviews find modest benefit mainly in people who already have depression symptoms, with little or no effect in healthy adults, and trials rarely test the same strain twice. That matters because a probiotic is not one thing but thousands of distinct organisms; a result for one strain tells you nothing about the next. Add inconsistent supplement quality and labeling, and the gap between marketing and proof widens. We list psychobiotics because the field is legitimate and fast-moving, not because the case is settled. If you want to experiment, treat it as low-risk add-on support, keep expectations modest, and never let it replace care for moderate or severe depression.',enel:false},
{i:'st-johns-wort',n:'St John\'s Wort',fn:'Hypericum perforatum for depression',tier:1,ts:68,sig:'stable',hot:false,ev:4,cats:['nutrition','evidence'],cls:'Botanical extract',orig:'traditional',aa:0,fdaS:'none',fda:'Jurisdiction-dependent: in Germany an approved drug for mild-to-moderate depression under Commission E (since 1984). In the United States sold only as a dietary supplement and NOT FDA-approved to treat depression.',wada:'Not applicable',rcts:35,studies:300,parts:'thousands',ctry:'Global',geo:[['Europe',50],['USA',25],['Asia',15],['Other',10]],disc:-450,discr:'documented in ancient Greek medicine by Hippocrates and Dioscorides (c. 5th-1st century BCE)',tag:'St John\'s Wort (the herb Hypericum perforatum) is a flowering plant with solid evidence for treating mild-to-moderate depression. It also has dangerous, well-documented interactions with many medications.',facts:[['Typical dose','300 mg, three times daily, of a standardized extract'],['Active compounds','hyperforin and hypericin (the herb\'s main mood-active ingredients)'],['Strength of evidence','strong for mild-to-moderate depression, weak for severe depression'],['Key caution','SERIOUS interactions with many prescription drugs']],brief:'St John\'s Wort, the flowering herb Hypericum perforatum, is one of the best-studied plant remedies for depression. A 2008 Cochrane review (Linde et al., pooling 29 trials and 5,489 patients; Cochrane reviews are independent, high-rigor summaries of all available trials) found standardized extracts of the herb worked better than a placebo (a dummy pill) and about as well as standard antidepressants for mild-to-moderate depression, with fewer side effects. The evidence for severe depression is much weaker: the Hypericum Depression Trial Study Group (JAMA, 2002, 340 patients) found no benefit over placebo for major depressive disorder, the clinical term for serious, persistent depression. The Cochrane authors cautioned that results vary by which extract is used, and that trials run in Germany reported larger effects than US trials, a sign of inconsistency and possible biased reporting.',uses:['mild-to-moderate depression','seasonal dips in mood','mild anxiety (traditional use)'],risk:'St John\'s Wort has SERIOUS, well-documented drug interactions. It strongly revs up the body\'s drug-clearing machinery (a liver enzyme called CYP3A4 and a cell transporter called P-glycoprotein, both driven by the compound hyperforin), which causes the body to break down many medications too fast and lose their effect. Affected drugs include birth control pills (risking breakthrough bleeding and unintended pregnancy), blood thinners such as warfarin, HIV medications (risking treatment failure), and immune-suppressing drugs such as cyclosporine (organ transplant rejection has occurred). Combined with common antidepressants such as SSRIs (selective serotonin reuptake inhibitors) or SNRIs (a related class), migraine drugs called triptans, or other serotonin-raising drugs, it can trigger serotonin syndrome, a potentially life-threatening reaction from too much serotonin. It can also make skin more sensitive to sunlight. Never combine it with prescription medications without review by a pharmacist or physician. Do not use it for major or severe depression. If you have thoughts of self-harm, contact a provider; in the US call or text 988.',mf:[['It is a gentle, risk-free natural remedy','It has some of the most serious drug interactions of any common supplement'],['It works for every kind of depression','The evidence supports mild-to-moderate depression only; trials in severe depression came back negative']],adv:[{n:'German Commission E',r:'national herbal regulatory body',paid:false,note:'approved hypericum as a depression drug in 1984; regulator, not seller'},{n:'Klaus Linde',r:'researcher, Technical University of Munich',paid:false,note:'lead author of the Cochrane reviews; academic'}],counter:[{n:'Hypericum Depression Trial Study Group',cred:'NIH/NCCIH-funded, JAMA 2002',q:'In major depression, St John\'s Wort was no better than placebo.'},{n:'Dr. Jonathan Davidson',cred:'Duke University, study co-author',q:'For more severe depression the herb did not outperform an inactive pill.'}],history:'Hypericum was documented in ancient Greek medicine: Hippocrates (c. 460-370 BCE) and later Dioscorides and Pliny the Elder (1st century CE) recommended it for wounds, menstrual disorders, and to expel what they saw as evil spirits causing melancholy. The genus name likely derives from Greek hyper (above) and eikon (image), referencing the custom of hanging the plant above icons to ward off evil. The English name honors St John the Baptist, as the plant blooms near his feast day (June 24). European folk healers used the red-tinged oil for wounds and nervous exhaustion throughout the medieval period; it entered modern clinical study in 1980s Germany.',timeline:[['c. 50 CE','Dioscorides describes hypericum in De Materia Medica'],['1984','German Commission E approves it as an antidepressant drug'],['2002','JAMA trial finds no benefit in major depression'],['2008','Cochrane review confirms efficacy for mild-to-moderate depression']],rel:['saffron','omega-3','exercise'],enelNote:'St John\'s Wort is the strongest natural-medicine case on this portal, and also the most dangerous to use carelessly. Enel rates it 4 of 5: the 2008 Cochrane review of 29 trials (an independent, high-rigor pooling of the evidence) shows clear benefit for mild-to-moderate depression, on par with prescription antidepressants. Germany has regulated it as a prescribed drug since 1984, which is why we note jurisdiction carefully; in the US it is merely a supplement. The honest caveats are real. The benefit does not extend to severe (major) depression, where the landmark 2002 JAMA trial found nothing, and German trials report larger effects than US ones. Most important is safety: this herb speeds up the liver enzymes and cell transporters that clear drugs from the body, strongly enough to cause birth-control failure, organ-transplant rejection, HIV treatment failure, and serotonin syndrome (a dangerous reaction) when mixed with antidepressants. It is not a casual purchase. Anyone on any prescription should clear it with a pharmacist first. For mild low mood in an adult taking no other medication, the evidence is genuinely good; everywhere else, caution governs.',enel:false},
{i:'ashwagandha',n:'Ashwagandha',fn:'Withania somnifera for stress and anxiety',tier:1,ts:71,sig:'rising',hot:false,ev:3,cats:['nutrition'],cls:'Botanical adaptogen',orig:'traditional',aa:0,fdaS:'none',fda:'In the US a dietary supplement, NOT FDA-approved to treat any condition; mood and stress claims are structure/function statements only. Some branded extracts hold GRAS status as food ingredients.',wada:'Not applicable',rcts:15,studies:200,parts:'thousands',ctry:'Global',geo:[['Asia',45],['USA',30],['Europe',18],['Other',7]],disc:-600,discr:'described in Ayurvedic texts of ancient India, including the Charaka Samhita (c. 600 BCE onward)',tag:'Ashwagandha (the root of the plant Withania somnifera) is a herb from traditional Indian medicine, classed as an adaptogen (a substance claimed to help the body cope with stress). It has moderate evidence for reducing stress and anxiety, but quality varies between products and rare cases of liver injury have been reported.',facts:[['Typical dose','300 to 600 mg of extract daily'],['Sanskrit meaning of the name','\'smell of a horse\''],['Strength of evidence','moderate; small trials, many paid for by the makers'],['Key caution','reports of liver injury in some users']],brief:'Ashwagandha (Withania somnifera) is a root used in traditional Indian medicine, and there is moderate but genuine evidence that it reduces stress and anxiety. A 2024 systematic review and meta-analysis (Della Porta et al.; this means an analysis that pools many trials together) and a 2025 BJPsych Open meta-analysis report meaningful drops in self-reported stress, scores on the Hamilton Anxiety scale (a standard anxiety questionnaire), and the stress hormone cortisol compared with a placebo (a dummy pill). The effects look sizable, but the results bounce around a lot between studies, so the true effect is uncertain. The trials are small, typically lasting 30 to 90 days at doses of 125 to 600 mg, and many are funded by the companies that sell the branded ex
