</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{background:#070c18;font-family:"Helvetica Neue",Helvetica,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::selection{background:#2D9AAD;color:#fff;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(133,212,224,0.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(133,212,224,0.32);}
input::placeholder{color:#5f7888;}
input:focus{outline:none;border-color:rgba(91,196,214,0.5)!important;box-shadow:0 0 0 2px rgba(45,154,173,0.12);}
button{font-family:inherit;}
#mainscroll{scroll-behavior:smooth;}
table{font-family:inherit;}

/* ── GLOBAL COSMIC STAGE (behind detail/category/search/compare) ── */
.cosmic-stage{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 44% at 50% 4%, rgba(212,160,23,0.10), transparent 58%),
    radial-gradient(ellipse 80% 50% at 50% 10%, rgba(45,154,173,0.12), transparent 60%),
    radial-gradient(ellipse 90% 55% at 50% 112%, rgba(45,154,173,0.10), transparent 62%),
    linear-gradient(180deg,#04070d 0%,#070c18 40%,#0a1426 100%);}
/* faint diagonal galaxy arc */
.mw-arc{position:absolute;inset:auto -16% 24% -16%;height:54%;
  background:
    radial-gradient(ellipse 60% 58% at 42% 60%, rgba(140,175,225,0.16) 0%, rgba(140,175,225,0.05) 40%, transparent 70%),
    radial-gradient(ellipse 44% 44% at 64% 52%, rgba(175,135,225,0.11) 0%, transparent 64%),
    radial-gradient(ellipse 40% 40% at 30% 66%, rgba(130,205,224,0.10) 0%, transparent 64%);
  transform:rotate(-13deg);filter:blur(6px);opacity:.85;}

/* ── REALISTIC STARFIELD ──
   Three coordinated layers: fine field, mid field, and bright glow-stars.
   Bright stars get a soft halo via a larger faint radial at the same point. */
.stars,.mw-stars{position:absolute;inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 7% 18%,#eaf3ff 99%,transparent),
    radial-gradient(1px 1px at 13% 41%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 19% 9%,#fff 99%,transparent),
    radial-gradient(1.4px 1.4px at 23% 63%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 29% 27%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 34% 78%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 39% 14%,#fff 99%,transparent),
    radial-gradient(1px 1px at 44% 49%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 48% 88%,#c4d8ff 99%,transparent),
    radial-gradient(1.4px 1.4px at 53% 33%,#fff 99%,transparent),
    radial-gradient(1px 1px at 58% 70%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 63% 11%,#bcd2ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 68% 54%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 73% 84%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 78% 23%,#fff 99%,transparent),
    radial-gradient(1.3px 1.3px at 83% 61%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 88% 38%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 93% 73%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 97% 16%,#fff 99%,transparent);
  background-repeat:no-repeat;animation:twinkle 7s ease-in-out infinite alternate;}
.stars.layer-2{
  background-image:
    radial-gradient(1px 1px at 5% 55%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 16% 84%,#fff 99%,transparent),
    radial-gradient(1px 1px at 27% 47%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 36% 92%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 49% 19%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 61% 87%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 71% 40%,#fff 99%,transparent),
    radial-gradient(1px 1px at 82% 92%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 91% 57%,#dce9ff 99%,transparent);
  animation-duration:10s;animation-direction:alternate-reverse;opacity:.7;}
/* bright glow-stars: a sharp core + a soft halo around a handful of points */
.stars-bright,.mw-stars-bright{position:absolute;inset:0;
  background-image:
    radial-gradient(2px 2px at 21% 30%,#fff 60%,rgba(255,255,255,0.0) 100%),
    radial-gradient(7px 7px at 21% 30%,rgba(207,224,255,0.5) 0%,transparent 70%),
    radial-gradient(2px 2px at 57% 22%,#fff 60%,transparent 100%),
    radial-gradient(8px 8px at 57% 22%,rgba(173,135,225,0.4) 0%,transparent 70%),
    radial-gradient(2.4px 2.4px at 79% 58%,#fff 60%,transparent 100%),
    radial-gradient(9px 9px at 79% 58%,rgba(130,205,224,0.45) 0%,transparent 70%),
    radial-gradient(2px 2px at 40% 70%,#fff 60%,transparent 100%),
    radial-gradient(7px 7px at 40% 70%,rgba(207,224,255,0.4) 0%,transparent 70%);
  background-repeat:no-repeat;animation:twinkle 5s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.5}50%{opacity:.95}100%{opacity:.6}}

/* gold celestial beam, V9 signature, behind dark views */
.beam-gold{position:absolute;left:50%;top:-20%;width:220px;height:92%;transform:translateX(-50%) rotate(8deg);

  stampLabel:'Mental Health & Emotional Wellbeing Library',
  disclaimer:'This library is an educational resource, not medical advice, and it does not endorse any therapy, product, or brand. It covers non-pharmaceutical approaches and is not a substitute for professional care. If you are struggling, contact a qualified mental-health provider. In a crisis, call or text 988 (the US Suicide and Crisis Lifeline) or your local emergency number. Information is anchored to publicly available research as of mid-2026 and will evolve as new evidence arrives.',
};
const CATS = [{id:'all',label:'All Interventions',n:46,icon:'◎',desc:'The complete mental-health and wellbeing library'},{id:'trending',label:'Trending Now',n:11,icon:'▲',desc:'Most-discussed approaches in 2026'},{id:'psychotherapy',label:'Talk Therapies',n:12,icon:'◉',desc:'CBT, ACT, DBT, EMDR, exposure, and more'},{id:'mindfulness',label:'Mindfulness & Meditation',n:17,icon:'⊙',desc:'MBSR, MBCT, breathwork, and meditation'},{id:'movement',label:'Movement & Body',n:5,icon:'◈',desc:'Exercise, yoga, and tai chi for mood'},{id:'nature',label:'Nature & Lifestyle',n:4,icon:'✷',desc:'Light, nature, sleep, and connection'},{id:'nutrition',label:'Nutrition & Supplements',n:7,icon:'❋',desc:'Diet, omega-3, and botanicals for mood'},{id:'somatic',label:'Somatic & Nervous System',n:17,icon:'◐',desc:'Bodywork, acupuncture, and vagal tone'},{id:'neurotech',label:'Devices & Neurotech',n:6,icon:'⟁',desc:'TMS, neurofeedback, and biofeedback'},{id:'creative',label:'Creative & Expressive',n:3,icon:'◇',desc:'Art, music, and expressive writing'},{id:'social',label:'Social & Community',n:6,icon:'⬡',desc:'Connection, animals, and gratitude'},{id:'emerging',label:'Emerging & Frontier',n:5,icon:'◌',desc:'The earliest-stage approaches'},{id:'evidence',label:'Strong Evidence',n:15,icon:'✓',desc:'Backed by multiple human studies (evidence level 4+)'},{id:'caution',label:'Weak Evidence',n:8,icon:'⚠',desc:'Early or low-quality evidence (level 2 or below)'}];
const P = [
{i:'cbt',n:'Cognitive Behavioral Therapy',fn:'Cognitive Behavioral Therapy (CBT)',tier:1,ts:92,sig:'hot',hot:true,ev:5,cats:['psychotherapy','trending','evidence'],cls:'Structured Psychotherapy',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:500,studies:2000,parts:'hundreds of thousands (RCTs + meta-analyses)',ctry:'USA, UK, Netherlands, Australia, Germany',geo:[['USA',38],['Europe',37],['Asia',13],['Other',12]],disc:1967,discr:'Aaron T. Beck, University of Pennsylvania (1967); Albert Ellis REBT (1955)',tag:'The most-studied psychotherapy and a guideline first-line option for depression and anxiety.',facts:[['Format','Structured, 8-20 sessions, homework'],['Best evidence','Depression, anxiety, OCD, PTSD'],['Guidelines','NICE and APA Div12 first-line'],['Caveat','Benefit looks larger when compared to a waiting list']],brief:'Cognitive behavioral therapy, or CBT, is a structured, short-term form of talk therapy. Instead of digging through the distant past, it works in the present: a therapist and client find the thoughts and habits that keep a problem going, then practice changing them, with exercises to do between sessions. It is the most studied talk therapy in the world, and the bodies that judge what counts as proven treatment endorse it. The American Psychological Association rates the evidence for CBT as strong for panic, generalized anxiety, and social anxiety, and Britain\'s National Institute for Health and Care Excellence, the group that tells the UK health service what to offer, lists it as a first choice for depression and anxiety. The honest debate is not whether CBT helps but how much. Some researchers found its measured benefit for depression had shrunk since the 1970s; others showed that fading stopped by the mid-1990s. And a recurring pattern is that studies comparing therapy against a waiting list make it look stronger than studies comparing it against ordinary care, because people left on a waiting list tend not to improve on their own. Put together, CBT is genuinely helpful and well supported, just not the cure-all that some marketing implies.',uses:['Depression','Anxiety disorders','OCD','PTSD','Insomnia (as CBT-I)'],risk:'How well CBT works depends a lot on the individual therapist, and the gains can fade if the skills are not kept up. As noted, the benefit can look bigger than it really is when studies compare it to a waiting list instead of to ordinary care, and when the researchers running the study are themselves CBT advocates. CBT is not a substitute for a professional assessment. Severe depression, psychosis, or any thoughts of self-harm need a qualified provider or emergency help (call or text 988 in the US), and some conditions need medication alongside or instead of therapy.',mf:[['CBT cures depression for everyone','Roughly half of patients respond; many relapse, and trial effects are inflated by weak control groups'],['CBT is purely a modern Western invention','Beck and Ellis both credited ancient Stoic philosophy, notably Epictetus, as the explicit philosophical origin'],['CBT is always better than other therapies','For depression and anxiety it performs similarly to several bona fide therapies, including ACT']],adv:[{n:'Beck Institute',r:'training organization founded by Aaron and Judith Beck',paid:true,note:'Sells CBT training and certification; states CBT is effective across many disorders. Financial stake in CBT adoption.'},{n:'Judith Beck',r:'clinical psychologist, Beck Institute president',paid:true,note:'Author of widely sold CBT textbooks; promotes CBT as a primary evidence-based treatment.'}],counter:[{n:'Dr. Pim Cuijpers',cred:'Vrije Universiteit Amsterdam',q:'Has repeatedly shown waitlist controls and risk-of-bias problems inflate psychotherapy effect sizes, including for CBT.'},{n:'Dr. Tor Wager and allegiance researchers',cred:'meta-research literature',q:'Researcher allegiance acts as a non-financial conflict of interest that enlarges reported psychotherapy effects.'}],history:'CBT\'s intellectual lineage is explicitly ancient and non-modern by its founders\' own account. Albert Ellis, developing Rational Emotive Behavior Therapy in 1955, credited the first-century Greek Stoic Epictetus, whose Enchiridion held that people are disturbed not by events but by their judgments of them. Aaron Beck, a psychiatrist at the University of Pennsylvania, traced cognitive therapy\'s philosophical origins to the Stoics including Zeno of Citium, Chrysippus, Seneca, and Marcus Aurelius, citing them in his 1979 depression manual. Parallels to Buddhist analysis of thought are also widely noted. Beck introduced cognitive therapy for depression in his 1967 book after finding psychoanalysis ineffective for the condition. The behavioral and cognitive streams merged into modern CBT through the 1970s and 1980s, and it became the most exported and digitized psychotherapy worldwide.',timeline:[['1955','Ellis introduces Rational Emotive Therapy'],['1967','Beck publishes Depression: Causes and Treatment'],['1979','Beck et al. publish the cognitive therapy of depression manual'],['2015','Johnsen and Friborg report declining effects for depression'],['2017','Reanalysis finds decline concentrated before 1995'],['2024','Cuijpers group quantifies waitlist-control inflation']],rel:['act','dbt','exposure','cbt-i','mbct'],enelNote:'The real question is how much of CBT\'s edge holds up under a fair test. The most careful answer comes from Pim Cuijpers and colleagues, who compared real trial patients given CBT against patients given ordinary care, rather than against a waiting list. The gap matters: measured against a waiting list, CBT\'s benefit roughly doubles, simply because untreated people on a waiting list improve less than people getting normal care. Most of the eye-catching numbers for CBT come from those waiting-list comparisons. When the comparison is fairer, CBT still clearly helps and still earns its place in treatment guidelines, but its advantage settles into the same moderate range as several other structured therapies, rather than standing out as a uniquely powerful cure. In short, a solid and well-evidenced therapy, not a magic bullet, and a reasonable first thing to try for depression or anxiety.',enel:false},
{i:'act',n:'Acceptance and Commitment Therapy',fn:'Acceptance and Commitment Therapy (ACT)',tier:1,ts:74,sig:'rising',hot:false,ev:4,cats:['psychotherapy','mindfulness','evidence'],cls:'Third-Wave Psychotherapy',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:1050,studies:1300,parts:'tens of thousands (1000+ RCTs)',ctry:'USA, Australia, UK, Sweden, Iran',geo:[['USA',34],['Europe',34],['Asia',16],['Other',16]],disc:1986,discr:'Steven C. Hayes, University of Nevada, Reno (mid-1980s)',tag:'A third-wave therapy that targets psychological flexibility rather than disputing thoughts directly.',facts:[['Core target','Psychological flexibility (6 processes)'],['Theory base','Relational Frame Theory'],['RCT count','Over 1000 by 2023'],['vs CBT','Comparable outcomes, different mechanism']],brief:'ACT, developed by Steven Hayes, aims to increase psychological flexibility through acceptance, cognitive defusion, present-moment awareness, self-as-context, values, and committed action, rather than directly disputing thought content as CBT does. Hayes, Luoma and colleagues (2006, 18 RCTs) reported a mean effect around 0.66, and Lars-Goran Ost (2008, 13 RCTs) found a comparable 0.68 while flagging weaker methodology than CBT trials. The RCT base grew past 1000 by 2023, and recent meta-analyses report moderate effects (Hedges\'s g near 0.72 versus controls). Head-to-head meta-analyses find ACT and CBT produce equivalent outcomes for depression and anxiety, though ACT moves its own proposed process, psychological flexibility, more.',uses:['Depression','Anxiety','Chronic pain','Stress and burnout','Substance use'],risk:'Many early trials used waitlist rather than active controls, inflating effects; Ost flagged methodological quality below CBT standards. ACT is not shown superior to CBT, only comparable. The values and acceptance framing does not suit everyone. Not a substitute for professional care. Severe symptoms, worsening mood, or thoughts of self-harm warrant a qualified provider or emergency services (988 in the US), and some conditions require medication.',mf:[['ACT is a breakthrough beyond CBT','Head-to-head trials show comparable, not superior, outcomes for depression and anxiety'],['ACT works by changing negative thoughts','ACT deliberately does not try to change thought content; it targets the relationship to thoughts'],['The evidence is as solid as CBT\'s','The trial base is large but historically weaker in design, with more waitlist controls']],adv:[{n:'Steven C. Hayes',r:'co-developer of ACT',paid:'unclear',note:'Originated ACT and Relational Frame Theory; authors popular ACT books. Strong researcher allegiance and likely book royalties.'},{n:'Association for Contextual Behavioral Science',r:'ACT professional and training body',paid:true,note:'Sells ACT training and conferences; promotes ACT as a unified model of behavior change. Financial stake in adoption.'}],counter:[{n:'Dr. Lars-Goran Ost',cred:'Stockholm University',q:'His reviews concluded third-wave therapies including ACT used less rigorous methods than CBT and did not meet empirically supported treatment criteria at the time.'},{n:'Dr. Stefan Hofmann',cred:'Boston University / Philipps-University Marburg',q:'Has argued third-wave claims of a paradigm shift outrun the comparative evidence, which shows rough equivalence with CBT.'}],history:'ACT is a modern American development, but it draws openly on older contemplative ideas about acceptance and present-moment awareness found in Buddhist and mindfulness traditions, recast in behavioral-science language. Steven Hayes began formulating the approach at the University of Nevada, Reno in the mid-1980s, grounding it in Relational Frame Theory, an account of how humans relate symbols and language. The first full ACT treatment text appeared in 1999 (Hayes, Strosahl, and Wilson). Unlike CBT\'s Stoic lineage of disputing irrational beliefs, ACT\'s stance, that struggling against thoughts can deepen suffering, parallels acceptance themes in Eastern contemplative practice while building a distinct experimental theory of language and cognition. The model spread rapidly, with RCTs rising from dozens in 2012 to over a thousand by 2023.',timeline:[['mid-1980s','Hayes develops the approach at Reno'],['1999','First ACT treatment manual published'],['2006','Hayes et al. meta-analysis, 18 RCTs'],['2008','Ost meta-analysis flags methodology'],['2023','RCT count surpasses 1000']],rel:['cbt','dbt','mbct','mbsr','self-compassion'],enelNote:'The central question is whether ACT works through its claimed engine, psychological flexibility, or simply works as well as CBT for nonspecific reasons. The most informative real-participant evidence comes from process-mediation meta-analyses of ACT versus CBT trials, such as the three-level meta-analysis by Bai and colleagues and adolescent process analyses, which track identifiable patients on both symptom scales and validated flexibility measures (for example the AAQ-II). The intervention is ACT; the comparison is active CBT; the endpoints are post-treatment depression or anxiety scores plus change in psychological flexibility. The finding that matters: ACT and CBT reach equivalent symptom outcomes, but ACT shifts psychological flexibility more than CBT does, while CBT shifts its own cognitive-change targets more. This supports ACT as a genuine alternative with a distinct mechanism rather than a superior treatment, and it tells clinicians that choosing ACT is reasonable on fit and preference, not on a claim of stronger results.',enel:false},
{i:'dbt',n:'Dialectical Behavior Therapy',fn:'Dialectical Behavior Therapy (DBT)',tier:1,ts:78,sig:'rising',hot:false,ev:4,cats:['psychotherapy','mindfulness','somatic','evidence'],cls:'Comprehensive Psychotherapy Program',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:40,studies:300,parts:'thousands (RCTs + meta-analyses)',ctry:'USA, Canada, UK, Germany, Netherlands',geo:[['USA',42],['Europe',33],['North America (ex-US)',10],['Other',15]],disc:1991,discr:'Marsha M. Linehan, University of Washington (1991)',tag:'The leading evidence-based treatment for borderline personality disorder and recurrent self-harm.',facts:[['Format','Individual + skills group + phone coaching'],['Best evidence','BPD, self-harm, suicidal behavior'],['Roots','CBT plus Zen and acceptance'],['Note','Often matched by strong structured care']],brief:'DBT, created by Marsha Linehan, combines CBT change strategies with acceptance skills drawn from Zen, organized as individual therapy, a skills group, and between-session phone coaching. Linehan\'s landmark 1991 RCT (Archives of General Psychiatry) in chronically parasuicidal women with borderline personality disorder found fewer and less severe self-harm episodes, better treatment retention, and fewer inpatient days versus treatment as usual. Meta-analyses since report moderate effects on self-harm and suicidal or self-injurious behavior, with mixed results on suicidal ideation and anger. McMain and colleagues (2009, 180 patients) found DBT and well-structured general psychiatric management both improved patients with no significant difference between them.',uses:['Borderline personality disorder','Recurrent self-harm','Suicidal behavior','Emotion dysregulation','Eating and substance use disorders (adjunct)'],risk:'DBT is intensive and resource-heavy, and fidelity outside specialist centers varies. Benefits on self-harm are clearer than on suicidal ideation, and structured comparison treatments can match it. Not a substitute for crisis care. Anyone with active suicidal thoughts, a recent attempt, or escalating self-harm needs a qualified mental-health provider or emergency services immediately (988 in the US), and medication is sometimes indicated alongside therapy.',mf:[['DBT is the only thing that helps BPD','Well-structured general psychiatric management performed comparably in the McMain trial'],['DBT eliminates suicidal thoughts','Evidence is strongest for reducing self-harm behavior; effects on suicidal ideation are mixed'],['The mindfulness in DBT is a neutral modern technique','Linehan adapted it directly from Zen practice and contemplative traditions of radical acceptance']],adv:[{n:'Marsha M. Linehan',r:'developer of DBT',paid:'unclear',note:'Originated DBT and founded Behavioral Tech to disseminate it; strong researcher allegiance and dissemination interest.'},{n:'Behavioral Tech / Linehan Institute',r:'DBT training organization',paid:true,note:'Sells DBT training and certification; promotes DBT as the established treatment for BPD. Financial stake in adoption.'}],counter:[{n:'Dr. Shelley McMain',cred:'University of Toronto / CAMH',q:'Her RCT found DBT no more effective than well-delivered general psychiatric management for borderline personality disorder.'},{n:'Dr. John Gunderson and GPM proponents',cred:'Harvard / McLean Hospital',q:'Argue that good structured psychiatric management achieves much of DBT\'s benefit at lower cost and intensity.'}],history:'DBT is a modern American synthesis with explicit Eastern contemplative roots. Marsha Linehan, at the University of Washington, developed it after standard CBT failed for chronically suicidal women, publishing the foundational trial and manuals around 1991 to 1993. Its acceptance side comes directly from Zen Buddhism: Linehan, herself a Zen practitioner, translated Zen mindfulness and the stance of radical acceptance into secular what and how skills, and also drew on Christian contemplative traditions. The dialectical framework, balancing acceptance and change, reflects dialectical philosophy emphasizing interconnection and continual change. This fusion of behavioral science with centuries-old contemplative practice distinguishes DBT from earlier purely cognitive approaches and made mindfulness a core clinical skill rather than an add-on.',timeline:[['1991','Linehan RCT in Archives of General Psychiatry'],['1993','Linehan publishes DBT treatment and skills manuals'],['2006','Linehan RCT versus expert community treatment'],['2009','McMain trial finds DBT comparable to general psychiatric management'],['2021','Meta-analysis confirms self-harm reduction, mixed ideation effects']],rel:['cbt','act','mbct','self-compassion','breathwork'],enelNote:'The decisive question is whether DBT\'s specific package outperforms simply delivering organized, expert care to the same patients. The McMain et al. (2009) randomized trial answers it with real, identifiable participants: 180 adults with borderline personality disorder, each with at least two suicidal or self-injurious episodes in the prior five years, were assigned to one year of DBT or to general psychiatric management, a structured but far less specialized approach. The measurable endpoints were the frequency and severity of suicidal and self-injurious episodes, plus emergency and inpatient use, tracked over treatment and two-year follow-up. Both groups improved substantially, and there was no significant difference between them. This matters because DBT is expensive and demanding, and the result reframes the choice: DBT clearly helps high-risk BPD patients, but a well-run structured program can deliver comparable gains. For systems with limited DBT capacity, that finding supports investing in any coherent, expert, suicide-focused care rather than treating DBT as uniquely necessary.',enel:false},
{i:'emdr',n:'EMDR',fn:'Eye Movement Desensitization and Reprocessing',tier:1,ts:74,sig:'stable',hot:false,ev:4,cats:['psychotherapy','somatic','evidence'],cls:'Trauma-focused psychotherapy',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:40,studies:300,parts:'thousands',ctry:'USA, UK, Netherlands, Germany',geo:[['USA',35],['Europe',45],['Other',20]],disc:1989,discr:'Francine Shapiro, Mental Research Institute, Palo Alto (1989)',tag:'A structured trauma therapy that pairs recall of distressing memories with bilateral eye movements, with strong PTSD evidence but a contested mechanism.',facts:[['Sessions','6-12 typical'],['Phases','8-phase protocol'],['Best evidence','adult PTSD'],['Eye-movement role','contested']],brief:'EMDR, short for eye movement desensitization and reprocessing, is a structured therapy for trauma. A person briefly brings a distressing memory to mind while the therapist guides their eyes back and forth (or taps left and right), repeating this until the memory loses its charge. For post-traumatic stress disorder (PTSD), the evidence is strong: it is recommended by the World Health Organization, by Britain\'s National Institute for Health and Care Excellence (NICE, which advises the UK health service), by the American Psychological Association, and by the 2023 US Veterans Affairs and Defense Department guideline, which rates it as highly as the other leading trauma therapies. Large reviews find it reduces symptoms about as much as trauma-focused CBT (cognitive behavioral therapy). The genuine controversy is the eye movements themselves: studies that remove them but keep everything else find little added benefit, which has fueled a long debate over whether EMDR is really just exposure therapy with an extra task attached. Either way, the overall package works for PTSD.',uses:['PTSD','traumatic memories','phobias (adjunct)'],risk:'Revisiting trauma can briefly intensify distress, vivid memories, or dreams, so the skill of the therapist matters a great deal, and it is not meant for steadying someone who is in active crisis. The evidence outside of PTSD is much thinner. EMDR is not a substitute for professional care; suicidal thoughts, dissociation (feeling detached from yourself or from reality), or severe or worsening symptoms call for a qualified mental-health provider or emergency help (call or text 988 in the US).',mf:[['The eye movements are what heal trauma.','Dismantling studies find the eye-movement component adds little; the active ingredient is debated and may overlap with exposure.'],['EMDR rewires the brain in one session.','Most protocols run 6-12 sessions; single-session \'cures\' are not supported by controlled evidence.'],['EMDR works for almost any condition.','Strong evidence is concentrated in PTSD; other uses are preliminary.']],adv:[{n:'EMDR International Association (EMDRIA)',r:'professional/credentialing body',paid:'unclear',note:'Sets training standards and certifies clinicians; promotes the method and has a financial interest in training revenue.'},{n:'Francine Shapiro',r:'originator',paid:'unclear',note:'Developed and trademarked EMDR and founded the EMDR Institute; held commercial training interests until her death in 2019.'}],counter:[{n:'Richard McNally',cred:'Harvard University',q:'Has argued the effective parts of EMDR are not new and the new parts (eye movements) are not effective, framing it as exposure with an inert add-on.'},{n:'James Herbert and colleagues',cred:'Drexel University',q:'Have cited EMDR as a case study in how a therapy can spread faster than rigorous evidence for its specific mechanism warrants.'}],history:'EMDR originated with American psychologist Francine Shapiro, who in 1987 noticed during a walk that spontaneous eye movements seemed to reduce the charge of distressing thoughts; she published the first randomized trial in 1989, naming it EMD, later EMDR. It built on a long Western behavioral lineage of confronting feared material rather than on a non-Western tradition, a modern Western origin worth stating plainly. It spread internationally through the 1990s and 2000s, gaining WHO and NICE endorsement for PTSD, while researchers continued to debate whether bilateral stimulation contributes anything beyond exposure and working-memory taxation.',timeline:[['1987','Shapiro observes the eye-movement effect'],['1989','first RCT published; method named EMD'],['1991','renamed EMDR to include reprocessing'],['2013','WHO lists EMDR as a recommended PTSD treatment'],['2018','NICE NG116 recommends EMDR for adult PTSD'],['2023','VA/DoD gives EMDR a strong recommendation for PTSD']],rel:['exposure','cbt'],enelNote:'The fairest summary comes from the 2023 US Veterans Affairs and Defense Department guideline, which judged each trauma therapy on its own and gave EMDR a strong recommendation, on par with prolonged exposure and cognitive processing therapy, declining to rank them. Three honest caveats. First, many EMDR studies are run by its supporters, and the body that certifies EMDR therapists earns money from training, so enthusiasm can color the results. Second, neither therapist nor patient can be kept unaware of which therapy is being given, which tends to inflate the measured benefit of any talk therapy. Third, the core puzzle is still unsolved: when researchers remove the signature eye movements but keep the rest, the extra benefit is small or absent, so the eye movements may not be the active ingredient even though the whole package helps. Treat EMDR as one of several effective, recommended options for PTSD, chosen on availability, fit, and the clinician\'s training, rather than as a uniquely powerful or proven-by-mechanism cure.',enel:false},
{i:'exposure',n:'Exposure Therapy',fn:'Exposure Therapy and Prolonged Exposure',tier:1,ts:80,sig:'stable',hot:true,ev:5,cats:['psychotherapy','trending','evidence'],cls:'Behavioral psychotherapy',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:100,studies:1000,parts:'tens of thousands',ctry:'USA, UK, South Africa (origins), Netherlands',geo:[['USA',45],['Europe',40],['Other',15]],disc:1958,discr:'Joseph Wolpe (systematic desensitization, 1958); Edna Foa (Prolonged Exposure, 1980s)',tag:'Systematic, graded confrontation with feared memories, objects, or situations; the most strongly evidenced behavioral treatment for anxiety, PTSD, and OCD.',facts:[['PE sessions','8-15 (90 min)'],['Core principle','reciprocal inhibition / habituation'],['Best evidence','PTSD, phobias, OCD'],['Key barrier','clinician underuse']],brief:'Exposure therapy treats fear and anxiety by doing the opposite of avoiding: with a therapist\'s guidance, a person approaches the feared memory, object, or situation in small, planned steps until it no longer sets off alarm. It is the most strongly proven behavioral treatment for anxiety, phobias, post-traumatic stress disorder (PTSD), and obsessive-compulsive disorder (OCD). Prolonged Exposure, a version built for PTSD, is a top recommendation of the American Psychological Association and the 2023 US Veterans Affairs and Defense Department guideline; in studies, about 53 percent of everyone who starts it no longer meets the definition of PTSD, rising to roughly 68 percent of those who finish, and the gains still hold 5 to 10 years later. For OCD, the version called exposure and response prevention (facing the trigger and then resisting the usual compulsion) is the leading non-drug treatment. The frustrating part is how underused it is: surveys find many therapists avoid it, often fearing it is too distressing, so most patients who could benefit never get it.',uses:['PTSD','specific phobias','panic disorder','social anxiety','OCD (as ERP)'],risk:'Exposure deliberately raises distress for a short time, which can feel intense, so it needs a trained clinician to set the pace and avoid pushing too fast or too soon; for complex or dissociative trauma it is adapted rather than dropped. It is not a substitute for professional care; suicidal thoughts, self-harm, or severe or worsening symptoms call for a qualified mental-health provider or emergency help (call or text 988 in the US).',mf:[['Exposure is dangerous and re-traumatizing.','Controlled evidence shows it is safe and effective when properly delivered; dropout is comparable to other trauma therapies.'],['Facing fear once cures it.','Benefit comes from repeated, graded, sustained exposure across multiple sessions, not a single confrontation.'],['Avoiding triggers is the safe long-term strategy.','Avoidance maintains anxiety; structured approach is what reduces it over time.']],adv:[{n:'Edna Foa',r:'originator of Prolonged Exposure',paid:'unclear',note:'Developed PE and authored its manuals; held author and training interests. Died April 2026.'},{n:'International OCD Foundation',r:'advocacy/professional body',paid:'unclear',note:'Promotes ERP and runs clinician training with associated revenue.'}],counter:[{n:'Dr. Norah Vincent',cred:'clinical researcher',q:'Notes that real-world dropout and partial response mean exposure, while highly effective on average, is not tolerated or completed by everyone.'},{n:'Some trauma clinicians',cred:'phase-based-treatment proponents',q:'Argue that for complex or dissociative trauma, stabilization should precede exposure, a sequencing question still debated in the field.'}],history:'Exposure\'s modern lineage is Western and behavioral. South African psychiatrist Joseph Wolpe, treating soldiers with war neurosis in the 1940s and running counterconditioning experiments with cats, formalized systematic desensitization in 1958 on the principle of reciprocal inhibition. Flooding and graded in-vivo exposure followed. In the 1980s, American psychologist Edna Foa developed Prolonged Exposure for PTSD, grounded in the emotional processing theory she and Michael Kozak proposed in 1986. A much older non-Western precedent exists in the Buddhist Bhayabherava Sutta (Majjhima Nikaya 4), in which the Buddha describes deliberately remaining in frightening conditions to process fear with mindful awareness, a contemplative parallel to graded exposure predating the clinical method by over two millennia.',timeline:[['~5th c. BCE','Bhayabherava Sutta describes mindful confrontation of fear'],['1958','Wolpe formalizes systematic desensitization'],['1986','Foa and Kozak publish emotional processing theory'],['1980s','Foa develops Prolonged Exposure for PTSD'],['2017','APA names PE a first-line PTSD treatment'],['2023','VA/DoD strongly recommends Prolonged Exposure']],rel:['cbt','emdr','cbt-i'],enelNote:'Exposure carries a strange paradox: it is one of the best-proven psychological treatments and one of the least delivered. Prolonged Exposure for PTSD helps about 53 percent of those who start and roughly 68 percent of those who finish, with benefits lasting 5 to 10 years, and exposure and response prevention is the leading treatment for OCD. The bottleneck is not whether it works but whether people can get it. Surveys repeatedly find that many therapists are uneasy about doing exposure, worry it is too hard on patients, or doubt their own training, and those attitudes predict not offering it. Two fair caveats: some people drop out or only partly respond, and experts still debate whether someone with complex or dissociative trauma should be stabilized first. If you want this kind of care, ask directly whether a provider is trained in Prolonged Exposure or exposure and response prevention, because availability, not effectiveness, is the real obstacle.',enel:false},
{i:'cbt-i',n:'CBT-I',fn:'Cognitive Behavioral Therapy for Insomnia',tier:1,ts:78,sig:'rising',hot:false,ev:5,cats:['psychotherapy','evidence'],cls:'Behavioral sleep medicine',orig:'practice',aa:0,fdaS:'cleared',fda:'Behavioral therapy itself is not a regulated product; the digital version Somryst received FDA 510(k) clearance in 2020 as a prescription digital therapeutic.',wada:'Not applicable',rcts:100,studies:1000,parts:'tens of thousands',ctry:'USA, UK, Canada, Australia',geo:[['USA',40],['Europe',40],['Other',20]],disc:1987,discr:'Components by Richard Bootzin (stimulus control, 1972) and Arthur Spielman (sleep restriction, 1987)',tag:'A multi-component behavioral program (sleep restriction, stimulus control, cognitive restructuring) that is the first-line treatment for chronic insomnia, ahead of sleeping pills.',facts:[['Sessions','4-8 typical'],['Core components','sleep restriction, stimulus control'],['Guideline status','first-line (ACP)'],['Digital option','Somryst, Sleepio']],brief:'CBT-I is cognitive behavioral therapy for insomnia, a short, structured program that retrains sleep rather than medicating it. Its main tools are limiting time in bed to rebuild the body\'s drive to sleep (sleep restriction), using the bed only for sleep so it stops being a place of frustration (stimulus control), and easing anxious beliefs about sleep. For long-term insomnia in adults, the American College of Physicians recommended it in 2016 as the first thing to try, ahead of sleeping pills, and the major sleep-medicine groups agree. Reviews show it meaningfully shortens the time it takes to fall asleep, with benefits that last after treatment ends, unlike pills. It can also lift mood: improving sleep has been shown to reduce depression and anxiety, including in a large 2019 trial of the app-based program Sleepio (1,711 people). Other digital versions exist too, such as Somryst, which the US Food and Drug Administration cleared in 2020.',uses:['chronic insomnia','comorbid insomnia with depression or anxiety','sleep maintenance and onset difficulties'],risk:'Sleep restriction can cause short-term daytime sleepiness, so it requires guidance and caution for those with untreated sleep apnea, bipolar disorder, seizure disorders, or safety-sensitive occupations such as driving. Digital programs show higher dropout than in-person care. CBT-I treats insomnia, not the full range of mental-health conditions; if low mood, anxiety, or self-harm thoughts are present, a qualified mental-health provider should be involved, and crises warrant emergency services (988 in the US).',mf:[['Sleeping pills are the standard fix for insomnia.','Guidelines (ACP) place CBT-I as first-line, ahead of medication, with more durable benefit and fewer harms.'],['CBT-I is just sleep hygiene tips.','Its active ingredients are sleep restriction and stimulus control; hygiene advice alone is the weakest component.'],['You need months of therapy.','Most protocols run roughly 4-8 sessions, and effective digital versions are even briefer.']],adv:[{n:'American Academy of Sleep Medicine',r:'professional society',paid:'unclear',note:'Endorses CBT-I as first-line; members deliver and profit from sleep services and training.'},{n:'Big Health (Sleepio)',r:'digital CBT-I vendor',paid:true,note:'Markets the Sleepio program commercially; funded and co-authored efficacy trials, an allegiance and funding consideration.'},{n:'Nox Health / formerly Pear Therapeutics (Somryst)',r:'digital therapeutic maker',paid:true,note:'Commercial owner of the FDA-cleared Somryst product; clearance rested on company-associated SHUTi trials.'}],counter:[{n:'Digital CBT-I reviewers',cred:'AASM and independent meta-analysts',q:'Note that unguided fully automated programs show higher dropout and somewhat smaller effects than therapist-delivered CBT-I.'},{n:'Access-focused clinicians',cred:'behavioral sleep medicine',q:'Point out that despite first-line status, trained CBT-I providers are scarce, so most patients still get pills by default.'}],history:'CBT-I is a modern Western synthesis assembled from behavioral sleep research. American psychologist Richard Bootzin introduced stimulus control in 1972, applying operant principles so that the bed becomes a cue for sleep rather than wakefulness. Arthur Spielman formalized sleep restriction (restriction of time in bed) in 1987 and articulated the 3P model of predisposing, precipitating, and perpetuating factors. These behavioral methods were combined with cognitive restructuring of unhelpful sleep beliefs to form the multi-component package now called CBT-I. From the 2000s onward it migrated to scalable digital platforms (SHUTi, later Somryst, and Sleepio), broadening access while raising new questions about adherence and dropout in unguided formats.',timeline:[['1972','Bootzin introduces stimulus control for insomnia'],['1987','Spielman formalizes sleep restriction and the 3P model'],['2016','ACP recommends CBT-I as first-line for chronic insomnia'],['2019','Espie et al. publish large Sleepio RCT in JAMA Psychiatry'],['2020','FDA clears Somryst as a prescription digital therapeutic']],rel:['cbt','exercise','meditation-apps'],enelNote:'The 2016 American College of Physicians guideline marked a turning point by naming CBT-I, not medication, the first thing to try for long-term insomnia in adults. The evidence is solid: it meaningfully shortens how long it takes to fall asleep, and unlike sleeping pills the benefit lasts after treatment stops. A real bonus is the knock-on effect on mood; the large 2019 Sleepio trial (1,711 people) and later analyses found that better sleep reduced depression and anxiety, which suggests poor sleep is a fixable cause rather than just a symptom. Two honest caveats. First, the strongest evidence for the app versions comes from trials funded or co-authored by the companies that sell them (Sleepio from Big Health; Somryst, cleared by the US Food and Drug Administration in 2020), so that financial interest is worth keeping in mind. Second, the fully automated programs see more people drop out and work somewhat less well than seeing a therapist in person. The practical problem is access: trained providers are scarce, which is why many people still get sleeping pills even though the guidelines favor CBT-I.',enel:false},
{i:'mbsr',n:'Mindfulness-Based Stress Reduction',fn:'MBSR',tier:1,ts:88,sig:'stable',hot:true,ev:4,cats:['mindfulness','trending','evidence'],cls:'Secular meditation program',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:40,studies:700,parts:'tens of thousands across trials',ctry:'USA, UK, Germany, Netherlands',geo:[['USA',40],['Europe',30],['Asia',15],['Other',15]],disc:1979,discr:'Jon Kabat-Zinn, UMass Medical Center (1979)',tag:'Mindfulness-Based Stress Reduction, or MBSR, is an eight-week non-religious course that teaches you to pay close attention to the present moment. It was adapted from a Buddhist meditation practice called Vipassana for use in clinics and workplaces.',facts:[['Program','8 weeks, weekly 2.5h classes plus a daylong retreat'],['Daily practice','About 45 min of meditation and a body scan, which means slowly moving your attention through each part of your body'],['Best evidence','Helps most with anxiety, depression, and long-term (chronic) pain, with a moderate effect'],['Origin','Adapted from Buddhist mindfulness meditation, 1979']],brief:'Mindfulness-Based Stress Reduction, or MBSR, is a set eight-week group course that teaches mindfulness meditation, the body scan (slowly moving your attention through each part of your body) and gentle yoga. Jon Kabat-Zinn created it by taking a Buddhist meditation practice called Vipassana and removing the religion, so it could be used in hospitals. How good is the evidence? The most important review, by Goyal in 2014 in the journal JAMA Internal Medicine, pooled the results of many studies (a method called meta-analysis). Across 47 trials and 3,320 participants it found moderate-strength evidence that mindfulness programs reduce anxiety (a small-to-moderate effect, scored 0.38 at 8 weeks), depression (0.30) and pain (0.33). Those benefits faded over 3 to 6 months, and there was little or no benefit for mood, attention, sleep, weight or substance use. A 2018 analysis by Goldberg confirmed two common flaws in this research: publication bias (studies that find a benefit get published more often than those that find nothing), and that the benefits shrink when MBSR is compared against another active activity that creates the same hopeful expectation, rather than against doing nothing. The benefits are real but are often exaggerated in the popular press. MBSR is a skill you train, not a cure, and the gains depend on keeping up the daily practice.',uses:['Lowering stress','Easing anxiety symptoms','Easing symptoms of depression','Coping with long-term (chronic) pain','Improving quality of life while living with an illness'],risk:'MBSR is usually well tolerated, but it is not harmless and is not a replacement for medical treatment. A study called the Varieties of Contemplative Experience (Lindahl and Britton, 2017, in the journal PLoS ONE) documented harms linked to meditation, including anxiety, feeling detached from yourself or reality, reliving past trauma, and difficulty functioning in daily life. Britton\'s 2021 work argues these harms are reported far less often than they actually happen in mindfulness programs. People who are currently having suicidal thoughts, or who have severe depression, psychosis, post-traumatic stress disorder (PTSD), or a history of trauma should talk to a mental health professional before starting and should choose teachers trained to handle trauma. If you are in crisis, contact a provider or call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['MBSR rewires your brain and is scientifically proven to cure stress and anxiety.','Brain-scan findings are early and inconsistent. The pooled studies show moderate, not curative, effects that fade over months and shrink when MBSR is compared against another active activity rather than against doing nothing.'],['Mindfulness is a neutral, purely non-religious wellness tool with no downsides.','It was adapted from a Buddhist meditation system, and a growing body of research documents real harms in a minority of people who practice it.']],adv:[{n:'Jon Kabat-Zinn',r:'Founder of MBSR, professor emeritus UMass',paid:true,note:'Earns income from books, courses and speaking on MBSR; the original champion of the method.'},{n:'UMass Memorial Center for Mindfulness',r:'Institutional home of MBSR teacher training',paid:true,note:'The for-profit body that trains and certifies MBSR instructors.'}],counter:[{n:'Dr. Willoughby Britton',cred:'Associate professor of psychiatry, Brown University; founder of Cheetah House',q:'Harms linked to meditation are real and are routinely reported far less often than they happen, both in research and in teacher training.'},{n:'Dr. Madhav Goyal',cred:'Johns Hopkins (2014 JAMA review)',q:'The evidence for benefit is moderate at best, and many claimed effects disappear once trials compare mindfulness against another active activity rather than against doing nothing.'}],history:'MBSR\'s origins are openly non-Western. Its core practice comes from Buddhist insight meditation (Vipassana), which is rooted in the Satipatthana Sutta, the Buddha\'s Discourse on the Foundations of Mindfulness. That text lays out paying attention to the body, feelings, mind and mental objects within the Noble Eightfold Path of early Buddhism (around the 5th century BCE, recorded in the Pali Canon). Jon Kabat-Zinn, who had studied Zen with teachers including the Korean Zen master Seung Sahn and had trained in Vipassana, founded the Stress Reduction Clinic at the University of Massachusetts Medical Center in 1979. He deliberately removed the explicit Buddhist and spiritual-salvation framing so the attention training would be acceptable in ordinary medical settings, keeping the technique while leaving the religious goal of spiritual liberation behind.',timeline:[['5th c. BCE','Satipatthana Sutta sets out Buddhist mindfulness practice'],['1960s-70s','Vipassana spreads to the West via Asian teachers'],['1979','Kabat-Zinn founds the Stress Reduction Clinic at UMass'],['1990','Full Catastrophe Living popularizes MBSR'],['2014','Goyal JAMA meta-analysis sets moderate evidence benchmark'],['2017','Lindahl and Britton document adverse effects in PLoS ONE']],rel:['mbct','meditation-apps','tm','self-compassion','breathwork','yoga'],enelNote:'MBSR is the most heavily studied non-religious meditation program and a reasonable, low-cost, generally safe option for stress, mild anxiety, mild depression, and coping with long-term illness. Be honest about the evidence: the pooled-studies review by Goyal in 2014 (JAMA) found moderate benefits that shrink within months and largely vanish for things like attention, sleep and weight, and the field suffers from publication bias (positive studies get published more) and weak comparison groups. It is a skill you train with ongoing daily practice, not a one-time fix, and not a treatment for serious psychiatric illness. The Buddhist roots matter, both historically and practically: the same intense attention that helps most people can unsettle a minority, with documented harms ranging from anxiety to feeling detached from yourself or reality, especially in people with a history of trauma. We recommend qualified teachers trained to handle trauma, realistic expectations, and treating MBSR as something added to professional care, never a replacement for it. Anyone with suicidal thoughts or severe symptoms should see a provider or call 988 in the US.',enel:false},
{i:'mbct',n:'Mindfulness-Based Cognitive Therapy',fn:'MBCT',tier:1,ts:80,sig:'stable',hot:true,ev:4,cats:['mindfulness','psychotherapy','trending','evidence'],cls:'Manualized group psychotherapy',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:25,studies:300,parts:'thousands across relapse-prevention trials',ctry:'UK, Canada, USA, Belgium',geo:[['Europe',45],['North America',35],['Asia',10],['Other',10]],disc:2002,discr:'Zindel Segal, J. Mark G. Williams, John Teasdale (2002)',tag:'Mindfulness-Based Cognitive Therapy, or MBCT, is an eight-week group program that blends the mindfulness of MBSR (Mindfulness-Based Stress Reduction) with cognitive therapy, a form of talk therapy. It is designed to stop depression from coming back in people who have had it repeatedly.',facts:[['Program','8 weekly group sessions combining MBSR mindfulness with cognitive therapy (a form of talk therapy)'],['Primary use','Stopping depression from returning in people who have had it repeatedly'],['Best evidence','Lowers the risk of depression returning, especially in people who have had 3 or more past episodes'],['Status','Recommended in the UK by NICE (the National Institute for Health and Care Excellence, the body that tells the UK health service what to offer) for depression']],brief:'Mindfulness-Based Cognitive Therapy, or MBCT, was created by Zindel Segal, Mark Williams and John Teasdale in 2002. They combined Kabat-Zinn\'s MBSR (Mindfulness-Based Stress Reduction) with parts of cognitive therapy (a form of talk therapy), specifically to break the cycle of repetitive negative thinking that drags people back into depression. The strongest evidence comes from a 2016 review by Kuyken that pooled the records of individual patients across 9 trials and 1,258 patients (published in JAMA Psychiatry). It found that MBCT lowered the risk of depression returning over 60 weeks compared with care that did not include MBCT (a hazard ratio of 0.69, meaning roughly a 31 percent lower risk), with the biggest benefit in people who still had some lingering symptoms. However, a large, carefully designed study called the PREVENT trial (Kuyken and colleagues, in The Lancet, 2015) found MBCT was no better than simply staying on maintenance antidepressants. So it is an alternative, not a clearly better choice. MBCT is preventive: it is built for people who are currently well between episodes, and it is not a standalone treatment for someone in the middle of a severe episode.',uses:['Preventing depression from returning in people who have had it repeatedly','Easing leftover depressive symptoms','Easing anxiety','Serving as an alternative to staying on antidepressants for some people'],risk:'MBCT is built for people in recovery, not for someone in the middle of severe depression; starting it during an acute episode may not work or may be distressing. As with all intensive meditation, a minority of people experience harms such as more anxiety, more repetitive negative thinking, or feeling detached from themselves or reality (Lindahl and Britton, 2017), and Britton\'s work notes these are underreported. Coming off antidepressants should only be done with the doctor who prescribed them. People with active suicidal thoughts or severe symptoms need professional care, not a self-help group. If you are in crisis, contact your provider or call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['MBCT lets you safely stop your antidepressants.','The PREVENT trial showed MBCT was no better than staying on the medication, and any reduction in dose must be supervised by the doctor who prescribed it.'],['MBCT treats depression.','Its proven role is preventing depression from returning in people who are currently well; it is not established as a treatment for someone in the middle of a severe episode.']],adv:[{n:'Prof. Zindel Segal',r:'Co-developer of MBCT, University of Toronto',paid:true,note:'Earns income from MBCT books, training and the Mindful Mood Balance program.'},{n:'Prof. Willem Kuyken',r:'Oxford Mindfulness researcher',paid:'unclear',note:'A leading MBCT trial researcher; an academic, with possible income from books and training.'}],counter:[{n:'PREVENT trial authors (Kuyken et al., 2015)',cred:'Lancet randomized controlled trial (a study that randomly assigns people to groups to fairly test a treatment)',q:'MBCT combined with reducing antidepressants was no better than staying on maintenance antidepressants for preventing depression from returning.'},{n:'Dr. Willoughby Britton',cred:'Brown University; Cheetah House',q:'Even in clinical mindfulness programs, harms happen and are not properly tracked.'}],history:'MBCT inherits MBSR\'s non-Western origins and adds Western clinical psychology. Its mindfulness part comes from Buddhist insight meditation, rooted in the Satipatthana Sutta and passed down through Kabat-Zinn\'s 1979 MBSR program. In the late 1990s, the cognitive scientists Zindel Segal (Canada), J. Mark G. Williams and John Teasdale (UK) were looking for a way to keep recurrent depression from coming back. They fused MBSR\'s attention training with Aaron Beck\'s cognitive therapy (a form of talk therapy), reasoning that mindfulness could interrupt the automatic loops of negative thinking that reawaken depression. They published the method as Mindfulness-Based Cognitive Therapy for Depression in 2002, joining a roughly 2,500-year-old meditation practice with 20th-century psychology.',timeline:[['5th c. BCE','Buddhist mindfulness codified in the Satipatthana Sutta'],['1979','Kabat-Zinn\'s MBSR provides the mindfulness template'],['2000','Teasdale et al. publish first relapse-prevention trial'],['2002','Segal, Williams and Teasdale publish the MBCT manual'],['2015','PREVENT trial: MBCT not superior to antidepressants'],['2016','Kuyken IPD meta-analysis confirms relapse reduction']],rel:['mbsr','cbt','act','meditation-apps','self-compassion','exercise'],enelNote:'MBCT is one of the better-supported non-drug options in mental health, but only for one specific job: keeping people who have recovered from repeated depression from sliding back into it. The 2016 pooled review by Kuyken (JAMA Psychiatry) supports roughly a 30 percent lower risk of depression returning, strongest for those with three or more past episodes or lingering symptoms, and the UK\'s NICE (the National Institute for Health and Care Excellence, which tells the UK health service what to offer) recommends it. Be clear about what it is not: the rigorous PREVENT trial found it was no better than staying on antidepressants, so it is an alternative some people may prefer, not a proven upgrade, and never a reason to stop medication without medical supervision. It is preventive and done in groups, meant for people who are currently well, not a treatment for someone in the middle of a severe episode. As with any intensive meditation, a minority experience harms, and having teachers trained to handle trauma matters. We see MBCT as a strong tool inside a treatment plan led by a clinician. Anyone with suicidal thoughts or severe symptoms should seek professional or emergency care, including 988 in the US.',enel:false},
{i:'tm',n:'Transcendental Meditation',fn:'TM',tier:1,ts:72,sig:'stable',hot:false,ev:3,cats:['mindfulness'],cls:'Mantra meditation (commercial program)',orig:'traditional',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:30,studies:400,parts:'estimated millions taught worldwide',ctry:'India (origin), USA, worldwide',geo:[['USA',35],['Asia',25],['Europe',25],['Other',15]],disc:1955,discr:'Maharishi Mahesh Yogi (introduced 1955)',tag:'A standardized, fee-based mantra meditation from the Vedic tradition; the evidence is real but modest and not unique to TM.',facts:[['Practice','Twice a day, about 20 minutes, silently repeating a personal sound (a mantra) in your mind, sitting comfortably with eyes closed'],['Training','A standardized course over four days in a row plus follow-ups, taught one-to-one by a certified teacher'],['What people report','An easy, effortless practice many find restful and simple to keep up because it needs no concentration or clearing the mind'],['Best evidence','A modest, short-term drop in blood pressure; some benefit for anxiety and stress']],brief:'Transcendental Meditation, or TM, is a mantra meditation: you sit comfortably with your eyes closed and silently repeat a personal sound (a mantra) for about 20 minutes twice a day. Maharishi Mahesh Yogi introduced it in India in 1955 and brought it to the West from the late 1950s, drawing on the Vedic tradition of India. Unlike practices that ask you to concentrate or watch your breath, TM is taught as an effortless technique in which the mantra is allowed to repeat on its own, and the mind is meant to settle naturally; many practitioners value it precisely because it feels simple and undemanding, which makes a twice-daily habit easy to keep. It is taught the same way everywhere through a standardized course given one-to-one by a certified teacher, which appeals to people who want a clear, consistent method rather than a self-guided app. On the evidence: pooled studies (meta-analyses, which combine the results of many trials) suggest modest short-term drops in blood pressure (roughly 3 mm Hg for the top number and 2 mm Hg for the bottom number) that tend to fade after about three months, along with some reduction in anxiety and stress. These are real but limited effects, and TM appears to work about as well as, not clearly better than, other relaxation or meditation methods. Two genuine limitations sit alongside the findings: a large share of TM studies were done by researchers tied to the TM organization or to Maharishi International University, which raises the risk of allegiance bias (researchers favoring the method they believe in) and publication bias (positive studies getting published more often than negative ones), a concern raised by Canter and Ernst; and independent reviewers, including one connected to Cochrane (a respected group that produces careful, neutral reviews of medical evidence), have judged the blood-pressure evidence too weak to draw firm conclusions.',uses:['Lowering stress','Easing anxiety symptoms','A modest help with blood pressure','General wellbeing and a structured daily routine'],risk:'TM is usually well tolerated, but as with other intensive meditation a minority of people report harms including anxiety, feeling detached from themselves or reality, or distress (Lindahl and Britton, 2017), and these are underreported. The program is a commercial product and can be expensive. The wider Maharishi movement has at times made overstated and legally disputed claims, including ones about levitation and crime reduction. TM is not on its own a treatment for serious psychiatric illness or for high blood pressure. Do not stop prescribed blood pressure or psychiatric medication; talk to your clinician. If you are in crisis or having suicidal thoughts, contact a provider or call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['TM is uniquely powerful, scientifically validated and clearly better than other meditations.','Direct comparisons and independent reviews show effects about the same as other relaxation and meditation methods. The benefits are real but modest, and much TM research carries allegiance bias (favoring the method) and publication bias (positive results published more).'],['TM does not really do anything beyond what marketing claims.','That overstates the skepticism. Pooled studies do show modest short-term reductions in blood pressure (about 3 mm Hg top number, 2 mm Hg bottom) and some easing of anxiety and stress; the honest point is that these effects are limited and not unique to TM, not that they are absent.']],adv:[{n:'Maharishi Foundation / TM organization',r:'Nonprofit that trademarks and teaches TM',paid:true,note:'Provides the standardized teacher training and the one-to-one course; charges fees (in the US, roughly $420 to $980 on an income-based sliding scale) and certifies all teachers, and so has a commercial and organizational stake in positive findings.'},{n:'David Lynch Foundation',r:'Charity promoting TM in schools, veterans and trauma settings',paid:false,note:'Funds and promotes TM programs, including for groups under stress; an interested promoter, not a neutral party.'},{n:'Maharishi International University researchers',r:'Academic producers of much TM research',paid:false,note:'Have produced a large body of TM studies; their institutional ties to the TM movement create allegiance bias (favoring the method) in that work.'}],counter:[{n:'Drs. Peter Canter and Edzard Ernst',cred:'Complementary medicine researchers, University of Exeter',q:'TM trials connected to the organization show bias, and there is no good evidence that TM is better than other relaxation techniques.'},{n:'Independent systematic reviewers',cred:'Cochrane-affiliated blood pressure review (Cochrane being a respected group that produces careful, neutral reviews of medical evidence)',q:'The evidence is too weak to say whether or not TM lowers blood pressure.'}],history:'TM\'s roots are openly Vedic and Indian, not Western. Maharishi Mahesh Yogi (born Mahesh Prasad Varma) studied under Swami Brahmananda Saraswati, the Shankaracharya (a senior Hindu spiritual leader) of Jyotir Math in the Himalayas, and credited him as the source of the teaching. The Maharishi began introducing his Transcendental Deep Meditation, later renamed Transcendental Meditation, in India in 1955, and launched his first global tour in 1958. The technique uses a Sanskrit-derived sound (mantra) assigned by a teacher, descending from the Vedic and Advaita Vedanta traditions of India. TM became famous worldwide in 1967 to 1968 when the Beatles studied with the Maharishi, including their 1968 stay at his ashram (spiritual retreat) in Rishikesh. The movement later grew into a global commercial and educational organization, including Maharishi International University in Iowa.',timeline:[['Ancient','Vedic and Advaita Vedanta meditation traditions of India'],['1955','Maharishi introduces Transcendental Meditation in India'],['1958','First global teaching tour begins'],['1968','Beatles study with the Maharishi in Rishikesh'],['1971','Maharishi International University founded in the US'],['2008','Maharishi Mahesh Yogi dies; movement continues commercially']],rel:['meditation-apps','mbsr','breathwork','yoga','hrv-biofeedback'],enelNote:'TM is a legitimate, generally safe form of mantra meditation (silently repeating a personal sound) with a genuine Vedic Indian heritage going back to Maharishi Mahesh Yogi in 1955. On its own terms it is an effortless, standardized practice done about 20 minutes twice a day and taught one-to-one by a certified teacher; many people like that it is simple to learn, asks for no concentration or clearing of the mind, and gives them a clear, consistent daily routine. The evidence is real but modest: pooled studies point to short-term blood pressure reductions (roughly 3 mm Hg top number, 2 mm Hg bottom) that tend to fade after about three months, plus some easing of anxiety and stress, with effects that look about the same as other relaxation or meditation methods. Two honest caveats round out the picture. First, the evidence base has known weaknesses: a large share of TM research comes from people and institutions tied to the TM organization, which creates allegiance bias (favoring the method), the field also shows publication bias (positive studies published more), and independent reviewers, including a Cochrane-affiliated one, find the effects modest and the blood-pressure evidence too weak for firm conclusions. Second, TM is sold as a trademarked, fee-based course (in the US, an income-based sliding scale of roughly $420 to $980), and the wider movement has a history of overstated and legally disputed claims. People who value the structure of a taught course may find that worthwhile; those who simply want quiet daily meditation can also get similar benefits from lower-cost or free options like MBSR or app-guided practice. As with any intensive meditation, a minority of people experience harms. TM is something added to medical care, not a replacement for it; never stop prescribed medication on your own, and seek professional or emergency help (988 in the US) for suicidal thoughts or severe symptoms.',enel:false},
{i:'self-compassion',n:'Self-Compassion',fn:'Mindful Self-Compassion (MSC)',tier:1,ts:68,sig:'rising',hot:false,ev:3,cats:['mindfulness','psychotherapy'],cls:'Practice',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:27,studies:300,parts:'thousands across trials',ctry:'USA, Australia, UK',geo:[['USA',45],['Europe',25],['Asia',15],['Other',15]],disc:2003,discr:'Kristin Neff (2003); MSC program with Christopher Germer (2010)',tag:'Learning to treat yourself with the same kindness you would offer a good friend, practiced as a deliberate skill.',facts:[['Format','An 8-week group course plus short daily practice at home'],['Core idea','Three parts: being kind to yourself, remembering everyone struggles, and staying mindful'],['Evidence','Moderate; the apparent benefits shrink when compared against other active practices rather than no practice at all'],['Cost','Course fees vary; the main book costs about US$15']],brief:'Self-compassion means responding to your own mistakes and pain with warmth instead of harsh criticism. Psychologist Kristin Neff first defined it as something that can be measured in 2003, and she and psychologist Christopher Germer turned it into an 8-week training course called Mindful Self-Compassion (MSC) in 2010. In their 2013 study using a randomized controlled trial (RCT, a study that randomly assigns people to the treatment or to a comparison group) published in the Journal of Clinical Psychology with 51 participants, people reported medium-to-large gains in self-compassion compared with those put on a waiting list, and the gains held up at 6 and 12 months. A 2019 review by Ferrari and colleagues that pooled 27 such trials found a large benefit (g=0.87, a standard measure of effect size) for self-compassion, but only when the comparison group was a waiting list. When the comparison was another active practice, the benefit was small, and improvements in anxiety and self-criticism no longer held up statistically. This gap, between looking strong against a waiting list and looking modest against a real alternative, is the field\'s central caution. Researcher Paul Muris and others also argue that the questionnaire used to score self-compassion overlaps with measures of mental distress itself, which makes a single overall score hard to trust.',uses:['Building the ability to bounce back from emotional setbacks','Easing harsh self-criticism','Coping with stress and shame','Adding to formal therapy as a supporting skill'],risk:'Generally low risk. Some people, especially those with past trauma or strong self-criticism, can feel a wave of distress when they first turn kindness inward; a trained teacher helps with this. Self-compassion practice is not a treatment for clinical depression, anxiety disorders, or a crisis. If you are struggling, consult a licensed mental health provider; in the US call or text 988 (Suicide and Crisis Lifeline).',mf:[['Self-compassion is just self-pity or making excuses for yourself','It pairs kindness with accountability and is linked to taking more personal responsibility, not less'],['The benefits are proven and large','The benefits are real but modest once you compare the practice against other active approaches rather than against doing nothing']],adv:[{n:'Kristin Neff',r:'Co-founder, Center for Mindful Self-Compassion',paid:true,note:'Bestselling author and certified-teacher program; commercial and reputational interest'},{n:'Christopher Germer',r:'Co-developer of MSC, Harvard lecturer',paid:true,note:'Co-author of MSC books and professional training'}],counter:[{n:'Dr. Paul Muris',cred:'Maastricht University',q:'The negative items of the Self-Compassion Scale resemble psychopathology, so a single total score can be misleading.'}],history:'Treating oneself and others with compassion long predates the modern psychological idea. The Buddhist Brahmaviharas, including metta (loving-kindness) and karuna (compassion), appear in the Pali Canon\'s Karaniya Metta Sutta more than two thousand years ago across South and Southeast Asia, and were developed further in Tibetan and Theravada Buddhist traditions. These practices send goodwill in all directions, explicitly including toward oneself, and were carried into Western clinical work by meditation teachers and through Paul Gilbert\'s Compassion-Focused Therapy in the UK. Kristin Neff, an American psychologist who had practiced Buddhist meditation, recast self-compassion as a measurable Western psychological idea in 2003, and with Christopher Germer created the secular MSC course in 2010.',timeline:[['c.500 BCE','Metta and karuna taught in early Buddhist texts in India'],['2003','Neff publishes Self-Compassion Scale and construct'],['2010','Neff and Germer launch the MSC course'],['2013','First MSC randomized controlled trial published'],['2019','Ferrari meta-analysis of 27 RCTs']],rel:['mbsr','mbct','cbt','act','meditation-apps','gratitude','journaling'],enelNote:'Enel reads the self-compassion evidence as genuinely promising but easy to oversell. The most impressive-looking numbers, such as the large g=0.87 benefit in the Ferrari 2019 review, come overwhelmingly from comparisons against people on a waiting list, which flatter the results because almost any activity beats doing nothing. When researchers compared the practice against another active approach instead, the benefit for self-compassion shrank to small, and several improvements, including for anxiety and self-criticism, were no longer statistically reliable. That pattern recurs across wellbeing research, and honesty requires naming it. We also note Paul Muris\'s measurement criticism: the questionnaire\'s negative items overlap with the very distress the practice is meant to reduce. None of this means self-compassion is useless; it is consistently linked with wellbeing, and the practice is cheap and low-harm. The main advocates, Neff and Germer, have commercial and reputational stakes through bestselling books and a paid teacher-certification business, which is normal but worth flagging. Treat it as a useful self-help and supporting skill, not a clinical treatment. If you are in crisis, contact a provider or call 988.',enel:false},
{i:'breathwork',n:'Slow Breathing',fn:'Pranayama / coherent breathing for stress',tier:1,ts:74,sig:'rising',hot:false,ev:3,cats:['somatic','mindfulness'],cls:'Practice',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:40,studies:250,parts:'thousands across trials',ctry:'India, USA, Brazil',geo:[['Asia',40],['USA',25],['Europe',20],['Other',15]],disc:-1500,discr:'Pranayama rooted in ancient India; coherent breathing labeled by Stephen Elliott (2005)',tag:'Deliberately slowing your breathing to about six breaths a minute to help calm the body\'s stress response.',facts:[['Pace','About 5 to 6 breaths per minute, the rate that produces the strongest calming rhythm in the body'],['Dose','5 to 20 minutes, most days'],['Evidence','Small-to-moderate; many studies have flaws that make the results less certain'],['Cost','Free']],brief:'Slow-paced breathing is the practice of deliberately breathing more slowly than usual to calm the body. It covers both pranayama, the breathing techniques from yoga, and modern coherent or resonance breathing at about six breaths per minute. Researchers Paul Lehrer and Evgeny Vaschillo found in the 1990s that this rate produces the largest swings in heart-rate variability (HRV, the natural beat-to-beat variation in your heart rate that reflects a relaxed, responsive nervous system). A 2023 randomized placebo-controlled trial of coherent breathing (a study that compares the technique against a sham version) published in Scientific Reports found benefits but stressed the need for better comparison groups. A review pooling pranayama trials reported less anxiety and milder symptoms compared with people who did nothing, but no clear effect on depression. Broader reviews of breathing practices find small-to-moderate drops in self-reported stress, anxiety, and low mood, but warn that most studies have design weaknesses that cloud the picture. Harmful side effects almost all come from fast, hyperventilation-style methods rather than slow breathing.',uses:['Calming sudden stress and anxiety','Strengthening the heart\'s healthy beat-to-beat variation','Helping you fall asleep','Supporting meditation and body-awareness practices'],risk:'Slow breathing is low risk for most people. Caution applies to fast or hyperventilation styles (for example holotropic breathwork and the Wim Hof method, which combine rapid breathing with breath-holds or cold). Deliberately overbreathing can cause dizziness, tingling, tetany (painful cramping of the hands), and, rarely, fainting or seizures, and it is dangerous in or near water. Avoid intense breath-holding or hyperventilation if you are pregnant or have epilepsy, heart disease, or a history of seizures. Breathing exercises are not a crisis tool or a substitute for care; if you are struggling, see a provider or call 988 in the US.',mf:[['Breathing exercises cure anxiety and depression','The evidence shows small-to-moderate symptom relief, not a cure, and little effect on depression'],['More intense breathing is more powerful','Fast hyperventilation styles cause the most harmful side effects; slow breathing is safer and better supported by evidence']],adv:[{n:'Stephen Elliott',r:'Author, founder of COHERENCE LLC',paid:true,note:'Coined and commercialized \'coherent breathing\''},{n:'Wim Hof',r:'Promoter of a hyperventilation-plus-cold method',paid:true,note:'Sells courses and instructor certification; method carries documented cautions'}],counter:[{n:'Dr. Guy Fincham',cred:'University of Sussex, breathwork researcher',q:'Breathwork shows promise for stress and mood, but most trials have moderate risk of bias, so we should be cautious about strong claims.'}],history:'Controlling the breath is one of humanity\'s oldest recorded mind-body practices. Pranayama, from the Sanskrit prana (life force) and ayama (to extend), is rooted in ancient India: mentions of controlled breathing appear in the Rigveda over 3,000 years ago and in the Upanishads (roughly 800 to 500 BCE), were organized into a system in Patanjali\'s Yoga Sutras (around 200 CE), and were spelled out in the 15th-century text the Hatha Yoga Pradipika by Svatmarama. Similar breathing disciplines grew up elsewhere, including qigong and Daoist breathing in China and rhythmic chanting traditions worldwide. In the 1990s the American researchers Lehrer and Vaschillo identified the breathing rate near six breaths per minute that the cardiovascular system responds to most strongly, and Stephen Elliott popularized the term coherent breathing in 2005.',timeline:[['c.1500 BCE','Breath references in the Rigveda, India'],['c.200 CE','Patanjali\'s Yoga Sutras systematize pranayama'],['1400s','Hatha Yoga Pradipika details breathing techniques'],['1990s','Lehrer and Vaschillo map resonance-frequency breathing'],['2005','Stephen Elliott popularizes \'coherent breathing\'']],rel:['yoga','meditation-apps','hrv-biofeedback','vagus-nerve','mbsr','tai-chi'],enelNote:'Enel sees slow breathing as one of the better-value mind-body tools: free, portable, and grounded in a deep non-Western lineage running from Indian pranayama to Chinese qigong. The physical effect is real; breathing at about six breaths a minute reliably increases the heart\'s healthy beat-to-beat variation, as Lehrer and Vaschillo showed. The honest caution is the quality of the evidence: pooled reviews report small-to-moderate relief for stress and anxiety, weaker or no effect for depression, and most studies have design flaws and lean on comparison groups that simply did nothing. We separate gentle slow breathing from intense hyperventilation styles. Slow breathing is low risk. Fast methods such as holotropic breathwork and the Wim Hof method deliberately lower the body\'s carbon dioxide and can cause fainting, hand cramping, and, in or near water, drowning; they warrant real caution and are inappropriate for people with epilepsy, heart disease, or pregnancy. Some prominent promoters sell courses and certifications, which is worth keeping in mind. Use breathing exercises as a helpful daily skill for steadying yourself, not as a treatment for a clinical disorder or a crisis. If you are struggling, contact a provider or call 988.',enel:false},
