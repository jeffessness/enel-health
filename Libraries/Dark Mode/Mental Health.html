tracts, such as Ixoreal (which makes KSM-66) and Natreon (which makes Sensoril); that funding pattern is a reason to suspect the benefits may be overstated.',uses:['reducing stress','mild-to-moderate anxiety','sleep support','a traditional tonic for vitality'],risk:'Generally well tolerated for short-term use, with mild drowsiness or stomach upset at worst. However, documented case reports describe ashwagandha causing liver injury, usually a type in which bile backs up in the liver (cholestatic hepatitis). A 2023 series of cases from India and further reports from Iceland and the US describe jaundice (yellowing of the skin and eyes) appearing weeks after starting the supplement, including deaths in people who already had liver disease. Avoid it if you have a liver condition, and stop immediately if jaundice, dark urine, or pain in the upper-right abdomen appears. It may rev up the immune system (a theoretical worry for people with autoimmune disease) and can shift thyroid hormone levels. It should not be used in pregnancy (it has traditionally been used to induce abortion) or while breastfeeding. Product quality varies widely and contamination with other substances has been documented. It is not a treatment for clinical depression; if you have thoughts of self-harm, contact a provider; in the US call or text 988.',mf:[['A harmless herb with no real risks','Liver injury, including fatal cases in people with prior liver disease, has been documented'],['All ashwagandha products are the same','Extracts vary widely in strength, which part of the plant is used, and authenticity; contamination is common']],adv:[{n:'Ixoreal Biomed (KSM-66)',r:'branded-extract manufacturer',paid:true,note:'sells the most-studied branded extract; funds many trials'},{n:'Natreon (Sensoril)',r:'branded-extract manufacturer',paid:true,note:'sponsors Sensoril clinical trials; commercial interest'}],counter:[{n:'Dr. Cyriac Abby Philips',cred:'hepatologist, \'The Liver Doc\'',q:'Ashwagandha can cause serious cholestatic liver injury; the supplement industry downplays it.'},{n:'NCCIH',cred:'US National Center for Complementary and Integrative Health',q:'Evidence is limited and short-term; rare but serious liver injury has been reported.'}],history:'Ashwagandha has been used in Ayurveda, the traditional medical system of India, for roughly 3,000 years. It is named in classical Sanskrit texts including the Charaka Samhita and Sushruta Samhita as a Rasayana, a rejuvenating tonic believed to restore vitality, strength, and longevity, and as a Balya (strength-giver). The Sanskrit name combines ashwa (horse) and gandha (smell), referring both to the root\'s odor and to the horse-like vigor it was said to confer. It spread through South Asian, Unani, and later African folk traditions before entering Western supplement markets in the late twentieth century.',timeline:[['c. 600 BCE','cited as a Rasayana in the Charaka Samhita'],['1990s','Western standardized extracts emerge'],['2012','KSM-66 branded extract popularizes clinical study'],['2023','Indian case series documents ashwagandha liver injury']],rel:['saffron','yoga','psychobiotics'],enelNote:'Ashwagandha is one of the most popular adaptogens (substances claimed to help the body handle stress), and the evidence is moderate rather than strong: Enel rates it 3 of 5. Several recent analyses that pool many trials do show real reductions in stress, anxiety, and the stress hormone cortisol, which is more than most herbs can claim. But two honest cautions hold the score down. First, the trials are small and short, and a large share are funded by the companies selling the branded extracts (KSM-66, Sensoril), a pattern that tends to inflate results. Second, and more seriously, ashwagandha is not the harmless tonic marketing suggests: published case reports link it to liver injury, with deaths in people who already had liver disease. Add documented contamination and wide swings in potency, and the product you choose matters enormously. We honor its deep roots in Ayurveda, where it has been a rejuvenating tonic for millennia. For a healthy adult seeking short-term stress relief, a reputable extract is a reasonable thing to try; anyone with liver concerns, autoimmune disease, thyroid issues, or who is pregnant should avoid it.',enel:false},
{i:'acupuncture',n:'Acupuncture',fn:'Needle stimulation for depression and anxiety',tier:1,ts:71,sig:'stable',hot:false,ev:3,cats:['somatic'],cls:'Traditional needling therapy',orig:'traditional',aa:0,fdaS:'none',fda:'The needles themselves are regulated by the US Food and Drug Administration (FDA) as Class II medical devices, meaning they must be single-use and handled by qualified practitioners. Acupuncture as a treatment has not been approved by the FDA for depression or anxiety, and no one is authorized to claim it cures these conditions.',wada:'Not applicable',rcts:64,studies:600,parts:'tens of thousands',ctry:'China, USA, Germany, UK',geo:[['Asia',50],['Europe',22],['USA',18],['Other',10]],disc:-200,discr:'Codified in Han-era China (around 200 BCE)',tag:'Inserting thin needles at specific points on the body. For depression, the honest read is a small-to-moderate benefit that shrinks once trials compare it against a convincing fake (sham) treatment.',facts:[['Typical course','8 to 12 sessions in the West; often 20 to 33 in Chinese trials'],['Cost','Roughly 75 to 150 USD per session in the US, rarely covered by insurance'],['Serious harm','A punctured lung (pneumothorax) or infection is rare, around 0.05 per 10,000 treatments'],['Sham comparison','The benefit over a fake treatment is real but modest, and easily skewed by bias']],brief:'Acupuncture is a traditional therapy in which a practitioner inserts thin needles at defined points on the body, used here to ease depression and anxiety. The strongest evidence is a 2018 review by the Cochrane group (an organization that pools many studies into one careful summary), led by Smith and colleagues across 64 randomized controlled trials, which are studies that randomly assign people to treatment or comparison groups to reduce bias (a randomized controlled trial is abbreviated RCT). It found acupuncture reduced depression more than a fake (sham) version of the treatment and more than usual care, with an effect size of about 0.55 (a measure where roughly 0.5 counts as a moderate difference). But it judged most trials at high risk of bias because patients and practitioners could often tell who got real needling. A big complication is dose: Chinese trials averaged about 33 sessions versus 12 in Western trials, and more sessions tended to mean bigger effects, so it is hard to separate the treatment from the sheer amount of it. For anxiety, a 2021 pooled analysis by Yang and colleagues of 20 mostly Chinese and methodologically weak trials reported a benefit (effect size around -0.41) but warned about quality. Whenever trials use a convincing fake treatment, the gap between real and fake narrows, which is the central honest tension in this research.',uses:['depression, as an add-on to standard care','generalized anxiety (long-running, excessive worry)','stress','insomnia (trouble sleeping)','ongoing pain'],risk:'Generally safe with a trained, licensed practitioner; serious problems (a punctured lung or infection) are rare and usually tied to poor technique. Acupuncture is not a replacement for proven care in moderate to severe depression or anxiety. If you are struggling, talk to a licensed mental health provider; in the US you can call or text 988 (Suicide and Crisis Lifeline) anytime.',mf:[['Acupuncture works by unblocking qi (a claimed life energy) flowing along meridians (claimed energy channels in the body)','Meridians do not correspond to any structure found in the body; the measurable effects are better explained by how nerves respond and by strong placebo and expectation effects'],['The benefit is purely placebo (a response driven by belief rather than the treatment itself)','Not quite; trials using a fake treatment show a small genuine effect, but it is smaller than studies without that comparison suggest']],adv:[{n:'World Health Organization (historical reviews)',r:'institutional reviewer',paid:false,note:'Earlier WHO documents listed many indications; later assessments were more cautious and evidence-graded.'},{n:'Acupuncture clinics and TCM schools',r:'commercial providers',paid:true,note:'Paid stakeholders; promotional claims should be weighed against sham-controlled data.'}],counter:[{n:'Dr. Edzard Ernst',cred:'Emeritus Professor of Complementary Medicine, University of Exeter',q:'When trials use credible sham needling and proper blinding, the specific effect of acupuncture tends to be small and clinically marginal.'},{n:'Cochrane authors (Smith et al., 2018)',cred:'Cochrane Common Mental Disorders',q:'The evidence is limited by high risk of performance bias and uncertain applicability outside high-dose Chinese settings.'}],history:'Acupuncture is a core practice of Traditional Chinese Medicine, with theory codified in the Huangdi Neijing (Yellow Emperor\'s Classic of Internal Medicine), compiled in China during the Warring States and Han periods (roughly 475 BCE to 220 CE) and traditionally attributed to the legendary Huangdi. Early practitioners used sharpened stone (bian) and bone implements before metal needles emerged in the Han dynasty. The companion text Lingshu Jing detailed needling and channels. The practice spread to Korea and Japan, and entered Western attention notably after a 1971 New York Times account by James Reston of his treatment in Beijing.',timeline:[['-475','Acupuncture concepts developing in Warring States China'],['-200','Huangdi Neijing compilation underway, codifying channel theory'],['200','Metal needling refined in the Han dynasty'],['1971','James Reston\'s report popularizes acupuncture in the US'],['2018','Cochrane review reports modest sham-controlled benefit for depression with high risk of bias']],rel:['massage','vagus-nerve','tai-chi','mbsr'],enelNote:'Enel\'s honest take: acupuncture is one of the better-studied traditional therapies for mood, and the 2018 Cochrane review does show a real signal for depression, but the signal is fragile. It shrinks when trials use a convincing fake (sham) version of the treatment and keep patients unaware of which they received, and the largest effects come from Chinese trials that delivered two to three times more sessions than Western ones, which tangles the dose with culture and expectation. We rate the evidence a 3: better than nothing, genuinely useful for some people as an add-on, but not a stand-in for talk therapy or medication in moderate to severe illness. The safety profile is reassuring when a licensed practitioner uses single-use needles; the rare serious harms (a punctured lung, infection) cluster around poor technique. Be skeptical of meridian and qi explanations, which have no basis in the body\'s actual structure; the believable mechanisms are about nerves and context. If acupuncture helps you feel calmer and you can afford it, that is legitimate. Just keep your primary mental health care in place, and reach a provider or 988 if symptoms worsen.',enel:false},
{i:'vagus-nerve',n:'Vagus Nerve Stimulation',fn:'Vagal tone and the many ways people try to influence it',tier:1,ts:64,sig:'rising',hot:false,ev:2,cats:['somatic','neurotech','caution'],cls:'Neuromodulation',orig:'device',aa:0,fdaS:'cleared',fda:'Approaches here span several regulatory categories. The implanted version (made by LivaNova) has been approved by the US Food and Drug Administration (FDA) since 2005 as an add-on for depression that has not responded to other treatments. The non-invasive gammaCore device (made by electroCore) is FDA-cleared for headache, not depression. Consumer neck devices (Pulsetto, Truvaga) are sold as general wellness products and are not FDA-cleared to treat any disease. Non-device practices such as slow breathing, humming, and cold exposure are everyday behaviors and are not regulated as medical treatments.',wada:'Not applicable',rcts:20,studies:150,parts:'thousands',ctry:'USA, China, Germany',geo:[['USA',40],['Asia',30],['Europe',25],['Other',5]],disc:1997,discr:'VNS first FDA-approved for epilepsy (1997); for depression (2005)',tag:'Vagal tone (the activity of the vagus nerve, a major calming nerve) is linked to mood and stress; people try to raise it many ways, from a surgical implant to ear stimulators to slow breathing. Evidence is strongest for the implant, thinnest for consumer gadgets.',facts:[['What it is','A major nerve of the parasympathetic (calming) system; its activity is called vagal tone'],['Implanted device','FDA-approved in 2005 for depression that has resisted other treatments'],['Ear stimulation (taVNS)','Studied for mood; pooled evidence rated low to very low quality'],['Free routes','Slow breathing, humming, and cold exposure are studied for raising vagal activity']],brief:'The vagus nerve is the longest nerve of the autonomic nervous system, the part of the body that runs automatic functions you do not consciously control, such as heart rate and digestion. The autonomic system has two branches: the sympathetic branch (which drives the fight-or-flight stress response) and the parasympathetic branch (which calms and restores). The vagus nerve is the main highway of that calming parasympathetic branch, running from the brain down through the neck into the chest and abdomen, where it helps slow the heart and settle the body. Researchers use the term vagal tone to mean how active this nerve is; higher vagal tone is associated, in observational studies, with steadier mood, better stress recovery, and greater heart-rate variability (the natural beat-to-beat variation in time between heartbeats, often used as a rough window onto vagal activity). Because of these links, vagal tone has become a target people try to influence in many ways, ranging from surgery to free breathing exercises.  The most established route is electrical stimulation, called vagus nerve stimulation, or VNS. The implanted version is surgically placed and has been approved by the US Food and Drug Administration (FDA) since 2005 (made by LivaNova) as an add-on for depression that has not responded to other treatments; it works slowly and helped about 30 percent of patients respond in the main trials. A 2024 one-year trial called RECOVER, which compared it against a fake (sham) version where the device was inactive, added cautious support. A non-invasive form delivered through the ear, called transcutaneous auricular VNS (taVNS, meaning stimulation applied through the skin at the ear), was reviewed in a 2023 pooled analysis in the Journal of Affective Disorders; it lowered scores on the Hamilton Depression Rating Scale (a standard questionnaire doctors use to gauge depression severity) compared with a fake treatment, with response rates similar to antidepressants, but the evidence was graded low to very low quality. A 2022 safety review in Scientific Reports found the ear method well tolerated, with ear pain, headache, and tingling most common.  Beyond devices, several everyday practices are thought to raise vagal activity, and they cost nothing. Slow breathing at roughly six breaths per minute (sometimes called resonance breathing) reliably increases heart-rate variability during the practice and is the best-supported of these, though lasting mood effects are less certain. Humming, chanting, and prolonged exhalation may gently stimulate vagal pathways, with mostly small, short studies. Brief cold exposure, such as a cold face splash or cold shower, can trigger a vagal reflex that slows the heart; evidence that this improves mood is preliminary. Heart-rate-variability training (also called HRV biofeedback), in which a person uses a sensor and slow breathing to nudge their heart rhythm, has modest supporting trials for stress and anxiety. These routes are low-risk but, like the ear devices, rest mostly on small or short studies. Finally, consumer neck devices (Pulsetto, Truvaga) borrow the language of this science in their marketing but are sold as wellness products without approval to treat disease and without comparable trial evidence, so claims about them should be read with particular caution.',uses:['depression that has resisted other treatments (implanted device, clinical use only)','general stress and relaxation (slow breathing, humming, HRV training, and as claimed by consumer-device makers)','anxiety (HRV biofeedback, modest evidence)','general wellness (as claimed by consumer-device makers)'],risk:'The implanted version involves surgery and its risks (voice changes, cough, infection) and is a medical decision, not a consumer purchase. The ear-based and non-device routes (slow breathing, humming, cold exposure, HRV training) carry little physical risk, though people with heart conditions should check before deliberate cold exposure. The non-invasive consumer neck devices also carry little physical risk but come with overstated marketing and weak evidence; do not use any of these in place of real treatment. If you have depression that has not responded to treatment, or you are in crisis, work with a psychiatrist; in the US call or text 988 (Suicide and Crisis Lifeline).',mf:[['Higher vagal tone simply causes better mental health, so raising it will fix mood','Overstated; the link is largely from observational studies, which show association, not proof of cause, and deliberately raising vagal activity has not been shown to reliably treat illness'],['A consumer vagus device gives the same benefit as the FDA-approved implant','False; the implant is placed surgically and backed by trials for hard-to-treat depression, while consumer neck devices are unproven wellness gadgets'],['The ear-based version (taVNS) is a proven depression treatment','Overstated; pooled evidence exists but is rated low to very low quality'],['Breathing or humming exercises are useless because they are not high-tech','Not so; slow breathing reliably raises heart-rate variability during practice and is low-risk, though its lasting mood benefit is less certain']],adv:[{n:'LivaNova',r:'maker of implanted VNS',paid:true,note:'Commercial maker of the FDA-approved implant for treatment-resistant depression.'},{n:'electroCore',r:'maker of gammaCore and Truvaga',paid:true,note:'Commercial seller; gammaCore is cleared for headache, Truvaga is a wellness product.'},{n:'Pulsetto',r:'consumer device company',paid:true,note:'Commercial seller; markets stress and sleep benefits without FDA disease clearance.'}],counter:[{n:'taVNS meta-analysis authors (2023, J Affect Disord)',cred:'systematic reviewers',q:'Benefit signals exist but the certainty of evidence is low to very low and larger rigorous trials are needed.'},{n:'Consumer-tech reviewers',cred:'independent health-tech press',q:'Consumer neck devices are early-stage wellness products, not validated medical treatments.'}],history:'Vagal anatomy was described by Galen in antiquity, but using it on purpose to influence mood is modern. Electrical VNS came first as a device therapy: Cyberonics developed implanted VNS, which the FDA approved for refractory epilepsy in 1997 and for treatment-resistant depression in 2005; Cyberonics later became LivaNova. Non-invasive approaches followed: electroCore\'s gammaCore earned FDA clearances for cluster headache (2017) and migraine (2018), and ear-based taVNS became a research focus in the 2010s and 2020s. In parallel, longstanding breathing and relaxation traditions were reinterpreted through the lens of vagal tone and heart-rate variability, and the 2010s and 2020s saw a wave of consumer-grade neck stimulators (Pulsetto, Truvaga) marketed for stress and sleep, a commercial expansion that outpaced the disease-specific evidence.',timeline:[['1997','FDA approves implanted VNS for refractory epilepsy'],['2005','FDA approves implanted VNS for treatment-resistant depression'],['2017','gammaCore cleared for cluster headache'],['2018','gammaCore cleared for migraine'],['2023','taVNS depression meta-analysis: benefit signal, low certainty'],['2024','RECOVER one-year sham-controlled implant trial reports results']],rel:['hrv-biofeedback','breathwork','tms','neurofeedback'],enelNote:'Enel\'s honest take: start with the idea, not the gadgets. The vagus nerve is the main nerve of the body\'s calming (parasympathetic) branch, and its level of activity, called vagal tone, is linked in observational studies to steadier mood and better stress recovery. That link is real but it is an association, not proof that cranking up vagal activity cures anything, and the ways people try to influence it sit on very different evidence. The implanted device is real medicine, FDA-approved since 2005 for depression that has not responded to other treatments, but it is surgery, slow to act, and reserved for people who have exhausted other options. The non-invasive ear-based science (taVNS) is genuinely interesting and early pooled analyses lean positive, but the evidence is rated low to very low quality. The free routes (slow breathing at about six breaths a minute, humming, brief cold exposure, and heart-rate-variability training) are low-risk and the breathing work reliably raises heart-rate variability in the moment, even if lasting mood benefits are less settled. And the neck gadgets you can clip on and buy online (Pulsetto, Truvaga) are wellness products, not FDA-cleared to treat any disease, sold at premium prices on marketing that runs ahead of the data. We score consumer-grade use a 2 overall: not nothing, often relaxing, but not a substitute for treatment. Try the free practices freely; weigh the devices skeptically; and for depression that has resisted treatment, this is a psychiatrist\'s conversation. In crisis, contact a provider or 988.',enel:false},
{i:'massage',n:'Massage Therapy',fn:'Hands-on bodywork for anxiety and stress',tier:1,ts:68,sig:'stable',hot:false,ev:3,cats:['somatic'],cls:'Manual bodywork',orig:'traditional',aa:0,fdaS:'none',fda:'Massage therapy is a hands-on service, not a product the US Food and Drug Administration (FDA) regulates, and it is not FDA-approved as a treatment for depression or anxiety. Practitioner licensing is handled by each US state.',wada:'Not applicable',rcts:50,studies:600,parts:'tens of thousands',ctry:'India, China, Sweden, USA',geo:[['Asia',40],['Europe',25],['USA',25],['Other',10]],disc:-3000,discr:'Ayurvedic and Chinese bodywork (around 3000 BCE)',tag:'Skilled touch reliably eases anxiety, depression, and stress in the short term. The popular idea that it works by lowering the stress hormone cortisol is largely unsupported.',facts:[['Typical course','Weekly sessions over several weeks for a mood benefit'],['Cost','Roughly 60 to 120 USD per hour in the US'],['Largest effects','Lasting reductions in ongoing anxiety and depression (Moyer 2004)'],['Cortisol claim','Any effect on the stress hormone cortisol is small and usually not meaningful']],brief:'Massage therapy is hands-on bodywork in which a practitioner uses pressure and stroking on the muscles and soft tissue, used here to ease anxiety, depression, and stress. The key evidence is a 2004 review by Moyer, Rounds, and Hannum in Psychological Bulletin that pooled 37 studies; it found massage\'s biggest effects were reductions in ongoing (trait) anxiety and depression, roughly comparable to a full course of talk therapy, while single sessions mainly eased momentary (state) anxiety and physical tension. The most-repeated explanation, that massage lowers cortisol (the body\'s main stress hormone), was tested directly in a 2011 review by Moyer and colleagues that pooled the numbers and found the cortisol differences almost all small and not statistically meaningful, so cortisol cannot account for the benefit. Much of this field rests on small trials where it was easy to tell who got treatment and where group assignment was poorly concealed. The benefit is real and welcome, but the evidence is moderate in strength and the popular biological story is overstated.',uses:['anxiety','depression, as an add-on to standard care','stress reduction','muscle tension','sleep quality'],risk:'Generally very safe; soreness or bruising can occur, and caution is needed with blood-clotting disorders, fragile skin, or recent injury. Massage is a helpful complement, not a treatment for moderate to severe depression or anxiety. If you are struggling, see a licensed mental health provider; in the US call or text 988 (Suicide and Crisis Lifeline).',mf:[['Massage works by flushing out cortisol and toxins','Not supported; the effect on the stress hormone cortisol is small and usually not meaningful, and the idea of flushing out toxins is a myth'],['The mood benefit lasts long after a single session','A single session mainly gives short-term relief; lasting change needs a repeated course']],adv:[{n:'Dr. Tiffany Field',r:'Director, Touch Research Institute, University of Miami',paid:false,note:'Prolific massage researcher; her institute produces much of the positive literature, which raises allegiance-bias concerns and warrants independent replication.'},{n:'American Massage Therapy Association',r:'professional trade body',paid:true,note:'Commercial and advocacy interest in promoting massage.'}],counter:[{n:'Dr. Christopher Moyer',cred:'meta-analyst, University of Wisconsin-Stout',q:'Massage reduces anxiety and depression, but its effect on cortisol is essentially nil, so the usual mechanistic story is wrong.'},{n:'Independent systematic reviewers',cred:'evidence synthesis groups',q:'Most massage trials are small with inadequate blinding and allocation concealment, limiting confidence.'}],history:'Therapeutic touch is ancient and global. In India, Ayurvedic abhyanga (warm-oil massage) dates back thousands of years within a system often placed around 3000 BCE. In China, tui na bodywork developed within Traditional Chinese Medicine, with manipulation techniques described in early texts. In 19th-century Sweden, Per Henrik Ling (1776-1839) systematized a movement-and-stroke method (effleurage, petrissage, friction, tapotement, vibration) that became known in the West as Swedish massage, the template for most modern clinical massage. Japanese shiatsu and other traditions added to the lineage.',timeline:[['-3000','Ayurvedic abhyanga practiced in India'],['-2700','Tui na bodywork documented within Chinese medical tradition'],['1813','Per Henrik Ling establishes his institute in Stockholm, formalizing Swedish massage'],['2004','Moyer meta-analysis: anxiety and depression are massage\'s largest effects'],['2011','Quantitative review finds cortisol reduction largely nonsignificant']],rel:['acupuncture','yoga','tai-chi','breathwork','floatation-rest'],enelNote:'Enel\'s honest take: massage is one of the more pleasant evidence-backed ways to take the edge off anxiety, depression, and stress, and we are comfortable rating it a 3. The 2004 Moyer review found that reducing ongoing anxiety and depression were massage\'s strongest effects, roughly on par with a course of talk therapy for some outcomes, which is a meaningful claim. But two honesty notes matter. First, the popular explanation, that massage lowers the stress hormone cortisol and washes out stress chemistry, was tested directly and largely failed; the cortisol effect is small and usually not statistically meaningful, so whatever is helping (relaxation, skilled human touch, the caring relationship, expectation) is not the cortisol story you have been told. Second, a large share of the positive research comes from a single prolific group, the Touch Research Institute led by Tiffany Field, which raises concerns about a built-in bias toward favorable results and a need for independent replication, and many trials are small with weak methods. Enjoy massage for what it reliably does in the moment, keep expectations realistic, and keep your core mental health care in place. In crisis, reach a provider or 988.',enel:false},
{i:'tms',n:'Transcranial Magnetic Stimulation',fn:'rTMS / Deep TMS / Accelerated TMS',tier:1,ts:88,sig:'rising',hot:true,ev:5,cats:['neurotech','trending','evidence'],cls:'Noninvasive neuromodulation',orig:'device',aa:0,fdaS:'cleared',fda:'FDA-cleared for MDD (2008, NeuroStar), OCD (2018, BrainsWay Deep TMS, De Novo), smoking cessation (2020); SAINT/SNT accelerated protocol cleared 2022. Cleared via 510(k)/De Novo, not PMA-approved.',wada:'Not applicable',rcts:150,studies:360,parts:'tens of thousands',ctry:'USA, Canada, Israel, Europe, Australia',geo:[['USA',55],['Europe',25],['Other',20]],disc:1985,discr:'Anthony Barker, University of Sheffield (1985)',tag:'A treatment that sends magnetic pulses through the scalp to stimulate a mood-regulating region at the front of the brain; the best-tested noninvasive brain-stimulation method for depression that has not responded to other treatments.',facts:[['Standard course','20 to 36 sessions over 4 to 6 weeks'],['Accelerated version (SAINT)','50 sessions over 5 days'],['Share who fully recover (treatment-resistant depression)','about 30 to 36 percent'],['Main brain target','the left dorsolateral prefrontal cortex, a region behind the upper-left forehead involved in mood and decision-making']],brief:'Transcranial magnetic stimulation, or TMS, uses a coil held against the scalp to send focused magnetic pulses into a mood-regulating region behind the forehead, without anesthesia or any drug entering the body. The repetitive form (rTMS) delivers pulse trains over several sessions. The US Food and Drug Administration, or FDA, the federal agency that regulates medical devices and drugs, cleared the Neuronetics NeuroStar device for major depressive disorder in October 2008, cleared the BrainsWay Deep TMS device for obsessive-compulsive disorder (a condition of intrusive thoughts and compulsive behaviors) in August 2018 (the first noninvasive device cleared for that condition), and cleared the Stanford-developed SAINT/SNT accelerated protocol in September 2022. The strongest evidence comes from trials that compare real treatment against a convincing fake (sham) one, and pooled analyses of these show a genuine benefit beyond the placebo response, with patients on real TMS roughly 3.3 times as likely to improve or fully recover. In the SAINT trial reported by Cole, Williams and colleagues, 79 percent of patients with depression that had resisted other treatments fully recovered after five days of brain-imaging-guided accelerated stimulation. The benefit lasts for many people but tends to fade without follow-up sessions.',uses:['depression that has not responded to standard treatments','obsessive-compulsive disorder, a condition of intrusive thoughts and compulsive behaviors (using Deep TMS)','fast relief for severe, acute depression (using accelerated protocols)','helping people quit smoking (Deep TMS, FDA-cleared)'],risk:'Generally well tolerated; the most common effects are scalp discomfort and headache. The main serious risk is a seizure, which is rare (roughly 1 in tens of thousands of sessions) and made more likely by high-intensity protocols, certain medications, and anything that lowers a person\'s seizure threshold; the newer accelerated protocols are still gathering long-term safety data. It is not safe for people with magnetic metal implants near where the coil sits. TMS is a medical procedure, not a do-it-yourself device. If you are in crisis or having thoughts of suicide, contact a licensed provider or call or text 988 (US Suicide and Crisis Lifeline).',mf:[['TMS is the same as electroconvulsive therapy, the older shock therapy','TMS uses focused magnetic fields, needs no anesthesia, and does not trigger a seizure or cause memory loss; it is a completely different treatment'],['One course of TMS is a permanent cure','Many people relapse within months without follow-up sessions; the data show benefit fading over roughly six months if untreated']],adv:[{n:'Nolan Williams',r:'Stanford psychiatrist, SAINT/SNT developer',paid:'unclear',note:'Stanford holds related IP; commercialized through Magnus Medical'},{n:'Neuronetics (NeuroStar)',r:'device manufacturer',paid:true,note:'commercial; markets first FDA-cleared TMS system for MDD'},{n:'BrainsWay',r:'Deep TMS manufacturer',paid:true,note:'commercial; markets Deep TMS for MDD, OCD, smoking cessation'}],counter:[{n:'Mark George',cred:'Medical University of South Carolina',q:'TMS has a real antidepressant effect, but it is moderate, expensive, and best understood as one option within a stepped-care plan rather than a miracle cure.'},{n:'Daniel Blumberger',cred:'CAMH, University of Toronto',q:'Newer accelerated and theta-burst protocols are promising and shorten treatment, but long-term durability and optimal targeting are still active research questions.'}],history:'TMS is a modern Western invention with no ancient or non-Western precedent. Anthony Barker and colleagues at the University of Sheffield, England, produced the first practical TMS device in 1985, building on nineteenth and twentieth century work on electromagnetic induction and cortical excitability. Therapeutic repetitive TMS for psychiatry was developed through the 1990s and 2000s, primarily in the United States, Canada, and Israel.',timeline:[['1985','Barker builds first TMS device at Sheffield'],['1990s','Repetitive TMS first tested for depression'],['2008','FDA clears NeuroStar rTMS for MDD'],['2018','FDA clears BrainsWay Deep TMS for OCD (De Novo)'],['2020','Deep TMS cleared as aid for smoking cessation'],['2022','FDA clears SAINT/SNT accelerated protocol']],rel:['neurofeedback','hrv-biofeedback','vagus-nerve','cbt','exercise'],enelNote:'TMS is the rare brain-stimulation product that earns its reputation. Unlike most consumer brain-tech, repetitive TMS has clearances from the FDA (the US Food and Drug Administration, which regulates medical devices) for depression (2008), obsessive-compulsive disorder (2018), and smoking cessation (2020), is recommended in major treatment guidelines, and beats fake (sham) stimulation in blinded trials, with patients on real treatment roughly 3.3 times as likely to improve. That said, honesty matters: among people whose depression resisted other treatments, only about a third fully recover, a real placebo response exists, and benefit fades without follow-up sessions, so this is a meaningful tool rather than a cure. The accelerated SAINT/SNT protocol reported by Cole and Williams produced striking five-day recovery figures (79 percent), but those numbers come from carefully selected trial patients and need testing in broader groups. Note a regulatory detail the marketing often blurs: these devices are cleared, meaning the FDA judged them similar enough to existing devices, not fully approved after independent proof of benefit, and cleared is not the same as approved. Cost is high and insurance coverage uneven. If you are weighing TMS, do it through a licensed psychiatric provider, not a standalone wellness storefront. If you are in crisis, call or text 988.',enel:false},
{i:'neurofeedback',n:'EEG Neurofeedback',fn:'EEG biofeedback / brain training',tier:1,ts:52,sig:'stable',hot:false,ev:2,cats:['neurotech','caution'],cls:'Operant EEG conditioning',orig:'device',aa:0,fdaS:'none',fda:'No FDA clearance as a treatment for ADHD, anxiety, or depression. Some EEG biofeedback devices are FDA-cleared or registered for general relaxation and stress-reduction (general wellness), not for treating psychiatric disorders.',wada:'Not applicable',rcts:40,studies:300,parts:'thousands',ctry:'USA, Canada, Germany, Netherlands, UK',geo:[['USA',45],['Europe',35],['Other',20]],disc:1962,discr:'Joe Kamiya (alpha, Chicago, ~1962) and Barry Sterman (SMR, UCLA, 1965)',tag:'A method that shows you a live readout of your own brainwaves and rewards you for shifting them toward a target; popular for attention and anxiety problems, but careful fake-controlled trials usually find no real effect.',facts:[['Typical course','20 to 40 or more sessions, often spread over months'],['Common brainwave targets','the theta-to-beta ratio, the sensorimotor rhythm, and the alpha rhythm (different patterns of electrical brain activity)'],['Key trial','the ICAN study (Arnold 2021) found no benefit over a fake (sham) version'],['Cost','high; often thousands of dollars paid out of pocket']],brief:'Neurofeedback measures the brain\'s electrical activity with an electroencephalogram, or EEG (sensors placed on the scalp that pick up brainwave patterns), shows the user a live display of that activity, and rewards shifts toward a target pattern, such as a lower theta-to-beta ratio said to help attention-deficit/hyperactivity disorder (ADHD). Studies where people know they are getting real feedback, or where a waiting-list group is the comparison, often report benefit. But the demanding test is a double-blind trial against a fake (sham) version, in which neither participants nor staff can tell real feedback from fake. The landmark ICAN trial (Arnold and colleagues, Journal of the American Academy of Child and Adolescent Psychiatry, 2021), the first large double-blind fake-controlled study, found no meaningful advantage of neurofeedback over the fake version for childhood ADHD, either at the end of treatment or at 13-month follow-up; both groups improved about the same. Researchers Robert Thibault and Amir Raz argue that the placebo effect and other nonspecific factors explain most of the apparent gains. Sterman\'s original sensorimotor-rhythm work in epilepsy remains its most credible application.',uses:['marketed for ADHD (attention-deficit/hyperactivity disorder), though fake-controlled trials do not support a real effect','marketed for anxiety and stress (the benefit appears to be mostly placebo)','epilepsy, a seizure disorder (Sterman\'s sensorimotor-rhythm protocol, the strongest historical evidence)','peak performance and relaxation (sold as general wellness, not medical treatment)'],risk:'Physically low-risk; the main harms are financial and the time lost to it. Courses commonly run into thousands of dollars over many months and can delay access to treatments that are known to work, such as cognitive behavioral therapy (CBT, a structured form of talk therapy), behavioral therapy, or properly supervised medication. Marketing claims often go well beyond what the blinded evidence supports. Neurofeedback should not replace established treatment for ADHD, anxiety, or depression. If you or someone you know is struggling or in crisis, consult a licensed provider or call or text 988 (US Suicide and Crisis Lifeline).',mf:[['Neurofeedback is a proven, lasting cure for ADHD','The first large double-blind trial (ICAN, 2021) found no benefit over a fake version; the gains seen in less rigorous studies are mostly placebo and practice effects'],['It physically rewires and permanently optimizes your brain','Blinded evidence does not support lasting, disorder-specific brain change beyond the placebo effect and ordinary practice']],adv:[{n:'EEG Info and similar clinics',r:'training providers and equipment vendors',paid:true,note:'commercial; sell sessions and devices, often for cash'},{n:'Myndlift',r:'consumer neurofeedback platform',paid:true,note:'commercial; markets at-home neurofeedback subscriptions'}],counter:[{n:'Robert Thibault',cred:'researcher, formerly McGill University',q:'Placebo factors permeate EEG neurofeedback and likely account for the majority of clinical outcomes; sham feedback often helps as much as real feedback.'},{n:'L. Eugene Arnold',cred:'Ohio State University, ICAN trial lead',q:'In a properly blinded design, neurofeedback did not outperform sham for ADHD, including at 13-month follow-up.'}],history:'Neurofeedback grew from two strands of mid-twentieth-century American research. Around 1962 at the University of Chicago, Joe Kamiya showed people could gain some voluntary control over alpha rhythms when given real-time feedback, work popularized in a 1968 Psychology Today article. In 1965 at UCLA, Barry Sterman identified the sensorimotor rhythm (SMR) in cats and later found SMR-trained cats were more resistant to chemically induced seizures, leading to human epilepsy applications. This is a modern Western development, though it overlaps culturally with the 1960s-70s Western interest in meditation and self-regulation.',timeline:[['1962','Kamiya demonstrates voluntary alpha control'],['1965','Sterman discovers SMR in cats'],['1968','Kamiya alpha work popularized in Psychology Today'],['1970s','Sterman applies SMR training to epilepsy'],['2018','Thibault and Raz publish major placebo critique'],['2021','ICAN double-blind trial finds no benefit over sham']],rel:['hrv-biofeedback','tms','meditation-apps','mbsr','cbt'],enelNote:'Neurofeedback is the cautionary tale of consumer brain-tech. The concept is appealing and Barry Sterman\'s early epilepsy work was genuine, but the modern marketing for ADHD, anxiety, and brain optimization has badly outrun the evidence. The decisive result is the ICAN trial (Arnold and colleagues, 2021), the first large double-blind study comparing real feedback against a convincing fake (sham) version, which found no advantage over the fake at the end of treatment or 13 months later; real and fake feedback improved children about equally. Robert Thibault and Amir Raz have argued for years that the placebo effect and other nonspecific factors drive most of the reported gains. We rate the evidence 2 out of 5 on purpose: this is not fraud, and many people feel better, but feeling better when you know you are getting real feedback is not proof of a specific effect, and proper blinding repeatedly erases the advantage. No device is cleared by the FDA (the US Food and Drug Administration) to treat ADHD, anxiety, or depression with neurofeedback; clearances are only for general relaxation. Given courses that cost thousands over months, the bigger risk is spending money and time that could go to CBT (cognitive behavioral therapy), behavioral therapy, or supervised care. If you are struggling, see a licensed provider; in crisis, call or text 988.',enel:false},
{i:'hrv-biofeedback',n:'Heart Rate Variability Biofeedback',fn:'HRVB / resonance frequency breathing',tier:1,ts:64,sig:'rising',hot:false,ev:3,cats:['neurotech','somatic'],cls:'Autonomic biofeedback',orig:'device',aa:0,fdaS:'none',fda:'No FDA clearance to treat anxiety, depression, or other psychiatric disorders. Consumer HRV biofeedback sensors and apps (HeartMath Inner Balance/emWave, Elite HRV) are marketed as general wellness and stress-management products, not medical treatments.',wada:'Not applicable',rcts:30,studies:100,parts:'thousands',ctry:'USA, Germany, Netherlands, UK, India',geo:[['USA',45],['Europe',30],['Other',25]],disc:2000,discr:'Paul Lehrer and Evgeny Vaschillo, resonance-frequency HRVB (around 2000)',tag:'Slow breathing at about six breaths a minute while watching a live readout of your heartbeat, used to strengthen a blood-pressure reflex and calm the nervous system.',facts:[['Ideal breathing pace','about six breaths per minute, the rate at which heartbeat and breathing line up best'],['Effect on depression','small-to-medium (a standardized effect size of about 0.38)'],['Largest effects','anxiety, stress, and self-control of emotions'],['How it works','activates the baroreflex (a reflex that regulates blood pressure) and the calming branch of the nervous system via the vagus nerve']],brief:'Heart rate variability, or HRV, is the natural beat-to-beat variation in the time between heartbeats. HRV biofeedback teaches people to breathe at their personal best pace, usually around six breaths per minute, while watching a live readout of their heart rhythm. At this pace, heartbeat and breathing fall into step and produce large, regular swings in heart rate that exercise the baroreflex (a reflex that adjusts blood pressure) and engage the vagus nerve, the main pathway of the body\'s calming, rest-and-digest system. Paul Lehrer and Evgeny Vaschillo at Rutgers turned this into a standard protocol around 2000. Pooled analyses report a small-to-medium effect on depressive symptoms (a standardized effect size of about 0.38) and generally larger effects for anxiety and self-reported stress. The biology is believable and the effects are modest but real, which is why we rate it 3 rather than higher. Consumer products from HeartMath and Elite HRV bring the method to phones, though true biofeedback requires live feedback you respond to, not just passive tracking of your numbers.',uses:['reducing stress and anxiety','an add-on for depressive symptoms','managing emotions and steadying performance','general self-regulation of the body\'s calming and stress systems'],risk:'Very low physical risk; slow breathing is safe for most people and side effects are minimal (occasional lightheadedness when first learning to pace your breath). Some consumer devices overstate the benefits, and passive HRV trackers (smartwatches, rings) measure your heart rhythm but do not provide true biofeedback you act on. HRV biofeedback is a reasonable add-on, not a standalone treatment for moderate or severe depression or anxiety disorders. If symptoms are significant, see a licensed provider; if you are in crisis, call or text 988 (US Suicide and Crisis Lifeline).',mf:[['Any HRV-tracking watch or ring gives you biofeedback','Passive trackers only measure your heart rhythm; true biofeedback means live feedback you act on in the moment, such as paced slow breathing'],['A higher HRV number always means you are healthier or calmer','HRV changes with age, fitness, and circumstances; the benefit comes from the breathing skill you practice, not from chasing a single number']],adv:[{n:'Paul Lehrer',r:'Rutgers researcher, HRVB pioneer',paid:'unclear',note:'academic; co-developed the resonance-frequency protocol'},{n:'HeartMath (Inner Balance, emWave)',r:'device and app maker',paid:true,note:'commercial; sells coherence-biofeedback sensors and subscriptions'},{n:'Elite HRV',r:'app maker',paid:true,note:'commercial; HRV training app paired with chest-strap or armband sensors'}],counter:[{n:'Paul Lehrer',cred:'Rutgers University',q:'The effects are genuine but modest; HRV biofeedback works best as a skill practiced over weeks and as an adjunct, not a replacement for established care.'},{n:'Methodology reviewers',cred:'biofeedback researchers',q:'Many positive studies are small and unblinded, so effect sizes should be read as encouraging rather than definitive.'}],history:'The modern resonance-frequency protocol is a Western clinical development, formalized around 2000 by Paul Lehrer and Evgeny Vaschillo, building on Russian cardiovascular-physiology research into baroreflex resonance. But its core technique, deliberate slow breathing to calm the body, has deep non-Western roots. Yogic pranayama in the Indian tradition has used slow, controlled breathing for self-regulation for well over two thousand years, and many traditional practices converge near the same six-breaths-per-minute pace that science later identified as the cardiovascular resonance frequency. HRV biofeedback can be seen as an instrumented, measurable version of these older breathing disciplines.',timeline:[['ancient','Yogic pranayama uses slow controlled breathing for self-regulation'],['1960s-70s','Soviet researchers study baroreflex and HRV resonance'],['2000','Lehrer and Vaschillo formalize resonance-frequency HRVB'],['2010s','Consumer apps and sensors (HeartMath, Elite HRV) emerge'],['2021','Meta-analyses report medium-small effects on depression (g~0.38)']],rel:['breathwork','neurofeedback','vagus-nerve','meditation-apps','mbsr','yoga','tms'],enelNote:'HRV biofeedback sits in the honest middle: better evidenced than neurofeedback, more modest than TMS. The idea is elegant. Breathe at your best pace, around six breaths per minute, and you drive large swings in heart rate that exercise the baroreflex (the body\'s blood-pressure reflex) and engage the calming branch of the nervous system through the vagus nerve. Paul Lehrer and Evgeny Vaschillo formalized the protocol around 2000, and pooled analyses show a real but small-to-medium effect on depression (a standardized effect size of about 0.38), with somewhat larger effects for anxiety and stress. We rate it 3 out of 5: believable mechanism, consistent small-to-moderate benefits, but many trials are small and not blinded, so do not expect TMS-level results. A key consumer caveat: the passive HRV numbers on a watch or ring are not biofeedback. The benefit comes from actively practicing paced breathing with live feedback over weeks. There is no FDA clearance (from the US Food and Drug Administration) to treat any disorder, and devices like HeartMath and Elite HRV are wellness products. Used as an add-on to therapy or care, it is low-risk and worthwhile; for significant symptoms, see a provider, and in crisis call or text 988.',enel:false},
{i:'art-therapy',n:'Art Therapy',fn:'Guided art-making with a credentialed therapist',tier:1,ts:42,sig:'stable',hot:false,ev:2,cats:['creative','psychotherapy','caution'],cls:'Creative Arts Therapy',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:40,studies:400,parts:'thousands',ctry:'UK, USA',geo:[['USA',40],['Europe',35],['Other',25]],disc:1942,discr:'Adrian Hill, UK (1942)',tag:'Making art with a trained therapist to work through emotions. The high-quality trial evidence is honestly thin.',facts:[['Term coined','Adrian Hill, 1942'],['Typical trial size','Often under 50 participants'],['Strength of evidence','Low, with a high chance that study flaws skewed the results'],['US credential','Registered art therapist (ATR), or board-certified (ATR-BC)']],brief:'Art therapy is making images, with the guidance of a trained therapist, as a way to express and work through emotions. British artist Adrian Hill coined the phrase \'art therapy\' in 1942 while recovering from tuberculosis at the King Edward VII sanatorium, where he found that drawing helped his recovery and later taught the practice to wounded soldiers. In the United States Margaret Naumburg developed a version rooted in psychoanalysis, and Edith Kramer (Art Therapy in a Children\'s Community, 1958) emphasized the healing power of the act of making itself. The honest caveat is that the high-quality trial evidence is weak. A 2018 review in the journal PLOS One looked at art therapy for adult anxiety and found only three randomized controlled trials (a randomized controlled trial, or RCT, splits people at random into a treated group and a comparison group, which is the most reliable way to test whether something works). Those three trials covered just 162 patients and all carried a high risk that design flaws skewed the results. The large MATISSE trial (Crawford et al., 2012), a well-designed RCT, found that group art therapy gave no benefit over standard care for people with schizophrenia. Reviews repeatedly point to small numbers of participants, assessors who knew who got the treatment, and the difficulty of telling a true effect apart from the boost people get simply from attention and care.',uses:['working through trauma and grief','expressing feelings when words are hard to find','supportive care alongside treatment for cancer and dementia','engaging children and teenagers'],risk:'The physical risk is generally low, but making images about trauma can bring up intense distress; severe or sudden symptoms call for a licensed mental-health provider. It is not a substitute for proven treatment of serious mental illness. If you or someone you know is in crisis, call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['Art therapy is a proven treatment for depression or psychosis','The evidence is low quality, and the well-run MATISSE trial found no benefit for schizophrenia'],['You need artistic talent to benefit','No skill is required; what matters is the process of making, not the finished product']],adv:[{n:'American Art Therapy Association',r:'US professional body',paid:false,note:'Sets ATR-BC credentialing; advocates for the profession'},{n:'British Association of Art Therapists',r:'UK professional body',paid:false,note:'Art therapy is a state-regulated profession in the UK'}],counter:[{n:'Mike J. Crawford',cred:'Imperial College London, MATISSE lead',q:'Referral to group art therapy did not improve outcomes for people with schizophrenia compared with standard care.'},{n:'Editorial, PNAS (2019)',cred:'Searching for the science behind art therapy',q:'There were not enough studies to make a claim, and what there were, were relatively small and anecdotal.'}],history:'Image-making for healing long predates the modern term. Sand painting was used ceremonially for healing by Dine (Navajo) and Tibetan Buddhist traditions; Indigenous Australian and many African and Amazonian cultures embed visual symbol-making in healing ritual. The professionalized clinical field emerged in the West in the 1940s-1950s: Adrian Hill coined the term in 1942 in England, while Margaret Naumburg and Edith Kramer built the American tradition. The US (1969, American Art Therapy Association) and UK (state registration of art therapists, 1997) formalized credentialing.',timeline:[['1942','Adrian Hill coins art therapy in a UK sanatorium'],['1958','Edith Kramer publishes Art Therapy in a Children\'s Community'],['1969','American Art Therapy Association founded'],['2012','MATISSE RCT finds no benefit for schizophrenia']],rel:['music-therapy','journaling'],enelNote:'Enel rates art therapy ev 2 because the practice is widely used and clinically sensible, but the controlled evidence is genuinely thin. Most trials are small (often under 50 people), rarely keep the assessors unaware of who received the treatment, and struggle to separate the specific value of a trained art therapist from the general benefits of attention, structure, and a supportive relationship. The most rigorous large trial, MATISSE (2012), found no benefit for schizophrenia, which honest reviews treat as an important negative result rather than a fluke. None of this means art therapy is useless: many people find image-making a genuine route to expression and processing, and it is a state-regulated health profession in the UK. We simply will not overstate what the strongest evidence supports. If you are drawn to it, treat it as a supportive, complementary practice delivered by a credentialed therapist, not as a stand-alone treatment for serious depression or psychosis. Anyone in crisis should contact a licensed provider or call or text 988 in the US.',enel:false},
{i:'music-therapy',n:'Music Therapy',fn:'Clinical use of music by a credentialed therapist',tier:1,ts:58,sig:'rising',hot:false,ev:3,cats:['creative','psychotherapy'],cls:'Creative Arts Therapy',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:60,studies:600,parts:'thousands',ctry:'USA, UK, Norway',geo:[['USA',35],['Europe',40],['Other',25]],disc:1950,discr:'NAMT founded, New York (1950)',tag:'A trained therapist uses music, either by making it or listening to it together, as treatment. There is moderate evidence it eases depression.',facts:[['Profession formalized','The National Association for Music Therapy (NAMT), 1950, now the American Music Therapy Association (AMTA)'],['Cochrane review (Aalbers 2017)','9 trials, 421 people, a moderate-to-large benefit (standardized effect size about -0.98)'],['Strength of evidence','Moderate quality; the benefit shrinks in larger, better trials'],['Not the same as','Passively listening to a playlist on your own']],brief:'Music therapy is the use of music by a credentialed therapist as part of clinical treatment, and it is not the same as simply listening to music on your own. A 2017 Cochrane review (Aalbers et al.) is a careful summary of all the trials, produced by Cochrane, an organization known for its independent, rigorous reviews of medical evidence. It pooled nine trials (421 participants) and found moderate-quality evidence that music therapy, added on top of usual treatment, reduced depression rated by clinicians and reduced anxiety, compared with usual treatment alone. The size of that benefit is reported as a standardized effect of about -0.98, a measure that lets researchers compare results across studies that used different rating scales; a value near -1 points to a sizeable effect. Later and larger reviews report smaller but still real effects. \'Active\' methods involve singing, playing, or improvising; \'receptive\' methods, such as Helen Bonny\'s Guided Imagery and Music (developed in the 1970s, where a person listens to structured music with a therapist\'s guidance), center on listening. The honest caveats: studies were small, used many different methods, and could not hide from participants whether they were getting the therapy.',uses:['easing symptoms of depression and anxiety','calming agitation and improving engagement in dementia','recovery after stroke and other brain injury','care for newborns and for people near the end of life'],risk:'The physical risk is low. High volume can harm hearing, and emotionally powerful music can bring up grief or distress. It is an add-on, not a replacement for proven care of moderate-to-severe depression. If you or someone you know is in crisis, call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['Listening to an upbeat playlist counts as music therapy','Clinical music therapy is delivered by a trained, credentialed therapist'],['Specific sound frequencies retune the body','Claims that certain healing frequencies (for example 432 Hz) heal the body are not supported by clinical evidence']],adv:[{n:'American Music Therapy Association',r:'US professional body',paid:false,note:'Maintains the MT-BC board credential'},{n:'World Federation of Music Therapy',r:'International body',paid:false,note:'Coordinates the profession across cultures'}],counter:[{n:'Christian Gold',cred:'GAMUT, University of Bergen / NORCE',q:'Effects are promising but trials are small and heterogeneous, so confidence remains limited.'},{n:'Cochrane review authors',cred:'Aalbers et al., 2017',q:'Music therapy may reduce depressive symptoms, but the evidence base is small and quality is moderate at best.'}],history:'Music as healing is ancient and cross-cultural. Pythagoras (c. 6th century BCE) and later Greek thinkers tied music to bodily harmony, and the god Apollo\'s lyre symbolized health. The Persian polymath Al-Farabi (c. 872-950 CE) wrote on music\'s effects on the soul in Kitab al-Musiqa al-Kabir. Indigenous Australians use the didgeridoo and songlines in healing; shamanic drumming across Native American, African, and Amazonian cultures induces altered states for healing. The modern profession crystallized after the World Wars as musicians played in US Veterans Administration hospitals, leading to the National Association for Music Therapy, founded in New York on June 2, 1950; E. Thayer Gaston is called the field\'s father.',timeline:[['c.900','Al-Farabi writes on music and the soul'],['1950','National Association for Music Therapy founded'],['1970s','Helen Bonny develops Guided Imagery and Music'],['2017','Cochrane review finds moderate-quality benefit for depression']],rel:['art-therapy','journaling','meditation-apps'],enelNote:'Enel rates music therapy ev 3, the strongest of our creative-therapy entries, because a Cochrane review (a careful, independent summary of the trials) and several other pooled analyses agree on a real reduction in depression symptoms when a trained therapist delivers it alongside usual care. We hold it at 3 rather than higher for honest reasons: the trials are mostly small, the methods vary widely, participants generally cannot be kept unaware of whether they are receiving the therapy, and the measured benefit shrinks as studies get larger and better controlled. The single most important distinction is that clinical music therapy is not the same as putting on a calming playlist; the evidence is about structured work with a credentialed therapist (a board-certified music therapist, or MT-BC, in the US). We also flag that marketing around healing frequencies (such as 432 Hz claims) is not supported by clinical data and should not be confused with the profession. For mild-to-moderate distress, music therapy is a reasonable, low-risk add-on. For serious depression it should complement, not replace, proven treatment. Anyone in crisis should reach a provider or call or text 988 in the US.',enel:true},
{i:'journaling',n:'Expressive Writing',fn:'Structured writing about thoughts and feelings',tier:1,ts:55,sig:'stable',hot:false,ev:3,cats:['creative','psychotherapy'],cls:'Expressive Therapy',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:150,studies:300,parts:'thousands',ctry:'USA',geo:[['USA',45],['Europe',35],['Other',20]],disc:1986,discr:'James Pennebaker and Sandra Beall, UT Austin (1986)',tag:'Brief, structured writing about upsetting events. The health effects are modest and uneven, and writing often makes you feel worse for a short while first.',facts:[['Classic method','15-20 minutes a day, for 3-4 days, writing about your deepest thoughts and feelings'],['Origin','Pennebaker and Beall, 1986'],['Average effect','Small (an effect size, Cohen\'s d, of roughly 0.1-0.2, meaning the benefit is real but slight)'],['Cost','Free; just pen and paper']],brief:'Expressive writing means setting aside a short, structured time to write about your deepest thoughts and feelings about an upsetting or stressful event. James Pennebaker and Sandra Beall launched the modern research on it in 1986 (in the Journal of Abnormal Psychology): 46 students wrote for 15 minutes a day for four days, either about a personal trauma or about a trivial topic, and the trauma-writing group made about 50% fewer visits to the campus health center over the next six months. A 1988 study with Janice Kiecolt-Glaser and Ronald Glaser reported a stronger immune response in writers. Across the larger body of research, though, the effects are real but small and uneven. Joanne Frattaroli\'s 2006 analysis, which pooled many studies together, put the overall effect at about d = 0.075 (a very small effect), and other estimates land near 0.16. Notably, writing usually makes people feel worse for a short time right after each session, with any benefits emerging later.',uses:['working through stressful or traumatic events','reducing repetitive, brooding thoughts over time','gratitude and reflective journaling','a complement to therapy'],risk:'Writing about trauma commonly causes a brief rise in distress, low mood, or tears right afterward; for people with intense, brooding distress or active post-traumatic stress disorder (PTSD), it can make symptoms worse and is not advisable without support. The long-term effects are mixed and modest. If you or someone you know is in crisis, call or text 988 (the US Suicide and Crisis Lifeline).',mf:[['Journaling about trauma feels good right away','It usually makes mood worse in the short term; any benefits come later'],['It reliably improves long-term mental health','The effects are small and inconsistent from study to study']],adv:[{n:'James W. Pennebaker',r:'Professor emeritus, UT Austin',paid:'unclear',note:'Originated and champions the paradigm; has authored popular books on it'}],counter:[{n:'Joanne Frattaroli',cred:'UC Irvine, 2006 meta-analysis',q:'The overall effect of expressive writing is statistically reliable but small and highly variable across contexts.'},{n:'Baikie and Wilhelm',cred:'Advances in Psychiatric Treatment, 2005',q:'The immediate impact is usually a short-term increase in distress and negative mood.'}],history:'Reflective and confessional writing has deep cross-cultural roots: the Stoic Marcus Aurelius kept his Meditations (2nd century CE) as private self-examination; Japanese nikki (diary) literature flourished from the Heian era, with Sei Shonagon\'s Pillow Book (c. 1000 CE); Sufi and other contemplative traditions used written self-accounting. The modern experimental science began in the USA when James Pennebaker formalized the 4-day disclosure paradigm in 1986, turning private writing into a testable health intervention studied in well over a hundred trials worldwide.',timeline:[['c.180','Marcus Aurelius writes Meditations'],['c.1000','Sei Shonagon writes The Pillow Book in Japan'],['1986','Pennebaker and Beall publish the first expressive-writing study'],['2006','Frattaroli meta-analysis finds small overall effect']],rel:['art-therapy','music-therapy','gratitude'],enelNote:'Enel rates expressive writing ev 3 because, unlike most creative therapies, it has been tested in well over a hundred randomized studies, so we know its effects fairly precisely; the honest finding is that they are real but small and inconsistent. Pennebaker\'s 1986 and 1988 studies were striking, but the pooled estimates (Frattaroli 2006, around d = 0.075, a very small effect) are modest, and the benefits depend heavily on the situation and on how engaged the writer is. We weight two cautions heavily. First, expressive writing reliably makes people feel worse right afterward; that short-term spike in distress is the rule, not a footnote, and benefits emerge only later, if at all. Second, for people with active post-traumatic stress disorder (PTSD) or intense, brooding distress, writing about trauma without support can deepen symptoms and is not advisable. The upside is that it is free, private, and easy to start, which makes a gentle trial reasonable for everyday stress. It is not a treatment for serious mental illness. Anyone in crisis should contact a provider or call or text 988 in the US.',enel:false},
{i:'animal-therapy',n:'Animal-Assisted Therapy',fn:'Trained-animal sessions and pet ownership',tier:1,ts:52,sig:'stable',hot:false,ev:2,cats:['social','psychotherapy','caution'],cls:'Adjunctive Psychosocial Intervention',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:30,studies:200,parts:'thousands',ctry:'USA',geo:[['USA',40],['Europe',35],['Other',25]],disc:1969,discr:'Boris Levinson, Pet-Oriented Child Psychotherapy (1969)',tag:'A trained animal is brought into a care setting to ease distress, working alongside a professional. The trial evidence is limited and uneven.',facts:[['Format','A therapist works with a client and a trained animal, usually a dog'],['How often','Sessions of 20 to 60 minutes'],['Evidence','Many small studies whose methods and results vary widely'],['Cost','Varies; often paid for by the program']],brief:'Animal-assisted therapy, or AAT, brings a trained animal, usually a dog, into a treatment session with a clear goal, run by a qualified professional such as a therapist. The aim is to help people relax, open up, and engage. Reviews report modest reductions in depression and anxiety. One pooled analysis of many studies found an average effect of about minus 0.34 for depression and minus 0.29 for anxiety (these are standardized effect sizes, where a small effect is roughly 0.2 and a medium one roughly 0.5), plus larger gains in social functioning. The caveats are important. A 2014 review of randomized controlled trials (studies that randomly assign people to the treatment or a comparison group, the strongest test of whether something works) and later reviews found the studies small, often poorly run, rarely conducted so that raters did not know who got the treatment, and too different from one another to combine reliably. The most consistent finding is short-term stress relief in students and hospital patients. Treat the benefits as promising but not yet firmly proven.',uses:['easing symptoms of depression','reducing anxiety and short-term stress','encouraging people to engage socially','supporting behavior in people with dementia','building trust in therapy with children and teens'],risk:'Generally low risk, but allergies, infection, bites, and the welfare of the animal itself are real concerns; the benefits are modest and the studies are weak. Animal-assisted therapy is not a substitute for proven care. If you are struggling with your mental health, talk to a licensed provider; in the US you can call or text 988 (Suicide and Crisis Lifeline) anytime.',mf:[['Pets cure depression','Studies show a small, uneven benefit; nothing supports calling it a cure'],['Any visit from an animal counts as therapy','Real animal-assisted therapy has a clear goal and is run by a trained professional with a screened animal']],adv:[{n:'Pet Partners',r:'nonprofit registering therapy animal teams',paid:false,note:'Promotes animal-assisted interventions and handler training in the US.'},{n:'Mars Petcare WALTHAM',r:'industry research arm',paid:true,note:'Funds human-animal interaction research; commercial interest in pet ownership.'}],counter:[{n:'Dr. Hal Herzog',cred:'Western Carolina University',q:'The evidence that interacting with animals improves mental health is far weaker and more mixed than popular claims suggest.'},{n:'Cochrane and RCT reviewers',cred:'systematic review authors',q:'Trials are small, rarely blinded, and too heterogeneous to support strong conclusions.'}],history:'Animals appeared in care long before modern science. In medieval Geel, Belgium, animals were part of community care for people with mental illness, and the York Retreat in England, founded by William Tuke in 1796, kept small animals so distressed patients could practice gentle responsibility. Florence Nightingale noted in Notes on Nursing (1859) that a small pet could comfort the chronically sick. Sigmund Freud allowed his dog Jofi into sessions in the 1930s in Vienna. The modern field is credited to US child psychologist Boris Levinson, who in the 1950s and 1960s observed his dog Jingles easing a withdrawn child, publishing Pet-Oriented Child Psychotherapy in 1969. Standards groups such as the Delta Society, now Pet Partners, formed in the US in the 1970s and 1980s.',timeline:[['1796','York Retreat in England uses small animals in humane care'],['1859','Florence Nightingale notes pets comfort the sick'],['1930s','Freud uses his dog Jofi in sessions in Vienna'],['1969','Levinson publishes Pet-Oriented Child Psychotherapy'],['1977','Delta Society (now Pet Partners) founded in the US'],['2014','Systematic review of RCTs finds small, low-quality trials']],rel:['social-connection','art-therapy','music-therapy'],enelNote:'Enel views animal-assisted therapy as a gentle, widely liked add-on rather than a primary treatment. The lived experience is often warm and real: people relax, talk more easily, and feel less alone in a clinic or care home. The science is more cautious. Most studies are small, run without keeping the raters in the dark about who got the treatment, and differ so much in the animal used, the length of sessions, and the group of people studied that reviewers usually cannot combine them, which is why we rate the evidence low at 2. The clearest signals are short-term drops in stress and modest help with social engagement, especially in older adults, children, and people in psychiatric or dementia care. We urge readers to treat animal-assisted therapy as a supportive layer on top of proven care, not a replacement for therapy or medical follow-up. Practical cautions matter too: allergies, infection risk, and the welfare of the animal itself. If your mood or anxiety is interfering with daily life, please reach out to a licensed provider, and in the US you can call or text 988 at any time. A friendly dog can lift a hard afternoon; it should not carry your whole treatment plan.',enel:false},
{i:'gratitude',n:'Gratitude Practice',fn:'Structured noticing of things one is thankful for',tier:1,ts:61,sig:'stable',hot:false,ev:3,cats:['social','emerging'],cls:'Positive Psychology Intervention',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:150,studies:700,parts:'tens of thousands',ctry:'USA',geo:[['USA',40],['Europe',25],['Asia',20],['Other',15]],disc:2003,discr:'Emmons and McCullough, Counting Blessings versus Burdens (2003)',tag:'Deliberately noticing what you are thankful for. The benefits are small, and they shrink when compared against other active activities rather than doing nothing.',facts:[['Format','Gratitude lists, letters, or journaling'],['How often','Weekly or daily entries over several weeks'],['Evidence','Small benefits that shrink against active comparisons'],['Cost','Free']],brief:'Gratitude practice asks people to deliberately notice and write down things they are thankful for, often through weekly lists, a journal kept over time, or a letter of thanks. The original experiment by Emmons and McCullough (2003) compared counting blessings with counting hassles or neutral events and found higher well-being in the gratitude groups. Later analyses that pool many studies are more sober. Cregg and Cheavens (2021) found only small effects on depression and anxiety (an average of about minus 0.29, where a small effect is roughly 0.2), and those effects nearly vanished, dropping to about minus 0.03, when gratitude was compared with other active activities rather than with a waitlist where people simply did nothing. A large 2025 analysis in the journal PNAS covering 28 countries found a small overall gain in well-being (about 0.19). Earlier reviews by Wood and by Davis warned that some of the benefit may simply reflect people expecting to feel better.',uses:['general well-being','more positive mood','relationship satisfaction','mild mood support as an add-on','a daily habit of reflection'],risk:'Low risk for most people, though forced gratitude can feel hollow or dismissive during grief, trauma, or hardship, and it is not a treatment for clinical depression or anxiety. The benefits shrink when compared with other active activities. If you are struggling, please consult a licensed provider; in the US you can call or text 988 (Suicide and Crisis Lifeline) anytime.',mf:[['Gratitude rewires your brain','Studies show small effects on mood; sweeping claims about changing the brain go well beyond the evidence'],['Gratitude beats therapy','The effects are small and often disappear when compared with other active activities; it is an add-on, not a treatment']],adv:[{n:'Greater Good Science Center, UC Berkeley',r:'academic outreach center',paid:false,note:'Runs gratitude programs and translates research for the public.'},{n:'Robert Emmons',r:'researcher, UC Davis',paid:false,note:'Leading gratitude scientist and author; founded much of the modern field.'}],counter:[{n:'Dr. David Cregg',cred:'Ohio State University',q:'Gratitude interventions produce only small effects on depression and anxiety, and these are recommended below better-supported treatments.'},{n:'Dr. Alex Wood',cred:'University of Stirling',q:'Some apparent benefits may reflect expectancy, and effects shrink against active controls.'}],history:'Gratitude as a virtue long predates positive psychology and spans many traditions. In Roman Stoic thought, Cicero called gratitude not only the greatest virtue but the parent of all the others, and Seneca wrote at length on giving and receiving thanks. In Judaism, the morning prayer Modeh Ani and the practice of reciting blessings frame daily life as ongoing thanks. In Islam, shukr (gratitude to God) is a core duty, with the Qur\'an promising increase to the grateful. In Buddhism, gratitude (katannuta in Pali) is praised as a mark of a good person and tied to interdependence. Hindu Vedic texts urge thankfulness for nature\'s gifts. Indigenous traditions, such as the Haudenosaunee Thanksgiving Address (Ohenton Kariwatekwen), open gatherings by giving thanks to the natural world. The scientific study began with Emmons and McCullough in 2003.',timeline:[['c. 44 BCE','Cicero names gratitude parent of the virtues'],['1st c. CE','Seneca writes On Benefits about giving thanks'],['7th c.','Qur\'an centers shukr as gratitude to God'],['2003','Emmons and McCullough publish Counting Blessings versus Burdens'],['2021','Cregg and Cheavens find small effects, shrinking vs active controls'],['2025','PNAS cross-cultural meta-analysis reports small overall benefit']],rel:['self-compassion','journaling','meditation-apps','social-connection'],enelNote:'Enel sees gratitude practice as a low-cost, low-risk habit with genuine but modest benefits, which is why we rate the evidence a 3 rather than higher. The honest picture matters here. Yes, the research base is large, and the founding Emmons and McCullough work in 2003 showed real gains in well-being. But the most careful pooled analyses, especially Cregg and Cheavens in 2021, show that effects on depression and anxiety are small, and they shrink toward nothing when gratitude is compared not with doing nothing but with another active activity. Earlier reviews by Wood and by Davis warned that part of the lift may simply be people expecting to feel better. A 2025 analysis in the journal PNAS across 28 countries still found a small, consistent well-being benefit, which is encouraging for everyday flourishing. Our guidance: keep a gratitude habit if it feels meaningful, especially alongside connection and reflection, but do not expect it to treat clinical depression or anxiety, and avoid forcing it during fresh grief. If you are struggling, reach out to a licensed provider, and in the US you can call or text 988 anytime.',enel:false},
{i:'floatation-rest',n:'Floatation-REST',fn:'Floating in warm Epsom-salt water, reduced sensory input',tier:1,ts:44,sig:'rising',hot:false,ev:2,cats:['emerging','somatic','caution'],cls:'Restricted Environmental Stimulation Technique',orig:'practice',aa:0,fdaS:'none',fda:'Not a regulated product',wada:'Not applicable',rcts:6,studies:50,parts:'hundreds',ctry:'USA',geo:[['USA',45],['Europe',40],['Other',15]],disc:1954,discr:'John C. Lilly\'s first isolation tank (1954)',tag:'Floating in body-temperature salt water to quiet the senses. Used for relaxation and wellness, with a handful of small studies pointing to short-term relief from anxiety.',facts:[['Format','A float pod or pool filled with Epsom-salt water'],['How often','About one hour per session'],['Evidence','Small early-stage studies'],['Cost','Often 50 to 90 USD per session']],brief:'Floatation-REST, where REST stands for reduced environmental stimulation therapy, has a person float effortlessly in skin-temperature water saturated with Epsom salt (a mineral salt that makes the water dense enough to float in), inside a dark, quiet pod or pool that cuts off sight, sound, the pull of gravity, and most touch. The idea is to give the senses a deep rest. It belongs to a broader family of methods called REST (restricted environmental stimulation), which also includes simply lying in a dark, quiet room (chamber REST); reducing sensory input by tank or chamber has been studied since the mid-1900s. Today most floating happens at wellness spas and float centers, where people use it mainly for relaxation, stress relief, and recovery, and where claims range across easing anxiety, pain, and muscle tension, aiding athletic recovery, and boosting creativity. The formal evidence is still small and early. The most-studied use is short-term anxiety relief: Justin Feinstein and colleagues at the Laureate Institute for Brain Research reported in 2018 that a single one-hour float produced clear short-term drops in anxiety, stress,
