</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{background:#070c18;font-family:"Helvetica Neue",Helvetica,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::selection{background:#2D9AAD;color:#fff;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(133,212,224,0.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(133,212,224,0.32);}
input::placeholder{color:#5f7888;}
input:focus{outline:none;border-color:rgba(91,196,214,0.5)!important;box-shadow:0 0 0 2px rgba(45,154,173,0.12);}
button{font-family:inherit;}
#mainscroll{scroll-behavior:smooth;}
table{font-family:inherit;}

/* ── GLOBAL COSMIC STAGE (behind detail/category/search/compare) ── */
.cosmic-stage{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 44% at 50% 4%, rgba(212,160,23,0.10), transparent 58%),
    radial-gradient(ellipse 80% 50% at 50% 10%, rgba(45,154,173,0.12), transparent 60%),
    radial-gradient(ellipse 90% 55% at 50% 112%, rgba(45,154,173,0.10), transparent 62%),
    linear-gradient(180deg,#04070d 0%,#070c18 40%,#0a1426 100%);}
/* faint diagonal galaxy arc */
.mw-arc{position:absolute;inset:auto -16% 24% -16%;height:54%;
  background:
    radial-gradient(ellipse 60% 58% at 42% 60%, rgba(140,175,225,0.16) 0%, rgba(140,175,225,0.05) 40%, transparent 70%),
    radial-gradient(ellipse 44% 44% at 64% 52%, rgba(175,135,225,0.11) 0%, transparent 64%),
    radial-gradient(ellipse 40% 40% at 30% 66%, rgba(130,205,224,0.10) 0%, transparent 64%);
  transform:rotate(-13deg);filter:blur(6px);opacity:.85;}

/* ── REALISTIC STARFIELD ──
   Three coordinated layers: fine field, mid field, and bright glow-stars.
   Bright stars get a soft halo via a larger faint radial at the same point. */
.stars,.mw-stars{position:absolute;inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 7% 18%,#eaf3ff 99%,transparent),
    radial-gradient(1px 1px at 13% 41%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 19% 9%,#fff 99%,transparent),
    radial-gradient(1.4px 1.4px at 23% 63%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 29% 27%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 34% 78%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 39% 14%,#fff 99%,transparent),
    radial-gradient(1px 1px at 44% 49%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 48% 88%,#c4d8ff 99%,transparent),
    radial-gradient(1.4px 1.4px at 53% 33%,#fff 99%,transparent),
    radial-gradient(1px 1px at 58% 70%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 63% 11%,#bcd2ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 68% 54%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 73% 84%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 78% 23%,#fff 99%,transparent),
    radial-gradient(1.3px 1.3px at 83% 61%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 88% 38%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 93% 73%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 97% 16%,#fff 99%,transparent);
  background-repeat:no-repeat;animation:twinkle 7s ease-in-out infinite alternate;}
.stars.layer-2{
  background-image:
    radial-gradient(1px 1px at 5% 55%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 16% 84%,#fff 99%,transparent),
    radial-gradient(1px 1px at 27% 47%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 36% 92%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 49% 19%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 61% 87%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 71% 40%,#fff 99%,transparent),
    radial-gradient(1px 1px at 82% 92%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 91% 57%,#dce9ff 99%,transparent);
  animation-duration:10s;animation-direction:alternate-reverse;opacity:.7;}
/* bright glow-stars: a sharp core + a soft halo around a handful of points */
.stars-bright,.mw-stars-bright{position:absolute;inset:0;
  background-image:
    radial-gradient(2px 2px at 21% 30%,#fff 60%,rgba(255,255,255,0.0) 100%),
    radial-gradient(7px 7px at 21% 30%,rgba(207,224,255,0.5) 0%,transparent 70%),
    radial-gradient(2px 2px at 57% 22%,#fff 60%,transparent 100%),
    radial-gradient(8px 8px at 57% 22%,rgba(173,135,225,0.4) 0%,transparent 70%),
    radial-gradient(2.4px 2.4px at 79% 58%,#fff 60%,transparent 100%),
    radial-gradient(9px 9px at 79% 58%,rgba(130,205,224,0.45) 0%,transparent 70%),
    radial-gradient(2px 2px at 40% 70%,#fff 60%,transparent 100%),
    radial-gradient(7px 7px at 40% 70%,rgba(207,224,255,0.4) 0%,transparent 70%);
  background-repeat:no-repeat;animation:twinkle 5s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.5}50%{opacity:.95}100%{opacity:.6}}

  brief: 'Iron carries oxygen and is critical for the developing brain, and deficiency is genuinely common in young children, iron-deficiency anemia in early childhood is linked to lasting effects on attention and learning. The AAP recommends that exclusively breastfed infants receive about 1 mg/kg/day of iron starting at 4 months (breast milk is low in iron and infant stores run down around six months), universal anemia screening around 12 months, and attention to toddlers (ages 1 to 3) and menstruating teen girls, the two highest-risk groups. Cow\'s milk can worsen iron status. But iron has a dangerous flip side: it is the leading cause of fatal supplement poisoning in young children, so it should only be given when a provider recommends it.',

  risk: 'Iron is the central safety paradox of children\'s supplements: necessary, yet the single leading cause of fatal pediatric supplement poisoning (see the dedicated Iron Poisoning entry). Children should not be given iron or iron-containing multivitamins without a provider\'s guidance, and all iron products must be stored out of reach. Side effects of appropriate dosing include constipation, stomach upset, dark stools, and teeth staining, which hurt adherence. High-iron formula for infants who do not need it may impair copper absorption, so iron is targeted, not maximized.',
  mf: [['Breast milk gives a baby all the iron needed for the first year.', 'Breast milk is low in iron, and an infant\'s built-in stores run down around six months. The AAP recommends iron supplementation for exclusively breastfed infants starting at 4 months, and iron-rich foods once solids begin.'], ['Giving extra iron is a safe way to keep my child\'s levels up.', 'Iron is the leading cause of fatal supplement poisoning in children, and the body cannot easily excrete excess. Iron should be given only when a provider recommends it, and products kept locked away.']],

  brief: 'This entry documents a specific, completed regulatory action, not a general claim. In 2023 the FDA issued warning letters over probiotic products given to hospitalized premature infants. A preterm infant (birthweight under 1,000 g) who received Evivo with MCT Oil, made by Infinant Health and containing live Bifidobacterium longum subsp. infantis, developed sepsis and died; genomic sequencing showed the bacterium causing the sepsis was a genetic match to the probiotic. That product was recalled. The FDA also warned Abbott over its Similac Probiotic Tri-Blend, which Abbott discontinued and recalled (about 226,000 packets). The agency stressed it has not approved any probiotic for infants of any age, and that more than two dozen adverse events have been reported since 2018.',

  brief: 'Vitamin C is essential and deficiency (scurvy) is serious, but the popular idea that extra vitamin C, or an immune-boosting gummy, prevents colds in children does not hold up. Decades of research show that regular vitamin C supplementation does not prevent colds in the general population, and most children get plenty of vitamin C from a normal diet (citrus, peppers, many fruits and vegetables). "Immune support" gummies, often built around vitamin C, zinc, and elderberry, lean on claims that outrun the evidence for healthy children and can simply add sugar. There is no need to routinely high-dose a child with vitamin C, and the marketing promise of fewer colds is largely unfulfilled.',

  brief: 'A core safety principle for children\'s supplements: vitamins fall into two groups. Water-soluble vitamins (the B vitamins and vitamin C) are largely excreted in urine when taken in excess, so toxicity is uncommon. Fat-soluble vitamins (A, D, E, and K) are stored in the body and accumulate, so excess can build to harmful levels. In children, the standouts are vitamin A (toxicity can cause headaches, liver problems, and bone issues) and vitamin D (excess raises calcium dangerously), along with iron, which is a separate and severe poisoning risk. Gummies make over-consumption easy because they taste like candy. The unifying message: with fat-soluble vitamins and iron, more is not better and can be harmful.',

  brief: 'Newborns are born with very little vitamin K, and breast milk supplies little, so without prophylaxis some infants develop vitamin K deficiency bleeding (VKDB), unpredictable hemorrhage that can include bleeding in the brain, causing death or lasting neurological harm. A single intramuscular vitamin K injection at birth prevents it, which is why the AAP has recommended it since 1961, with WHO and the Canadian Paediatric Society in agreement. Part of the dose works immediately and the rest is stored and released over months. It is not a vaccine. Oral vitamin K is an alternative but is less effective (especially against late VKDB) and requires multiple doses. This is among the best-established interventions in newborn care.',
  uses: ['Preventing vitamin K deficiency bleeding (VKDB) in newborns', 'Protecting against intracranial hemorrhage in early infancy', 'Providing sustained vitamin K over the first months', 'Covering the gap left by low vitamin K in breast milk'],
  risk: 'The intramuscular injection is well established as safe over more than 60 years; the real risk lies in declining it. Refusal is rising, US hospital refusal ranges from 0 to about 3.2% but reaches up to roughly 14.5% at home births and 31% at birthing centers, and a 2024 JAMA study of 5 million births found non-receipt rose from 2.92% (2017) to 5.18% (2024). Higher refusal tracks with more VKDB and intracranial hemorrhage in otherwise healthy babies. Oral regimens are less effective and depend on completing multiple doses. Any concerns should be discussed with the baby\'s provider before birth.',
  mf: [['The vitamin K shot is unnecessary for a healthy baby from an uncomplicated birth.', 'VKDB can strike otherwise healthy, full-term babies, and the belief that it is unnecessary is the most common reason for refusal. Surveillance shows serious VKDB cases, some requiring transfusion, in healthy babies whose parents declined the shot.'], ['Vitamin K is linked to childhood cancer, or it is a vaccine.', 'The supposed leukemia link comes from a single 1990 study that has been repeatedly disproven. Vitamin K is not a vaccine; it is a nutrient newborns are born deficient in, given to prevent bleeding.']],
  voices: [{
    n: 'American Academy of Pediatrics',
    r: 'Policy since 1961 (reaffirmed 2022)',
    stance: 'champions',
    paid: false,
    q: 'All newborns should receive a single intramuscular dose of vitamin K1 (0.5-1 mg) within the first 6 hours of birth to prevent vitamin K deficiency bleeding; the injection is more effective than oral regimens.'
  }, {
    n: 'World Health Organization & Canadian Paediatric Society',
    r: 'Global guidance',
    stance: 'champions',
    paid: false,
    q: 'Routine newborn vitamin K prophylaxis is recommended; intramuscular administration is preferred, with multiple oral doses only as an alternative.'

    paid: false,
    q: 'Refusal of intramuscular vitamin K is rising worldwide, paralleling vaccine hesitancy, and is associated with increases in VKDB and intracranial hemorrhage; parental concerns are often based on disproven claims.'

    q: 'A minority of parents decline the shot citing a desire for a "natural" birth, injection-pain concerns, the debunked cancer link, or the false belief it is a vaccine, positions not supported by the evidence.'
  }],
  history: 'In 1961 the AAP first recommended vitamin K prophylaxis for all newborns, after research had already shown for over two decades that it prevents VKDB. The intervention became routine and VKDB grew rare. A 1990 study suggesting a link to childhood cancer caused alarm but was repeatedly disproven by later research. In recent years, refusal has climbed, paralleling vaccine hesitancy and accelerating after 2020, prompting renewed pediatric attention as VKDB cases reappear among unprotected infants.',
  timeline: [['1961', 'AAP first recommends newborn vitamin K prophylaxis'], ['1990', 'A study links vitamin K to childhood cancer; later repeatedly disproven'], ['2022', 'AAP reaffirms IM vitamin K policy'], ['2024', 'JAMA study: non-receipt rose from 2.92% (2017) to 5.18% (2024)'], ['2025', 'Surveillance links rising refusal to more VKDB and brain bleeds']],
  rel: ['vitamin-d-kids', 'infant-probiotics', 'does-my-kid'],
  enelNote: 'Vitamin K at birth is one of the strongest evidence-based interventions in newborn care, and one increasingly undermined by misinformation, the disproven 1990 cancer claim, the false "it is a vaccine" belief, and the "natural birth" framing. We treat it the way the evidence demands: a clear champion-level recommendation, the disproven claims named as disproven, and the rising-refusal trend reported honestly because the consequence, brain bleeds in healthy babies, is severe and preventable.',
  enel: true

  disc: 0,

  tag: 'A proven cavity-fighter that mostly works topically, supplemented only when drinking water is low in fluoride, and now at the center of a live political fight.',
  facts: [['Main benefit', 'Topical (toothpaste, varnish)'], ['Supplement only if', 'Water fluoride is low'], ['Exclusively breastfed <6mo', 'No fluoride needed'], ['2025', 'FDA moved to limit supplements under age 3']],
  brief: 'Fluoride prevents dental caries, one of the most common chronic diseases of childhood, primarily through a topical effect (fluoride toothpaste from tooth eruption, and in-office varnish), with a smaller systemic role during tooth development. Community water fluoridation provides both routes and reduces caries meaningfully. Dietary fluoride supplements are recommended only for children whose primary drinking water is low in fluoride, scaled by age and water level (for example, 0.25 mg/day for ages 6 months to 3 years when water is under 0.3 ppm), and are not needed for exclusively breastfed infants under 6 months. This is also a newly contested area: in 2025 the FDA moved to limit fluoride supplements for children under 3, and some states (Utah, Florida) curtailed water fluoridation, even as the AAP and ADA continued to back fluoride.',
  uses: ['Preventing dental caries through topical fluoride', 'Supplementing only where drinking water is fluoride-deficient', 'Supporting enamel resistance during tooth development', 'Reducing caries disparities in higher-risk children'],
  risk: 'The main risk of excess is dental fluorosis (mostly cosmetic enamel mottling) from too much fluoride during tooth development, which is why supplements are dosed to water-fluoride levels, not given on top of adequate fluoride, and not added to formula or milk (calcium reduces absorption). Providers should verify other fluoride sources before prescribing. The flip side is the current policy reversal: where water fluoridation has been reduced or banned, caries are expected to rise, shifting more burden onto supplements and varnish programs. The evidence for supplements specifically (versus topical fluoride) is mixed.',
  mf: [['Every child should take a fluoride supplement.', 'Fluoride supplements are only for children whose drinking water is low in fluoride, dosed by age and water level. Most benefit comes from topical fluoride (toothpaste, varnish) and fluoridated water, not routine oral supplements.'], ['Bottled water gives my child the same fluoride as tap water.', 'Most bottled water is not fluoridated and can be more acidic. Children drinking mainly bottled water may miss the fluoride benefit, which is one reason fluoride status should be checked before deciding on supplements.']],

    q: 'In 2025 the FDA moved to limit fluoride supplements for children under 3, and states including Utah and Florida curtailed water fluoridation, a shift dental authorities warn will increase tooth decay.'

  history: 'Fluoride\'s role in preventing tooth decay was established through the 20th century, leading to community water fluoridation and an age- and water-level-scaled supplement schedule jointly set by the ADA, AAPD, and AAP. The understanding shifted over time toward fluoride\'s primarily topical benefit. In 2024-2025 fluoride became unusually political: the AAP reaffirmed its recommendations amid scrutiny, while the FDA moved to limit supplements for the youngest children and several states reduced or banned water fluoridation.',
  timeline: [['20th c.', 'Fluoride caries prevention and water fluoridation established'], ['1994', 'ADA/AAPD/AAP set the water-level-scaled supplement schedule'], ['2020', 'AAP emphasizes topical fluoride and fluoridated water'], ['2025', 'FDA moves to limit fluoride supplements under age 3; states curtail water fluoridation']],
  rel: ['does-my-kid', 'safety-overdose', 'kids-global'],
  enelNote: 'Fluoride is a proven caries-fighter caught in a live political fight, exactly the kind of topic where Ēnel\'s job is to separate evidence from controversy. The science: topical fluoride and fluoridated water are the main benefit, supplements are a scaled, secondary tool with mixed evidence, and excess causes (mostly cosmetic) fluorosis. The 2025 reversals are reported as fact, with the dental authorities\' warning that reducing fluoride will raise decay, neither cheerleading nor dismissing the controversy.',

  discr: 'Side-by-side national pediatric supplement guidance',
  tag: 'Whether a baby gets vitamin D, how much, and even how vitamin K is given differ by country, revealing that "standard" pediatric practice is partly local.',

  brief: 'Pediatric supplement guidance varies by country more than parents tend to assume. Vitamin D for infants is widely recommended across high-income countries, but doses and rules differ: the US/AAP advises 400 IU per day for all infants, while the UK recommends roughly 8.5 to 10 micrograms (about 340-400 IU) for under-ones (and for breastfed infants specifically). Vitamin K prophylaxis is near-universal, but the route differs: the US strongly prefers a single intramuscular injection, while some European countries use multiple-dose oral regimens (the Netherlands, for instance, increased its daily oral dose after surveillance found higher late-VKDB rates). Fluoride supplementation practices differ widely, and water fluoridation is common in some countries and absent or banned in others.',
  uses: ['Understanding why pediatric supplement advice differs by country', 'Interpreting guidance when relocating or comparing sources', 'Seeing the IM-versus-oral vitamin K divide', 'Recognizing local context behind "standard" practice'],
  risk: 'The risk is assuming one country\'s defaults are universal, or cherry-picking the most permissive guidance from abroad. The vitamin K route is a clear example where the difference matters: oral regimens depend on completing multiple doses and are less effective against late VKDB, which is why some countries that use oral vitamin K raised their dosing after seeing more bleeding. Families should follow the guidance of the system caring for their child, and use international comparison for understanding rather than as a menu.',
  mf: [['Pediatric supplement guidance is the same everywhere.', 'It is not. Infant vitamin D doses, vitamin K route (injection vs oral), and fluoride practice all differ by country, reflecting local diet, sunlight, water, and health-system choices.'], ['If another country does it differently, the US must be wrong (or vice versa).', 'Different national defaults usually reflect different contexts and tradeoffs, not a single right answer, though the vitamin K route is one area where the IM injection has a clear effectiveness advantage over oral regimens.']],

  timeline: [['20th c.', 'National pediatric authorities develop their own supplement guidance'], ['2008', 'AAP sets 400 IU infant vitamin D; other countries use differing doses'], ['2010s-2020s', 'European oral vitamin K dosing adjusted after VKDB surveillance'], ['2020s', 'Fluoride and water-fluoridation practice diverge further by country']],

  disc: 0,
  discr: 'WHO/UNICEF zinc-for-diarrhea recommendation; cold evidence weaker',
  tag: 'A genuine, globally important treatment for childhood diarrhea, especially in lower-income countries, and a much weaker story for preventing colds in healthy kids.',
  facts: [['WHO diarrhea dose', '10-20 mg/day for 14 days'], ['Ages 1-3 RDA', '3 mg/day'], ['Diarrhea (LMIC)', 'Shortens duration, cuts persistence'], ['Colds (healthy kids)', 'Little clear evidence']],
  brief: 'Zinc supports immune function, growth, and hundreds of enzyme reactions, and it has one genuinely strong pediatric use: treating childhood diarrhea. A Cochrane review of 33 trials in over 10,000 children found zinc shortens diarrhea duration and reduces the chance it persists, with the clearest benefit in children with signs of malnutrition, which is why WHO and UNICEF recommend 10 to 20 mg of zinc daily for 14 days for young children with diarrhea, an intervention that saves lives in low-income settings where diarrhea kills hundreds of thousands of children a year. The cold story is far weaker: evidence that zinc prevents or shortens colds in healthy children is limited and unclear, despite its prominence in immune gummies.',
  uses: ['Treating acute and persistent diarrhea in young children (WHO)', 'Supporting growth where zinc deficiency is common', 'Covering shortfall in restrictive or low-zinc diets', 'Recognizing the weak evidence for cold prevention in healthy kids'],
  risk: 'Zinc is generally safe at recommended doses; the most common side effect is vomiting, which is less frequent at lower doses (a reason recent reviews suggest reducing the diarrhea dose). The tolerable upper limits are low in young children (for example, 7 mg/day for ages 4-8), and chronic excess can impair copper absorption, so zinc should be dosed for age and not stacked. As with all supplements, products should be stored safely. The key framing is context: a real treatment for diarrhea (especially in deficient populations), not a proven cold-fighter for well-nourished children.',
  mf: [['Zinc gummies keep my healthy kid from catching colds.', 'The evidence that zinc prevents or shortens colds in healthy children is limited and unclear. Its strong, well-supported pediatric use is treating diarrhea, especially where zinc deficiency is common, not cold prevention in well-nourished kids.'], ['Zinc is only useful as an immune booster.', 'Zinc\'s best-evidenced pediatric role is treating childhood diarrhea, a WHO-recommended, life-saving intervention in low-income countries. That is a very different, and much stronger, use than the immune-gummy marketing suggests.']],

  history: 'Zinc\'s role in childhood diarrhea emerged from trials largely in Asian and other low-income settings with high zinc-deficiency rates, leading WHO and UNICEF to make zinc plus oral rehydration a cornerstone of diarrhea treatment. That strong, equity-focused evidence base is distinct from the later, weaker marketing of zinc for cold prevention in well-nourished children, where the data do not match the claims.',
  timeline: [['1990s-2000s', 'Trials establish zinc for childhood diarrhea in deficient populations'], ['2000s', 'WHO/UNICEF adopt zinc plus ORS for childhood diarrhea'], ['2010s-2020s', 'Cochrane confirms diarrhea benefit; cold evidence in healthy kids stays weak']],
  rel: ['does-my-kid', 'vitamin-c-immune', 'gummies', 'b12-kids', 'vitamin-a-global'],

  disc: 0,
  discr: 'Children\'s multivitamins are unstandardized consumer products',
  tag: 'A children\'s multivitamin is an unregulated, unstandardized product, and the cartoon on the front tells you nothing about what is, or is not, inside.',
  facts: [['Often missing', 'Iron (gummies)'], ['Often added', 'Sugar; "immune" extras'], ['Fat-soluble watch', 'Vitamins A and D'], ['Quality check', 'Third-party tested']],
  brief: 'Children\'s multivitamins are consumer products: not FDA pre-market tested, not standardized, and free to put a friendly cartoon on the front while varying widely in contents. Reading the label past the marketing reveals the patterns. Gummy multivitamins usually omit iron (taste and stability), so a gummy "complete" multi often lacks one of the nutrients kids most commonly need. Many add sugar and bundle in "immune" extras (vitamin C, zinc, elderberry) whose benefits for healthy children are weak. Fat-soluble vitamins A and D are worth checking because they accumulate. And because products are not pre-tested, third-party verification is the main signal that the label matches the bottle. The skill is dull and powerful: match the label to what the child actually needs.',
  uses: ['Reading a children\'s multivitamin label against actual needs', 'Spotting the common omission of iron in gummies', 'Recognizing sugar and unproven "immune" add-ons', 'Favoring third-party-tested products for label accuracy'],
  risk: 'The risks are the recurring portal themes in one product: gummies invite over-consumption (a danger for fat-soluble vitamins A and D); a "complete" multi may quietly lack iron while another household product (adult/prenatal iron) poses the real poisoning danger; and unverified products may not contain what the label claims. Stacking a multivitamin with separate single nutrients can push fat-soluble vitamins too high. None of this means multivitamins are useless for the children who need them, it means the label, not the cartoon, is the thing to read.',
  mf: [['A children\'s multivitamin is a complete, regulated nutrition product.', 'It is an unregulated, unstandardized consumer product, not FDA pre-market tested. Contents vary widely, gummies usually lack iron, many add sugar, and only the label (ideally third-party verified) tells you what is actually inside.'], ['The friendly branding means it is designed for my child\'s real needs.', 'Branding is marketing. A gummy "complete" multi often omits iron and adds sugar and unproven immune extras; whether it matches a specific child\'s needs depends on the label and the child, not the cartoon.']],

  history: 'Children\'s multivitamins evolved from simple deficiency-prevention products into a heavily branded, gummy-dominated consumer category, increasingly layered with "immune support" claims. Throughout, they remained unregulated as to need and unstandardized in content, so the gap widened between cartoon-fronted marketing and the actual, variable contents, making label literacy and third-party testing the practical tools for parents.',
  timeline: [['Mid-20th c.', 'Children\'s multivitamins emerge for deficiency prevention'], ['2010s', 'Gummies and "immune" branding come to dominate the category'], ['2020s', 'Third-party testing and label literacy emphasized over branding']],

  disc: 0,
  discr: 'AAP clarified sports vs energy drinks; water is the default for kids',
  tag: 'Gatorade, Powerade, and Prime Hydration are designed for prolonged hard exercise, not everyday thirst, and for most kids plain water is the right answer.',
  facts: [['Principal hydration', 'Water (AAP)'], ['Useful when', 'Prolonged vigorous activity'], ['20 oz sports drink', '~30-35 g added sugar'], ['Risks', 'Overweight, dental erosion (low pH)']],
  brief: 'Sports drinks (Gatorade, Powerade, Prime Hydration) combine carbohydrates and electrolytes to replace what is lost in prolonged, vigorous exercise, and that is the narrow situation where they have a real use for young athletes, in combination with water. For everyday hydration, the AAP is explicit: water, not sports drinks, should be the principal source of hydration for children and adolescents. Routine use adds calories kids do not need (a 20-ounce bottle can carry 30 to 35 grams of added sugar, around or above a child\'s entire daily limit) and the low pH erodes tooth enamel. Newer "hydration" products like Prime Hydration are caffeine-free but use sucralose and an unusual electrolyte balance (heavy potassium, little sodium/magnesium). For most children, most of the time, water wins.',

  risk: 'For routine use the risks are excess calories and added sugar (contributing to overweight and obesity) and dental erosion from the drinks\' acidity. Sports drinks should not replace water or milk at meals, and most children doing ordinary activity never need them. Electrolyte products vary, some "hydration" drinks are low in sodium (the electrolyte most relevant to sweat loss) and high in potassium, and use artificial sweeteners. The decision should track the activity: water by default, sports drinks reserved for genuinely prolonged, intense, or hot-weather exertion.',

  brief: 'A child\'s relationship with glucose is built daily, and added sugar is the lever. The American Heart Association recommends children aged 2 to 18 consume less than 25 grams (about 6 teaspoons) of added sugar per day, and no added sugar at all under age 2, while the typical American child takes in roughly 19 teaspoons, about triple the limit. The single largest source is sugar-sweetened beverages (sodas, fruit drinks, sports drinks, sweet teas), which deliver glucose as a fast liquid hit rather than alongside the fiber, protein, and fat of whole food that blunt the blood-sugar rise. Sustained high added-sugar intake in childhood is linked to obesity, elevated blood pressure, abnormal cholesterol, and insulin resistance, a precursor to type 2 diabetes. The AHA also caps sugary drinks at one 8-ounce serving per week.',

  brief: 'How children eat has shifted: grazing between meals has risen substantially since the 1970s, and snacks now supply roughly a quarter of children\'s daily calories. Snacking is not inherently good or bad, young children have small stomachs and genuinely benefit from planned snacks to meet energy and nutrient needs, but the quality is what matters. The problem is that many common snacks are nutrient-poor and high in added sugar, refined carbohydrate, or salt, and frequent grazing on these contributes to excess calories, blood-sugar swings, and crowding-out of more nutritious food. The constructive framing is to treat snacks as small meals: planned, mostly whole foods (fruit, vegetables, dairy, protein), rather than constant unstructured grazing on packaged snacks and sugary drinks.',

  risk: 'The risks come from snack quality and pattern, not snacking itself: frequent nutrient-poor, sugary, or salty snacks add excess calories, drive blood-sugar swings, harm teeth, and displace more nutritious foods, while all-day grazing can blunt appetite for balanced meals. Sugary drinks count as snacks in this sense and are a major contributor. The goal is structure and quality, planned mini-meals built around whole foods, not eliminating snacks (which young children often need) or moralizing about eating between meals.',

  disc: 0,
  discr: 'Behavioral sleep measures first-line; melatonin use surged in the 2010s-2020s',
  tag: 'A child\'s body clock runs on light and routine, and the explosion of evening screens, and of melatonin gummies, has made children\'s sleep a new front in daily health.',
  facts: [['Strongest clock cue', 'Light (esp. morning/evening)'], ['Teen delayed sleep phase', '~7-16% prevalence'], ['Melatonin poison-control calls', '+530% (2012-2021)'], ['First-line for sleep', 'Behavioral measures']],
  brief: 'The circadian rhythm, the roughly 24-hour body clock, governs not just sleep but many bodily functions, and in children it is set largely by light and routine. Evening bright and blue light (screens) pushes the clock later, while morning light pulls it earlier; this matters most in adolescence, when the clock naturally shifts late and delayed sleep-wake phase disorder affects an estimated 7 to 16% of teens. The first-line response is behavioral: consistent sleep-wake times, morning light, limiting evening screens and caffeine, not a pill. Yet melatonin use has surged, and with it harm: poison-control calls for pediatric melatonin ingestion rose 530% from 2012 to 2021 (most accidental, many from candy-like gummies), with hospitalizations and two deaths in children under 2. Melatonin is an unregulated supplement, not under FDA drug oversight, so dose accuracy varies.',
  uses: ['Supporting children\'s sleep through light and routine first', 'Understanding the adolescent late-clock shift', 'Recognizing evening screens and caffeine as clock-disruptors', 'Using melatonin cautiously, short-term, with a provider'],
  risk: 'Two distinct risks. First, circadian disruption itself, from late screens, irregular schedules, and early school start times clashing with the teen clock, harms sleep, mood, and learning. Second, melatonin: because it is an unregulated supplement sold in candy-like gummies, accidental ingestion has surged (a 530% rise in poison-control calls, hospitalizations, and two deaths in toddlers), and long-term effects in children are not well established, with low-quality evidence raising questions about pubertal timing. The AAP does not recommend routine melatonin use; it should be short-term, correctly dosed for age, provider-guided, and stored like medicine, never treated as a harmless nightly habit.',
  mf: [['Melatonin is a harmless natural sleep aid for kids.', 'Melatonin is a biologically active hormone sold as an unregulated supplement, not a harmless vitamin. Pediatric poison-control calls rose 530% in a decade, with hospitalizations and two toddler deaths, and the AAP does not recommend routine use. Behavioral measures come first.'], ['Screens before bed do not really affect a child\'s sleep.', 'Light is the strongest influence on the body clock, and evening bright/blue light from screens pushes sleep later. Limiting evening screens (and caffeine) is a core, first-line step for children\'s sleep.']],

  history: 'Children\'s sleep moved to the foreground as evening screens proliferated and adolescent sleep deprivation drew attention (including debates over later school start times to fit the teen body clock). In parallel, melatonin shifted from a niche aid to the second-most-common "natural" product parents give children, after multivitamins, and the resulting surge in accidental ingestions, documented by the CDC, reframed it from harmless supplement to a substance needing real caution.',
  timeline: [['2010s', 'Evening screens and adolescent sleep loss raise circadian concern'], ['2010s-2020s', 'Melatonin becomes the second-most-common supplement given to children'], ['2022', 'CDC documents a 530% rise in pediatric melatonin poison-control calls (2012-2021)'], ['2020s', 'Sleep-medicine bodies reaffirm behavioral measures first, caution on melatonin']],

  brief: 'Children\'s bodies are more than half water and they lose it constantly through breathing, sweat, and urine, so steady fluid intake matters, especially for active kids in the heat. The AAP\'s healthy-beverage guidance gives rough daily targets: about 4 cups of fluid (water and milk) per day for ages 1 to 3, about 5 cups for ages 4 to 8, and roughly 7 to 8 cups for older children, with the exact need varying by size, activity, and weather. Water and plain milk are the everyday foundation; 100% juice should be limited (about 4 oz/day for ages 1-3, up to 8 oz for older kids), and sugary drinks, caffeine, and sweeteners avoided. Importantly, babies under 6 months should not be given water, milk or formula covers their needs, and extra water can be harmful.',

  brief: 'Artificial food dyes, Red 40, Yellow 5, Yellow 6, Blue 1, and others, color a large share of foods marketed to children, and the question of whether they affect behavior has produced one of the clearest US-versus-world splits in food policy. A landmark 2007 University of Southampton study found that mixtures of certain dyes increased hyperactivity in children, leading the EU in 2010 to require a warning label that these dyes "may have an adverse effect on activity and attention in children." The US took a different path: the FDA long maintained the dyes were safe while acknowledging some children may be sensitive, until January 2025, when it banned Red 3 (erythrosine) over a rat-cancer link, with a 2027 deadline. States moved too: California banned Red 3 and barred six dyes from school food. The honest scientific read: effects on behavior are real but modest, inconsistent across children, and dyes are not the main cause of ADHD.',

  brief: 'Ultra-processed foods (UPF), industrial formulations of refined ingredients, additives, and substances rarely used in home kitchens, are categorized using the NOVA system\'s fourth group, and they now dominate many children\'s diets. The numbers are stark and vary sharply by country: roughly 67% of US children\'s calories and about 61% for UK 2-to-5-year-olds come from UPF, versus around 40% in Greece and about 25% among Brazilian schoolchildren, a real global gradient that tracks how far a country has moved from traditional diets toward "Westernized" eating. UPF tend to be calorie-dense, nutrient-poor, and engineered with sugar, fat, and salt to be highly palatable, which makes overconsumption easy. Higher UPF intake is consistently associated with weight gain and obesity risk in children, and fast early weight gain often carries into later life.',

  brief: 'How children eat is shaped not just by the food but by the screen in front of them. Two effects combine. First, distracted eating: when attention is on a screen, children miss internal fullness cues and eat more without noticing, and screen-time eating is associated with higher intake of ultra-processed foods and with overweight, one study of schoolchildren found that eating while watching TV nearly doubled the odds of high UPF consumption. Second, food advertising: screens deliver heavy marketing of sugary, salty, ultra-processed foods and drinks directly to children, shaping their preferences and requests. The constructive response is environmental, screen-free, shared family meals, structured eating times, and limiting food marketing exposure, rather than relying on a child to self-regulate against an engineered environment.',

  brief: 'Few areas of pediatric nutrition have reversed as completely as this one. Around 2000, guidelines told parents of higher-risk infants to delay dairy to age 1, eggs to 2, and peanuts, nuts, and fish to age 3. By 2008 that advice was rescinded for lack of evidence, and in 2015 the landmark LEAP trial (640 high-risk infants) flipped it entirely: infants who regularly ate peanut from 4-11 months had roughly an 81% lower rate of peanut allergy at age 5 than those who avoided it. The NIAID and AAP then recommended introducing infant-safe peanut (and other allergens) around 4-6 months, after first solids are tolerated, with medical guidance for the highest-risk infants (severe eczema and/or egg allergy). The population payoff is now visible: US food allergies in children under 3 fell about 36% from 2012-2015 to 2017-2020, with peanut allergy down about 43%.',

  brief: 'Growth charts are one of the most misread tools in pediatrics. A percentile simply describes how a child\'s height or weight compares to other children the same age and sex, the 50th is the middle of the range, not a target, and the 5th or 95th can be entirely normal for a given child. Healthy children come in a wide range of sizes, and a child at the 10th percentile who is growing steadily along their own curve is usually doing fine. What pediatricians watch is not a single number but the trend over time and consistency along a child\'s own line; a sudden crossing of percentiles (up or down) is the signal worth discussing, not the percentile itself. Research shows parents often read percentiles as grades, interpreting a high number as "good" and a low one as "bad," which drives unnecessary anxiety and sometimes unnecessary supplementation.',
  uses: ['Interpreting a percentile as a comparison, not a grade', 'Focusing on a child\'s own growth trend over time', 'Reducing anxiety over a single low or high number', 'Knowing when a percentile change is worth discussing'],

  brief: 'Few supplement topics carry more locker-room and social-media pressure on teens than creatine and protein. Two honest threads. Protein: most teenagers already meet or exceed their protein needs (RDA roughly 46 g/day for teen girls, 52 g for boys) through food, so protein powders are usually unnecessary, a single scoop plus normal meals can push a 13-year-old well past their daily target. Creatine: it is one of the most-studied supplements, and the International Society of Sports Nutrition considers creatine monohydrate generally safe and potentially effective for adolescent athletes (around 16+) who are in serious supervised training, eating well, and using it with guidance. The AAP and many sports bodies take a more conservative, food-first stance, urging young athletes to build a foundation through training, diet, and sleep first, not citing toxicity, but counseling that supplements are supplementary.',

  brief: 'Choline is an essential nutrient, important for brain structure, the neurotransmitter acetylcholine, and the handling of DHA, with recommended intakes of 200 mg/day for ages 1-3 and 250 mg for 4-8. It is found mostly in animal foods (egg yolks, meat, fish, dairy), so some children, especially those eating little of these, may fall short. Where the marketing gets ahead of the science is the "brain booster" gummy: combining choline, DHA, and B vitamins under claims of sharper memory and focus. The strongest choline-cognition evidence comes from specific contexts (early-life development, and clinical situations like fetal alcohol spectrum disorder), not from boosting cognition in already well-nourished, healthy children. Choline is essential and worth getting from food; a "brain" gummy is not a proven way to make a healthy child smarter.',
  uses: ['Meeting choline needs, primarily through food', 'Covering shortfall in children who eat few animal foods', 'Understanding the limits of "brain booster" claims', 'Distinguishing essential-nutrient adequacy from cognitive enhancement'],
  risk: 'Choline is generally safe within the upper limit (1,000 mg/day for ages 1-8); very high intakes can cause a fishy body odor, sweating, and GI effects. The real issue is expectation: "brain" supplements marketed to make healthy children smarter or more focused rest on evidence from deficiency or clinical contexts, not from enhancing typical kids, so the cognitive-boost promise is largely unproven. As with all gummies, sugar and over-consumption apply. Food-first (eggs are a standout source) covers most children, and any concern about a child\'s development belongs with a provider, not a supplement label.',
  mf: [['"Brain" supplements with choline and DHA make healthy kids smarter or more focused.', 'The strong evidence is from early development and clinical conditions, not from boosting cognition in well-nourished healthy children. The "brain booster" claim outruns the evidence for typical kids.'], ['Choline does not matter for children.', 'It is genuinely essential for brain structure and neurotransmission, and some kids who eat few animal foods fall short. The point is not that choline is unimportant, it is that food covers most children and a gummy is not a cognitive upgrade.']],

  brief: 'Fiber stands out in the children\'s nutrition aisle because the shortfall is real: most children eating a typical Western diet do not get enough. A common rule of thumb is "age plus 5" grams per day for children 2 and older (so a 6-year-old, about 11 g), and average intakes run well below recommendations. Fiber supports regularity and helps prevent constipation, feeds gut bacteria (producing beneficial short-chain fatty acids), and contributes to metabolic and cardiovascular health. The clear best source is whole food, fruits, vegetables, legumes, and whole grains, which deliver fiber along with vitamins, water, and other nutrients a gummy lacks. Fiber gummies can bridge a gap for picky eaters short-term, but pediatric GI guidance specifically advises against gummies when precise therapeutic dosing is needed (powders like psyllium are preferred under clinician direction).',

  disc: 2020,
  discr: 'WHO 2020: avg 60 min/day MVPA for ages 5-17',
  tag: 'The single most evidence-backed thing for a child\'s body and brain is not in any bottle, it is about an hour of daily movement, and roughly three in four adolescents worldwide fall short.',
  facts: [['Standard', 'Avg 60 min/day moderate-vigorous (5-17)'], ['Plus', 'Muscle/bone strengthening 3 days/week'], ['Not meeting it (adolescents)', '~73% worldwide'], ['Screen-time guide', '≤2 hr/day recreational']],
  brief: 'If the supplement aisle promises focus, mood, strong bones, and a healthy weight, daily physical activity is the intervention that actually delivers them, and it is free. The WHO and CDC recommend that children and adolescents (5-17) get an average of at least 60 minutes per day of moderate-to-vigorous activity across the week, with muscle- and bone-strengthening activity on at least 3 days. The documented benefits are broad and well-evidenced: better cardiorespiratory and muscular fitness, healthier blood pressure, blood sugar and lipids, stronger bones, reduced body fat, fewer symptoms of depression, and, notably, cognitive benefits including academic performance and executive function. The gap is stark: by WHO estimates, nearly three-quarters of adolescents worldwide do not meet the guideline. "Doing some is better than none" is the official message, any movement counts, and more than 60 minutes brings additional benefit.',
  uses: ['Hitting the ~60 min/day moderate-vigorous target', 'Including strengthening activity 3 days/week', 'Supporting mood, focus, and academic performance', 'Reducing obesity and cardiometabolic risk'],
  risk: 'Physical activity is overwhelmingly beneficial and safe; the main cautions are sensible ones, gradual progression, hydration, appropriate gear and supervision for contact and high-impact sports, and balancing intense single-sport specialization (overuse-injury and burnout risk) with varied play. The larger "risk" is the inverse: too little activity tracks with higher overweight and obesity (in one study of 1,002 children, those under 60 min/day of moderate-vigorous activity had greater overweight/obesity risk), and high sedentary screen time is associated with poorer mental health. This is the rare entry where the corrective is doing more, not consuming a product.',
  mf: [['Supplements can substitute for the benefits of exercise.', 'No supplement reproduces the broad, evidence-backed benefits of daily activity, fitness, bone and cardiometabolic health, reduced body fat, better mood, and improved cognition and academic performance. Movement is the intervention; pills are not a substitute.'], ['Kids are naturally active enough, so guidelines do not matter.', 'By WHO estimates about three-quarters of adolescents worldwide miss the 60-minute target, and low activity tracks with higher obesity and poorer mental health. Most children today are not getting enough, which is exactly why the standard exists.']],

  tag: 'A timeline of how children\'s free, outdoor, and creative play has shrunk, with the trends researchers say moved alongside it, presented as documented parallels, not proven cause.',
  facts: [['"Golden Age" of free play', 'First half of 20th c. (Chudacoff)'], ['Play decline, ages 6-8', '~25% (1981-1997)'], ['Mothers citing screens', '85%'], ['Mothers citing safety fears', '82%']],
  brief: 'Childhood play has measurably contracted. The historian Howard Chudacoff called the first half of the 20th century the "Golden Age of Unstructured Play"; in the second half, free play declined sharply. One often-cited analysis found that time children aged 6-8 spent in play fell about 25% between 1981 and 1997, and unstructured outdoor play among children 3-12 dropped over the decades since the 1970s. Surveys point to two main drivers: about 85% of mothers cited television and screens, and, strikingly, 82% cited safety fears, with many acknowledging they themselves restricted their children\'s outdoor play. Schools changed too: a 2008 report found that 20% cut recess between 2001-02 and 2006-07, and roughly 30% of children had little to no recess, with high-poverty schools 4-5 times more likely to lack it. Researchers including Peter Gray and Jean Twenge have documented that rising childhood anxiety and depression appear to move in parallel with this decline, a correlation they take seriously, though it is not proof of cause.',
  uses: ['Understanding the historical shrinkage of free play', 'Naming the drivers (screens, safety fears, recess cuts)', 'Seeing the documented parallel with mental-health trends', 'Comparing policy responses across countries'],
  risk: 'The honest caution here is interpretive: the parallel rise in childhood anxiety and depression alongside falling free play is a documented correlation, and researchers like Gray argue it is causally meaningful, but many factors changed over the same decades (screens, academic pressure, social media, economics), so this is association, not established causation. The practical, low-risk response is well supported regardless: protect daily free play (the CDC suggests at least 60 minutes, preferably outdoors), keep recess as a daily, non-punitive activity, and provide safe nearby places to play. Restoring play carries little downside and broad developmental upside.',
  mf: [['The decline in free play is just nostalgia, not a real measurable change.', 'It is documented: historians and surveys record a "Golden Age" of unstructured play giving way to a sharp decline, a ~25% drop for ages 6-8 from 1981-1997, falling outdoor play, and widespread recess cuts. The change is real and measured.'], ['Falling play definitely caused rising childhood anxiety and depression.', 'The two trends move in parallel and researchers take the link seriously, but many things changed over the same period. It is a documented correlation, not proven causation, and we present it as such.']],

  history: 'From a documented early-20th-century peak of unstructured, child-directed play, the second half of the century saw a steep decline driven by screens, safety-driven parental restriction, longer school days, academic pressure, and recess cuts. A few governments (such as Hungary and Taiwan) took policy steps to protect children\'s play opportunities, while developmental researchers increasingly framed the loss of play as a public-health concern, tracking its apparent parallel with rising youth anxiety and depression.',

  tag: 'For vomiting and diarrhea, the right fluid is an oral rehydration solution, not a sports drink, the sugar-to-sodium balance is the whole point, and worldwide it is a life-saver.',
  facts: [['WHO ORS', '~75 mEq/L sodium, ~75 mmol/L glucose'], ['Sports drinks', 'Too much sugar, too little sodium'], ['ORS-treated needing IV', 'Only ~1 in 25'], ['Pedialyte vs Gatorade sugar', '100 vs ~240 kcal/L']],
  brief: 'When a child has vomiting or diarrhea, the goal is to replace fluid and salts in the right proportions, and that is precisely what an oral rehydration solution (ORS) is engineered to do. The WHO reduced-osmolarity formula carries roughly 75 mEq/L sodium and 75 mmol/L glucose (total osmolarity around 245), a ratio that drives the sodium-glucose cotransporter to pull water back into the body. Sports drinks, sodas, and juices fail this test, too much sugar (which can worsen diarrhea) and too little sodium, and clinical guidance says they should not be used for rehydration during GI illness. ORS works remarkably well: only about 1 in 25 children treated with it need IV fluids. Commercial ORS (e.g., Pedialyte: ~100 kcal/L, ~1,035 mg sodium/L) differs sharply from Gatorade (~240 kcal/L, ~465 mg sodium/L). Globally, ORS is one of the great low-cost child-survival tools, where price and access are barriers, free distribution sharply raises use.',
  uses: ['Rehydrating during vomiting and diarrhea', 'Choosing ORS over sports drinks for GI illness', 'Avoiding IV fluids in mild-to-moderate dehydration', 'Understanding the global child-survival role of ORS'],
  risk: 'ORS is safe and effective for mild-to-moderate dehydration when a child can take fluids by mouth, but some situations need a clinician: infants under 1 year (consult the pediatrician first), signs of severe dehydration, persistent vomiting, bloody stools, or extreme sodium imbalances. Sports drinks and sodas are not appropriate substitutes during GI illness. In mild cases, evidence supports flexible options, one trial found half-strength apple juice followed by preferred fluids was non-inferior (even superior on some measures) to electrolyte solution, but that applies to mild dehydration, not significant illness. When in doubt about a sick, dehydrated child, the safe move is contacting a provider.',
  mf: [['Sports drinks like Gatorade are good for rehydrating a sick child.', 'For vomiting and diarrhea, sports drinks have too much sugar (which can worsen diarrhea) and too little sodium; clinical guidance says they should not be used. An oral rehydration solution with the right sodium-glucose balance is the standard.'], ['A dehydrated child usually needs IV fluids.', 'For mild-to-moderate dehydration, oral rehydration works for the large majority, only about 1 in 25 children treated with ORS need IV fluids. ORS first is the evidence-based approach when a child can drink.']],

  history: 'Oral rehydration therapy, developed and refined through the late 20th century, transformed the treatment of childhood diarrhea, one of the leading global causes of child death, and the WHO\'s shift to a reduced-osmolarity formula further improved outcomes. In wealthy countries the same science underlies commercial products like Pedialyte, while globally ORS (often paired with zinc) remains among the most cost-effective child-survival interventions, with access and price the main remaining barriers.',

  rel: ['sports-drinks', 'hydration', 'zinc-kids', 'vitamin-a-global'],
