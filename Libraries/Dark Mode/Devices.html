</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{background:#070c18;font-family:"Helvetica Neue",Helvetica,-apple-system,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::selection{background:#2D9AAD;color:#fff;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(133,212,224,0.18);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(133,212,224,0.32);}
input::placeholder{color:#5f7888;}
input:focus{outline:none;border-color:rgba(91,196,214,0.5)!important;box-shadow:0 0 0 2px rgba(45,154,173,0.12);}
button{font-family:inherit;}
#mainscroll{scroll-behavior:smooth;}
table{font-family:inherit;}

/* ── GLOBAL COSMIC STAGE (behind detail/category/search/compare) ── */
.cosmic-stage{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 44% at 50% 4%, rgba(212,160,23,0.10), transparent 58%),
    radial-gradient(ellipse 80% 50% at 50% 10%, rgba(45,154,173,0.12), transparent 60%),
    radial-gradient(ellipse 90% 55% at 50% 112%, rgba(45,154,173,0.10), transparent 62%),
    linear-gradient(180deg,#04070d 0%,#070c18 40%,#0a1426 100%);}
/* faint diagonal galaxy arc */
.mw-arc{position:absolute;inset:auto -16% 24% -16%;height:54%;
  background:
    radial-gradient(ellipse 60% 58% at 42% 60%, rgba(140,175,225,0.16) 0%, rgba(140,175,225,0.05) 40%, transparent 70%),
    radial-gradient(ellipse 44% 44% at 64% 52%, rgba(175,135,225,0.11) 0%, transparent 64%),
    radial-gradient(ellipse 40% 40% at 30% 66%, rgba(130,205,224,0.10) 0%, transparent 64%);
  transform:rotate(-13deg);filter:blur(6px);opacity:.85;}

/* ── REALISTIC STARFIELD ──
   Three coordinated layers: fine field, mid field, and bright glow-stars.
   Bright stars get a soft halo via a larger faint radial at the same point. */
.stars,.mw-stars{position:absolute;inset:0;
  background-image:
    radial-gradient(1.2px 1.2px at 7% 18%,#eaf3ff 99%,transparent),
    radial-gradient(1px 1px at 13% 41%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 19% 9%,#fff 99%,transparent),
    radial-gradient(1.4px 1.4px at 23% 63%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 29% 27%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 34% 78%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 39% 14%,#fff 99%,transparent),
    radial-gradient(1px 1px at 44% 49%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 48% 88%,#c4d8ff 99%,transparent),
    radial-gradient(1.4px 1.4px at 53% 33%,#fff 99%,transparent),
    radial-gradient(1px 1px at 58% 70%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 63% 11%,#bcd2ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 68% 54%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 73% 84%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 78% 23%,#fff 99%,transparent),
    radial-gradient(1.3px 1.3px at 83% 61%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 88% 38%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 93% 73%,#eef5ff 99%,transparent),
    radial-gradient(1.2px 1.2px at 97% 16%,#fff 99%,transparent);
  background-repeat:no-repeat;animation:twinkle 7s ease-in-out infinite alternate;}
.stars.layer-2{
  background-image:
    radial-gradient(1px 1px at 5% 55%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 16% 84%,#fff 99%,transparent),
    radial-gradient(1px 1px at 27% 47%,#bcd2ff 99%,transparent),
    radial-gradient(1px 1px at 36% 92%,#dce9ff 99%,transparent),
    radial-gradient(1px 1px at 49% 19%,#eef5ff 99%,transparent),
    radial-gradient(1px 1px at 61% 87%,#cfe0ff 99%,transparent),
    radial-gradient(1px 1px at 71% 40%,#fff 99%,transparent),
    radial-gradient(1px 1px at 82% 92%,#c4d8ff 99%,transparent),
    radial-gradient(1px 1px at 91% 57%,#dce9ff 99%,transparent);
  animation-duration:10s;animation-direction:alternate-reverse;opacity:.7;}
/* bright glow-stars: a sharp core + a soft halo around a handful of points */
.stars-bright,.mw-stars-bright{position:absolute;inset:0;
  background-image:
    radial-gradient(2px 2px at 21% 30%,#fff 60%,rgba(255,255,255,0.0) 100%),
    radial-gradient(7px 7px at 21% 30%,rgba(207,224,255,0.5) 0%,transparent 70%),
    radial-gradient(2px 2px at 57% 22%,#fff 60%,transparent 100%),
    radial-gradient(8px 8px at 57% 22%,rgba(173,135,225,0.4) 0%,transparent 70%),
    radial-gradient(2.4px 2.4px at 79% 58%,#fff 60%,transparent 100%),
    radial-gradient(9px 9px at 79% 58%,rgba(130,205,224,0.45) 0%,transparent 70%),
    radial-gradient(2px 2px at 40% 70%,#fff 60%,transparent 100%),
    radial-gradient(7px 7px at 40% 70%,rgba(207,224,255,0.4) 0%,transparent 70%);
  background-repeat:no-repeat;animation:twinkle 5s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.5}50%{opacity:.95}100%{opacity:.6}}

/* gold celestial beam, V9 signature, behind dark views */
.beam-gold{position:absolute;left:50%;top:-20%;width:220px;height:92%;transform:translateX(-50%) rotate(8deg);

  history: 'Light as medicine is ancient: Greek, Egyptian, and Ayurvedic traditions used heliotherapy (sun exposure) for skin and mood, and sun-cure practices appear across non-Western healing systems. Modern phototherapy began with Danish-Faroese physician Niels Ryberg Finsen, who won the 1903 Nobel Prize in Medicine for treating lupus vulgaris with concentrated light, founding the field of clinical light therapy. The specific phenomenon of low-level light stimulating tissue (photobiomodulation) was discovered by accident in 1967 by Endre Mester at Semmelweis University in Budapest, Hungary: testing whether ruby laser caused cancer in mice, he instead found faster hair regrowth and wound healing. Through the 1980s and 1990s this was studied as low-level laser therapy. In 1993 NASA-linked work using red LEDs for plant growth led, with Harry Whelan at the Medical College of Wisconsin, to wound-healing research for astronauts and Navy crews. The 2000s and 2010s brought cheaper high-power LEDs, the cytochrome c oxidase mechanism (Karu, Poyton, Hamblin), and a wave of consumer panels and masks.',

  brief: 'The headline evidence comes from the Kuopio Ischaemic Heart Disease (KIHD) cohort in eastern Finland, led by Jari and Tanjaniina Laukkanen. In a 2015 JAMA Internal Medicine analysis of 2,315 middle-aged men followed a median 20.7 years, men using a sauna 4 to 7 times weekly versus once weekly had lower sudden cardiac death (HR 0.37), fatal cardiovascular disease (HR 0.50), and all-cause mortality (HR 0.60), with longer sessions tracking further reductions. Later KIHD papers reported lower incident hypertension (Zaccardi 2017; HR about 0.54) and lower dementia and Alzheimer\'s risk (Laukkanen 2017, Age and Ageing; roughly 65 to 66% lower). A 2018 BMC Medicine extension added women (1,688 participants, median 15 years) and found cardiovascular mortality HR 0.23 for the most frequent users. These are consistent, dose-responsive, and adjusted for fitness and known risk factors. They remain observational: frequent sauna users are likely healthier, wealthier, and more active in ways no model fully captures, so causation is not established. Reverse causation (sick people sauna less) is plausible. There are no large randomized trials proving sauna prevents death. Infrared evidence is thinner; the strongest is Japanese Waon therapy (far-infrared at 60 C), where the randomized WAON-CHF study in heart-failure patients showed improved ejection fraction and lower BNP, a clinical population, not primary prevention.',

  history: 'Heat bathing is one of humanity\'s oldest and most globally distributed health practices, and its lineage is far more non-Western than the modern Finnish sauna branding suggests. In Finland the earliest form was the savusauna, a smoke sauna: an earthen dugout or log room where a large stone pile (kiuas) was heated by burning wood for hours, the smoke vented, and water thrown on the stones for steam (loyly). It served for bathing, childbirth, healing, and even preparing the dead. In parallel and entirely independently, Indigenous peoples across North America built sweat lodges, dome frames covered with hides or earth where water is poured over fire-heated stones, used as sacred purification ceremonies, not mere hygiene. In Mesoamerica the temazcal (from Nahuatl temazcalli, house of heat) was used by Maya, Aztec, and Toltec cultures for ritual cleansing, healing, and postpartum recovery, and survives in Mexico today. The Russian banya, of Finno-Ugric roots and recorded in Novgorod by the 11th century, paired intense steam with birch-branch whisking (venik). Across the Islamic world the hammam grew from Roman and Byzantine bathing into a central social and spiritual institution from North Africa to Anatolia. Roman thermae industrialized heat bathing with hypocaust underfloor heating and graded hot, warm, and cold rooms. In East Asia, Japanese onsen and sento bathing and Korean kiln saunas (the ancestors of today\'s jjimjilbang, traceable to roughly the 15th century) built their own deep heat-bathing cultures. The thread connecting all of them, steam and fire-heated stone for cleansing, healing, and community, long predates any clinical study.',

  history: 'Cold water as medicine is ancient and global. The Edwin Smith papyrus (Egypt, about 1600 BCE) records cold applications for swelling and abscesses, and Hippocrates in the 5th to 4th century BCE used cold and snow to reduce swelling, pain, and bleeding. Far from being a Western invention, cold-water purification is central to non-Western spiritual life: in Japanese Shinto, misogi has practitioners stand beneath icy waterfalls to cleanse body and spirit, a living tradition still practiced at sacred waterfalls today. Russian Orthodox communities plunge through ice (the Epiphany cold dip), and Nordic peoples have long paired sauna with winter swimming and ice-hole bathing. The modern Western therapeutic strand grew from 19th-century hydrotherapy: the Silesian farmer Vincenz Priessnitz built cold-water cure sanatoriums in the 1820s, and the Bavarian priest Sebastian Kneipp systematized cold affusions and contrast applications later in the century, seeding spas across Europe and North America. The 21st-century revival fused this lineage with sports recovery science and, via Wim Hof and online creators, mass wellness culture.',

  brief: 'The Oura Ring estimates sleep, heart-rate variability, respiratory rate and skin-temperature deviation using infrared photoplethysmography (PPG), an accelerometer and thermistors on the palmar finger surface. Sleep-staging validation is moderate and improving. de Zambotti and colleagues benchmarked early generations against polysomnography (PSG); Oura\'s Sleep Staging Algorithm 2.0 was validated by Ghorbani et al. (2024, Sleep Medicine) across 96 participants and 421,045 epochs, reporting per-stage sensitivity of roughly 74 to 98%. A Brigham and Women\'s Hospital comparison (2024) ranked Oura strongest among tested consumer devices for four-stage classification. Khan et al. (2025, OTO Open) pooled six studies (388 participants) and found no statistically significant mean differences from PSG for total sleep time, efficiency or stage percentages, though a 2025 Scientific Reports analysis in patients with actual sleep disorders found all-stage accuracy falling near 53%. Temperature and illness signals were studied in UCSF\'s TemPredict cohort (Mason et al., Scientific Reports 2022), where multi-signal changes preceded COVID-19 diagnosis by an average of 2.75 days. Critically, what Oura measures (movement, pulse waveform, temperature deviation) is distinct from what it infers. The Readiness Score is a proprietary composite that has not been independently validated against any clinical recovery outcome, and HRV and readiness should be read as relative trends, not diagnostic values.',

  brief: 'WHOOP is a screenless subscription wrist band that uses wrist photoplethysmography (PPG) to capture heart rate, heart rate variability (HRV), respiratory rate and skin temperature, then folds them into proprietary Recovery, Strain and Sleep scores. The underlying signals have reasonable independent support. Miller and colleagues (Journal of Sports Sciences, 2020) validated the strap against polysomnography and found 89% agreement for wake-versus-sleep (Cohen kappa 0.49) but weaker four-stage staging (64% agreement). Bellenger and colleagues (Sensors, 2021) reported acceptable HR agreement versus ECG and low HRV bias using WHOOP\'s proprietary filter. A 2025 nocturnal study (Dial et al., Physiological Reports) ranked WHOOP 4.0 just behind Oura for resting HR and HRV across 536 nights in 13 adults. The honest gap is the scores themselves: Recovery and Strain are black-box composites whose weighting and error correction are undisclosed, so they are educated estimates rather than validated measures. WHOOP\'s own high accuracy claims trace to a sleep-context study and should be read as brand framing. The 2024 to 2026 period was defined by celebrity capital: Cristiano Ronaldo joined as investor and ambassador in 2024, alongside LeBron James and Rory McIlroy, helping drive the valuation. Regulatory friction also arrived: an FDA 510(k) ECG clearance in 2025, then a July 2025 warning letter over the unauthorized Blood Pressure Insights feature, which WHOOP publicly contested as a wellness tool.',

  brief: 'PEMF delivers low-frequency magnetic pulses that induce tiny electrical currents in tissue. Its strongest evidence is orthopedic and narrow. Bassett, Pawluk and Pilla (Science, 1974) demonstrated bone healing in dogs, and the FDA approved non-invasive bone-growth stimulators for fracture nonunion in 1979. Devices like Orthofix PhysioStim (a 139-subject nonunion study reported roughly 80% healing) and SpinalStim (lumbar fusion adjunct) hold genuine premarket approvals; ActiPatch earned a 2017 510(k) clearance for knee osteoarthritis and plantar fasciitis, and SofPulse is cleared for post-operative edema. Pain literature is mixed. Tong et al. (2022, Pain Research and Management) pooled 11 RCTs (614 patients) and found PEMF improved osteoarthritis pain, stiffness and function, while an earlier systematic review (McCarthy 2006) concluded PEMF offered no clinical benefit for knee-OA pain. Reviews for shoulder impingement (2025) and low-back pain show small, heterogeneous, often short-term effects. Crucially, PEMF is NOT FDA-approved for depression; that space belongs to transcranial magnetic stimulation (NeuroStar) and cranial electrotherapy, which are distinct technologies often conflated in marketing. Consumer wellness mats advertising circulation, sleep, detox and energy benefits rest on weak or absent controlled evidence and are typically only FDA-listed, a status that certifies nothing about effectiveness. The honest summary: a legitimate, regulated medical niche plus a large, under-evidenced wellness market wearing the same name.',

  brief: 'TENS delivers low-voltage electrical pulses through skin electrodes to modulate how pain signals reach the brain. Its modern rationale comes from the gate control theory of pain published by Ronald Melzack and Patrick Wall in Science in 1965, which proposed that non-painful sensory input can close a spinal gate and reduce transmission of painful input at the dorsal horn. Conventional high-frequency TENS is thought to recruit this gating mechanism, while low-frequency settings appear to drive release of endogenous opioids; both pathways have animal and human support, making the mechanism one of the better-characterized parts of the field. Clinical efficacy is more uneven. An overview of Cochrane Reviews led by William Gibson (2019) judged the underlying evidence very low quality and could not confidently say whether TENS helps chronic pain. By contrast, the large meta-TENS analysis by Mark Johnson and colleagues (BMJ Open, 2022) pooled 381 randomized trials with 24,532 participants and reported moderate-certainty evidence that TENS lowers pain intensity during and just after stimulation versus placebo, with a standardized mean difference near 0.96. The gap reflects differences in how trials were grouped, dosing, blinding, and outcome timing. Results tend to be stronger for some acute and procedural pain and weaker or inconsistent for diffuse chronic pain. TENS is low-risk, drug-free, and patient-controlled, which keeps it widely used in physiotherapy and home settings even where high-quality outcome data remain limited.',

  brief: 'Hyperbaric oxygen therapy (HBOT) has patients breathe near-100% oxygen at 2 to 3 atmospheres, dissolving far more oxygen into plasma than normal breathing allows. The Undersea and Hyperbaric Medical Society (UHMS) recognizes roughly 14 to 17 approved indications, and the FDA clears chambers as Class II devices for these. The strongest evidence covers decompression sickness, carbon monoxide poisoning, gas gangrene, crush injury, delayed radiation injury, and refractory wounds. A Cochrane review (Kranke et al.) found HBOT improves diabetic foot ulcer healing at six weeks, though longer-term and amputation benefits are less certain. The wellness story is weaker. Efrati and colleagues (Aging, 2020) reported that 60 sessions lengthened telomeres up to 38% and cut senescent cells up to 37% in 35 healthy older adults, but the trial was small, uncontrolled, and used surrogate cell measures rather than health outcomes, so it cannot show that anyone aged more slowly. Companion RCTs (Hadanny and Efrati 2020 on cognition; Zilberman-Itskovich 2022 on post-COVID symptoms) are larger and sham-controlled but still single-center and short. Independent replication is thin. Safety is the sharp edge: oxygen-rich chambers are fire hazards, and 2025 saw fatal chamber fires, including a 5-year-old in Michigan and a clinician in Arizona, both tied to ignition in an oxygen-saturated space. Barotrauma to ears and sinuses and oxygen toxicity (seizures) are recognized risks. Home soft-shell units running ~1.3 ATA deliver a fraction of clinical pressure and are largely unregulated for the longevity claims marketed around them.',
